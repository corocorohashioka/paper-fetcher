t strategies have differing effects across impact categories. Measures targeting food composition and consumption, such as reducing beef consumption and plate waste, lead to consistent reductions across several indicators, whereas strategies focused on sourcing and production methods, such as organic and local, yield more mixed outcomes, with improvements in some categories but increases in others. Substituting minced beef with local game and reducing food waste result in the largest overall reductions, while increasing organic procurement leads to relatively small changes across most indicators. These findings highlight the importance of multi-indicator assessments and show that focusing on a single indicator, or target, risks overlooking trade-offs. The study provides empirical evidence supporting more targeted, evidence-based procurement strategies and highlights the need for improved life cycle inventory data.", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103141", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.foodpol.2026.103141"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103131", "title": "Agricultural workers’ employment cycles and churn in the Supplemental Nutrition Assistance Program: A descriptive analysis", "authors": "Casey J. McNichols, Charlotte E. Ambrozek, Timothy K.M. Beatty", "abstract": "", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103131", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.foodpol.2026.103131"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103137", "title": "Framing plant-rich eating: an analysis of nutritional public policies in Portugal", "authors": "Cristina Romanelli", "abstract": "The ways in which governments legitimize and promote plant-rich eating remain underexplored, particularly in contexts where animal-based foods retain strong cultural and political significance. Focusing primarily on nutritional governance, this study examines the institutional mechanisms through which plant foods and plant-rich practices have been framed as objects of public intervention in Portugal since the inception of the National Program for the Promotion of Healthy Eating in 2012. Adopting a qualitative, discourse-oriented, and semiotically informed approach, the study conceptualizes public intervention as a dispositif that actively shapes meanings and norms around food. Findings show that the legitimization of plant-rich eating relies on strategically cautious discourse emphasizing health, sustainability, and heritage, while avoiding explicit advocacy of vegetarianism. The Mediterranean diet emerges as the primary legitimizing model, enabling plant foods without challenging the centrality of meat and fish. Risk prevention and responsibilization further structure these discourses, framing citizens as self-monitoring consumers. Ultimately, plant-rich eating is cautiously legitimized yet continually negotiated, absorbed into broader narratives of health, sustainability, and national identity. As the first European country to legally require the availability of vegetarian meals in public canteens, Portugal offers insights for other national contexts, particularly regarding discursive strategies, risk-based governance, the symbolic status of animal and plant products, and the role of institutional environments in normalizing plant-rich eating. These findings also resonate with developments elsewhere while highlighting context-specific dynamics.", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103137", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.foodpol.2026.103137"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103136", "title": "Predictable patterns of protest: The impact of agricultural cycles on social unrest in Kenya", "authors": "Nicole Robiro, Sophia Seelos", "abstract": "", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103136", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.foodpol.2026.103136"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103130", "title": "Greenwashed groceries: prevalence and patterns of environmental marketing and greenwashing in the retail food sector", "authors": "Erin O’Dwyer, Jennifer Weeks, Eric B. Rimm, Kevin Cody, Emma-Louise Aveling, Teck Ming Tan, Erica L. Kenney", "abstract": "", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103130", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.foodpol.2026.103130"}, {"source": "crossref", "source_id": "10.1002/ajae.v108.4", "title": "", "authors": "", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-08-01", "url": "https://doi.org/10.1002/ajae.v108.4", "fetched_at": "2026-07-07T08:02:26", "id": "crossref:10.1002/ajae.v108.4"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103133", "title": "Cropland use consequences of a nationwide poverty alleviation relocation program in China", "authors": "Xinyuan Lei, Xiangwen Kong, Huanguang Qiu, Yawen Ding", "abstract": "", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103133", "fetched_at": "2026-06-25T08:01:09", "id": "crossref:10.1016/j.foodpol.2026.103133"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103115", "title": "Food price inflation forecasting: Insights from a Macroeconomic Auto-Regressive Random Forest approach", "authors": "William McWilliams, Shamar L. Stewart, Olga Isengildina Massa", "abstract": "", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103115", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103115"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103129", "title": "Managed urbanization and agricultural productivity: evidence from China’s New-type urbanization pilot program", "authors": "Tianxiang Li, Yuanyi Liao, Tomas Baležentis, Zhiyang Shen", "abstract": "", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103129", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103129"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103121", "title": "The state of global food insecurity measurement: A mix of methods, and a mix of messages", "authors": "Derek Headey", "abstract": "Robust food insecurity indicators are needed for monitoring development targets, emergency responses, and rationally allocating foreign aid. For decades, global food security monitoring relied on the FAO’s prevalence of undernourishment, but this indicator’s fundamental limitations led the FAO to develop the Food Insecurity Experience Scale (FIES) and adopt the unaffordability of the healthy diet. In parallel, The World Bank monitors monetary poverty, arguably a food insecurity indicator in its own right. In this study we assess whether this larger suite of indicators agrees on: (a) which countries are most food insecure; and (b) whether global food insecurity is really deteriorating. Unfortunately, this new mix of methods produces mixed messages. Longstanding criticisms of the prevalence of undernourishment still apply, while rising undernourishment in the past decade is driven by modelled increases in calorie inequality that are inconsistent with income inequality trends. The FIES fares no better: severe FIES food insecurity is higher in several Latin American and Caribbean countries than in extremely food-insecure African countries such as Niger. The World Bank’s poverty and healthy diet affordability monitoring efforts are significantly constrained by systematically fewer household surveys in poorer and more crisis-affected countries. How can this situation be improved? First, experience-based indicators need to be more rigorously evaluated for cross-cultural comparability, and alternatives need to be considered. Second, international agencies and national governments should pool resources to implement coordinated, high-frequency, multi-purpose surveys – focusing on poor and crisis-affected countries – to jointly monitor food insecurity, poverty and malnutrition, as well as their root causes.", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103121", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103121"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103116", "title": "Strait of Hormuz disruption, fertilizer market transmission, and food policy response", "authors": "Sandro Steinbach, Shawn Arita, Rwit Chakravorty, Jiyeon Kim, Ming Wang", "abstract": "", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103116", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103116"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103112", "title": "Is newer better? The effect of varietal age on real-world maize yield in Kenya", "authors": "Michael K. Ndegwa, Paul N. Nyangáu, Sarah Kariuki, Moti Jaleta, Hope Michelson, Jill Cairns", "abstract": "Maize varietal turnover is widely promoted across Sub-Saharan Africa to improve crop productivity and increase food security, yet its impact on yields remains poorly understood amid heterogeneous agroecological and socioeconomic conditions. This study quantifies the yield effects of varietal age in Kenya using a three-wave panel survey (2023-2024) of 4,160 smallholder households across Kenya. Using entropy balancing and weighted regression models to isolate the effect of varietal age on maize yield, we find a strong and consistent relationship between varietal age and yield. New varieties yield 147 kg/ha more than old ones in the long rains and 91 kg/ha more in the short rains. Finer age categorization reveals that switching to ultra-new varieties (0-5 years) delivers the highest gains-360 kg/ha over ultra-old varieties (21+ years) in the long rains and 269 kg/ha in the short rains. These findings suggest that slow varietal turnover carries significant opportunity costs in the form of forgone yield gains. While farmers generally perceive new varieties favorably-particularly for yield potential, early maturity and grain quality-concerns around labor intensity and resilience remain, potentially dampening adoption. Providing farmers with clear, locally relevant performance data and opportunities for on-farm experimentation can help shift perceptions and support wider uptake. Policies and programs that expand access to newer, better-performing varieties and strengthen seed quality assurance are essential for translating genetic gains into productivity improvements across Kenya's bimodal maize production systems.", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103112", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103112"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103117", "title": "Do Producer organizations Promote Climate-Smart Agriculture? assessing direct and spillover effects in Nigeria", "authors": "Abebayehu Girma Geffersa, Martin Paul Jr. Tabe-Ojong", "abstract": "Climate change threatens the livelihoods of millions of smallholder farmers in sub-Saharan Africa and beyond, yet the adoption of Climate-Smart Agriculture (CSA) remains low. In this paper, we examine the role of producer organizations (POs) in promoting CSA adoption among their members and non-members through spillover effects. We rely on a three-wave panel dataset of over 1,500 farm households fielded between 2017 and 2019 and estimated the multivariate probit model to capture interdependencies in adopting four key CSA practices: climate-resilient groundnut varieties (CRVs), organic fertilizers, crop rotation, and intercropping. We also examine the association between POs and the adoption intensity of CSA practices, including number of CSA practices used and area under CRVs. Employing the Mundlak–Chamberlain device to address time-invariant unobserved heterogeneity, we find that PO membership is positively associated with the adoption of CSA practices. Beyond the independent use of these CSA practices, we also highlight a positive association between POs and both the adoption intensity and the joint use of these practices which indicates bundling. Importantly, positive spillover effects are observed among non-members, especially for low-cost, easily observable practices such as intercropping and crop rotation, indicating the role of peer learning and informal networks. Conversely, spillovers are less evident for input-intensive practices such as CRVs and organic fertilizers, highlighting the need for targeted support. The results point to two distinct adaptation pathways: a technology-driven strategy reliant on financial and institutional resources, and a diversification-driven strategy based on cost-effective, observable practices. Overall, the study demonstrates the critical role of POs in fostering resilient and sustainable agricultural systems through both direct engagement and community-wide spillovers.", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103117", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103117"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103132", "title": "Premium procurement channel access and farm-gate prices: evidence from rice farmers in China", "authors": "Junjie Li, Jianping Li, Qin Xiao, Haixia Wu, Di Liu", "abstract": "", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103132", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103132"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103106", "title": "Shrinkflation, unit price disclosure, and consumer welfare: Evidence from canned tuna", "authors": "Xibo Wan, Katherine Harris-Lagoudakis, John M. Crespi", "abstract": "", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103106", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103106"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103080", "title": "The effects of U.S. poultry industry consolidation on employee productivity and labor costs", "authors": "Tina L. Saitone, K. Aleks Schaefer, Daniel P. Scheitrum, Shawn Arita, Vince Breneman, Rebecca Nemec Boehm", "abstract": "", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103080", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103080"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103113", "title": "Food systems policy coherence: A ten-country assessment", "authors": "Stella Nordhagen, Mahamadou Tankari, Jamie Morrison, Julie Collins, Kelly Parsons, Danielle Resnick, José Valls Bedeau", "abstract": "Policy coherence is widely recognised as essential for achieving food systems transformation, but attempts to assess food systems policy coherence have been limited to date in terms of their scope of topics and geographies and lack of comparable methods. This paper introduces the Food Systems Policy Coherence (FSPC) Diagnostic Tool and uses it to analyse food systems policy coherence across 10 low- and middle-income countries in Africa and Asia through key informant interviews (n = 189) and review of policy documents (n = 808). The FSPC Diagnostic Tool considers two aspects of policy coherence: (1) the structures and mechanisms that may contribute to achieving stronger policy process coherence and (2) coherence between policies from six sectors and ten common food systems goals. Regarding the former, all countries analysed had strong framework documents for cross-sectoral food policy, backed by high-level political commitment, but they tended to be much weaker when it came to capacity for implementation and especially monitoring and accountability. Policy coherence across sectors was generally strong for the goals of climate change adaptation and social protection but weaker for goals of healthy diets for all, adequate wages for food system workers, and climate change mitigation through food systems. Trade policy was the policy area with the greatest incoherence with a diverse range of food systems goals. The results offer the most comprehensive analysis of food systems policy coherence to date. The tool makes a useful contribution to measuring policy coherence and can serve as both a foundation for future research and enhance accountability for achieving coherent policy outcomes.", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103113", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103113"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103111", "title": "Welfare program participation among US farmworkers", "authors": "Alexandra E. Hill, Sarah C. Whitnall, Elizabeth C.A. Saunders, Timothy K.M. Beatty", "abstract": "This study examines US farmworker participation in social safety net programs, providing the first comprehensive comparison across the National Agricultural Workers Survey, the American Community Survey, and the Current Population Survey. We measure levels, trends, and predictors of farmworker participation rates in six programs: the Supplemental Nutrition Assistance Program (SNAP), the Special Supplemental Nutrition Program for Women, Infants, and Children (WIC), Medicaid, Unemployment Insurance (UI), the National School Lunch and Breakfast Program (NSLP), and the Earned Income Tax Credit (EITC). Across surveys, we find that participation rates among income-eligible farmworker households are consistently highest for Medicaid (71%–79%) and the EITC (75%) and lowest for UI (21%). We evaluate how survey design and data collection methodologies shape these estimates through question wording, farmworker coverage, nonresponse, and measurement error. Comparing across surveys, we identify multiple persistent predictors of participation, including citizenship, gender, age, and educational attainment. These findings inform targeted outreach and policy interventions to enhance participation among US farmworkers and mitigate health and economic disparities.", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103111", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103111"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103120", "title": "Understanding Nutrient - Contaminant Tradeoffs in fish consumer preferences: Evidence from Kenya", "authors": "Kira Lancker, Christopher B. Barrett, Kathryn J. Fiorella, Christopher M. Aura, Hezron Awandu, Fonda J. Awuor, Patrick Otuo", "abstract": "Fish consumers are often challenged by tradeoffs between nutritional benefits and contaminant risks, which increase due to environmental pollution. Health campaigns and labeling initiatives can guide decision-making by providing information both on contaminant risk and nutritional value of a product, but it is not well understood how consumers react to such complex dual labels. We use data from a stated choice experiment in Kenya’s Lake Victoria region to study how consumers respond to dual labels on fish products, and how their responses to each label interact. We focus on the tradeoff between polyunsaturated fatty acids and contamination with microcystins, a class of toxins produced by harmful algae blooms that can accumulate in fish tissue. Our findings suggest that, faced with a dual information policy, consumers react rationally to dual health attribute labeling, and that nutrient labels and contaminant warnings can function concurrently, indeed even be mutually reinforcing, but pose a risk of inadvertently concentrating unhealthful consumption in less responsive subpopulations.", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103120", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103120"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103118", "title": "Healthier diets: a global economic modelling study of income and employment impacts across regions", "authors": "Adam M. Komarek, Dirk Willenbockel, Shahnila Dunston, Nicola Cenacchi, H. Charles J. Godfray, Daniel Mason-D’Croz, Timothy B. Sulser, Keith Wiebe", "abstract": "Interest has grown in how to achieve healthy, sustainable, and affordable human diets. The potential income and employment effects of a transition towards healthier diets have received much less attention. We simulate aggregate and sectoral income and employment for business-as-usual and healthier diets for all geographic regions up to 2050 using scenario-based modelling. These healthier diets can increase food’s share of household expenditure in some regions, for example from 18% to 25% in East and Central Africa in 2050. Our results suggest that a global shift towards healthier diets leads to a reallocation of primary factors of production, especially low-skilled labour and capital, from non-agricultural sectors to crop agriculture in parts of sub-Saharan Africa and South Asia. Notably, in 2050, with healthier diets, agriculture’s share of low-skilled labour increases by 3.2 percentage points in East and Central Africa and 1.5 percentage points in South Asia excluding India. Although Gross Domestic Product increases in these regions relative to business-as-usual, this reallocation raises agriculture’s share of Gross Domestic Product, consistent with a slower pace of long-run structural transformation. The reallocation leads to a mild increase in wages for low-skilled workers relative to high-skilled workers in most of these regions, compared to business-as-usual. However, in parts of sub-Saharan Africa, food price increases outweigh wage gains for low-skilled labour, reducing real purchasing power. Policies that encourage healthier diets may also alter income and employment and reduce economic welfare of poor populations in some regions, so care is needed in policy design to avoid adverse unintended consequences.", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103118", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103118"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103119", "title": "Estimating plant-based milk impacts on U.S. fluid milk prices and quantities", "authors": "Sangwon Lee, Daniel A. Sumner", "abstract": "Per capita consumption of fluid cow’s milk has declined steadily in North America and Europe. In the United States, that well-known decline accelerated in percentage terms in the past two decades as the market for plant-based substitutes surged. This paper documents and explains significant impacts of plant-based products on the retail prices and quantities of fluid cow’s milk products in the United States, using a discrete-choice model of milk product demand with random coefficients. Demand estimates based on household purchase and store scanner data from 2018 to 2020 show that plant-based milk is more substitutable for organic and lactose-free cow’s milk products than for conventional cow’s milk. Based on our demand estimates, if plant-based milk products had not been available in the consumer choice set, the retail quantity of organic cow’s milk would have been 14.5%, lactose-free cow’s milk 10.2% higher, and conventional cow’s milk by 7.7% higher. The absence of plant-based alternatives would increase annual retail purchases of fluid cow’s milk by 1.46 gallons for a representative survey of households. In these data, each gallon of plant-based milk displaced 0.68 gallons of cow’s milk. While plant-based milk continues to affect the demand for fluid cow’s milk products, especially the higher-priced organic and lactose-free products, evidence shows that it has not been the primary driver in the recent accelerated decline in the consumption of fluid cow’s milk.", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103119", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103119"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103069", "title": "Philanthropic food assistance in high-income countries: Lessons from Israel’s food-aid network", "authors": "Moran Accos, Orly Tamir, Aron M. Troen", "abstract": "Food insecurity (FI) in high-income countries (HICs) is increasingly addressed by philanthropic food-aid organizations that operate with limited state oversight. Such is the case in Israel, a high-income country that faces persistent FI and social inequality, but has never conducted a comprehensive mapping of its philanthropic food-aid network. This study is the first national-level analysis of food-aid NGOs in Israel. We evaluated their distribution, purpose, scale, and alignment with need, using administrative data from Guidestar, Israel’s official NGO database, and from the country’s two largest food banks. We analyze the system through the lenses of effectiveness, equity, and efficiency – the three key dimensions used globally to assess food-aid systems. We identified 2289 active food-aid NGOs, with exponential growth over the past two decades. Most organizations operate locally, provide in-kind food rather than vouchers, and serve the general public rather than specific target groups. The majority are affiliated with the Jewish religious sector, while Arab communities, despite significantly higher rates of FI, remain underrepresented. Geographic disparities are evident, with major gaps in low-resource regions, particularly among Bedouin populations in the south. Financial and volunteer investment in the sector is substantial. Little data is available concerning the extent to which the network ensures effectiveness, efficiency, and equity. Thus, our study raises critical questions about the expanding role of private actors and their ability to fulfill public welfare functions in Israel. Moreover, it contributes empirical evidence to an ongoing global debate about whether philanthropic food-aid networks complement or actually displace state responsibilities. We highlight the need for high-income welfare states to assume responsibility for regulation, transparency, and strategic integration of food-aid systems into broader food and social policy frameworks.", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103069", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103069"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70128", "title": "Gender and Adoption of Climate‐Smart Agricultural Practices in Developing Countries: Evidence From West African Countries", "authors": "Abraham Amoussouga Gero, Aklesso Y. G. Egbendewe", "abstract": "ABSTRACT This paper examines the influence of gender on the adoption of Climate‐Smart Agriculture (CSA) practices in West Africa. An exogenous switching treatment effect regression model with the Oaxaca–Blinder decomposition method is used in the study. Data were collected from the 2018/2019 Harmonized Household Living Conditions Survey across five West African countries. The results indicate that if female plot managers had the same characteristics as their male counterparts, their likelihood of adopting CSA practices would increase, yet it would still be lower than that of men. The decomposition analysis shows a significant gender gap favouring men in Burkina Faso and Senegal, unlike in Ivory Coast and Togo. These gender differences are mainly due to structural factors such as household size, education, access to credit, commercialisation, income, livestock ownership, family labour, pesticide use, soil fertility and the availability of agricultural extension agents and cooperatives. To effectively address gender disparities in CSA adoption, policies could focus on improving these structural conditions rather than solely on ensuring equal access to production resources. This approach would enhance policy effectiveness and empower women to better utilise their agricultural resources.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-07-06", "url": "https://doi.org/10.1111/1467-8489.70128", "fetched_at": "2026-07-07T08:02:26", "id": "crossref:10.1111/1467-8489.70128"}, {"source": "crossref", "source_id": "10.1002/aepp.70106", "title": "Do Universal Free School Meals Improve the Dietary Quality of Food‐At‐Home Purchases?", "authors": "Xueying Ma, Andres Cuadros‐Meñaca, Michael R. Thomsen", "abstract": "ABSTRACT Since 2014, the number of schools offering universal free meals to all enrolled children without requiring annual meal applications has increased meaningfully. Using USDA's Purchase to Plate Crosswalk, a difference‐in‐differences framework, and a nationwide consumer panel, the effect of universal‐free‐meal exposure on the diet quality of food‐at‐home purchases is assessed in terms of the Healthy Eating Index (HEI). Consistent with earlier findings, households exposed to universal free meals reduce grocery spending by over 6%. There is no deleterious overall effect of universal‐free‐meal exposure on the diet quality of food‐at‐home purchases as measured by the HEI.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-07-06", "url": "https://doi.org/10.1002/aepp.70106", "fetched_at": "2026-07-07T08:02:26", "id": "crossref:10.1002/aepp.70106"}, {"source": "crossref", "source_id": "10.1002/aepp.70107", "title": "Farmers' Preferences for Gene Editing Crops and Influencing Factors", "authors": "Bertolozzi‐Caredio Daniele, Vigani Mauro", "abstract": "ABSTRACT Gene editing (GE) is gaining momentum worldwide, but limited data on UK farmers' preferences hinders our understanding of its potential impact amid deregulation debates. Based on a survey of 200 English arable farmers, we employ a Latent Class Analysis and Multinomial Logit regressions to investigate current preferences for GE crops. The analysis reveals a high willingness of adoption, outlines three preference profiles, including eager, wary, and hesitant adopters, and identify factors influencing such preferences. Results spot a possible substitution effect among GE crops and agricultural insurance, and suggest farmers may adopt GE in response to growing public demand for sustainable practices.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-07-05", "url": "https://doi.org/10.1002/aepp.70107", "fetched_at": "2026-07-07T08:02:26", "id": "crossref:10.1002/aepp.70107"}, {"source": "crossref", "source_id": "10.1093/erae/jbag007", "title": "Beyond determinism: Accounting for weather variability in the carbon pricing debate for EU agriculture", "authors": "Davit Stepanyan, Sebastian Neuenfeldt, Alisa Spiegel, Mareike Söder, Julio G Fournier Gabela, Florian Freund, Claudia Heidecke, Bernhard Osterburg, Alexander Gocht", "abstract": "Abstract Agriculture accounts for 11 per cent of EU greenhouse gas emissions, yet sectoral emissions have stagnated over the past two decades. This paper evaluates carbon pricing in EU agriculture by integrating stochastic yield variability into the CAPRI model. We assess how different carbon price levels affect emissions and outcome uncertainty. Results show that carbon pricing reduces emissions, and higher price levels are associated with lower uncertainty in policy outcomes. While expected results remain similar to deterministic simulations, stochastic modeling reveals greater regional and sectoral heterogeneity. These findings highlight the importance of accounting for production risk when designing agricultural climate policies.", "journal": "European Review of Agricultural Economics", "published": "2026-07-02", "url": "https://doi.org/10.1093/erae/jbag007", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1093/erae/jbag007"}, {"source": "crossref", "source_id": "10.1002/ajae.70087", "title": "Issue Information", "authors": "", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-07-02", "url": "https://doi.org/10.1002/ajae.70087", "fetched_at": "2026-07-07T08:02:26", "id": "crossref:10.1002/ajae.70087"}, {"source": "crossref", "source_id": "10.1002/aepp.70105", "title": "The Cost of Uncertainty: US–China Tariff Effects on Agricultural Commodity Markets", "authors": "Raghav Goyal", "abstract": "ABSTRACT We examine the impact of US–China trade policy announcements on corn and soybean markets. Using time‐series models, our results show that prospective tariff announcements significantly increased implied volatility (IV), especially during the 2018–2019 trade war. Our results show that corn and soybean markets responded to both countries' announcements. We observe the strongest volatility impacts at the 90% and 95% strikes. Our results indicate that higher IV raised hedging costs for producers, further constricting farm margins– a 7.5% rise in IV increased soybean option premiums by approximately 3.75%. These findings highlight the financial burden imposed by trade policy uncertainty beyond its impact on commodity prices.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-07-01", "url": "https://doi.org/10.1002/aepp.70105", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1002/aepp.70105"}, {"source": "crossref", "source_id": "10.1111/agec.70117", "title": "Small Midges, Major Consequences: Partial Declines in Cocoa Pollination and Their Economic Impact in West Africa and Beyond", "authors": "Falk Krumbe, Camillus Abawiera Wongnaa, Arndt Feuerbacher", "abstract": "ABSTRACT Cocoa production forms the backbone of West Africa's agricultural economy, sustaining smallholder farmers whose livelihoods depend on stable yields. Critical to these yields is the provision of pollination services by a few key species, notably, the minuscule Forcipomyia spp. While many studies have modeled the effects of complete pollinator collapse, the impacts of gradual declines remain little studied. In this study, we develop an integrated ecological–economic model that links pollinator abundance with cocoa yield, incorporating the global cocoa market and an economy‐wide framework for Ghana, one of the world's major cocoa producers. We examine scenarios in which declines in pollinator populations occur at regional, national, and supranational scales. Our analysis reveals that localized declines in pollinator populations detrimentally affect cocoa farmers and Ghana's national economy, with rural communities and low‐income households bearing a disproportionate share of the welfare losses. In contrast, widespread declines across West Africa trigger a “King effect” where rising global cocoa prices partially mitigate production losses, benefiting farmers while overall consumer surplus declines. These results highlight the necessity of conserving pollinator biodiversity to safeguard cocoa production and economic welfare at multiple scales.", "journal": "Agricultural Economics", "published": "2026-07-01", "url": "https://doi.org/10.1111/agec.70117", "fetched_at": "2026-07-07T08:02:26", "id": "crossref:10.1111/agec.70117"}, {"source": "crossref", "source_id": "10.1111/agec.70130", "title": "Beyond Metropolitan Averages: Food Demand Across Local Markets", "authors": "Justin D. Bina", "abstract": "ABSTRACT Demand estimates are commonly used to inform firm strategy and public policy, yet they can obscure important variation in demand across geographic space that is relevant for local business decisions and policy interventions. Prior work documents demand heterogeneity across countries, regions, states, and between coarse urban‐rural categories, but evidence on sub‐metropolitan variation is limited. This study documents within‐metro geographic heterogeneity in market shares and willingness‐to‐pay (WTP) for retail and foodservice protein products. I use nearly six years of publicly available survey data and random parameters logit models that include municipality interactions with alternative‐specific constants and price sensitivity to estimate municipality‐specific market shares and WTP in the Phoenix metropolitan area. Demand varies substantially across adjacent municipalities. Central Phoenix residents exhibit higher retail WTP for conventional beef, pork, and chicken products, while both central Phoenix and Scottsdale‐Tempe residents show consistently higher foodservice WTP. Median WTP in these municipalities is roughly 30–50% higher than in surrounding suburbs, whereas suburban groups exhibit similar valuations to one another. These within‐metro differences are large enough to affect targeted pricing and assortment strategies and to produce uneven distributional welfare effects from local price policies (e.g., taxes). The results suggest that investment in geographically refined demand analyses could better inform policy interventions and business decisions at the local level, where those decisions are often made.", "journal": "Agricultural Economics", "published": "2026-07-01", "url": "https://doi.org/10.1111/agec.70130", "fetched_at": "2026-07-07T08:02:26", "id": "crossref:10.1111/agec.70130"}, {"source": "crossref", "source_id": "10.1111/agec.70125", "title": "Food Price Crises and the Insulation of Domestic Grain Markets", "authors": "Clemens Hoffmann, Lina Kastens, Alberto Portugal‐Perez, Stephan von Cramon‐Taubadel", "abstract": "ABSTRACT Studies that analyze the transmission of food prices from international to domestic markets for large sets of countries and products assume that price relationships are time‐invariant. However, studies that look in detail at individual countries and products show that countries respond to increasing international food prices with measures that increase the insulation of their domestic markets and thus weaken international‐to‐domestic price transmission. We analyze relationships between international prices and a large set of domestic prices for wheat, yellow and white maize, and rice using a smooth‐transition error correction model. This specification relaxes the assumption of time‐invariant price transmission by allowing price relationships and domestic market insulation to vary over time depending on international price levels. The results confirm that international‐to‐domestic price transmission weakens in many countries during periods of high international prices, such as 2007/08 and 2022. Our findings highlight a collective action problem: as more countries insulate, the global trading system's capacity to buffer shocks diminishes, amplifying volatility and food security risks.", "journal": "Agricultural Economics", "published": "2026-07-01", "url": "https://doi.org/10.1111/agec.70125", "fetched_at": "2026-07-07T08:02:26", "id": "crossref:10.1111/agec.70125"}, {"source": "crossref", "source_id": "10.1002/aepp.70104", "title": "Rural Labor Supply and Economic Opportunities: Commuting, Migration, Tariffs, and Immigration", "authors": "Peter F. Orazem, Mary C. Ahearn", "abstract": "ABSTRACT Some rural counties remain dependent on agricultural or manufacturing jobs, but an increasing proportion have diversified economics. Rural counties also differ in their abilities to commute to an urban market characterized by higher wages and labor productivity. National changes in immigration and trade policies have had heterogeneous effects on rural labor markets, with counties dependent on agriculture or food processing facing rising input costs and shrinking international output markets. Increased commuting will help some rural communities adapt, while more remote counties will face outmigration, population loss, and reduced capacity to sustain public services.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-07-01", "url": "https://doi.org/10.1002/aepp.70104", "fetched_at": "2026-07-07T08:02:26", "id": "crossref:10.1002/aepp.70104"}, {"source": "crossref", "source_id": "10.1111/agec.v57.4", "title": "", "authors": "", "abstract": "", "journal": "Agricultural Economics", "published": "2026-07-01", "url": "https://doi.org/10.1111/agec.v57.4", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.v57.4"}, {"source": "crossref", "source_id": "10.1002/aepp.v48.3", "title": "", "authors": "", "abstract": "", "journal": "Applied Economic Perspectives and Policy", "published": "2026-07-01", "url": "https://doi.org/10.1002/aepp.v48.3", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.v48.3"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/2/62_102/_article/-char/ja/", "title": "Organizational–Individual Configurations Shaping Core Members’ Commitment in Specialized Farmers’ Cooperatives: An fsQCA Study in China", "authors": "Xiaotong Wang", "abstract": "This study examines how combinations of individual and organizational conditions shape organizational commitment of core members in specialized farmers’ cooperatives. Using survey data from 21 shiitake cooperatives in China, we apply fuzzy-set qualitative comparative analysis (fsQCA) to identify configurational pathways to high and low commitment. The results reveal two pathways to high commitment: one based on the complementarity between human capital and vertical integration, and another driven by large operating scale under limited external social capital. Commitment erosion occurs when individual resources exceed the cooperative’s structural capacity, leading members to seek external opportunities or experience dissatisfaction under insufficient returns. The findings point to a two-level logic of commitment formation, in which human capital serves as a necessary threshold, while the effects of individual resources depend on their fit with organizational capacity. These insights contribute to a configurational understanding of cooperative commitment and are relevant for smallholder systems facing structural constraints.", "journal": "農林業問題研究", "published": "2026-06-27", "url": "https://www.jstage.jst.go.jp/article/arfe/62/2/62_102/_article/-char/ja/", "fetched_at": "2026-07-07T08:02:26", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/2/62_102/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/2/62_110/_article/-char/ja/", "title": "地域資源管理におけるエンゲージメント概念の構築", "authors": "柴崎 浩平", "abstract": "The purpose of this study was to construct a concept of engagement among officers of management organizations responsible for common agricultural resources. Semi-structured interviews were conducted with five young officers. Statements considered relevant to engagement were categorized into behavioral, emotional, cognitive, and social dimensions. The results indicate that engagement in resource management involved, on the behavioral side, maintaining an attitude of participating in activities as much as possible while also attempting to improve work methods and related practices. On the emotional side, it involved positively valuing newly formed connections and interactions with farmers, maintaining interest in the management system, and taking pride in one’s role as an officer. Cognitively, it included recognizing the significance of the organization and its activities while striving to understand the management system. The social dimension entailed showing respect for predecessors who had sustained the community while also maintaining a desire to contribute personally.", "journal": "農林業問題研究", "published": "2026-06-27", "url": "https://www.jstage.jst.go.jp/article/arfe/62/2/62_110/_article/-char/ja/", "fetched_at": "2026-07-07T08:02:26", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/2/62_110/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/2/62_118/_article/-char/ja/", "title": "労働者協同組合による農業経営の意義と課題", "authors": "内山 智裕", "abstract": "This study examines the emerging role of worker cooperatives in farm management under Japan’s Workers Cooperative Act (2022), focusing on the Tsukuba Workers Cooperative, established in 2025 by three rice farmers in Tsukuba City. Drawing on field interviews and internal documents, this study explores the cooperative’s organizational characteristics, management practices, and institutional context. The findings suggest that the worker cooperative model may offer a framework for collective farm management emphasizing member participation, equality in decision-making, and non-profit-oriented principles. At the same time, the case reveals several institutional and practical constraints, including complex administrative procedures, financing challenges, and restrictions imposed by the Agricultural Land Act. Rather than presenting definitive evidence, this study positions the Tsukuba case as an initial empirical reference for discussing the potential and limitations of worker cooperatives in the agricultural sector. Further comparative and longitudinal research will be needed to assess their long-term sustainability and broader applicability.", "journal": "農林業問題研究", "published": "2026-06-27", "url": "https://www.jstage.jst.go.jp/article/arfe/62/2/62_118/_article/-char/ja/", "fetched_at": "2026-07-07T08:02:26", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/2/62_118/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/2/62_71/_article/-char/ja/", "title": "小学生を対象とした農業体験学習の効果に関する実証研究", "authors": "嶋田 大作", "abstract": "This study examined the effects of agricultural experience programs on elementary school students. Questionnaires were administered at two intervention schools and one control school before and after their experiences in rice paddies. The effects were analyzed using the difference-in-differences method. The results indicate that students at the intervention schools showed significant increases in both their motivation to interact with local residents and their interest in living organisms within the rice paddies. In contrast, no significant changes were observed in other areas, such as interest in agriculture or attachment to the local community. These differences may stem from the program content. However, the five-point scale used in the survey may have had limited sensitivity to children’s perceptions due to ceiling effects. Moreover, the program’s effects may unfold over time, suggesting that the pre- and post-survey design may not have fully captured them. Improving measurement methods remains a challenge for future research.", "journal": "農林業問題研究", "published": "2026-06-27", "url": "https://www.jstage.jst.go.jp/article/arfe/62/2/62_71/_article/-char/ja/", "fetched_at": "2026-07-07T08:02:26", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/2/62_71/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/2/62_78/_article/-char/ja/", "title": "有機野菜消費における知識の構造と役割", "authors": "堀江 亮祐", "abstract": "Knowledge, including subjective knowledge, objective knowledge, and product-related experience, plays a crucial role in consumer decision-making. However, the relationship between these types of knowledge and organic food purchases has not yet been thoroughly investigated. This study examines the role of knowledge in organic vegetable consumption in Japan using structural equation modeling. The results show that subjective knowledge is the strongest predictor of organic vegetable consumption, whereas objective knowledge has only a limited indirect effect mediated through subjective knowledge. Product-related experience is positively associated with both types of knowledge and directly correlated with organic vegetable consumption, suggesting its dual role as a driver of both knowledge formation and purchases. These findings highlight that enhancing subjective knowledge and offering experiential opportunities, such as farm visits and hands-on learning, may be more effective than simply providing objective information in stimulating consumer demand for organic food and supporting the transition to organic farming.", "journal": "農林業問題研究", "published": "2026-06-27", "url": "https://www.jstage.jst.go.jp/article/arfe/62/2/62_78/_article/-char/ja/", "fetched_at": "2026-07-07T08:02:26", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/2/62_78/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/2/62_86/_article/-char/ja/", "title": "中国における農地流動化と施設野菜経営の展開", "authors": "楽 泓", "abstract": "To address the limitations of small-scale farming, farmland transfer has been promoted in China. Following the 2018 revision of the Rural Land Contracting Law, a practice has become widespread whereby village collectives retain their farmland ownership and farmers maintain contractual rights, while transferring operational rights to third parties. This study examines farmland transfer and the development of greenhouse vegetable production in S Town, located in inland China. The findings indicate that farmland transfer has enhanced both agricultural productivity and farmers’ incomes. However, the following issues were identified: (1) land rents are significantly lower than the profits from vegetable production, highlighting the need for more equitable benefit-sharing mechanisms between producers and landholding farmers; (2) although farmers retain contractual rights, it is nearly impossible for them to resume cultivating the leased land themselves, rendering their rights largely symbolic; and (3) while village collectives maintain land ownership, their role in farmland management has partially diminished.", "journal": "農林業問題研究", "published": "2026-06-27", "url": "https://www.jstage.jst.go.jp/article/arfe/62/2/62_86/_article/-char/ja/", "fetched_at": "2026-07-07T08:02:26", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/2/62_86/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/2/62_94/_article/-char/ja/", "title": "子実トウモロコシ生産における簡易貯蔵技術導入の経済性", "authors": "野口 周", "abstract": "We analyzed the economic effects of a simple ensiling method in corn grain production. Two distinct analyses were conducted. First, break-even prices for corn grain production were compared between drying and simple ensiling methods on paddy-based farms in Ibaraki Prefecture. Second, based on production cost statistics, feed costs were compared by replacing compound feed and imported corn with corn grains stored via the simple ensiling method in dairy cattle rations. The results show that the simple ensiling method can reduce break-even price by approximately 5–15%. Furthermore, feed cost reductions were achieved even without increases in market price. Future research should focus on improving yield, enhancing storage methods, and clarifying the limitations of the distribution range.", "journal": "農林業問題研究", "published": "2026-06-27", "url": "https://www.jstage.jst.go.jp/article/arfe/62/2/62_94/_article/-char/ja/", "fetched_at": "2026-07-07T08:02:26", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/2/62_94/_article/-char/ja/"}, {"source": "crossref", "source_id": "10.1002/aepp.70103", "title": "Temporary Programs, Lasting Questions: Ad Hoc Assistance in the U.S. Farm Safety Net", "authors": "Alejandro Plastina, Oranuch Wongpiyabovorn", "abstract": "ABSTRACT Large ad hoc assistance programs have returned to U.S. farm policy since 2017, operating alongside a more developed safety net built around federally subsidized crop insurance, Title I commodity programs, and standing disaster assistance. This paper reviews the renewed use of ad hoc assistance, documents its recent scale using USDA data, and examines its implications for producers and policy design. Repeated ad hoc programs may create expectations of future support while leaving uncertainty about timing, eligibility, and payment formulas. They also raise questions about crop insurance incentives, targeting, transparency, taxpayer exposure, and coordination across safety‐net tools.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-06-26", "url": "https://doi.org/10.1002/aepp.70103", "fetched_at": "2026-07-07T08:02:26", "id": "crossref:10.1002/aepp.70103"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70123", "title": "Australia's Search for Greener Pastures: The Foundations of the Global Genetic Resources Movement, 1926–1980. By DerekByerlee, Canberra, ACT: The Crawford Fund, 2025, 71 pp. ISBN: 978‐1‐7640211‐0‐4.", "authors": "Thomas Nordblom", "abstract": "Data sharing not applicable to this article as no datasets were generated or analysed during the current study.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-06-25", "url": "https://doi.org/10.1111/1467-8489.70123", "fetched_at": "2026-07-07T08:02:26", "id": "crossref:10.1111/1467-8489.70123"}, {"source": "crossref", "source_id": "10.1002/aepp.70101", "title": "What Happens to Diet Quality When Food Prices Rise? Revealed Preference From National Household Scanner Data, 2015–2018", "authors": "Kate Schneider Lecy, Bangyao Sun, Sean B. Cash, Wenhui Feng, Andrew Thorne‐Lyman, David C. Love", "abstract": "ABSTRACT How food prices affect diet quality is an important question to design policies that can improve the nutrition and health of all Americans. This study investigates the association between food‐at‐home diet quality and aggregate food prices to understand if price movements compromise nutrition, and where price‐based policies could be an effective tool to improve population health. Using detailed household purchase data from 2015 to 2018, our findings suggest three insights. First, consumers make substitutions that largely preserve their given level of diet quality, though that level remains poor relative to recommendations for health. Second, we find minimal evidence of heterogeneous responsiveness to prices by diet quality or sociodemographic characteristics. Third, we find evidence that the substitutions consumers make in their protein choices when prices rise increase the healthfulness of their food baskets. Taken together, our study suggests that encouraging healthier diets probably requires more than pricing policies but that price‐based policies targeted at protein may be more effective than other food groups. That we fail to find evidence of differential responsiveness of diet quality to prices suggests that universal (untargeted) policies can be recommended to improve diets across the population. JEL Classification: D12, I12, Q18", "journal": "Applied Economic Perspectives and Policy", "published": "2026-06-25", "url": "https://doi.org/10.1002/aepp.70101", "fetched_at": "2026-07-07T08:02:26", "id": "crossref:10.1002/aepp.70101"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_283/_article/-char/ja/", "title": "中国の賃金高騰下における大手冷凍野菜開発輸入業者の指導機能の発揮と効果", "authors": "菊地 昌弥", "abstract": "近年，中国で賃金が高騰する構造変化のなかにあっても，中国産冷凍野菜の輸入量は価格的優位性を維持する形で，過去最高の水準で増加している．本研究では，この事象に開発輸入業者の指導機能（企業行動）が関与していたことを解明した．研究方法はわが国専業最大手の冷凍野菜開発輸入業者と，その主要な仕入先である中国山東省の製造企業のケーススタディを採用した．入手した企業データを分析した結果，指導機能により現地の製造企業では労働生産性が2倍向上していた．また高い頻度で指導する仕入先グループと，そうではないグループ間でクレームの発生頻度の平均値差の検定を通し，品質面でも指導機能が有益であることを明らかにした．", "journal": "農業経済研究", "published": "2026-06-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_283/_article/-char/ja/", "fetched_at": "2026-06-25T08:01:09", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/4/97_283/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_301/_article/-char/ja/", "title": "庭先直売所の顧客価値向上に向けた直売所リアルタイム配信システムの活用", "authors": "保坂 三仁", "abstract": "We conducted a questionnaire survey of customers and interviews of farmers to identify the characteristics of customers who are most effective in using farm stands’ real-time image sharing systems. The main outcomes are as follows. First, the efficiency of purchasing behavior is higher for customers who use the farm stands more frequently in the neighborhood. Second, the effect of improving customer commitment and efficiency of purchasing behavior are greater for customers who evaluated the farm stands as selling fresh and tasty products or keeping the sales floor tidy.", "journal": "農業経済研究", "published": "2026-06-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_301/_article/-char/ja/", "fetched_at": "2026-06-25T08:01:09", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/4/97_301/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_307/_article/-char/ja/", "title": "中国農村産権交易所の融資仲介機能に関する考察", "authors": "王 雷軒", "abstract": "The rural property rights trade centers play an important role in the trade of rural resources and assets in China. This paper analyzed the centers’ loan intermediary function in the collateral loan of land use right. An analysis of the loan intermediation functions showed that it included intermediation, information provision, asset evaluation and support for non-performing loan disposal. The study of the loan intermediary function from the perspectives of the farm enterprises, financial institutions, local governments and the centers revealed that the performances of financing intermediary functions involved efforts and supports to improve the collateral loan system.", "journal": "農業経済研究", "published": "2026-06-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_307/_article/-char/ja/", "fetched_at": "2026-06-25T08:01:09", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/4/97_307/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_313/_article/-char/ja/", "title": "多面的機能支払交付金による共同活動の実態", "authors": "磯道 駿介", "abstract": "This study analyzes activity records from 38 organizations in Morioka, Iwate, that participated in Multifunctional Payment Systems from 2019-2023, to clarify the roles of farmers and non-farmers in joint activities for managing local agricultural resources. The findings reveal that while farmers play a leading role, non-farmers constituted 31% of participants, engaging in 37% of the total activities. It was observed that non-farmer participation was higher in larger organizations. Participation also rebounded after a temporary decrease due to the COVID-19 pandemic, suggesting non-farmer involvement is well-established. Non-farmers were particularly active in tasks closely linked to daily life and community-based activities.", "journal": "農業経済研究", "published": "2026-06-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_313/_article/-char/ja/", "fetched_at": "2026-06-25T08:01:09", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/4/97_313/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_319/_article/-char/ja/", "title": "小規模農業集落における用排水路管理の実態", "authors": "森脇 俊太", "abstract": "This study aims to verify whether the statistical data showing that joint maintenance of agricultural irrigation and drainage channels is more likely in communities with organizations under the Multifunctionality Payment System accurately reflect the actual situation of the communities. In a survey in City A, Niigata Prefecture, cooperation between communities as shown in the statistical data could not be confirmed in most of the communities surveyed. This study revealed that cooperation between communities in the maintenance of agricultural irrigation and drainage channels is not easy, and that the statistical data does not necessarily reflect the actual situation of the communities.", "journal": "農業経済研究", "published": "2026-06-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_319/_article/-char/ja/", "fetched_at": "2026-06-25T08:01:09", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/4/97_319/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_325/_article/-char/ja/", "title": "新型コロナウイルス感染症は消費者の食料需要を長期的に変えたのか？", "authors": "宇都宮 涼", "abstract": "While food demand shifts during COVID-19 have been widely studied, their persistence, timing, and pace remain unclear. This study examines how demand elasticities for home-cooked meals, ready-to-eat meals, and dining out evolved during COVID-19. The findings indicate that changes in the demand structure during the analysis period did not involve distinct turning points but instead occurred gradually over time. Additionally, the results suggest that the demand for all analyzed food categories became increasingly responsive to changes in price and expenditure. However, this shift progressed slowly, and the differences in elasticity between April 2019 and March 2023 were not statistically significant.", "journal": "農業経済研究", "published": "2026-06-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_325/_article/-char/ja/", "fetched_at": "2026-06-25T08:01:09", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/4/97_325/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_331/_article/-char/ja/", "title": "流域治水に対する稲作農家の意識", "authors": "栗原 伸一", "abstract": "The aim of this study is to have a better understanding of flood control measures that systematically overflow floodwaters onto agricultural lands in the watershed. To this end, we present a survey of farmers to examine their perceptions of the flood, their levels of agreement with the policy, and their assessment of the attitudes of downstream residents. The results showed that more than half of the farmers were willing to accept this flood control measure, although this number was smaller than that of the downstream residents. The characteristics of these farmers were clarified through quantitative analysis.", "journal": "農業経済研究", "published": "2026-06-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_331/_article/-char/ja/", "fetched_at": "2026-06-25T08:01:09", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/4/97_331/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_337/_article/-char/ja/", "title": "環境情報の提供がエコフィードを利用した牛肉への消費者評価に与える影響", "authors": "服部 明彦", "abstract": "This study examined how ecological information affects consumer evaluations of beef raised on eco-feed using a questionnaire and conjoint analysis. Scientific information about eco-feed’s environmental benefits increased support for its use, but its impact on purchase willingness was limited. The number of consumers less willing to purchase eco-feed beef was nearly equal to those more willing, indicating contrasting shifts in preferences. Many who purchase beef at farmers’ markets, department stores, and through hometown tax programs became more willing to buy eco-feed beef, while a portion of consumers who associate it with ethically or economically desirable traits may become less willing.", "journal": "農業経済研究", "published": "2026-06-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_337/_article/-char/ja/", "fetched_at": "2026-06-25T08:01:09", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/4/97_337/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_343/_article/-char/ja/", "title": "稲作に対する公的研究開発投資の収益性", "authors": "八畑 知礼", "abstract": "This study aims to estimate the rates of return on public R&D investments in Japan’s rice sector, using gamma lag distributed models for constructing knowledge stocks. The key findings are as follows: First, public R&D investment in the rice sector has been declining since 1994. Second, there are significant spillovers of knowledge stocks among prefectures, implying that R&D investment contributes to the productivity growth of neighboring regions. Third, the modified internal rates of return on public R&D investments exceed 10%, suggesting that the decline in investment is a critical factor contributing to the stagnation of productivity growth in Japan’s rice sector.", "journal": "農業経済研究", "published": "2026-06-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_343/_article/-char/ja/", "fetched_at": "2026-06-25T08:01:09", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/4/97_343/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_349/_article/-char/ja/", "title": "バイオベース地域経済成長における牽引産業の特定", "authors": "藤本 髙志", "abstract": "The bioeconomy includes sectors that produce bioresources, such as agriculture and forestry, and those that use them, like food and timber processing. Developing bioresource-based value chains can boost economic growth while addressing societal challenges such as food security. Our analysis of inter-industry linkages identified key sectors that drive regional economic growth, particularly those forming value chains around arable crops, livestock, and timber. We also assessed the intra- and inter-regional impacts of these linkage effects across Japan’s nine constituent regions. While approximately half of the economic benefits leak outside their originating region, this trend is less prominent in Japan’s peripheral regions.", "journal": "農業経済研究", "published": "2026-06-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_349/_article/-char/ja/", "fetched_at": "2026-06-25T08:01:09", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/4/97_349/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_355/_article/-char/ja/", "title": "移動販売事業に携わる主体間の関係に関する考察", "authors": "杉平 翼", "abstract": "The objective of this study is to elucidate the roles of various stakeholders involved in the mobile vending business in Ibaraki Prefecture. To this end, interviews were conducted with a private company and municipal governments engaged in mobile vending operations in the region. The main findings of the study are as follows: The president of the neighborhood association plays a crucial role in understanding and representing the needs of local residents. The municipality grasps the needs of the community through the president of a neighborhood association and shares this information with the business operator.", "journal": "農業経済研究", "published": "2026-06-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_355/_article/-char/ja/", "fetched_at": "2026-06-25T08:01:09", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/4/97_355/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_361/_article/-char/ja/", "title": "稲作農家のリスク態度に関連する社会・経済・気象要因", "authors": "広瀬 知弘", "abstract": "It is known that farmers’ attributes and exposure to extreme weather are related to risk attitudes, but former studies have used stated preferences, which are biased compared to revealed preferences. In this study, we extend the theoretical framework of the expected utility hypothesis to derive absolute risk aversion based on revealed preferences and propose a method to quantitatively derive the relationship between observable farmers’ and experience variables. The results of the empirical analysis show that exposure to sudden extreme weather increases risk aversion and that demographic variables and management characteristics have statistically significant relationships with risk attitudes.", "journal": "農業経済研究", "published": "2026-06-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/4/97_361/_article/-char/ja/", "fetched_at": "2026-06-25T08:01:09", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/4/97_361/_article/-char/ja/"}, {"source": "crossref", "source_id": "10.1093/erae/jbag012", "title": "Alternative Agricultural Carbon Border Adjustment and Climate Club Designs : a Quantitative Assessment", "authors": "Lærke Jensbye, Wusheng Yu, Francesco Clora", "abstract": "Abstract We analyze alternative agricultural carbon border adjustment mechanism (CBAM) designs across three dimensions (participating countries, emission intensity, and carbon price). We find that an agricultural CBAM by the European Union (or an expanded climate club consisting of the EU and other countries) has minor global agricultural GHG emission implications but protects the most emission intensive domestic production. Nevertheless, having a larger climate club imposing CBAM tariffs and applying exporters’ emission intensities are more effective in lowering global emissions. Compared to national carbon prices, harmonized carbon prices at climate club level can reduce trade disruptions while attaining similar emission reduction outcomes.", "journal": "European Review of Agricultural Economics", "published": "2026-06-24", "url": "https://doi.org/10.1093/erae/jbag012", "fetched_at": "2026-06-25T08:01:09", "id": "crossref:10.1093/erae/jbag012"}, {"source": "crossref", "source_id": "10.1002/aepp.70098", "title": "Promoting Healthier Drinking: Evidence From a Vignette Experiment on Contextual and Informational Drivers of Dealcoholized Wine Choices", "authors": "Giovanna Piracci, Giulia Maesano, Leonardo Casini, Maurizio Canavari, Marija Cerjak", "abstract": "ABSTRACT Growing demand for healthier beverages is driving innovation in the wine sector, with dealcoholized wine emerging as a promising alternative. However, little is known about the contextual conditions under which consumers would choose dealcoholized wine, particularly in countries with strong wine traditions. To fill this gap, this work examines how situational factors and information treatments influence consumers' willingness to switch from traditional to dealcoholized wine in Italy and Croatia, two countries with different wine consumption traditions. Using a vignette‐based experiment administered to 1600 wine consumers, this study analyses how consumption context and product information affect the likelihood of choosing dealcoholized wine over conventional alternatives. The results show that, although conventional wine remains the preferred option under standard conditions, the likelihood of switching to dealcoholized wine increases when a driving constraint is introduced. Informational treatments significantly affect choices in Italy, whereas Croatian consumers appear to respond more to functional constraints than to calorie or health messages. The findings have implications for producers and policymakers seeking to promote dealcoholized wines.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-06-24", "url": "https://doi.org/10.1002/aepp.70098", "fetched_at": "2026-06-25T08:01:09", "id": "crossref:10.1002/aepp.70098"}, {"source": "crossref", "source_id": "10.1002/ajae.70086", "title": "When e‐commerce meets smallholders: Boosting incomes and widening gaps in rural China's anti‐poverty policy", "authors": "Wenqi Duan, Mingming Jiang, Jianhong Qi, Qing Shi", "abstract": "Abstract Lifting smallholder farmers out of poverty depends largely on boosting their agricultural operating incomes, a persistent challenge despite numerous efforts. This study evaluates the impact of China's “E‐Commerce into the Countryside” (ECC) program—the first and largest e‐commerce initiative in the developing world—on both the level and distribution of smallholders' farm earnings. Employing a quasi‐experimental design, we find that the ECC program significantly increases household per capita agricultural operating income. We show that this gain is driven by expanded market access through online sales, which facilitate income growth via three primary mechanisms: operational scale expansion, higher output prices, and a shift toward high‐value‐added crops. However, these benefits are unevenly distributed. The program also widens the income gap among smallholders, a disparity largely attributable to pre‐existing differences in human, productive, and digital capital. Our findings highlight that e‐commerce policies, while potent for income generation, require complementary measures to mitigate disparities that arise from heterogeneous initial endowments.", "journal": "American Journal of Agricultural Economics", "published": "2026-06-23", "url": "https://doi.org/10.1002/ajae.70086", "fetched_at": "2026-06-24T08:00:37", "id": "crossref:10.1002/ajae.70086"}, {"source": "crossref", "source_id": "10.1002/ajae.70085", "title": "School feeding, maternal empowerment, and household consumption", "authors": "Guanfu Fang, Tianyuan Luo, Benyu Qian", "abstract": "Abstract This paper examines the causal effects of a school feeding program on maternal empowerment and household consumption in rural China. Exploiting the staggered implementation of the Student Nutrition Improvement Program, we find that the program significantly reduces maternal time spent on housework, improves maternal labor market performance, and enhances maternal decision‐making power within nuclear households. The augmented bargaining power translates into shifts in household consumption toward female‐prioritized goods, including more nutritious foods, clothing, and housework‐related appliances. However, these positive effects on maternal empowerment are diminished in multigenerational families, where grandparents can assist with childcare responsibilities.", "journal": "American Journal of Agricultural Economics", "published": "2026-06-22", "url": "https://doi.org/10.1002/ajae.70085", "fetched_at": "2026-06-24T08:00:37", "id": "crossref:10.1002/ajae.70085"}, {"source": "crossref", "source_id": "10.1002/aepp.70100", "title": "Keeping Pace or Falling Behind? The Depth of Latin American Trade Agreements", "authors": "Raphael Gomes da Silva, Fernanda Aparecida Silva, Lia Nogueira", "abstract": "ABSTRACT This article examines whether Latin American countries are keeping pace with global trends in trade agreement depth or falling behind. Using 681 agreements (1970–2019), we develop the Depth Index of Trade Agreements (DITA) to weight provisions endogenously through factor analysis based on co‐occurrence patterns. Results show that the Pacific Alliance and Central America lag one decade behind North American standards, whereas South America and the Caribbean lag by two to three decades. Partner selection is critical: countries negotiating extensively with developed partners tend to incorporate similar provisions into South–South agreements, suggesting North–South spillover effects. These findings suggest that regional lag reflects policy choices rather than inherent constraints.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-06-22", "url": "https://doi.org/10.1002/aepp.70100", "fetched_at": "2026-06-24T08:00:37", "id": "crossref:10.1002/aepp.70100"}, {"source": "crossref", "source_id": "10.1002/aepp.70102", "title": "Chinese Trade Competition and Rural Mexican Migration", "authors": "Zachariah Rutledge, Joaquin Mayorga", "abstract": "ABSTRACT China's accession to the World Trade Organization in 2001 reshaped global trade, reducing U.S. demand for Mexican manufactured goods and weakening Mexico's manufacturing employment. This study estimates how this trade‐induced decline affected migration and employment decisions among rural Mexicans. Using individual‐level panel data from the Mexican National Rural Household Survey (ENHRUM) and a long‐difference framework, we instrument manufacturing employment with regional exposure to Chinese import competition. Results show that a 10‐percentage‐point decline in manufacturing employment increased the probability of U.S. migration by 24 percentage points and U.S. nonagricultural employment by 17 points, with no significant effects on agricultural employment.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-06-22", "url": "https://doi.org/10.1002/aepp.70102", "fetched_at": "2026-06-24T08:00:37", "id": "crossref:10.1002/aepp.70102"}, {"source": "crossref", "source_id": "10.1002/aepp.70091", "title": "How Lender Cost of Funds and Market Structure Shape Agricultural Interest Rates", "authors": "Noah Miller, Chad Fiechter, Jennifer Ifft, Blaine Nelson, Francisco Scott", "abstract": "ABSTRACT This paper investigates how lenders' costs of funds affect agricultural loan interest rates. We use a matched sample of US farm‐loan data and lender‐specific cost of funds, and a farm fixed effects design, to estimate pass‐through, conditioning on borrower characteristics. We find modest average pass‐through of funding costs to farm loan interest rates, with meaningful differences across lender types and local market conditions. Our findings suggest that borrower characteristics and common macroeconomic trends remain central to agricultural loan pricing, but lender business models and local credit market structure also shape how changes in funding costs affect farm borrowing costs.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-06-22", "url": "https://doi.org/10.1002/aepp.70091", "fetched_at": "2026-06-24T08:00:37", "id": "crossref:10.1002/aepp.70091"}, {"source": "crossref", "source_id": "10.1002/aepp.70099", "title": "Hemp Cultivation and Crop Diversification: Implications for Ecosystem Services in Kentucky", "authors": "Yunsun Park, Seong D. Yun, Brandy E. Phipps, Tyler Mark, Craig Schluttenhofer", "abstract": "ABSTRACT This study examines the ecosystem benefits of expanding hemp cultivation by assessing its impact on crop diversity. Using scenario‐based simulations and fixed‐effect panel regressions with county‐level data in Kentucky, we find that increased hemp acreage tends to enhance crop diversity, improving water quality and bird diversity. While agricultural policies aimed at small‐scale farmers align with improving farm profitability, broader ecological benefits may remain limited unless they reach a sufficient scale. Our findings suggest that hemp‐induced crop diversification can generate measurable non‐market economic benefits through improvements in water quality and bird diversity, highlighting the need for practical and proactive policy measures that promote smallholder participation.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-06-19", "url": "https://doi.org/10.1002/aepp.70099", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70099"}, {"source": "crossref", "source_id": "10.1093/erae/jbag010", "title": "The relationship between pesticides and risk in apple production", "authors": "M Casati, L Arata, A Varacca, P Sckokai", "abstract": "Abstract We examine how pesticide expenditure relates to the probability distribution of yield and revenue per hectare in apple production in northern Italy. Using a flexible moment-based approach, we find that pesticide expenditure is negatively associated with downside risk in yield and revenue, whereas late frosts are positively associated with downside risk in yield. Sensitivity analyses show that mean-equation estimates are robust to unobserved confounders, while negative s
