cultural and Resource Economics", "published": "2026-02-18", "url": "https://doi.org/10.1111/1467-8489.70099", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70099"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70093", "title": "Land Use and Economic Trade‐Offs of Large‐Scale Solar in Agricultural Regions: Marginal National Impacts, Significant Regional Variations", "abstract": "ABSTRACT Large‐scale solar generation is critical for energy transitions. In Australia, increased solar production to meet emission targets means its land footprint increasingly competes with agricultural land. Understanding the scale and location of agricultural land use change and potential profitability losses from large‐scale solar farms is essential for a sustainable transition, yet comprehensive spatial assessments are lacking. We quantified these potential trade‐offs through spatially explicit modelling of 1568 scenarios that account for a range of uncertainties about utility‐scale solar design, performance, land suitability and energy production targets. Our analysis considered siting strategies that either prioritised the highest solar yield or reduced the land use trade‐off ratio of energy to agricultural profitability. The results show that meeting national utility‐scale solar targets could convert up to 273,000 ha (0.28% of total agricultural land). While a yield‐focused approach could result in annual agricultural profit losses of up to $29 million, adopting an approach that reduced opportunity costs on agricultural production can reduce these losses to $2.6 million for the same energy generation. Even the larger of these two figures represents less than 0.03% of Australia's farm‐gate output. Impacts are primarily concentrated in grazing regions of Queensland, Western Australia and New South Wales. ‘Agrisolar’—co‐location of agriculture or grazing with solar development could help further mitigate agricultural production and regional impacts. These results show that while the overall national impact on agricultural land from large‐scale solar expansion may be marginal, strategic spatial planning and agrisolar (where feasible) are crucial for mitigating adverse regional effects.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-02-17", "url": "https://doi.org/10.1111/1467-8489.70093", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70093"}, {"source": "crossref", "source_id": "10.1111/agec.70102", "title": "Grain of the Future: Consumer Demand for Bread Made of Sustainable Perennial Grain Intermediate Wheatgrass", "abstract": "ABSTRACT Intermediate wheatgrass (IWG), also known as Kernza, is a perennial grain crop with recognized environmental benefits, including improved water quality, increased soil carbon storage, and enhanced biodiversity. However, despite these advantages, consumer demand for IWG‐based products remains poorly understood, limiting its market potential. This study employs sensory analysis and an experimental BDM mechanism to estimate consumer willingness to pay (WTP) for IWG bread and assess the influence of sustainability information on purchasing decisions. Results suggest that IWG bread commands a price premium when accompanied by effective consumer education, with WTP estimates indicating a potential market niche for sustainability‐labeled perennial grains. Economic implications suggest that targeted consumer awareness campaigns, standardized eco‐labeling, and financial incentives could enhance adoption and market penetration. These findings offer insights for policymakers, agribusinesses, and sustainability advocates aiming to align consumer‐driven demand with environmental goals.", "journal": "Agricultural Economics", "published": "2026-02-16", "url": "https://doi.org/10.1111/agec.70102", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70102"}, {"source": "crossref", "source_id": "10.1111/agec.70094", "title": "But Don't Play With Me `Cause You're Playing With a Farmer – Electoral Consequences of Proposed Animal Welfare Reforms in Rural Poland", "abstract": "ABSTRACT It has long been recognized that reforming agricultural policies can be challenging. One of the key obstacles is the risk of dissatisfaction among rural voters and the potential loss of electoral support. In this paper, we demonstrate that such political costs may arise not only from policy reforms that are actually implemented, but also from reform proposals that are put forward but never enacted. We illustrate this with an example from Poland, where, in 2020, the government attempted to reform animal welfare regulations. The proposed law was highly unpopular among farmers, sparked numerous protests, and was ultimately not passed. We provide evidence that, despite the withdrawal of the reform, the governing party suffered a significant decline in support among the rural electorate in the first elections following the attempt, and that this decline was more pronounced in municipalities where livestock production was relatively more important. The interpretation that the party's poorer performance in rural areas may have been due to the animal welfare proposals is further supported by several robustness tests.", "journal": "Agricultural Economics", "published": "2026-02-16", "url": "https://doi.org/10.1111/agec.70094", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70094"}, {"source": "crossref", "source_id": "10.1111/agec.70103", "title": "Trade Policy Uncertainty, Competition, and Markups of Chinese Agricultural Firms: Evidence From the China‐ASEAN Free Trade Agreement", "abstract": "ABSTRACT Chinese agricultural exporters display a persistent tendency toward low price‐cost markups. This study investigates the determinants of this phenomenon by examining the role of Regional Trade Policy Uncertainty (RTPU), with a particular focus on the impact of the China‐ASEAN Free Trade Agreement (CAFTA). Emphasizing the pro‐competitive effects of regional trade agreements (RTAs), we develop a theoretical framework grounded in a mathematical model and employed firm‐level data from the Annual Survey of Industrial Firms and Chinese Customs Database for the period 2000–2013. The empirical results indicate that CAFTA significantly reduces RTPU, which in turn lowers firm markups by intensifying competition in export market and promoting economies of scale effects. These are more pronounced among smaller firms in the food manufacturing sector and producers of lower‐quality agricultural goods. Furthermore, the reduction in RTPU enhances resource allocation efficiency within the agricultural export sector by narrowing the dispersion of markups across exporters. This paper contributes to understanding the “black box” of markup formation in agricultural export by identifying a novel mechanism—RTA‐induced competition—that helps explain the persistently low markups of Chinese agricultural exporters. Our findings provide firm‐level evidence on how RTAs foster regional competition, amplify the benefits of regional trade, and improve resource allocation efficiency. These insights offer valuable policy implications for the design and refinement of RTA strategies.", "journal": "Agricultural Economics", "published": "2026-02-16", "url": "https://doi.org/10.1111/agec.70103", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70103"}, {"source": "crossref", "source_id": "10.1002/ajae.70058", "title": "Online platform entry and food safety risk: Evidence from the Chinese restaurant industry", "abstract": "Abstract The online food delivery (OFD) industry has witnessed substantial global expansion. In this study, we examine how OFD platforms in China affect the food safety conditions of restaurants. Given the difficulty quantifying food safety, we first propose a machine learning approach to construct a restaurant‐specific food safety risk indicator based on online customer reviews. The approach features high‐frequency continuous measurements with complete geographic coverage. We also conducted an event study and found that the food safety risk in restaurants decreased significantly in response to OFD platforms, with the effects concentrated in the five quarters including the entry period. Our mechanism analysis suggests that this improvement might come from extended market information, strengthened market competition, and heightened supervision and regulation. The impact is also more pronounced for chain restaurants, restaurants that are relatively popular and expensive, and restaurants offering low‐risk food items.", "journal": "American Journal of Agricultural Economics", "published": "2026-02-15", "url": "https://doi.org/10.1002/ajae.70058", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70058"}, {"source": "crossref", "source_id": "10.1093/erae/jbag001", "title": "Can reducing technical inefficiencies of pesticides achieve environmental impact targets? The case of Dutch arable farms", "abstract": "Abstract Farmers manage each type of pesticide differently, given the varying risks they address. As both damage-abating and polluting inputs, we have incorporated their negative impacts into a non-parametric framework to estimate the technical inefficiency of different pesticides and environmental inefficiency of Dutch arable farms from 2011 to 2021. Results suggest that farmers are more efficient in using insecticides rather than fungicides, herbicides and other pesticides, and have a higher potential to reduce negative pesticide impacts on aquatic organisms compared to soil organisms. However, even with full efficiency, the vast majority of farmers would not meet acceptable pesticide impact levels that are seen as sustainable in the long run.", "journal": "European Review of Agricultural Economics", "published": "2026-02-13", "url": "https://doi.org/10.1093/erae/jbag001", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbag001"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70091", "title": "Knowledge and Capacity Barriers to Circular Bioeconomy in Crop Waste Bioenergy Production: A Comparative\n                    <scp>MCDM<\/scp>\n                    Analysis", "abstract": "ABSTRACT In the context of growing energy demand, prioritising the advancement of the circular bioeconomy (CBE) over the ongoing extraction of fossil fuels is essential for a sustainable future. The utilisation of crop residues for bioenergy can significantly contribute to the CBE framework, providing a sustainable as well as an economical solution. However, it may be hindered by several knowledge and capacity‐related barriers. This study examines those critical knowledge and capacity barriers to the effective implementation of a CBE for crop residue–based bioenergy production via a systematic literature review and experts' suggestions. This paper further aims to compare the findings of the DEMATEL and WINGS methods in identifying potential relationships among selected knowledge and capacity barriers from an academic‐expert‐driven perspective, and to ascertain key strategies for successful crop residue–based bioenergy production through a qualitative case study analysis of Indian farmers. The results indicate significant discrepancies in the number of interrelationships among the barriers. Although DEMATEL reveals a comparatively greater number of interrelationships, WINGS tends to highlight only the most dominant and statistically robust causal links, identifying technical skill gaps and awareness deficits as particularly influential. Therefore, resolving these difficulties is crucial for sustainable bioenergy production through a circular bioeconomy framework.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-02-12", "url": "https://doi.org/10.1111/1467-8489.70091", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70091"}, {"source": "crossref", "source_id": "10.1002/ajae.70044", "title": "Issue Information", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-02-11", "url": "https://doi.org/10.1002/ajae.70044", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70044"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70030", "title": "Policy Evaluation in the Absence of Survey Data: Customised Border Designs With Satellite Data", "abstract": "ABSTRACT Developing country governments often launch new agricultural programmes without collecting pre‐implementation survey data, making it difficult to evaluate the effects of such programmes. Leveraging the flexibility of granular pixel‐level satellite panel data and a well‐developed quasi‐experimental policy evaluation design, we study a programme where pre‐implementation data is unavailable. We estimate the effect of cash transfers on agricultural productivity in Telangana, India. Treatment and control regions are within 10 km on either side of the state border. They are identical in all respects except for the difference in exposure to policy treatment. Agricultural productivity increased in the major monsoon cropping season due to the cash transfer programme. The findings also reveal that cash transfers helped reduce productivity gaps between irrigated and rainfed agricultural areas. Our results are robust to two different sources of satellite data, three alternative indicators of productivity, two rounds of full‐scale resampling, 100 rounds of small‐scale resampling and three alternative border designs. Placebo regressions of two previous years also confirm our results. This approach to policy evaluation is applicable anywhere satellite data are available in the world.", "journal": "Journal of Agricultural Economics", "published": "2026-02-10", "url": "https://doi.org/10.1111/1477-9552.70030", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70030"}, {"source": "crossref", "source_id": "10.1111/agec.70091", "title": "Managing Groundwater Irrigation in India", "abstract": "ABSTRACT Access to groundwater is inextricably linked with agriculture, rural livelihoods, and climate resilience. Yet, in many parts of India, groundwater tables are falling, with extraction rates exceeding that of recharge. There have been many attempts and interventions to manage groundwater, but there has been no systematic assessment yet of how well these have worked, and in what contexts and regions. This paper attempts such an exercise, highlighting the common lessons learned, and points to an agenda for further research.", "journal": "Agricultural Economics", "published": "2026-02-08", "url": "https://doi.org/10.1111/agec.70091", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70091"}, {"source": "crossref", "source_id": "10.1111/agec.70097", "title": "Global Agrifood Value Chains, Structural Transformation and Income Inequality", "abstract": "ABSTRACT Global agrifood value chains are rapidly expanding worldwide and play a key role in transforming agricultural production and food systems. Despite this importance, their socioeconomic implications remain insufficiently understood. This paper examines the relationship between agrifood value chain participation and income inequality. Using panel data from 137 countries over the period 1990–2020, we find a negative association between global agrifood value chain participation and income inequality, largely driven by the food and beverage sector. Delving into the underlying mechanisms, we show that this inequality‐reducing effect operates through labor reallocation away from informal, low‐productivity agricultural activities towards more formal and better‐paid downstream processing jobs, and a process of structural upgrading toward industry and services in countries that deepen their participation in the food and beverage sector. We also highlight significant disparities across regions and income groups. These findings carry significant policy implications and underscore the need for policymakers in developing countries to strengthen agrifood value chains through further transformation, with the aim of increasing incomes, generating employment, and reducing income inequality.", "journal": "Agricultural Economics", "published": "2026-02-08", "url": "https://doi.org/10.1111/agec.70097", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70097"}, {"source": "crossref", "source_id": "10.1111/agec.70099", "title": "Access to Digital Extension Services and Crop Yield: Evidence From Paddy Cultivation in India", "abstract": "ABSTRACT We examine the influence of information access on seasonal paddy yields in 10 selected Indian states using decade‐long (2009–2019) data from the Government of India's Kisan (farmers) call center (KCC) initiative. Based on 17 million farmers' queries at the KCC, we isolate two most frequent concerns—one related to pest pressure and the other related to weather predictions. Leveraging these farmers' queries and crop yield–related datasets at the district level, we assess the impacts of weather and paddy pest infestation information on seasonal paddy yields. Endogeneity concerns are addressed using an instrumental variable (IV) approach—previous years' paddy yields and percentage gross irrigated area as IVs for pest and weather‐related queries, respectively. After confirming the validity of the IVs, the results reveal that an increase in seasonal pest attacks—proxied by a 1% increase in seasonal pest‐related queries from districts—decreases paddy yields by 0.028 t ha (i.e., a decrease of 1.1% of average paddy yields). On the contrary, a 1% increase in district‐level seasonal weather queries increases paddy yields by 0.008 t ha (i.e., an increase of 0.3% of average paddy yields). Our results point to the positive contribution of paddy yield gains, while addressing proactive types of queries (i.e., weather), as well as the limitations of digital extension services, which are unable to recover the potential yield while addressing reactive types of queries (i.e., paddy pests) in a developing country.", "journal": "Agricultural Economics", "published": "2026-02-08", "url": "https://doi.org/10.1111/agec.70099", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70099"}, {"source": "crossref", "source_id": "10.1111/agec.70096", "title": "Market Insurance and Risk Pooling in U.S. Crop Insurance", "abstract": "ABSTRACT A common assumption is that multiple‐peril crop insurance markets suffer from market failures, thus justifying government intervention in the form of premium subsidies, operating allowances, and reinsurance agreements. One prominent rationale for intervention involves geographic correlation in agricultural production which leads to systemic risk in crop insurance portfolios. We measure the degree of systemic risk—and evaluate the effectiveness of risk pooling—in a hypothetical portfolio of insurance policies for U.S. corn and soybeans. We model dependence using vine copulas that capture potential asymmetries, tail dependence, and nonlinear associations. Our results indicate a reduction in overall risk when policies are pooled across space, decreased capital per policy held by the insurer to prevent ruin, and weakened tail dependence at moderate distances. Although the portfolio is subject to spatial dependence, systemic risk is unlikely to be the main impediment to market (i.e., private) crop insurance.", "journal": "Agricultural Economics", "published": "2026-02-08", "url": "https://doi.org/10.1111/agec.70096", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70096"}, {"source": "crossref", "source_id": "10.1111/agec.70093", "title": "Climate Change‐Driven Shifts in Staple Crop Structure: Evidence From Northern China", "abstract": "ABSTRACT Climate change is reshaping agricultural production, with adjustments in crop structure serving as a vital climate adaptation strategy. Drawing on county‐level agricultural data (1985–2019) and climate data (1965–2019), this study employs a panel fixed effects model to assess the impacts of climate change on the area shares of wheat, maize, and rice in Northern China, as well as their implications for grain production. The results reveal heterogeneous crop‐specific responses. The growing degree days (GDDs) is positively associated with maize area—with each 10°C·day increase in GDD associated with an approximately 0.24% rise in maize area share—while having a significantly negative effect on wheat. These effects are more pronounced in colder regions and in a single‐cropping system, reflecting agroecological heterogeneity. On the other hand, increased precipitation is associated with expansions in both wheat and maize area shares, with the effect being more evident for wheat. These climate‐driven adjustments in Northern China contributed to an estimated 1.42% increase in China's total grain output over the study period. Further mechanism analysis, using competing crops as a case, shows that the positive impact of GDD on spring maize productivity is notably greater than that for spring wheat, suggesting that higher GDD enhances the comparative advantage of maize, thereby expanding its area share while reducing that of spring wheat. We also find that increased precipitation is significantly associated with multiple cropping index (MCI) increases, offering an additional adjustment pathway. By incorporating socio‐economic factors into the analytical framework, our results indicate that improved irrigation capacity can effectively moderate the impacts of climate change on cropping patterns—by mitigating the negative effect of GDD on area shares of wheat and rice, and strengthening the positive effect of GDD on maize. Additionally, the adverse impact of GDD on wheat is substantially weaker in major grain‐producing counties compared with nonmajor ones. These findings enhance our understanding of how staple crop structure in Northern China responds to climate change and the attendant implications for food security. Our analysis can help policymakers to formulate more targeted adaptation strategies that optimize land use and sustain stable grain production.", "journal": "Agricultural Economics", "published": "2026-02-08", "url": "https://doi.org/10.1111/agec.70093", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70093"}, {"source": "crossref", "source_id": "10.1111/agec.70098", "title": "Impact of Doi Moi Agricultural Reforms on Vietnamese Crop Production", "abstract": "ABSTRACT This study uses a natural experiment design to evaluate the effects of the Doi Moi revolution in Vietnam on production outcomes for the country's five largest crops (rice, coffee, tea, cassava, and rubber). We test whether Doi Moi reforms had statistically measurable impacts on agricultural production using the synthetic control method (SCM). We find that economic reform led to substantial, long‐term increases in the production for at least four of these crops. However, the underlying drivers of these impacts appear to be crop‐specific. For tea, increases were concentrated on the intensive margin, with yields nearly 87% above counterfactual levels, while land area rose only modestly. By contrast, the dramatic expansion of coffee production was driven mainly by the extensive margin, with harvested area increasing by roughly 740%. Our findings underscore the transformative role that market‐oriented agricultural reforms can have in fostering agricultural production.", "journal": "Agricultural Economics", "published": "2026-02-08", "url": "https://doi.org/10.1111/agec.70098", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70098"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70096", "title": "From Farms to Futures: The Impact of Centralised Relocation on Non‐Agricultural Employment Transitions", "abstract": "ABSTRACT Addressing spatial and relocation poverty traps remains a key challenge in global poverty alleviation. This study assesses the impact of the Anti‐Poverty Relocation Centralised Resettlement policy on non‐agricultural employment using longitudinal data from 857 households (2014–2020). By applying multi‐period difference‐in‐differences, mediation analysis and difference‐in‐differences‐in‐differences models, this study systematically investigates the promotional effects of the Anti‐Poverty Relocation Centralised Resettlement policy on the non‐agricultural employment transition of relocated households. Impact pathway analysis highlights the critical role of employment opportunities and vocational training in facilitating employment transitions. In contrast, agricultural production support policies exert a concealing effect, discouraging shifts to non‐agricultural employment. The results further reveal that urban resettlement is more effective than industrial park resettlement, and that larger communities provide greater employment benefits than smaller ones. These insights offer policy recommendations for addressing spatial and relocation poverty traps.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-02-06", "url": "https://doi.org/10.1111/1467-8489.70096", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70096"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70094", "title": "A Small Act Towards Circular Bioeconomy: Adoption of Integrated Crop‐Livestock System and Its Impacts on Fertiliser Use", "abstract": "ABSTRACT The integrated crop‐livestock system (ICLS) involves rural households simultaneously engaging in crop cultivation and livestock rearing, embodying the principles of a circular bioeconomy. In this system, crop cultivation produces straw as livestock feed, while livestock rearing generates manure that enriches the soil for crop production. This small‐scale circular model enables farmers to efficiently utilise renewable natural resources, such as crop residues and livestock waste, as sustainable alternatives to non‐renewable, fossil‐based inputs like chemical fertiliser. This paper analyses rice farmers' adoption of ICLS and its impact on fertiliser use using data collected from rural China. This study employs probit two‐stage least squares and the endogenous treatment effect model to address the endogeneity of ICLS adoption. The results indicate that ICLS adoption significantly increases expenditure and application frequency of bio‐fertiliser, while its impact on chemical fertiliser use is insignificant, though negative. The negative effect of ICLS adoption on chemical fertiliser use is only observed among young farmers. ICLS adoption is correlated with an increase in farm revenue. These findings suggest that reducing chemical fertiliser use and increasing bio‐fertiliser use, facilitated by ICLS adoption, do not compromise food security and contribute to the transition towards a circular bioeconomy.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-02-06", "url": "https://doi.org/10.1111/1467-8489.70094", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70094"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70085", "title": "Carbon Farming Optimisation With Market Premiums for Biodiversity Co‐Benefits Under Climate Change Socio‐Economic Pathway Scenarios", "abstract": "ABSTRACT Achieving global climate change mitigation, biodiversity conservation and restoration goals requires innovative solutions that balance carbon sequestration with biodiversity conservation. Payments for ecosystem services markets often treat carbon sequestration and biodiversity separately, but integrating biodiversity as a co‐benefit within carbon farming could improve the environmental outcomes of carbon markets. This study explores the potential for carbon farming strategies in south‐eastern Australia, investigating the trade‐offs and synergies between carbon farming and biodiversity conservation. We aim to evaluate whether modest changes to carbon farming policy could influence biodiversity outcomes, carbon sequestration and economic returns. We develop an optimisation framework to evaluate two carbon farming practices, assisted natural regeneration and environmental planting, under different climate projections and policy scenarios. Our model incorporates carbon sequestration estimates and biodiversity priorities across historical climate and projected climate change defined by the shared socio‐economic pathways, specifically SSP245 and SSP585. The selection of land use change sites is optimised for two policy settings: a least‐cost carbon policy that emulates current market design, and a premium carbon credit policy that provides a 10% premium to maximise biodiversity outcomes without sacrificing carbon sequestration or economic return. Results indicate that biodiversity premiums in carbon credit payments could significantly improve biodiversity outcomes without sacrificing carbon sequestration or economic returns. Spatial analyses reveal shifts in optimal locations for carbon farming under different climate change projections. Previous research on carbon‐biodiversity trade‐offs has overlooked the impacts of current policy settings, eligibility criteria, risk factors and transaction costs. By addressing these gaps, this study provides new insights into how a moderate premium to existing policies could significantly enhance biodiversity co‐benefits within carbon credit schemes.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-02-05", "url": "https://doi.org/10.1111/1467-8489.70085", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70085"}, {"source": "crossref", "source_id": "10.1002/aepp.70054", "title": "Issue Information", "abstract": "", "journal": "Applied Economic Perspectives and Policy", "published": "2026-02-03", "url": "https://doi.org/10.1002/aepp.70054", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70054"}, {"source": "crossref", "source_id": "10.1002/ajae.70045", "title": "Causal analysis of trade loss from pathogens: A global study of foot and mouth disease impacts on meat exports", "abstract": "Abstract Our general interest is in global trade loss from livestock pathogens, specifically exports. We adopt a causal inference approach that considers animal disease outbreaks over time as non‐staggered binary treatments with the potential for switching in (infection) and out of treatment (recovery) within the sample period. The outcome evolution of switchers and non‐switchers identifies the treatment effects. Using a recently proposed dynamic difference‐in‐differences estimator, we estimate the treatment effects that decompose into “infected” (switch in) and “recovered” (switch out) effects. As a case study, we investigate the global impacts of foot and mouth disease outbreaks on meat exports using panel data across 178 countries from 1996 to 2016. We find that the outbreak decreases meat export by 19,000 to 48,000 metric tons per year (14% ‐ 35% of the mean annual meat export) in the 5 years following an outbreak, which is brought about by a decline in the infected countries' meat exports, while the disease‐recovered countries do not fully regain the export losses even after 5 years. The average total effect is estimated at about 54,000 metric tons per outbreak over 5 years following an outbreak, resulting in an export revenue loss of $141 million. Asymmetric post‐infection and post‐recovery trade losses imply a significant disease burden on the endemic regions. Regional decomposition of treatment effects reveals that while the magnitude of export loss is greater for the non‐endemic regions, the relative magnitude (compared to the mean annual export per country) is many times higher in the endemic regions.", "journal": "American Journal of Agricultural Economics", "published": "2026-02-02", "url": "https://doi.org/10.1002/ajae.70045", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70045"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70095", "title": "The Impact of Credit and Training on Farmers Efficiency: A Semi‐Parametric Meta‐Frontier Analysis", "abstract": "ABSTRACT Smallholder farmers in developing countries face several constraints, which affect their productivity. To reduce these constraints and enhance productivity, government and non‐governmental agencies implement programmes that provide credit and training to farmers. In this study, we evaluate the impact of one of such programme on the efficiency of farmers. Specifically, we evaluate the impact of providing both credit and training on the efficiency of peanut farmers in Haiti. To achieve this goal, first, we use the Propensity Score Matching (PSM) technique to balance our dataset, thereby accounting for selection bias based on observable factors. Second, we correct for selection bias from non‐observable factors by using the Selectivity‐bias Correction Stochastic Production Frontier (SC‐SPF) to estimate the efficiency scores on the balanced sample. Third, given that there might be differences in the technology used by farmers, we estimate a meta‐frontier to compare the efficiency scores while addressing the incorrect skewness problem in frontier analysis. Our results show that farmers who received both credit and training had higher efficiency scores, suggesting that interventions that increase credit access and transfer knowledge can enhance productivity and help to address food security issues.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-02-02", "url": "https://doi.org/10.1111/1467-8489.70095", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70095"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70087", "title": "Management of Spent Mushroom Substrate in Odisha, India: Determinants, Impacts and Scope for the Circular Bioeconomy", "abstract": "ABSTRACT Mushroom cultivation is rapidly gaining prominence as a sustainable farming system. However, it generates substantial quantities of spent mushroom substrate (SMS), posing challenges for waste management and environmental sustainability. Therefore, developing circular bioeconomic approaches is crucial for the sustainable management of SMS. This study examines the SMS management approaches practiced by mushroom farmers in Odisha, India, and the factors influencing their management choices as well as their impact on mushroom productivity. It was observed that farmers primarily practice three SMS management approaches: farm‐site deposition, composting and distant dumping. The results of the multinomial endogenous switching regression (MESR) model indicate that factors such as education, farming experience, access to extension services and infrastructure significantly influence the choice of SMS management approach. These management approaches were found to have a significant impact on mushroom productivity. The study recommends policies that promote waste management infrastructure aligned with circular bioeconomy principles, fostering sustainable mushroom farming.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-02-02", "url": "https://doi.org/10.1111/1467-8489.70087", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70087"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70088", "title": "Harnessing Indonesia's Circular Bioeconomy: Integrating Land, Marine, Forest and Water Resources for Food System Sustainability", "abstract": "ABSTRACT Circular bioeconomy (CBE) applications in land, marine, water and forest sectors are evolving rapidly to support agriculture and food systems. Their integration into national development agendas can advance inclusive, sustainable economic growth while enhancing social welfare and environmental stewardship. However, existing literature offers limited cross‐sectoral analysis of CBE applications. This study addresses that gap through an integrative review of concepts, theories, strategies and practices related to CBE in the context of sustainable agriculture and food systems. We examine research trends and propose future directions across four resource domains: land, marine, forest and water. Findings indicate a widespread transformation of sectoral waste and by‐products into biochar, organic fertilisers, animal feed, nutritional supplements and other bio‐based products that strengthen food systems. Additional outputs include bioenergy, bioplastics, handicrafts, furniture and paper. Drawing on these insights, we introduce a causal loop diagram illustrating a CBE model that links all four sectors. For Indonesia, leveraging CBE within global networks will require technological innovation, robust policies and cross‐sector collaboration to realise its full potential and align with global sustainability targets.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-02-02", "url": "https://doi.org/10.1111/1467-8489.70088", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70088"}, {"source": "crossref", "source_id": "10.1111/jage.v77.1", "title": "", "abstract": "", "journal": "Journal of Agricultural Economics", "published": "2026-02-01", "url": "https://doi.org/10.1111/jage.v77.1", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/jage.v77.1"}, {"source": "crossref", "source_id": "10.1002/ajae.70057", "title": "Lost ground, lost value: Investigating the relationship between soil erosion and agricultural land value", "abstract": "Abstract This study examines the impact of soil erosion on agricultural land values in the United States (US) Midwest. Based on a novel county‐level panel data set with information on soil erosion levels and agricultural land values covering five census years (1997, 2002, 2007, 2012, and 2017), we separately investigate the direct effect of two types of soil erosion—water and wind erosion—on county‐level average agricultural land values. Linear panel fixed effects econometric models and a number of robustness checks are used to achieve the study objective. We find that increasing soil erosion levels have a statistically significant negative impact on agricultural land values at the county level. Our findings confirm that damages to the soil from water or wind erosion are capitalized into lower farmland values. The study provides new insights in terms of further understanding the economic damages due to soil erosion and the likely benefits from soil erosion control.", "journal": "American Journal of Agricultural Economics", "published": "2026-01-30", "url": "https://doi.org/10.1002/ajae.70057", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70057"}, {"source": "crossref", "source_id": "10.1002/ajae.70056", "title": "Economics of land‐based carbon mitigation", "abstract": "Abstract Agricultural land holds tremendous potential to contribute to net zero greenhouse gas emission goals by providing low carbon renewable energy to displace fossil fuels and by serving as a sink for sequestering carbon in the soil with climate‐smart practices. This potential is, however, far from being realized. This paper examines the economic incentives and barriers to implementing land‐based carbon mitigation strategies and discusses the specific features of land‐based carbon mitigation practices on carbon emissions that need to be considered in designing policy incentives to induce adoption. Although a carbon price‐based policy is socially efficient, the more commonly observed policies to promote land‐based carbon mitigation include practice‐based conservation programs, technology mandates, and sector‐specific standards. The paper discusses the rationale for these alternative policy approaches and concludes with a discussion of emerging opportunities for designing policy and market‐based approaches for promoting land‐based carbon‐mitigation and future directions for economics research.", "journal": "American Journal of Agricultural Economics", "published": "2026-01-27", "url": "https://doi.org/10.1002/ajae.70056", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70056"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf067", "title": "Import substitution and Russian food independence", "abstract": "Abstract We investigate whether Russia’s change in trade policy from increasingly WTO compliant, pre-WTO accession policy to being restrictive, discretionary and WTO non-compliant has changed price volatility on the domestic market. DCC-MGARCH model results suggest doubling of conditional volatility and volatility correlation between pork producer prices along Russia’s pork supply chain. A volatility regime switch is confirmed by the regime switching dynamic correlations model. Our findings show that contrary to their objective, discretionary trade restrictions may increase price volatility in the domestic market. Trade restrictions need to be redesigned such that rule-based, WTO-conform trade policies are implemented instead.", "journal": "European Review of Agricultural Economics", "published": "2026-01-27", "url": "https://doi.org/10.1093/erae/jbaf067", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf067"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/4/63_1/_article/-char/ja/", "title": "有機イチゴ新規参入者の技術習得における情報源の特徴", "abstract": "", "journal": "農業経営研究", "published": "2026-01-27", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/4/63_1/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/4/63_1/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/4/63_13/_article/-char/ja/", "title": "6次産業化農産加工事業の承継", "abstract": "", "journal": "農業経営研究", "published": "2026-01-27", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/4/63_13/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/4/63_13/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/4/63_19/_article/-char/ja/", "title": "中国都市近郊果樹産地における農地経営権流動化の実態", "abstract": "", "journal": "農業経営研究", "published": "2026-01-27", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/4/63_19/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/4/63_19/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/4/63_25/_article/-char/ja/", "title": "関係人口の創出につながる活動の実態と継続要因", "abstract": "", "journal": "農業経営研究", "published": "2026-01-27", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/4/63_25/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/4/63_25/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/4/63_32/_article/-char/ja/", "title": "ポストCOVID-19における教育民泊受入組織の再構築過程に関する事例研究", "abstract": "", "journal": "農業経営研究", "published": "2026-01-27", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/4/63_32/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/4/63_32/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/4/63_39/_article/-char/ja/", "title": "施設園芸におけるヒートポンプ導入と定着の要件", "abstract": "", "journal": "農業経営研究", "published": "2026-01-27", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/4/63_39/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www. article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/4/63_7/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/4/63_71/_article/-char/ja/", "title": "山崎亮一・新井祥穂・氷見理　編著『伊那谷研究の半世紀 ―労働市場から紐解く農業構造―』", "abstract": "", "journal": "農業経営研究", "published": "2026-01-27", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/4/63_71/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/4/63_71/_article/-char/ja/"}, {"source": "crossref", "source_id": "10.1002/ajae.70049", "title": "<scp>\n                      <i>De gustibus est disputandum<\/i>\n                    <\/scp>\n                    : The role of agricultural and applied economists in an era of behavior change initiatives and endogenous preferences", "abstract": "Abstract Popular society increasingly questions preferences that drive many resource allocations and production decisions, with many groups actively seeking to alter those preferences to achieve changes to resource use. Agricultural and applied economists, who are already equipped with excellent technical skills to undertake consumer preference and valuation studies, must also be challenged to understand post‐Beckerian consumer theories that can help guide emerging requests placed upon economists as multi‐disciplinary collaborators as non‐academic groups press us to join in work involving interventions that work from the implicit assumption that preferences are malleable and potentially endogenous. I call association members to follow our best traditions of studying production dynamics and incorporating emerging theories drawn from or inspired by other disciplines so that we may better interact with the broader scientific community who, as many suggest, finds our insistence on stable and static preferences to limit the usefulness of economists in handling a raft of modern dilemmas. In addition to setting out the history of economists' reticence in considering endogenous preferences, I will outline several threads of emerging literature that can provide structure to professional inquiry in this domain and sketch some emergent cases with implications for the agricultural and resource sectors.", "journal": "American Journal of Agricultural Economics", "published": "2026-01-25", "url": "https://doi.org/10.1002/ajae.70049", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70049"}, {"source": "crossref", "source_id": "10.1002/ajae.70055", "title": "Award winning theses", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-01-25", "url": "https://doi.org/10.1002/ajae.70055", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70055"}, {"source": "crossref", "source_id": "10.1002/ajae.70053", "title": "Wiktor (Vic) Adamowicz", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-01-23", "url": "https://doi.org/10.1002/ajae.70053", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70053"}, {"source": "crossref", "source_id": "10.1002/ajae.70051", "title": "Sergio H. Lence", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-01-23", "url": "https://doi.org/10.1002/ajae.70051", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70051"}, {"source": "crossref", "source_id": "10.1002/ajae.70050", "title": "<scp>AAEA<\/scp>\n                    Fellows", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-01-23", "url": "https://doi.org/10.1002/ajae.70050", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70050"}, {"source": "crossref", "source_id": "10.1002/ajae.70052", "title": "Ted Schroeder", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-01-23", "url": "https://doi.org/10.1002/ajae.70052", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70052"}, {"source": "crossref", "source_id": "10.1002/ajae.70054", "title": "Amy W. Ando", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-01-23", "url": "https://doi.org/10.1002/ajae.70054", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70054"}, {"source": "crossref", "source_id": "10.1002/ajae.70048", "title": "Gerald “Jerry” Shively", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-01-23", "url": "https://doi.org/10.1002/ajae.70048", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70048"}, {"source": "crossref", "source_id": "10.1002/ajae.70047", "title": "Presidents", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-01-23", "url": "https://doi.org/10.1002/ajae.70047", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70047"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70021", "title": "Pass‐Through of Cocoa Prices Along the Supply Chain: What's Left for Farmers in Côte d'Ivoire?", "abstract": "ABSTRACT Most cocoa farmers in Côte d'Ivoire are trapped in a cycle of poverty and farming practices that degrade the environment. This paper aims to provide an in‐depth understanding of the price formation process for cocoa at each stage of the supply chain in the world's largest cocoa‐producing country. By examining potential inefficiencies that affect price pass‐through and could explain exceptionally low farm‐gate prices, the study seeks to identify segments of the supply chain where policy or market interventions could improve outcomes for farmers. Our approach couples econometric analyses using secondary cocoa price data and primary farm household survey data with qualitative assessments of institutional factors specific to the cocoa value chain in Côte d'Ivoire. Notwithstanding the country's highly regulated system of setting cocoa prices, we do not find evidence of inefficiencies that would explain persistently low farm‐gate prices. Nor do we find that the recently introduced ‘Living Income Differential’, a price surcharge on internationally traded cocoa, has benefited farmers. We conclude by advocating that the international cocoa industry strengthens its development programmes in cocoa‐growing communities, and that the government supports these efforts with better provision of infrastructure and other public goods. Such efforts could ultimately serve to increase the opportunity cost of cocoa production, drawing farmers into other employment sectors while improving the resilience and livelihoods of those who remain.", "journal": "Journal of Agricultural Economics", "published": "2026-01-23", "url": "https://doi.org/10.1111/1477-9552.70021", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70021"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf070", "title": "Time preferences in rural economies: A systematic global review", "abstract": "Abstract Time preferences shape decisions about resource use, investment and sustainability, yet evidence on how they are measured in rural field settings remains fragmented. This systematic literature review covers 67 studies eliciting time preferences among rural populations, focusing on farmers and fishers. We map the theoretical models used, compare elicitation methods and experimental designs, and synthesise reported patterns. The review documents substantial heterogeneity in how time preferences are conceptualised and measured, and highlights recurring methodological and reporting challenges that limit comparability across contexts. For more reliable, replicable and policy-relevant research, we propose a structured reporting guide.", "journal": "European Review of Agricultural Economics", "published": "2026-01-23", "url": "https://doi.org/10.1093/erae/jbaf070", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf070"}, {"source": "crossref", "source_id": "10.1002/ajae.70046", "title": "Brian E. Roe", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-01-21", "url": "https://doi.org/10.1002/ajae.70046", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70046"}, {"source": "crossref", "source_id": "10.1002/ajae.70040", "title": "Consumer food waste as household technical inefficiency across countries and time", "abstract": "Abstract Despite its implications for global food security and sustainability, quantitative analysis of consumer food waste across countries and over time is scarce. We examine food waste dynamics across 145 countries from 1995 to 2013 by modeling uneaten calories as a form of household‐level technical inefficiency, using an input distance function within a panel stochastic frontier framework. Unlike prior studies that rely on production functions, our input‐oriented specification reflects consumer behavior by treating body mass as a predetermined level and analyzing the calories required to sustain it—aligning the specification with consumer behavior. The panel structure allows decomposition of inefficiency into time‐invariant (persistent) and time‐varying (transient) components and clarifies development‐related factors associated with food waste. Our results show that persistent inefficiency is the dominant source of household food waste, with fruit and vegetable consumption associated with higher overall levels of transient inefficiency. We find evidence of an inverted‐U (Kuznets‐style) relationship, where food waste tends to rise at lower income levels but declines as countries become wealthier. Between 1995 and 2013, global food waste increased by an estimated 336 million metric tons, with middle‐income countries—particularly Brazil, Russia, India, and China—accounting for a large share of the rise. This novel application establishes a foundational, generalizable framework for longitudinal, indirect measurement of food waste across spatial scales and levels of aggregation. Additionally, by decomposing inefficiency into persistent and transient components, this framework enables dynamic computable general equilibrium and partial equilibrium simulations, integrated with life‐cycle assessment, that distinguish structural changes from short‐run shocks.", "journal": "American Journal of Agricultural Economics", "published": "2026-01-21", "url": "https://doi.org/10.1002/ajae.70040", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70040"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70027", "title": "Environmental Performance Evaluation Under the Frontier Analysis Framework: A Farm‐Level Systematic Review and Meta‐Analysis", "abstract": "ABSTRACT Quantifying and improving the environmental performance (EP) of agriculture has become an urgent research and policy priority. Over the past three decades, frontier‐based analytical frameworks have been widely applied to evaluate farm‐level EP. We present a global systematic review and meta‐analysis of 121 studies (comprising 800 unique environmental performance estimates) that use a frontier‐based approach for farm‐level EP evaluation. Adhering to PRISMA guidelines, we extract and synthesise information on modelling approaches, estimation methods, pollutant types, as well as other data and study characteristics. We also consider the determinants for EP. We find that there is inertia in the shift towards more recent and methodologically better environmental performance evaluation techniques, such as the by‐production approach and material balance methods, at the farm level. A random effects meta‐regression reveals that the methodological approach and estimation methods explain the variation in EP. Farm type and inclusion of determinants are also important. We identify multiple significant determinants of environmental performance across agricultural systems. The findings advance academic understanding of how modelling frameworks shape EP estimates. They also offer practical insights to help policymakers understand specific policy variables and farm‐specific factors that could be leveraged to improve environmental performance. For example, fostering pro‐environmental attitudes and encouraging the adoption of sustainable agricultural practices through extension services can help enhance environmental performance in farming.", "journal": "Journal of Agricultural Economics", "published": "2026-01-19", "url": "https://doi.org/10.1111/1477-9552.70027", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70027"}, {"source": "crossref", "source_id": "10.1002/ajae.70036", "title": "Price incentives and unregulated deforestation: Evidence from Indonesian palm oil mills", "abstract": "Abstract Global demand shifts and supply chain interventions have the potential to reduce palm oil's environmental footprint, especially in otherwise unregulated plantations. This ultimately depends on deforestation reacting to prices in upstream, complex plantation–mill systems. We produce the first microeconomic panel of geolocalized palm oil mills, and we model their influence on palm plantations across Indonesia where the issue is most critical. We leverage our data granularity and the nature of the value chain to isolate downstream mill‐gate price shocks that are exogenous to deforestation upstream. We find a positive elasticity to the mill‐gate price of crude palm oil, in general and in two specific cases of unregulated deforestation—for smallholder plantations and for illegal industrial plantations. However, smallholder deforestation decelerates as palm fruit prices increase. These results inform the design of fair and effective conservation policy.", "journal": "American Journal of Agricultural Economics", "published": "2026-01-17", "url": "https://doi.org/10.1002/ajae.70036", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70036"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70028", "title": "Contract Labour, Job Quality and Turnover Intention—Evidence From Nigeria", "abstract": "ABSTRACT Labour contracting, where intermediaries provide farmers with migrant workers, plays a central role in meeting the demand for seasonal labour on labour‐intensive farms. Yet this system poses underresearched challenges for both workers and farmers. A few studies, mostly qualitative, link labour contracting to exploitative conditions, raising concerns about workers' welfare (Sustainable Development Goal 8). However, poor working conditions are widespread in agriculture, and notably, quantitative comparisons between contract and non‐contract workers are lacking. For farmers, these precarious conditions pose a production risk if they lead to higher turnover. However, such links have so far been mainly documented in high‐skilled settings. Here, we address these gaps and provide the first empirical evidence on the links between contract labour, job quality and turnover intention. We use matched worker–employer survey data, rarely available in agricultural research, complemented with qualitative insights from a well‐suited case study: Nigeria's labour‐intensive tomato sector, where farmers recruit workers through personal networks and labour contractors. Using decomposition analysis—commonly used to examine gender gaps—in a novel way, we assess disparities in working conditions between contract and non‐contract workers. Our findings show that contract labour is associated with structural disparities in working conditions. Complementary qualitative insights show how rules, norms and practices embedded in labour contracting systems contribute to these structural inequalities. Paradoxically, despite poorer conditions, contract workers report job satisfaction levels similar to non‐contract workers—likely reflecting limited alternatives. Consequently, turnover intentions are comparable across both groups, with job satisfaction being the primary driver of turnover intentions.", "journal": "Journal of Agricultural Economics", "published": "2026-01-16", "url": "https://doi.org/10.1111/1477-9552.70028", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70028"}, {"source": "crossref", "source_id": "10.1002/ajae.70043", "title": "Does an early warning system for foodborne illness in schools work? Evidence from South Korea", "abstract": "Abstract Understanding how information and/or information systems can help reduce the spread of foodborne illness, especially among vulnerable populations, is of first‐order policy relevance. In 2008, the South Korean government introduced an early warning system for foodborne illness outbreaks in all schools. This action was in response to a 2006 outbreak that sickened over 3600 students in 46 schools in the greater Seoul area. The EWS mandates schools track food items and suppliers such that schools can be alerted when an outbreak occurs. This study evaluates the effects of this warning system using administrative panel data in South Korea for 10 school years (2002–2011). We find the areas that had a higher pre‐policy prevalence of foodborne illness had the largest decrease in foodborne illness‐related costs after the implementation of the Early Warning System. In general, outbreaks of foodborne illness (of any type) fell by about 18.5% and the overall number of cases fell by 0.4%. When we compare changes in illnesses in schools versus other food sources (e.g., homes or restaurants) we find less evidence that the EWS reduced illness. Back‐of‐the‐envelope calculations indicate that the EWS reduced the annual cost of foodborne illness by at least $0.4 million per year, upwards of $2.9 million.", "journal": "American Journal of Agricultural Economics", "published": "2026-01-14", "url": "https://doi.org/10.1002/ajae.70043", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70043"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70084", "title": "US Consumer Appetite for Climate Claims on Beef Products: Does Country‐of‐Origin Matter?", "abstract": "ABSTRACT Beef cattle producers have been receiving pressure to reduce methane emissions from production. Beef products with varying climate claims have recently been introduced to the retail sector, stemming from various countries‐of‐origin. Using data from a US consumer survey, we find a subset of US consumers is willing to pay a premium for Lower Carbon Footprint beef products. These consumers are willing to pay a higher premium for the claim on ribeye steak ($1.84/lb) compared to ground beef ($0.79/lb). Imported beef products with climate claims are unlikely to have major implications on the demand for US‐produced beef.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-01-14", "url": "https://doi.org/10.1111/1467-8489.70084", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70084"}, {"source": "crossref", "source_id": "10.1002/aepp.70053", "title": "Microeconomic Linkages Between Food, Energy, and Land Security: Insights From Ethiopia", "abstract": "ABSTRACT Rural households in low‐income countries face food and energy insecurity. This study examines how land tenure security shapes these interlinked outcomes in southern Ethiopia. We introduce the Household Energy Insecurity Access Scale ( HEIAS ), adapted from experience‐based food security indicators, to measure energy security. Using survey data from 803 households and a multiple mediation model, we find a direct positive effect of land tenure security on energy security and an indirect effect on food security, which improves through enset cultivation and livestock ownership. HEIAS offers a practical tool to quantify household energy security that can support monitoring, targeting, and policy evaluation.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-01-11", "url": "https://doi.org/10.1002/aepp.70053", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70053"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70024", "title": "Surveying the Farmer Survey: A Synthesis of Research Practices in the Netherlands, Slovenia and Sweden", "abstract": "ABSTRACT Research based on farmer surveys is a cornerstone of agricultural economics. Farmer surveys provide unique insights into behavioural variables—such as values, motivations, attitudes, behaviours, and preferences—that are unavailable in secondary datasets. However, the decline in farm numbers across most European countries, combined with a growing number of surveys, is posing a threat to farmer survey research. This paper synthesises current practices in farmer surveys in the Netherlands, Slovenia, and Sweden. Our approach is meta‐scientific, drawing on a survey aimed at researchers responsible for 34 farmer surveys conducted between January 2019 and August 2024. This analysis is complemented by a document analysis and critical reflection workshops. We identify three key challenges: (i) limited consistency and standardisation of socio‐economic survey questions, (ii) long surveys, which are associated with high attrition and low response rates, and (iii) low adoption of open science practices. To address these challenges, we propose a set of best practices to enhance the transparency, comparability, standardisation, and reusability of farmer survey data. These best practices aim to strengthen the quality of survey‐based research in agricultural economics and ensure that farmer surveys continue to support evidence‐based policymaking.", "journal": "Journal of Agricultural Economics", "published": "2026-01-10", "url": "https://doi.org/10.1111/1477-9552.70024", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70024"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70026", "title": "Women's Off‐Farm Employment and Dietary Quality in Rural Africa", "abstract": "ABSTRACT Most households in rural Africa are involved in smallholder farming, but off‐farm employment is an important additional income source for many. Previous research has analysed links between off‐farm employment and well‐being, but mostly at the household level, not considering that household members may be affected differently. In particular, gender gaps in employment, nutrition and other well‐being dimensions are widely observed. Here, we use survey data collected in Tanzania and Zambia to examine how women's off‐farm employment influences their individual‐level dietary quality. Regression estimates with instrumental variables show that women's off‐farm employment is associated with improved dietary diversity, including more frequent consumption of nutritious foods such as meat, fish, fruits and vegetables. We also explore potential mechanisms, including changes in household income, women's decision‐making and time allocation. The main results hold across various robustness checks, suggesting that improving women's access to off‐farm employment can help increase household income and reduce widespread gender gaps in rural Africa.", "journal": "Journal of Agricultural Economics", "published": "2026-01-10", "url": "https://doi.org/10.1111/1477-9552.70026", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70026"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70029", "title": "Issue Information", "abstract": "", "journal": "Journal of Agricultural Economics", "published": "2026-01-10", "url": "https://doi.org/10.1111/1477-9552.70029", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70029"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf068", "title": "Strategic responses to ban enforcement uncertainty: Antibiotic application decisions in plant agriculture", "abstract": "Abstract The rise of antibiotic resistance in plant agriculture, combined with limited disease management options and potential antibiotic bans, complicates growers' disease management decision-making. We develop a dynamic model of optimal antibiotic use under uncertainty about ban enforcement in the case of apple fire blight. We find that proactive growers who adjust to anticipated bans overexploit antibiotic efficacy and gain benefits over business-as-usual growers. However, if a government fails to enforce an announced ban, these proactive growers incur losses. The magnitude of these losses is nonlinear with respect to the value of the crop in question. We generate loss estimates for a range of apple crop values and show that regulatory uncertainty can have negative, neutral, or positive unintended impacts on growers.", "journal": "European Review of Agricultural Economics", "published": "2026-01-10", "url": "https://doi.org/10.1093/erae/jbaf068", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf068"}, {"source": "crossref", "source_id": "10.1002/ajae.70037", "title": "Quantifying inequities in the implementation of governmental farm payments to field and specialty crop producers", "abstract": "Abstract This paper estimates the racial, ethnic, and gender inequities in aggregate governmental funding to field and specialty crop farmers over 2002–2017 using a well‐matched subset of the USDA Agricultural Census microdata. I employ a coarsened exact matching model to compare most similar farmers, differentiated by Black race, Hispanic ethnicity, Asian race, and woman gender. I find that Black farmers received more funding than comparable white farmers in 2012 at both the federal and state/local levels but did not have significant differences in other years. I also find that Hispanic farmers received less federal funding in 2007 than non‐Hispanic White farmers and more state and local funding in 2012, while women have funding differences in both directions over time and in particular received more conservation funding than men. Ultimately, this paper does not find broad evidence of inequities in governmental payments for racial, ethnic, or gender minorities in the matched subset of field and specialty crop farmers. I conclude with additional ways that potential inequities could be tested by future studies.", "journal": "American Journal of Agricultural Economics", "published": "2026-01-09", "url": "https://doi.org/10.1002/ajae.70037", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70037"}, {"source": "crossref", "source_id": "10.1002/ajae.70041", "title": "<scp>A<\/scp>\n                    meta‐analysis on the productive value of crop biodiversity", "abstract": "Abstract Growing recognition of biodiversity's role in supporting agricultural productivity has prompted economists and other scholars to quantify the “productive value” of crop biodiversity using observational data from real‐world conditions. We present the first meta‐analysis of that literature, drawing on 158 estimates from 52 observational studies published between 1998 and 2025. Overall, crop biodiversity exhibits a positive and statistically significant effect on agricultural productivity, with an average elasticity of 0.75—meaning a 1% increase in crop biodiversity (proxied by diversity indexes) raises agricultural outcomes by 0.75%. Yet, this average masks considerable heterogeneity across and within studies (standard deviation of 1.23). Complementary meta‐regression analyses attribute much of this heterogeneity to differences in research settings: biodiversity indexes based on species richness yield larger effects than evenness‐based ones, profit‐related outcomes show stronger associations with biodiversity than production‐related ones, and instrumental variable estimates exceed those from other methods. We further detect signs of selective reporting in our sample, with published estimates clustering just above conventional significance thresholds. Adjusting for this bias reduces average effects substantially, though the corrected evidence still points toward a positive—though more modest—productive value of crop biodiversity.", "journal": "American Journal of Agricultural Economics", "published": "2026-01-08", "url": "https://doi.org/10.1002/ajae.70041", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70041"}, {"source": "crossref", "source_id": "10.1002/aepp.70051", "title": "Markets Mitigate Land‐Use Competition From Energy Crops and Increase Farm Revenues", "abstract": "ABSTRACT Meeting the US Sustainable Aviation Fuel Grand Challenge target of 35 billion gal annually by 2050 will require an estimated 380 million–700 million dry tons of agricultural biomass feedstock. This study evaluates the implications of large‐scale biomass production for land use, crop production, and market outcomes under mature market conditions. Results suggest that producing 476 million–843 million dry tons of biomass annually from agriculture would reduce cropland planted in corn, wheat, and soy by 8%–14%. However, convergence toward higher‐quality cropland raises per‐acre yields by 2%–9% relative to a business‐as‐usual baseline, limiting net production losses to 1%–3%. At the same time, farm market incomes increase by 20%–33%, whereas food price impacts remain below 1%. These findings indicate that substantial expansion of agricultural biomass for sustainable aviation fuel can be achieved with relatively modest impacts on food production and prices while also improving farm income.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-01-08", "url": "https://doi.org/10.1002/aepp.70051", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70051"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70023", "title": "Criteria for Choosing Crop Protection Strategies: Comparative Perspectives From Farmers, Advisors and Researchers", "abstract": "ABSTRACT Achieving ambitious pesticide reduction goals calls for collaboration and shared vision among multiple stakeholders. This study evaluates whether this is the case in three French pesticide‐intensive production sectors: vine‐growing, orchards and fruits &amp; vegetables farming. To do so, it uses the Q‐method to assess farmers' decision‐making criteria when selecting crop protection strategies, taking stock of technical, economic, and organisational constraints, as well as health and environmental impacts. It also compares these criteria with the perspectives of researchers and advisors on farmers' priorities. After combining a factor analysis with a fractional multilogit model accounting for factor loadings, the findings reveal four distinct profiles across the sample: a competitiveness‐oriented approach; a focus on reducing health and environmental impacts; a risk management perspective; and an integrated vision combining multiple priorities. Being a farmer, advisor or researcher significantly influences the likelihood of belonging to one profile or another. However, close interactions between farmers, researchers, and advisors help bridge differences in priorities, fostering more closely aligned perspectives on crop protection strategies. These results point to key indicators that researchers and advisors could leverage to better inform farmers about alternative crop protection methods, ultimately supporting more sustainable agricultural practices.", "journal": "Journal of Agricultural Economics", "published": "2026-01-06", "url": "https://doi.org/10.1111/1477-9552.70023", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70023"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_001/_article/-char/ja/", "title": "座長解題／危機の中の食料消費", "abstract": "", "journal": "フードシステム研究", "published": "2026-01-06", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_001/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/2/32_001/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_002/_article/-char/ja/", "title": "研究会報告／2024年における日本の食費カテゴリの消費動向", "abstract": "", "journal": "フードシステム研究", "published": "2026-01-06", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_002/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/2/32_002/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_003/_article/-char/ja/", "title": "研究会報告／生協組合員の消費意識について", "abstract": "", "journal": "フードシステム研究", "published": "2026-01-06", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_003/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/2/32_003/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_004/_article/-char/ja/", "title": "研究会報告／危機下にあるアフリカ食料安全保障", "abstract": "", "journal": "フードシステム研究", "published": "2026-01-06", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_004/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/2/32_004/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_005/_article/-char/ja/", "title": "研究会報告／セネガル都市部における食料消費者の姿", "abstract": "", "journal": "フードシステム研究", "published": "2026-01-06", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_005/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/2/32_005/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_006/_article/-char/ja/", "title": "コメント／コメント・質問", "abstract": "", "journal": "フードシステム研究", "published": "2026-01-06", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_006/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/2/32_006/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_007/_article/-char/ja/", "title": "上田遥著／『食の豊かさ 食の貧困：近現代日本における規範と実態』", "abstract": "", "journal": "フードシステム研究", "published": "2026-01-06", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_007/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/2/32_007/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_008/_article/-char/ja/", "title": "伊藤紀子著／『「食」でつながるアフリカのコミュニティ～持続可能な地域の発展をかなえるための５つのヒント～』", "abstract": "", "journal": "フードシステム研究", "published": "2026-01-06", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_008/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/2/32_008/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_009/_article/-char/ja/", "title": "八木浩平・野口敬夫・林瑞穂編著／『日本の食料安全保障と国際環境：国・企業・消費者の視点から』", "abstract": "", "journal": "フードシステム研究", "published": "2026-01-06", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_009/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/2/32_009/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_02_news/_article/-char/ja/", "title": "裏表紙", "abstract": "", "journal": "フードシステム研究", "published": "2026-01-06", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_02_news/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/2/32_02_news/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_2_cover/_article/-char/ja/", "title": "
