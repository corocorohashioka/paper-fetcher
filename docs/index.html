 {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_004/_article/-char/ja/", "title": "酒蔵ツーリズムを通じた地域DMOの役割と関係団体の関係性", "authors": "橘 昌尚", "abstract": "Efforts to attract tourists to rural Japan emphasize cultural assets such as sake tourism. UNESCO’s designation of washoku in 2013 and traditional sake brewing in 2024 as intangible cultural heritage has increased interest in Japanese cuisine and sake. Visiting a local sake brewery can be considered experiential tourism content unique to specific regions of Japan and allows tourists experience geographical diversity and cultural differences. Sake tourism is a form of travel in which people visit sake breweries, interact with local people, taste sake, and stroll around the land in which the sake is grown while enjoying the local cuisine and traditional culture unique to that area. This study aims to consider, from the perspective of marketing and management, the role of regional DMOs, which are closely tied to the community, play through sake tourism, which affects a variety of stakeholders.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_004/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/3/32_004/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_005/_article/-char/ja/", "title": "会長講演／日本フードシステム学会設立30周年に向けて", "authors": "清水 みゆき", "abstract": "", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_005/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/3/32_005/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_006/_article/-char/ja/", "title": "座長解題／海外での農業参入、海外への農産物輸出の拡大に向けたグローバルなフードシステム構築の新たな展開", "authors": "大仲 克俊", "abstract": "The entry of Japanese companies into overseas agriculture and their investment therein have primarily been aimed at a develop-and-import scheme. However, with the development of new food systems driven by economic growth in East and Southeast Asia, Japanese companies are shifting toward expanding their businesses as consumer markets in these regions. Are these trends also observable among Japanese farmers? If Japanese farmers were to enter overseas agriculture and expand overseas markets, under what conditions would such initiatives be implemented, and what business strategies might be anticipated? Additionally, what impact will overseas production by Japanese farmers and the development of local markets have on Japanese agriculture? This symposium features reports from researchers and business practitioners on the participation of Japanese farmers in overseas agriculture, the agricultural products exporteds, and the characteristics of Japanese agricultural and food manufacturing companies. On the basis of these reports, we hope aim to discuss the future of food systems in a complex and increasingly interconnected global society.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_006/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/3/32_006/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_007/_article/-char/ja/", "title": "シンポジウム報告・論文／日本企業による海外農業参入の戦略的類型化", "authors": "齋藤 文信", "abstract": "This study analyzes the objectives and strategic contexts of Japanese corporations’ entry into overseas agricultural sectors. Historically, Japanese overseas agriculture has evolved from early emigrant farmers to contemporary high value-added corporates, characterized by a marked increase in agricultural subsidiary formation, particularly within Asia. This study is situated against the backdrop of domestic market contraction and governmental support measures such as the FBI strategy（an initiative promoting“Made From Japan,”“Made By Japan”, and“Made In Japan”）in Japan. Firm entry motivations are broadly categorized into two distinct paradigms: traditional global resource security model; and the contemporary overseas market development and brand-building one. The case study of Nihon Agri Inc., involved in strawberry production in Thailand, reveals that the firm exemplifies this strategic approach. The company’s success is attributed to a sophisticated marketing strategy that targets the price gap between expensive Japanese imports and lower-priced local produce. The firm has leveraged the premium imagery associated with“Made by Japan”and secured local trademark rights for its“SAKURA ICHIGO”brand. Furthermore, through strategic collaboration with Japanese logistics partners, the company has established a robust cold chain that preserves quality from farms to consumers. Distribution channels are selectively limited to high-end retailers and cafés to reinforce the brand’s premium positioning. Additionally, consistent with the literature, this strategy explicitly avoids direct competition with exports from Japan. The analysis indicates that strategic local partnerships, meticulous preparation, clear market positioning, and effective utilization of the “Japan Brand”are critical for the successful entry of Japanese enterprises into overseas agricultural markets. To establish the generalizability of these findings, future research should extend this analysis to encompass a broader range of products and geographical regions.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_007/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/3/32_007/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_008/_article/-char/ja/", "title": "シンポジウム報告・論文／日本の農業・食品製造業におけるグローバル市場参入にみる企業の異質性", "authors": "阿久根 優子", "abstract": "Farmers and food companies in Japan have expanded their opportunities to engage in global markets through regional economic agreements and domestic export promotion initiatives. However, not all farmers or firms choose to expand their businesses internationally. Additional fixed costs, such as those associated with following different food safety regulations in each destination, influence firms’ decisions to enter global markets. International trade research has focused on firm heterogeneity and the processes of firm selection and reallocation linked to global market participation. This mechanism raises the industry’s average productivity. Simultaneously, if small- and medium-sized farmers and firms exit, it could undermine efforts to export their collective products, weaken the use of local resources, and harm local economies. To understand these conflicting possibilities, an overview of firm distribution is required. This study empirically examines the relationship between global market participation and firm heterogeneity in Japan’s agri-food industry. Firm-level microdata from 8,497 firms across 30 subsectors were analyzed. A rank-size regression analysis was conducted to explore the characteristics of firm size distribution. The findings revealed that firm size distribution in Japan’s agri-food industry generally follows a power law, indicating firm heterogeneity. Regarding the link between global market participation and firm heterogeneity, statistically significant differences were found in 17 of the 29 subsectors, many of which produce Japan’s top agri-food export products. These results imply that firms engaged in the global market tend to show greater heterogeneity than those operating solely in domestic markets. Global market participation may reflect firm selection and reallocation mechanisms in these subsectors. However, the results differed for the beef and green tea sectors, which are high-export agricultural products. These sectors have promoted regional brands and established joint shipping and export systems. This may result in exporters being composed of homogenous farmers.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_008/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/3/32_008/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_009/_article/-char/ja/", "title": "シンポジウム報告／ベトナムへの農業事業参入", "authors": "照井 渉", "abstract": "In this paper, the conditions, and challenges, faced by local small- and medium-sized enterprises entering the agricultural business in Vietnam as well as their future prospects are reported on the basis of their actual experiences in expanding into that country. Specifically, the following are highlighted: ① the development of entry into the agricultural business in Vietnam, ② the shift from agricultural to restaurant businesses, and ③ future prospects and remaining challenges.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_009/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/3/32_009/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_010/_article/-char/ja/", "title": "シンポジウム報告／日本の食のグローバル化とは何か", "authors": "北川 浩伸", "abstract": "The Japanese government is currently advancing policies to increase the export value of agricultural, and forestry and fishery products and foodstuffs. Steady progress is being made toward reaching the targets of ¥2 trillion by 2025 and ¥5 trillion by 2030. How should we approach promoting numerous food-centered industries, while maintaining a “global” perspective? In this paper, outbound and inbound aspects are comprehensively addressed, and a “consumption cycle model” centered on Japanese food is proposed. A “growth model” designed to foster development of the consumption maturity of overseas consumers is also presented. Furthermore, for inbound tourism, a model illustrating the “correlation between the multi-stage nature of the consumption maturity of overseas consumers” and the dispersion of overseas travellers to regional areas'” is proposed. Finally, the article highlights the importance of developing personnel capable of addressing the needs of overseas consumers and the significance of collaboration among industry, government, and academia.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_010/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/3/32_010/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_011/_article/-char/ja/", "title": "コメント／主にグローバル・フードバリューチェーンの視点から", "authors": "株田 文博", "abstract": "", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_011/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/3/32_011/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_012/_article/-char/ja/", "title": "コメント／日本における開発輸入から海外市場参入への歴史的変遷を踏まえて", "authors": "吉田 行郷", "abstract": "", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_012/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/3/32_012/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_3_cover/_article/-char/ja/", "title": "表紙", "authors": "", "abstract": "", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_3_cover/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/3/32_3_cover/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_3_news/_article/-char/ja/", "title": "裏表紙", "authors": "", "abstract": "", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_3_news/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/3/32_3_news/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_001/_article/-char/ja/", "title": "林瑞穂・野口敬夫・八木浩平・堀田和彦編著／『穀物・油糧種子バリューチェーンの構造と日本の食料安全保障−2020年代の諸相−』", "authors": "清水池 義治", "abstract": "", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_001/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_001/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_002/_article/-char/ja/", "title": "大江徹男・坂内久著／『サスティナブル社会とエネルギー』", "authors": "高橋 克也", "abstract": "", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_002/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_002/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_003/_article/-char/ja/", "title": "ブリ養殖産地の競争力評価とその要因分析", "authors": "林 琦", "abstract": "This article evaluates the regional competitiveness of Japan’s amberjack aquaculture industry and identifies structural factors behind its divergence. Using dynamic shift-share analysis (DSSA), we examine long-term changes in aquaculture entities across 22 regions classified as growing, stagnating, or declining from 1973 to 2023. The results show large disparities, with only a few areas sustaining competitiveness. Further analysis highlights vertical integration and organizational coordination as critical for sustaining competitiveness. The study introduces a new analytical framework and offers policy insights for fostering competitive aquaculture regions.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_003/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_003/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_004/_article/-char/ja/", "title": "卸売市場における情報共有のデジタル化", "authors": "松本 百永", "abstract": "This study explores how the digitalization of information sharing in a wholesale market relates to changes in transaction patterns. Focusing on a digital system that enables two-way communication between producers and the market, we conduct quantitative analyses using transaction data for spinach and strawberries before and after the system's installation. The results show that users generally experience higher average prices and shipment volumes. For spinach, increased volumes and reduced price variability are observed, whereas for strawberries, higher prices and greater variability are evident. These findings offer insights into how digital systems may promote more stable and efficient market transactions.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_004/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_004/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_005/_article/-char/ja/", "title": "農産物直売所における規格外野菜の流通に関する研究", "authors": "江浪 颯哉", "abstract": "This study investigated the distribution of off-spec vegetables, tomatoes, cucumbers, carrots, and radishes, at farmers' markets. Our methodology assessed two conditions: commercialization by farmers and consumer preference. To verify commercialization, we examined whether farmers invest resources in converting off-spec vegetables into marketable products. The consumer preference condition required consumers to select off-spec vegetables when presented alongside standard produce. Our findings indicate that off-spec tomatoes, cucumbers, and carrots meet both conditions, signifying successful market distribution. Conversely, off-spec radishes do not satisfy the consumer preference condition, suggesting insufficient distribution in these markets persists.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_005/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_005/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_006/_article/-char/ja/", "title": "スリランカ農産物公設卸売市場における取引制度", "authors": "岡庭 なぎさ", "abstract": "This study examines how local trading practices function as informal institutions in two regional wholesale markets (Dedicated Economic Centers (DECs)) in the highlands of Sri Lanka. The order-based system in the Nuwara Eliya DEC ensures price stability and lowers transaction risks. In the Keppetipola DEC, wholesalers play a key role in the market by acting as intermediaries between farmers and buyers. Despite the lack of formal institutional rules, both markets have created flexible and effective institutional frameworks. The findings suggest that structural arrangements and endogenous institutional formation based on local practices are necessary for sustainable market functioning.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_006/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_006/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_007/_article/-char/ja/", "title": "新型コロナ流行前後における外食利用の変化と持続性", "authors": "橋本 友莉", "abstract": "This study analyzes shifts in eating-out behavior during and after COVID-19 using consumer purchase-history data. To assess whether these changes proved temporary or lasting, we categorized individuals by their annual share of food expenditures. We focus on individuals with high shares of food expenditures devoted to eating out and tracked their behavior. The findings indicate that some consumers returned to their previous dining patterns once restrictions ended, while others continued to avoid eating out. These variations suggest that COVID-19 reshaped eating-out behavior in uneven ways, with its effects varying in duration across individuals.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_007/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_007/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_008/_article/-char/ja/", "title": "高年齢層の菓子に対する評価", "authors": "滝口 沙也加", "abstract": "This study examined how older adults aged 60–70 years evaluate different types of confectionery. The findings indicate that Japanese confectionery is associated with positive descriptors such as “healthy” and “low calorie,” whereas Western confectionery is perceived more negatively and linked to descriptors such as “fattening” and “high calorie.” Interestingly, perceptions of Japanese–Western fusion sweets, which combine characteristics of both confectionery traditions, shift toward positive descriptors such as “delicious” and “easy to eat.” Taken together, these findings suggest that emphasizing differences in ingredients and production methods can meaningfully shape consumer perceptions, even when products share similar physical attributes.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_008/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_008/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_009/_article/-char/ja/", "title": "2024年問題後の国産たまねぎの空間的市場間関係の変化", "authors": "木村 勇輝", "abstract": "This study examines how spatial relationships among geographically separated wholesale markets for domestic onions in Japan changed following the “2024 Issue”, a policy reform that restricts truck drivers’ working hours and has worsened transport conditions. Using weekly wholesale prices from Tokyo, Osaka, and Fukuoka, we compare the degree of market integration before (FY2015 to FY2023) and after (FY2024) the regulation. Prior to the regulation, these markets were fully or partially integrated. However, after the regulation, Osaka and Fukuoka became fully integrated, and Tokyo became isolated. These results suggest that recent labor regulations have reshaped spatial market linkages in Japan.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_009/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_009/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_010/_article/-char/ja/", "title": "日本産ホタテに対する香港消費者の評価", "authors": "李 冠軍", "abstract": "This study analyzed consumer evaluations of Japanese scallops in Hong Kong using a web-based survey and choice-based conjoint analysis. The results showed that Japanese scallops were rated higher than their Chinese and Canadian counterparts, and that the presence of Marine Stewardship Council, Aquaculture Stewardship Council, and HACCP certifications contributed to higher evaluations. Furthermore, consumers who had participated in promotional activities for Japanese food, exhibited stronger preferences for Japanese scallops. These findings suggest leveraging certification schemes, enhancing in-person tasting events, and promotional activities as effective strategies for expanding Japanese scallop exports.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_010/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_010/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_011/_article/-char/ja/", "title": "Consumer Preferences for Home Plant Factory Attributes", "authors": "Yu CHEN", "abstract": "This study investigates consumer preferences for home plant factory attributes in Beijing using the best–worst scaling method. Surveying 228 respondents, “price” emerged as the most important attribute, followed by “automation” and “design sense,” while “size,” “type,” and “growth rate” were considered less important. Preferences varied by age and hydroponic kit ownership. That is, older consumers favored design, whereas younger consumers prioritized automation. The findings suggest that customizable features and clear communication of home plant factory benefits may promote broader adoption. Future research should consider a wider range of demographic and cultural factors to validate these results and guide product development.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_011/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_011/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_012/_article/-char/ja/", "title": "Effect of Information Provision on Local Residents’ Preferences for a Local Feed-Fed Pork", "authors": "Aofei CHEN", "abstract": "This study investigates how information provision influences local residents’ preferences for processed pork products fed with locally sourced feed, using a choice experiment and mixed logit model. Results demonstrate that information highlighting the environmental and safety benefits of local feed significantly increases the willingness to pay for locally produced pork, particularly when emphasizing environmental preservation. Given that most consumers remain unaware of Japan’s current low feed self-sufficiency ratio, raising awareness of this issue, along with providing environmental and safety information, is essential to boost demand for locally fed pork.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_012/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_012/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_013/_article/-char/ja/", "title": "情報提供による下水汚泥肥料への消費者選好の変化", "authors": "河井 実央", "abstract": "", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_013/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_013/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_014/_article/-char/ja/", "title": "コロナ禍の行動変容が家計の食料消費に与える影響", "authors": "谷 顕子", "abstract": "This study clarifies the impact of the exogenous shock of the COVID-19 pandemic on household food consumption in Japan. We present theory-consistent hypotheses, measure the food demand system, and compare elasticities before and after the pandemic outbreak. The results verify the hypothesis that the expenditure and own-price elasticities (absolute value) change less for at-home meals and more for eating out.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_014/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_014/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_015/_article/-char/ja/", "title": "ガーナにおける幼児期栄養投資に対する親の選好と動機", "authors": "小此木 悟", "abstract": "This study employs two economic experiments—a dictator game and a Dizon-Ross and Jayachandran (DRJ) design—to assess parental altruism and the incentives shaping child-nutrition investments in Ghana. In the dictator game, fathers and mothers allocated more resources to children than to themselves or each other; joint decisions further increased child allocations. In the DRJ experiment without market price priming, fathers showed a higher willingness-to-pay (WTP) for enjoyment goods, whereas mothers showed a higher WTP for human-capital goods. Taken together, the results indicate that fathers play a significant role in strengthening early childhood nutrition.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_015/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_015/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_016/_article/-char/ja/", "title": "飲食店におけるジビエの取り扱い要因", "authors": "長尾 真弓", "abstract": "This study examines the determinants of factors affecting game meat adoption in Japanese restaurants through preliminary interviews and a nationwide survey of 200 establishments. The interviews show that chefs’ motivation for culinary expression and external factors, such as supply stability, shaped their decisions to incorporate game meat. Logistic regression analysis indicates that perceptions of food safety, consistent supply, recognition of cultural value, and preferences for quality-focused sourcing significantly boost adoption rates. Furthermore, Western-style restaurants show a greater likelihood of serving game meat. Factor analyses indicate that culinary expression stimulates adoption but supply instability and technical barriers hinder it. Internal factors motivate initiation, whereas perceptions of stability support sustained use.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_016/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_016/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_017/_article/-char/ja/", "title": "新型コロナウイルス感染拡大による業務用飲食料品への連鎖的影響", "authors": "石川 清貴", "abstract": "This study examines the ripple effects of the decline in the demand for commercial food and beverage products caused by the spread of COVID-19 among upstream companies, focusing on the pathways of these effects through inter-company transaction relationships. The analysis reveals that the distance between transactions from restaurants and bars affected the pace of sales recovery of upstream companies after the spread of the pandemic. In particular, companies upstream of food wholesalers, such as those engaged in processing, manufacturing, and raw material production, experienced sales recovery rates that up to 9 percentage points lower after the start of the pandemic.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_017/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_017/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_018/_article/-char/ja/", "title": "ロシアにおける小麦輸出量減少が世界小麦需給及びフードセキュリティに与える影響", "authors": "小泉 達治", "abstract": "We examine the impact of decreasing Russian wheat exports on the global wheat market and food security by using a partial equilibrium model. The result of this study shows that the decrease in wheat exports in Russia in 2024/25 is projected to increase international wheat prices by 8.7-28.5%. Furthermore, the decrease in Russian wheat exports was projected to have a significant impact on food security in Egypt and India among the model covering countries. Therefore, we consider that Russian wheat market and policy remain one of the biggest uncertainties and risk factors in the global wheat market and food security.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_018/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_018/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_019/_article/-char/ja/", "title": "ユニバーサル農園としての町内会の農園活動の一考察", "authors": "作田 竜一", "abstract": "This study investigated the functions of farming activities established by a community association with the participation of older adults. Using a cross-measure approach in Miyagi Prefecture, we found that farming activities are positioned as social farms because they promote multigenerational participation in the community. The community association also contributes to ensuring local food security by serving as a coordinator for solving food access problems associated with farm harvests. Furthermore, it promotes community welfare and contributes to the realization of a community-based symbiotic society. Farming activities supported by community associations should be evaluated not only as a method of introducing care farming.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_019/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_019/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_32.4_index/_article/-char/ja/", "title": "報告論文目次", "authors": "", "abstract": "", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_32.4_index/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_32.4_index/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_1/_article/-char/ja/", "title": "地域農林業の「規定要因」をあらためて考える", "authors": "竹歳 一紀", "abstract": "", "journal": "農林業問題研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_1/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/1/62_1/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_17/_article/-char/ja/", "title": "中山間地域における買い物環境の実態", "authors": "高橋 克也", "abstract": "In Japan, problems related to access to groceries have been becoming increasingly severe. In particular, in hilly and mountainous regions, the number of stores selling groceries and daily necessities is extremely limited, and continued population decline has led to further store closures and withdrawals, resulting in a highly constrained shopping environment. Against this background, this study examines the current state of the shopping environment and residents’ perceptions in a hilly and mountainous region, focusing on Okuizumo Town in Shimane Prefecture. The results reaffirm that municipal efforts to improve the shopping environment constitute an essential living infrastructure that influences residents’ decisions to continue living in the area as well as their residential location choices. At the same time, the study reveals that a certain proportion of residents experience inconvenience and anxiety about the future due to the decline of nearby stores and the limited range of shopping options available.", "journal": "農林業問題研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_17/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/1/62_17/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_23/_article/-char/ja/", "title": "食品小売企業の店舗戦略と社会インフラ機能の展望", "authors": "木立 真直", "abstract": "This study examined the novel store strategies adopted by Japanese food retailers as social infrastructure in food desert areas. As Japan’s food retail market has been shrinking, food retailers are revising traditional chain store operations, seeking new store strategies. Two retailers, a convenience store chain and a consumer cooperative, were selected as case studies. They had significantly improved accessibility constraints for their consumers. Regarding availability, the convenience store adapted its assortment to meet local consumers’ needs and wants, and the co-op’s mobile retailing format strove to optimize itself through face-to-face communication with customers. Both retail formats succeeded in gaining customer support, resulting in sales above the break-even point and business continuity. Noteworthy is the fact that collaboration between various entities created retail innovation, and that they were trying to pursue a community-based approach for local sustainability.", "journal": "農林業問題研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_23/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/1/62_23/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_3/_article/-char/ja/", "title": "食料は人々に届いているか", "authors": "清原 昭子", "abstract": "In the 2024 revision of the Basic Act on Food, Agriculture and Rural Areas, food security is defined as “a state in which quality food is stably supplied at reasonable prices and accessible to every citizen,” and its assurance is set as a key policy goal. This symposium is designed to open a shared discussion on how such access can be ensured for every individual in today’s changing society—a topic that has not yet been widely explored within our field. The first presentation focuses on urban areas, the second on rural and mountainous regions, both illustrating where and how the situational norm of food security remains unmet. The third presentation examines the retail and service sectors that directly connect people to food, presenting a framework for understanding their evolving social functions. Through these three reports and subsequent commentary, the symposium aims to foster collective reflection on the roles of industries and policies in delivering food to people, and to invite participants to consider new directions for regional agriculture and forestry research.", "journal": "農林業問題研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_3/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/1/62_3/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_31/_article/-char/ja/", "title": "Financialization of the Food System: Contextualization in Japan and Developing a Research Agenda", "authors": "Hart Nadav Feuer", "abstract": "The 2025 ARAFE International Symposium, held on November 2, 2025, at Shimane University and online via Zoom Webinar, commenced with a welcome address by Kazuki Taketoshi, President of ARAFE. Taketoshi emphasized the timeliness of the symposium’s theme, noting that Japan’s 2024 re-opening of rice futures markets and the subsequent 2025 rice price crisis had brought questions of financialization into sharp public focus. He expressed hope that the symposium would contribute to both academic understanding and practical policy responses. In my opening remarks as chair, I situated the symposium within a broader historical arc, observing that Japan pioneered one of the world’s first formalized agricultural futures markets with the Dojima Rice Exchange in eighteenth-century Osaka. Yet despite this deep history, contemporary financialization in Japan’s food sector has received surprisingly little scholarly attention. The symposium aimed to address this gap by bringing together international and Japanese scholars to critically engage with the evolving landscape of food system financialization. Nina Takashino (Ritsumeikan University), Keeni Minakshi (Tohoku University), and Motoi Kusadokoro (Tokyo University of Agriculture and Technology) served as moderators throughout the proceedings.", "journal": "農林業問題研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_31/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/1/62_31/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_37/_article/-char/ja/", "title": "Price Fixing by Dominant Meat Processors and the Global Concentration of Agrifood Power", "authors": "Philip H. Howard", "abstract": "In recent years, prices of meat have increased rapidly in some regions, even as the prices paid to livestock producers have decreased. This has led to record profits for many of the world’s largest meat processors, due to their strategic position between more diffuse producers and consumers. If price fixing is technically illegal, how have firms been able to coordinate their actions effectively? One way to put industry interests ahead of individual firm interests is to structure better conditions for higher prices. This may include, (1) the use of data sharing firms to exchange what is typically confidential business information, (2) increasing common ownership by asset management firms, and (3) “gin rummy” deals—swapping divisions among the largest firms. Directions of movement that would better protect consumers, producers and workers face significant obstacles in the near term but are more likely to be achieved in the long term.", "journal": "農林業問題研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_37/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/1/62_37/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_44/_article/-char/ja/", "title": "Japan in the Global Agribusiness Network", "authors": "Loka Ashwood", "abstract": "We examine Japanese ties to global agribusiness powerhouses in nine sectors: cattle, chemicals, tractors and equipment, hogs, fertilizer, grains, poultry, turkey, tractors and equipment and seeds. We move from the frontstage of these agribusinesses into their backstage of connected leaders and private firms acting across the globe. We provide an interactive link for interested readers to see the ways in which Japanese entities network into these global agribusinesses.", "journal": "農林業問題研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_44/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/1/62_44/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_52/_article/-char/ja/", "title": "Rice as a Financialized Food in the Japanese Empire: Colonial Imports and Exchanges’ Futures Trade", "authors": "Kiyotaka Maeda", "abstract": "Since 2024, rice prices have increased, raising public concerns regarding the affordability of staple foods and making food-related financial transactions a key issue. Japan has maintained strict oversight of its rice market since 1939. Before the post-1939 period, Japan actively and financially engaged in rice trading in thriving markets. These historical experiences offer important insights into current rice price policies. The various intrinsic factors that have historically influenced these markets must be recognized. This study focuses on colonial rice imports as a notable example. Major Japanese cities hosted rice exchanges that set index prices for the spot market. While these exchanges only traded domestic rice, major cities relied heavily on colonial rice supplies, and fluctuations in colonial rice prices would significantly affect domestic prices. Rice prices in Taiwan and Korea had different effects on domestic markets because their harvest seasons differed. Although the Japanese rice market generally served its function, it was sensitive to factors that affected the quantity and quality of rice distributed, leading to instability. Therefore, further historical studies are required to identify the factors that caused the instability of the rice market during this period.", "journal": "農林業問題研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_52/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/1/62_52/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_60/_article/-char/ja/", "title": "Wealth Paradox in Vietnam: Landholdings, Child Age, and Agricultural Labor Participation", "authors": "Sho Yamada", "abstract": "Despite economic growth, child labor persists in the agricultural sector. The wealth paradox—whereby increased land size leads to an increase in child labor—remains underexplored in the Vietnamese context. This study investigates this paradox in Dak Lak province, Vietnam, using data from the Thailand Vietnam Socio-Economic Panel. We examine the nonlinear relationship between cultivated land area and child farm labor, specifically analyzing how children’s age moderates this effect. We use a probit model to estimate the probability that children (aged 5–17 years) engage in household agricultural work as their primary occupation. We find a significant inverted-U-shaped relationship between land wealth and child labor, which supports the wealth paradox hypothesis. This effect is significantly stronger for children aged 16 years and above than for those aged 15 years and under. The probability of child labor peaks at land sizes of 3.4–3.6ha, which is substantially above the sample average, implying that future scale expansion could inadvertently increase child labor. Therefore, policies encouraging farm expansion should be complemented by interventions that reduce incentives for child labor, especially among younger children. We find no significant evidence that improved proximity to schools reduces this probability.", "journal": "農林業問題研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_60/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/1/62_60/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_9/_article/-char/ja/", "title": "都市部における食料品アクセス・食生活状態と格差", "authors": "上田 遥", "abstract": "This presentation examines access to food access in urban areas of Japan. First, drawing on the capability approach, it clarifies the conceptual similarities and differences between food security, food capability, and food access, and argues that the prevailing understandings of food access risk are underestimating multiple inequalities in everyday dietary practices, including economic, social and gender disparities. It then focuses on urban single mothers, who are often described as almost the half population living in relative poverty, and offers a detailed analysis of their actual dietary practices and constraints. On this basis, the presentation discusses what forms of food policy are required to enhance food capabilities and to address the structural disadvantages embedded in current urban food environments.", "journal": "農林業問題研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_9/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/1/62_9/_article/-char/ja/"}, {"source": "crossref", "source_id": "10.1002/ajae.70068", "title": "Climate change and perennial crop production: Evidence of yield impact and adaptation in California", "authors": "Yuanyuan Wen, Wei Zhang, Julian M. Alston", "abstract": "Abstract Perennial crops are economically important. They contribute to food security, providing essential nutrients that are often lacking in annual crops, and provide additional environmental benefits compared with annual crops. Despite their importance, empirical research on the impacts of climate change and adaptation on perennial crops remains limited. We model the phenological characteristics of major perennial crops in California and take adaptation into consideration to estimate the effects of temperature and precipitation on yields in both the short run and long run. Our findings indicate that weather impacts vary across the four phenological phases—dormancy, bloom, fruit development, and fruit maturity. Specifically, warming during the dormancy phase reduces walnut yields and warming during the bloom phase reduces almond yields in both the short‐run and long‐run. These long‐run negative impacts suggest that adaptation has not offset the adverse effects of winter warming on these crops. On the other hand, warming in the fruit maturity phase positively affects almond yields, especially in the long run, suggesting that adaptation has taken advantage of rising temperatures to increase almond yields. Our findings provide valuable insights for targeted adaptation strategies to enhance the resilience of perennial crop production in the face of climate change.", "journal": "American Journal of Agricultural Economics", "published": "2026-03-30", "url": "https://doi.org/10.1002/ajae.70068", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70068"}, {"source": "crossref", "source_id": "10.1002/aepp.70068", "title": "Consumer Valuation of Meat Alternatives and Labeling Policies: A Comparative Perspective", "authors": "Daniele Asioli, Wei Yang, Jia Han, Quoc Cuong Nguyen, Massimiliano Petracci, Rodolfo M. Nayga", "abstract": "ABSTRACT This study investigates and compares US consumer perceptions and the impact of environmental, human health, and animal welfare information related to conventional meat on preferences for meat alternatives and labeling policies. Using the best–worst scaling method across 10 different burger alternatives, our results show that the meat burger is largely the most preferred option, while meat alternatives collectively account for nearly 40% of total consumer preferences. Information about the health effects of meat consumption and consumer characteristics influences preferences for meat alternatives. Consumers perceive the meat burger as tastier, more natural, more nutritious, and more expensive. In contrast, the plant burger is viewed as healthier and more environmentally friendly, while also being perceived as very distinct from the meat burger. Interestingly, most consumers oppose labeling meat alternatives as “meat.” Our findings provide useful insights into the psychology of consumer acceptance, which can be useful in communicating the nature of meat alternatives to the public and shaping meat alternatives labeling policies.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-03-30", "url": "https://doi.org/10.1002/aepp.70068", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70068"}, {"source": "crossref", "source_id": "10.1002/aepp.70067", "title": "Exploring Differences in Precision Agriculture Adoption: New and Beginning Farmers, and Established Farmers", "authors": "Whoi Cho, Oscar Sarasty, Tong Wang", "abstract": "ABSTRACT This paper compares precision agriculture (PA) adoption between new and beginning farmers (NBFRs) and established farmers using data from a 2021 U.S. Midwest farmer survey. We focus on the human capital of two different groups of farmers in the PA adoption. NBFRs adopted PA technologies at a higher rate than established farmers, with the most substantial adoption gap observed in diagnostic technologies that require human capital investment. A higher proportion of NBFRs held college degrees in agricultural majors, which significantly influenced PA adoption. The findings highlight the need for targeted education and support to ensure sustainable PA adoption among NBFRs. JEL Classification: Q10, Q12, 116", "journal": "Applied Economic Perspectives and Policy", "published": "2026-03-30", "url": "https://doi.org/10.1002/aepp.70067", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70067"}, {"source": "crossref", "source_id": "10.1002/aepp.70065", "title": "Investing in Agricultural Research to Sustain Growth and Competitiveness of US Agriculture", "authors": "Keith O. Fuglie", "abstract": "ABSTRACT Public investments in agricultural research and development (R&amp;D) have been a major driver of long‐term productivity growth and competitiveness of US agriculture. Public agricultural R&amp;D has high economic returns: each $1 invested has produced about $20 in benefits to the US economy. The Federal Government provides about 70% of the funding for the agricultural R&amp;D carried out by universities and USDA laboratories. State governments and non‐government sources provide the rest. Resources for public agricultural R&amp;D have been declining in real terms, with annual spending down by about one‐third from its peak in 2002; the US has fallen behind other major competitor nations in spending on agricultural R&amp;D. Part of the decline in public agricultural R&amp;D has been offset by increased R&amp;D by the private companies, but private R&amp;D is concentrated on a few commodities and underinvests in the foundational science needed to sustain long‐term growth and competitiveness for US agriculture. New approaches to public–private collaboration in agricultural R&amp;D can strengthen the financing and performance of the US agricultural innovation system.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-03-30", "url": "https://doi.org/10.1002/aepp.70065", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70065"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70042", "title": "Rising Tides, Falling Harvests: Examining the Effects of Salinity Intrusion on Paddy Production in Vietnam's Mekong Delta", "authors": "Huong Nguyen, Bradford Mills, Chi Ta, Shamar L. Stewart", "abstract": "ABSTRACT Rising sea levels and salinity intrusion increasingly threaten rice farming in Vietnam's Mekong Delta. Using a district‐level panel dataset from 2000 to 2020, this study examines the impacts of salinity on Winter–Spring rice yields and acreage and how farmers adapt to salinity risk. A Nerlovian adaptive expectations model is applied to assess how past exposure influences land‐use decisions. Results show that extreme salinity events exert a stronger and more persistent effect on acreage adjustments than year‐to‐year fluctuations, with reductions most pronounced in salinity‐prone and coastal districts. Spatial heterogeneity underscores the need for location‐specific strategies: infrastructure and salt‐tolerant varieties for inland areas, and support for transitions to alternative land uses in highly exposed regions. Evidence of complementarities between rice and aquaculture suggests integrated systems can sustain production under moderate salinity pressure. These findings highlight the importance of tailored interventions to enhance resilience as salinity intrusion intensifies with sea‐level rise.", "journal": "Journal of Agricultural Economics", "published": "2026-03-29", "url": "https://doi.org/10.1111/1477-9552.70042", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70042"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70037", "title": "Can Extensive Grassland Management Pay Off for Farmers Facing Drought Risks? A Cumulative Prospect Theory‐Based Approach", "authors": "Julia Kunkel, Jürgen Groeneveld, Robert Finger, Birgit Müller", "abstract": "ABSTRACT Grasslands in Central Europe are increasingly affected by droughts, leading to lower hay yields and reduced profits for dairy farmers. The insurance hypothesis suggests that extensively managed, species‐rich grassland is more drought resistant than intensively managed grassland. However, it produces lower yields in non‐drought years, creating a trade‐off between maximising yield and improving stability. In this study, we analyse how this trade‐off translates into farmers' management decisions. Using a mechanistic bio‐economic model, we evaluate outcomes across a wide range of simulated ecological, climatic and economic input conditions. We apply classification tree analysis to identify key drivers of extensive management under expected utility, cumulative prospect theory and an extension we call reference‐based valuation, where outcomes are valued relative to management‐specific expectations. Results suggest that farmers who evaluate profits against the expected outcome under each management intensity potentially adopt extensive management despite lower expected profit if it offers greater stability during droughts. By contrast, when outcomes are compared to         <div class="${cls}" data-id="${esc(p.id)}">
          <button class="toggle-read" data-toggle>${isRead ? "未読に戻す" : "既読にする"}</button>
          <div class="title">${isNew ? '<span class="badge-new">NEW</span>' : ""}<a class="paper-link" href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.title)}</a></div>
          ${p.authors ? `<div class="authors">${esc(p.authors)}</div>` : ""}
          <div class="meta"><span class="tag">${esc(p.source)}</span>${esc(p.journal)} · ${esc(p.published)}</div>
          ${p.abstract
              ? `<div class="abstract">${esc(p.abstract)}</div>`
              : `<div class="abstract empty">（アブストラクトなし）</div>`}
          <div class="link"><a class="paper-link" href="${esc(p.url)}" target="_blank" rel="noopener">論文を開く →</a></div>
        </div>`;
      }).join("");
    }

    // クリック委譲: 既読ボタン / 論文リンク（開いたら自動で既読に）
    document.getElementById("list").addEventListener("click", e => {
      const card = e.target.closest(".card");
      if (!card) return;
      const id = card.getAttribute("data-id");
      if (e.target.closest("[data-toggle]")) {
        e.preventDefault();
        toggleRead(id);
      } else if (e.target.closest("a.paper-link")) {
        markRead(id);  // ナビゲーションは止めない（別タブで開く）
      }
    });

    render();
  </script>
</body>
</html>
