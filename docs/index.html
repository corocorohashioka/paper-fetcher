racteristics and motivations of diverse producer types.", "journal": "Journal of Agricultural Economics", "published": "2026-04-26", "url": "https://doi.org/10.1111/1477-9552.70045", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70045"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70048", "title": "Trading Blows, Losing Bushels: Global Implications of US Tariff Hikes for Agri‐Food Trade and Welfare", "authors": "Carlos Zurita, Dongin Kim, Sandro Steinbach", "abstract": "ABSTRACT Recent trade policy developments have renewed concerns about the vulnerability of agri‐food markets to tariff increases. This paper quantifies the effects of 2025 US tariff hikes and potential tit‐for‐tat retaliation on agri‐food trade, prices, output, and welfare. We employ a sectoral general‐equilibrium gravity model covering 46 agri‐food industries on a 2023 baseline. The framework combines product‐level trade elasticities with sector‐specific supply elasticities based on input‐cost shares, providing a transparent mapping from tariffs to equilibrium outcomes. We simulate the April 2, 2025 (‘Liberation Day’) tariff schedule and the July 31, 2025 revisions, each with and without symmetric retaliation by all trading partners. Without retaliation, US agri‐food exports fall by 22%–25%, output declines by about 3%, the price index rises by 6.8%–7.2%, and welfare falls by 4.4%–4.9%. With retaliation, export losses deepen to 37%–43%, output drops by 4%–5%, the price index rises by 2%–5%, and welfare declines by 6.9%–7.9%. Welfare losses are highly asymmetric: Canada and Mexico experience the largest additional losses under retaliation, reflecting integrated North American supply chains, while contractions are concentrated in processed meats, soybeans, corn, and selected food products. Retaliation amplifies global welfare losses rather than offsetting them, suggesting that cooperative policy restraint yields smaller welfare costs for the United States and its major trading partners.", "journal": "Journal of Agricultural Economics", "published": "2026-04-26", "url": "https://doi.org/10.1111/1477-9552.70048", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70048"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70034", "title": "Collective Contracts as a Risk‐Sharing Mechanism for Result‐Based Agri‐Environmental Payments: Experimental Evidence", "authors": "Thomas Rellensmann, Stefanie Engel, Jens Rommel, Fabian Thomas", "abstract": "ABSTRACT Linking payments from agri‐environment schemes to ecological results or to collective outcomes is viewed as a promising way to increase the effectiveness of agri‐environmental conservation. However, the two approaches are rarely combined. In this study, we test the performance of result‐based payments with collective contracts in a contextualised economic experiment with 540 non‐agricultural and agricultural students in Germany. Combining result‐based payments with collective contracts may hold potential by allowing farmers to share the risks associated with result‐based payments within a group. A downside of collective contracts, however, is the creation of a social dilemma, as individual payments depend on group outcomes. We find no evidence of differences in conservation levels under result‐based payments with collective as compared to individual contracts, suggesting that risk‐sharing benefits and effects of the social dilemma offset each other. We further examine the performance of collective contracts for varying risk levels that could, for example, reflect different geological and climatic conditions across Europe. Result‐based payments with collective contracts motivate higher conservation efforts in our experiment when external risks are high. Further, high risks appear to foster group cooperation under collective contracts, potentially leading to more equitable and predictable outcomes.", "journal": "Journal of Agricultural Economics", "published": "2026-04-26", "url": "https://doi.org/10.1111/1477-9552.70034", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70034"}, {"source": "crossref", "source_id": "10.1111/agec.70114", "title": "Policy Schemes for More Sustainable Dairy Farming: The Role of Financial Instruments and Policy Implementation Modes", "authors": "Oyakhilomen Oyinbo, Helena Hansson", "abstract": "ABSTRACT Dairy farming is faced with environmental, social and economic sustainability challenges, which call for the uptake of more sustainable farming practices. Policy schemes involving public and private sectors can support the uptake of more sustainable farming practices through the provision of incentives to farmers if designed appropriately. However, empirical research in designing such policy schemes is scarce. This paper examines dairy farmers’ preferences for policy attributes in environmental compensation schemes for more grass‐based feeding systems. Using data from a discrete choice experiment in Sweden and a hybrid latent class model, we find that while size of financial compensation matters, farmers’ likelihood of participation in grass‐based feeding schemes is also driven by how the financial compensation is designed and by non‐financial attributes of the policy schemes. Notably, we find three distinct groups of farmers who differ in their likelihood of participating and exhibit heterogeneous preferences for schemes with private versus public sector‐led implementation mode, and direct subsidy payment versus consumer price premium and tax relief. Furthermore, findings demonstrate that behavioral factors, including farmer attitudes toward different forms of compensation and risk aversion, partly explain the observed heterogeneous preferences. Overall, our findings highlight the need to accommodate preference heterogeneity in policy design to improve participation, especially in settings where the transition to more grass‐based feeding is challenging for farmers.", "journal": "Agricultural Economics", "published": "2026-04-26", "url": "https://doi.org/10.1111/agec.70114", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70114"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70115", "title": "Economic and Land Use Impacts of Synthetic Dairy Production on a Dairy‐Intensive Economy: New Technology Moo‐ving In", "authors": "Niven Winchester, Dominic White", "abstract": "ABSTRACT Synthetic dairy products are promoted as an environmentally sustainable alternative to conventional dairy goods. This paper examines the potential economic, employment and land use impacts of large‐scale synthetic dairy production on Aotearoa New Zealand—the world's leading dairy exporter. Using a global, economy‐wide model, we simulate a case in which synthetic dairy products are cost‐competitive with conventional dairy products. Our results show that, under this scenario, New Zealand's GDP would decline by 0.5%–0.7%, and national welfare would fall by 1.2%–1.5%, with significant employment impacts on dairy‐related and other sectors. The reallocation of dairy land to other uses offers limited mitigation, as global shifts in production depress the prices of other agricultural commodities. Moreover, policies aimed at preserving dairy employment are costly. These findings suggest that, if synthetic dairy products are produced at scale, policy should prioritise adaptation strategies—such as retraining and skills development—to support workers and landowners in adjusting to the resulting changes.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-25", "url": "https://doi.org/10.1111/1467-8489.70115", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70115"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_1/_article/-char/ja/", "title": "会長挨拶「現代社会の情報環境と研究活動」", "authors": "伊庭 治彦", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_1/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_1/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_10/_article/-char/ja/", "title": "ICT利用と協働を通じた農業経営の学習と成長", "authors": "武藤 幸雄", "abstract": "Information and Communication Technology(ICT)-based information systems and services for smart farming have recently diffused among Japanese farm management entities expanding their scale of operations. Based on the author’s research results over the past ten years and organizational and contract theories, this paper explains how farm managements should utilize ICT-based information systems and services with changing their organizational structures, and what strategy they should choose for the utilization to enhance their farm management. This paper shows that whether farm management entities can effectively utilize ICT-based information systems and services toward their growth depends on their endowments or availability of complementary human resources and/or their collaboration systems with external organizations. Moreover, this paper discusses how farm management entities can combine various management resources and collaborate with external organizations to efficiently utilize ICT-based information systems and services and enhance their management growth. Thus, this paper points out that farm management entities need to develop effective combination and collaboration strategies. The paper presents specific examples and theoretical explanations to illustrate these arguments. For example, when farm management entities adopt ICT-based information systems, delegating authority to employees may not be efficient for them. The reason is that the employees may not easily master management skills. Additionally, the communication cost savings due to the ICT-based information systems may be sufficiently large to justify authority centralization to managers. Thus, the optimal authority allocation for such farm management entities depends on their human resource endowments and the cost-effectiveness of the systems. This paper illustrates what strategy such farm management entities can take to develop a competitive combination of human resources and ICT-based information systems consistent with the optimal authority allocation.", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_10/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_10/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_22/_article/-char/ja/", "title": "雇用劣化の下における労働力・農地制約と雇用型経営の展開", "authors": "氷見 理", "abstract": "Farm management with hired labor has developed despite the current decline in Japanese agriculture. The labor market has changed since the 2010s, particularly in non-seniority-based expansion and low-wage employment among young and middle-aged men, referred to as “employment deterioration.” This study clarifies how these changes have influenced farm management development with hired labor, focusing on resource constraints, such as the labor force and farmland. Employment deterioration creates a relative work advantage in the agriculture sector by lowering wage expectations and fosters a management mindset among certain farmers. However, a dual income is necessary in low-income households, which induces labor supply. Thus, hiring opportunities at low wages are offered in farm management with hired labor. In addition, low-income households often reduce their farm size or retire from their own farm because they are required to work full-time by their employers. Therefore, farmland is supplied to farm management with hired labor. As a result, employment deterioration has dual effects: (1) It encourages upward development among farmers with a management mindset and makes them farm managers with hired labor. (2) It causes widespread downward development among low-income households by retiring from their own farm.", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_22/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_22/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_3/_article/-char/ja/", "title": "多様な経営目標と資源制約に直面する農業経営主体の技術導入と市場対応", "authors": "松下 秀介", "abstract": "Primary approaches of agricultural management studies rely on case analyses and normative analyses. This field has often faced criticism related to the difficulty of generalizability of scientific discussion partly because procedures that ensure scientific objectivity are difficult to employ. Moreover, an evaluative perspective highlighting the practical applicability of agricultural management studies holds that despite the complexity of environmental factors, social institutions, and local conditions, the rich information obtained even from a few cases can effectively contribute to solving regional issues and supporting farmers’ decision making. Accordingly, the agenda of this symposium focuses on diverse managerial norms and resource constraints, emphasizing the development of the practical applicability of agricultural management studies. Moreover, these discussions aim to emphasize application-oriented perspectives of analysis that contribute to the practical applicability of agricultural management research not only in academic studies but also in agricultural extension and advisory activities.", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_3/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_3/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_32/_article/-char/ja/", "title": "北海道の大規模経営が直面する与件変化と経営対応", "authors": "山田 洋文", "abstract": "This study examines how large-scale agricultural corporations in Hokkaido that manage local resources are established under conditions of rapid depopulation and aging. The following points are clarified. First, a case study shows that a farm in X Town expanded to approximately 173 ha by consolidating farmland vacated by exiting farmers. To maintain an appropriate cropping balance, this farm temporarily increased the proportion of labor-intensive buckwheat and wheat. It also expanded paddy rice, the core of its rice production by securing suitable workers, machinery, and facilities. Second, the study finds that sparse planting and direct seeding have been adopted in remote paddy fields to mitigate severe constraints related to seedling production and transportation in rice cultivation. For such large-scale agricultural corporations to be established and operate stably, management strategies that respond to both internal and external business environments are essential.", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_32/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_32/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_40/_article/-char/ja/", "title": "施設園芸経営における農業経営支援サービスの実態と今後の展開", "authors": "田口 光弘", "abstract": "This paper clarifies the status and planned development of agricultural management support services in greenhouse horticulture. In Japan, large-scale greenhouse operations exceeding 1ha are increasing, and such operations often face significant challenges in environmental control and human resource management. Introducing consultants in cultivation and human resource management can effectively address these issues. Hence, this paper presents case studies on the introduction of such consultants. In addition, one of the authors serves as a consultant and provides detailed examples from his own practice.", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_40/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_40/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_48/_article/-char/ja/", "title": "コメント1", "authors": "若林 勝史", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_48/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_48/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_51/_article/-char/ja/", "title": "コメント2", "authors": "飯田 拓詩", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_51/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_51/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_54/_article/-char/ja/", "title": "討論の要約", "authors": "", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_54/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_54/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_70/_article/-char/ja/", "title": "畑作酪農専業地帯におけるスマート農業技術の展望", "authors": "三宅 俊輔", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_70/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_70/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_72/_article/-char/ja/", "title": "北海道農業における人材育成の現状と課題", "authors": "前田 晶子", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_72/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_72/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_73/_article/-char/ja/", "title": "農業の共通価値創造（CSV）に向けたステークホルダーの役割と課題", "authors": "角田 毅", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_73/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_73/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_75/_article/-char/ja/", "title": "新たな農業経営モデルとしての営農型太陽光発電導入の可能性", "authors": "馬上 丈司", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_75/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_75/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_76/_article/-char/ja/", "title": "変革期の農業法人を支える事業再生と企業価値評価", "authors": "田井 政晴", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_76/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_76/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_77/_article/-char/ja/", "title": "ゲノム情報・デジタル技術利用による持続的酪農生産システム構築に関する国際比較", "authors": "長命 洋佑", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_77/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_77/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_78/_article/-char/ja/", "title": "脱炭素型農業実現のための温暖化緩和技術の社会実装に向けた課題", "authors": "芦田 敏文", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_78/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_78/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_79/_article/-char/ja/", "title": "吉田真悟・田井政晴　著『企業価値評価と農業法人―持続可能性による価値創造―』", "authors": "犬田 剛", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_79/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_79/_article/-char/ja/"}, {"source": "crossref", "source_id": "10.1002/ajae.70075", "title": "Correction to “Farmers' Pro‐Social Motivations and Willingness‐To‐Accept in Markets with Public Goods”", "authors": "", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-04-24", "url": "https://doi.org/10.1002/ajae.70075", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70075"}, {"source": "crossref", "source_id": "10.1002/aepp.70075", "title": "Do Tax Incentives for Farmland Leases Increase Farm Supply? Evidence From Iowa's Beginning Farmer Tax Credit", "authors": "Justin M. Ross, Wesley M. Zebrowski, Julia C. D. Valliant", "abstract": "ABSTRACT In recent decades, agriculture has become increasingly concentrated through horizontal mergers and acquisitions via corporate entities, and policy makers are concerned this will be exacerbated by the aging population of farm operators. To reduce market concentration in agriculture, many states have enacted policies to entice new prospective entrepreneurs into farming. Among these are tax credits for existing farm owners who lease or sell farmland to “beginning farmers.” These subsidies aim to compensate the lessor for the additional risk associated with leasing land to a new farming enterprise. This paper investigates the effect of Iowa's Beginning Farmer Tax Credit program on land leased to farmers, farm operators' average age, and various metrics of non‐corporate farm operations. Our point estimates suggest very small effects of the program on Iowa's prevailing farm trajectories with a budgetary cost of more than $100,000 per added independent farm.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-24", "url": "https://doi.org/10.1002/aepp.70075", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70075"}, {"source": "crossref", "source_id": "10.1111/agec.70110", "title": "Efficiency of Spatial Subsidies Under Information Constraints: A Case Study", "authors": "Germán Sánchez‐Arce, Montserrat Viladrich‐Grau", "abstract": "ABSTRACT This study compares the efficiency of homogeneous versus spatially heterogeneous subsidies in developing agricultural plans compatible with bird sustainability. Using the plains of Lleida as a case study—where incentives for agricultural intensification threaten a bird community‐we employ a spatially explicit model that simulates crop yields linked to a habitat suitability index for each species. Within this framework, we model subsidies to evaluate their impact on biodiversity conservation, farmer acceptance, required budget, and agricultural economic profitability. We also address incomplete information by relaxing the assumption that the regulator knows real opportunity costs and instead estimate them via sampling methods. Results show that a conservation‐focused homogeneous subsidy is significantly less efficient than a heterogeneous one. Heterogeneous subsidies differentiate between farmers' agricultural potential, enabling conservation goals to be met with lower budgets. Moreover, a development‐oriented heterogeneous scheme—which maximizes total agricultural profits while ensuring bird sustainability—can be even more effective, reducing implementation costs and promoting agricultural economic growth. However, incomplete information leads to suboptimal decisions, lowering total profits and causing losses for misidentified farmers who may require additional compensation. While heterogeneous subsidies remain budget‐efficient under incomplete information, achieving full farmer participation requires higher payments. This reduces their efficiency advantage, but heterogeneous subsidies still represent the more efficient option.", "journal": "Agricultural Economics", "published": "2026-04-23", "url": "https://doi.org/10.1111/agec.70110", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70110"}, {"source": "crossref", "source_id": "10.1002/aepp.70073", "title": "Ban Glyphosate—Does It Affect the Swedish Farmers' Willingness to Grow Cover Crops?", "authors": "Vivian Wei Huang, Anna Kristina Edenbrandt, Elin Röös", "abstract": "ABSTRACT The cultivation of cover crops is one of the new Eco‐scheme practices introduced in Sweden. This study examines how the design of policy attributes of these schemes influences farmers' willingness to grow cover crops on arable land, with particular focus on the potential impact of a glyphosate ban. A discrete choice experiment was conducted with Swedish crop farmers ( N = 875), considering three policy attributes (commitment duration, maximum allowable percentage of mixed legume plants, and subsidy payment levels), two alternatives (permission to sell or utilize cover crop biomass versus restrictions), and one treatment condition (glyphosate ban). A Latent Class Logit Model was employed to explore heterogeneity in farmers' willingness to grow cover crops. The analysis identified three distinct farmer groups: 29% are unlikely to grow cover crops regardless of policy attribute design, 41% are predisposed to adoption irrespective of policy attributes, and 30% are influenced by subsidy payment scheme design. For the latter group, a glyphosate ban should reduce their willingness to grow cover crops. These findings offer valuable insights for enhancing flexibility in Eco‐scheme management prescriptions for promoting greater farmer participation, such as easing the restriction on the maximum number of legume plants in cover crops and permitting farmers to sell or utilize cover crops.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-23", "url": "https://doi.org/10.1002/aepp.70073", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70073"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70112", "title": "Emission Reporting for Agriculture: Frameworks and Metrics Matter", "authors": "Johnny Machon, Christophe d'Abbadie, Ross Kingwell", "abstract": "ABSTRACT Frameworks and metrics that reliably describe agricultural emission sources and carbon sinks are critical to the formulation of cost‐effective mitigation investment. This study identifies and compares three distinct emission reporting frameworks across metrics of total emissions and emissions intensity. The frameworks and metrics are applied to agricultural industries in Western Australia. Findings for 2005 and 2023 and the trends and uncertainties over the intervening period are reported. This study novelly considers a framework that includes emissions and sequestration from land use, land use change and forestry (LULUCF) activities at an industry scale. Most of Western Australia's agricultural emissions occur in the beef, sheep and grains industries, which also dominate agricultural land use. The emissions intensity of the grains industry in particular is highly sensitive to the inclusion of LULUCF activities. While large uncertainties surround emissions and sequestration from LULUCF activities, there are indications that the effect of LULUCF on emissions has changed considerably over time. We conclude it is preferable not to rely solely on one framework or one reporting metric. We highlight that more research is needed to lessen uncertainties surrounding LULUCF activities by agricultural industries.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-21", "url": "https://doi.org/10.1111/1467-8489.70112", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70112"}, {"source": "crossref", "source_id": "10.1002/aepp.70071", "title": "Biofuel Growth: The Unintended Effects of the Ethanol Boom on Farmland Values", "authors": "Hoanh Le, Oscar Galvez‐Soriano", "abstract": "ABSTRACT This paper provides the first causal estimates of the impact of the U.S. ethanol boom on farmland values in the Midwest. Using county‐level data from the Census of Agriculture (1997–2022) and a difference‐in‐differences strategy that exploits variation in soil productivity, we find that farmland values in high corn‐suitability counties increased by $1147 per acre after 2005, equivalent to a 44% gain relative to pre‐ethanol boom levels. The effects are even larger in the most productive counties, where land values more than doubled. We also identify two reinforcing mechanisms: a short‐run response to higher corn prices and a longer‐run increase in farmland demand. These findings highlight how large‐scale energy policies can reshape rural land markets in ways that extend well beyond their intended objectives. JEL Classifications: Q11, Q24, Q28", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-21", "url": "https://doi.org/10.1002/aepp.70071", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70071"}, {"source": "crossref", "source_id": "10.1111/agec.70111", "title": "Driver's License Reform and the Labor Supply and Benefit Access of Undocumented Farm Workers", "authors": "Tianyuan Luo, Genti Kostandini", "abstract": "ABSTRACT This study investigates the impact of granting driver's licenses to undocumented immigrants on their labor market outcomes and employers' use of benefits as mechanisms to retain workers. First, using data from the American Community Survey, we document an increase in the probability of working in agriculture for likely undocumented workers in states that passed driver's license legislation. Then, by utilizing the restricted version of the National Agricultural Workers Survey, we specifically analyze changes in working hours and wages for undocumented farm workers following the implementation of the policy. We find significant increases in hours and days worked on‐farm, higher wages, especially for low‐skilled workers, and a greater likelihood of employers providing private benefits for undocumented farm workers. Farms also experience increased output in states granting driver's licenses to undocumented workers. Additionally, we also find a lower probability of participating in Supplemental Nutritional Assistance Program benefits after driver's license legislation. These findings suggest that policies enabling driving privileges for undocumented workers not only enhance labor market outcomes but also incentivize labor supply.", "journal": "Agricultural Economics", "published": "2026-04-20", "url": "https://doi.org/10.1111/agec.70111", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70111"}, {"source": "crossref", "source_id": "10.1111/agec.70113", "title": "Village E‐Commerce Penetration and Agricultural Enterprise Growth: Evidence From China", "authors": "Xiaoyong Xiao, Yong Xia, Wuyang Hu, Qingsong Tian", "abstract": "ABSTRACT E‐commerce is increasingly becoming a mainstream model for business development worldwide. Utilizing comprehensive business registration data and accounting data for agricultural enterprises in China, we take China's National Rural E‐commerce Comprehensive Demonstration Policy as a quasi‐natural experiment to investigate the effects of e‐commerce penetration in villages on agricultural enterprise growth and the underlying mechanisms. We find that e‐commerce penetration in villages significantly boosts the number of agricultural enterprises, a result that remains robust across various checks. Further analysis indicates that e‐commerce penetration in villages also enhances the economic performance of agricultural enterprises and fosters their innovation activities. Mechanism analysis reveals that e‐commerce penetration boosts agricultural enterprise growth by enhancing the entrepreneurial ecosystem, as evidenced by broadening sales channels for agricultural products, enriching agricultural inputs, and expanding financial access. This study offers valuable insights for China and other developing countries on leveraging e‐commerce to promote agricultural enterprise growth.", "journal": "Agricultural Economics", "published": "2026-04-20", "url": "https://doi.org/10.1111/agec.70113", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70113"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70102", "title": "Awareness–Action and Policy Acceptability in Mitigating Greenhouse Gas Emissions: Key Stakeholders in Germany's Cattle Dairy and Meat Chains", "authors": "Karen Arcia, Livia Cerini, Stephan von Cramon‐Taubadel", "abstract": "ABSTRACT This paper presents a systematic literature review and targeted searches to define a synthesis framework mapping the awareness–action gap, progression along the awareness–action continuum and policy acceptability in greenhouse gas (GHG) emissions mitigation among key stakeholders in Germany's cattle dairy and meat chains. The awareness–action gap results from barriers that prevent stakeholders from translating climate awareness into action, whereas progression reflects how far different stakeholder groups have advanced from awareness to action. Previous studies often focus on single stakeholder groups, individual policies or general national trends, but seldom examine how different stakeholders stagnate or progress from awareness to action or how policy acceptability can support this transition. Our synthesis framework integrates concepts and indicators from behavioural economics, social psychology and environmental policy to address these issues. We find strong disparities in four stakeholder groups regarding barriers to act. Producers face misaligned incentives and resource constraints. Consumers are hindered by cultural norms and weak market signals. Regulators struggle with fragmented policies and political hesitancy. Finally, influencers, which we define as entities such as media and think tanks that boost public discourse, amplify inconsistent narratives that impede coordinated action. We also assess the acceptability of 20 GHG mitigation policies for producers and consumers. For meat taxation, we analyse acceptability for two additional stakeholders: policymakers and social organisations. Three structural factors constrain policy uptake: fragmented stakeholder preferences, a lack of enforceable mechanisms for mid‐chain actors and weak institutional pathways to translate preferences into regulation. While some policies have higher acceptability, debated measures such as meat taxation still face low support across stakeholders. This illustrates how framing, layered atop structural constraints, ultimately shapes whether acceptability translates into implementation.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-16", "url": "https://doi.org/10.1111/1467-8489.70102", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70102"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70044", "title": "How Changing Food Preferences and Technology Are Transforming Food Markets", "authors": "Jill J. McCluskey, Jillian Hyink", "abstract": "ABSTRACT The foods that consumers purchase and how they purchase food are changing over time. In this article, we discuss how health prioritization and environmental concerns, combined with new technologies, are changing consumers' food preferences and retail choices. Wellness trends have increased attention to functional attributes and specific nutrients such as protein, while intensifying scrutiny of ultra‐processed foods. Adoption of personalized technologies, including prescription medications, wearable devices and diet‐tracking apps, may alter the volume and composition of food consumed. Many consumers are also willing to pay a premium for sustainability claims, but may conflate environmental standards and healthfulness, which raises questions about credibility and effective labeling design. All of these considerations may be impacted by affordability concerns following a period of supply‐chain disruptions and disease outbreaks since 2020, causing food price inflation. This, combined with increasing income inequality, has resulted in a bifurcation of demand between value and premium consumer segments. Preferences are further separated by the channel consumers use to purchase food, as many households still purchase groceries online and order meals for delivery after the COVID‐19 pandemic. The availability of highly detailed consumer purchasing and health data allows for compelling future research on the causal relationships that arise from these trends, which will continue to shape the global food environment.", "journal": "Journal of Agricultural Economics", "published": "2026-04-15", "url": "https://doi.org/10.1111/1477-9552.70044", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70044"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70040", "title": "Small Seed Packs, Big Potential? Effect of Seed Packs on Knowledge and Adoption of Improved Crop Varieties", "authors": "Kelvin Mulungu, Mitelo Subakanya, Peter Setimela, Akpo Essegbemon, Walter Chivasa, James Gethi, Mazvita Chiduwa, Jeremiah Sigalla, Henry‐Hussein Mvungi, Hambulo Ngoma", "abstract": "ABSTRACT Small seed packs for demonstration and testing are widely used to stimulate the uptake of improved crop varieties, yet evidence on their effectiveness remains mixed. This study examines whether small seed packs distributed either for free or at a subsidised price enhance farmers' knowledge and subsequent adoption of improved legumes, drought‐tolerant maize, and improved traditional African vegetables in Tanzania and Zambia. Drawing on mobile phone survey data and applying entropy balancing alongside machine‐learning methods to address selection bias, we find consistent evidence that seed packs increase both technical knowledge and adoption of these crops. Knowledge gains are strongest for crops with limited prior exposure, while improvements for familiar crops such as drought‐tolerant maize likely reflect experiential learning rather than new information. Adoption effects are positive across all crops and robust to alternative estimation strategies. Overall, the results indicate that small seed packs can serve as an effective demand‐creation tool, particularly in settings where farmers face information gaps or uncertainty about the performance of improved germplasm.", "journal": "Journal of Agricultural Economics", "published": "2026-04-14", "url": "https://doi.org/10.1111/1477-9552.70040", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70040"}, {"source": "crossref", "source_id": "10.1002/aepp.70070", "title": "Temperature Sensitivity and Adaptation of Cereal Yields: Empirical Evidence From Italy", "authors": "Paolo Nota, Giacomo Coughlan, Alessandro Olper", "abstract": "ABSTRACT This paper investigates the evolving temperature sensitivity and climate adaptation of cereal yields in Italy from 1952 to 2023, using province‐level data for maize, common wheat, and durum wheat. Employing panel data econometric methods, we estimate yield responses to heat exposure, changes in sensitivity over time, and adaptation to climate change. The findings reveal reduced heat sensitivity in maize, persistent sensitivity in common wheat, and some evidence of reduced heat sensitivity in durum wheat. The results also highlight mixed evidence of adaptation, as long‐run climate adaptation offsets some of the negative effects only on maize yield. Consequently, there is both potential for reducing heat impacts and concern about future vulnerability. This study provides novel evidence regarding the necessity of targeted agricultural strategies in enhancing climate resilience among cereal producers.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-13", "url": "https://doi.org/10.1002/aepp.70070", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70070"}, {"source": "crossref", "source_id": "10.1002/ajae.70071", "title": "Food insecurity and unemployment among immigrants in the United States", "authors": "Siwen Zhou, Joshua Berning, Alessandro Bonanno, Jude Bayham", "abstract": "Abstract Immigrants can be more vulnerable to economic downturns and, during periods of economic hardship, more likely to experience food insecurity compared to natives. This study examines the differential effect of the unemployment rate on the probability of being food insecure among diverse groups of immigrant households relative to natives in the United States. Since the unemployment rate is not randomly determined for households, we use an identification strategy based on shift‐share Bartik instruments which exploit exogenous spatial variation in industry employment shares and national industry growth rates. We find that increases in the unemployment rate raise the probability of household food insecurity, with noncitizen immigrants disproportionately affected compared to both natives and naturalized citizens, likely reflecting their more limited access to safety‐net programs. Noncitizen immigrant cohorts from countries with high proportions of less‐skilled workers, or those arriving during economic downturns, are more likely to experience food insecurity than both native‐born individuals and naturalized immigrant citizens. Higher education partially mitigates the impact of unemployment on household food insecurity, particularly for U.S. immigrant noncitizens. Our findings highlight the need for targeted measures to support at‐risk immigrant groups disproportionately vulnerable to short‐term economic shocks.", "journal": "American Journal of Agricultural Economics", "published": "2026-04-09", "url": "https://doi.org/10.1002/ajae.70071", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70071"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70105", "title": "Gender Empowerment and Climate‐Smart Agriculture: Insights and Implications for Achieving Gender Equity and Climate Resilience", "authors": "Junpeng Li, Wanglin Ma, Dil Bahadur Rahut, Ziqi Wang", "abstract": "ABSTRACT This study investigates the effects of male and female empowerment, as well as gender empowerment inequality, on the adoption of climate‐smart agriculture (CSA) practices. Using a conditional mixed process model, we analyse survey data from 743 households across Henan, Shandong and Hebei provinces in China. The results reveal that empowering both males and females significantly promotes the adoption of CSA practices. Male and female empowerment drives the adoption of CSA practices through improving income generation and reducing agricultural production costs. Higher levels of gender empowerment inequality are linked to reduced CSA practice adoption. The positive and negative impacts of male and female empowerment, as well as gender empowerment inequality, on the adoption of CSA practices among wheat growers cultivating medium‐scale farmland are the primary focus. Additionally, empowering women and narrowing gender inequality substantially boost wheat yields, whereas male empowerment shows no significant effect. These results highlight the importance of addressing gender disparities to promote sustainable agricultural practices and ensure food security. The study advocates policies that empower rural women, reduce gender inequality in access to empowerment and foster the widespread adoption of CSA technologies, thereby advancing gender equity and climate resilience in agricultural systems.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-08", "url": "https://doi.org/10.1111/1467-8489.70105", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70105"}, {"source": "crossref", "source_id": "10.1002/aepp.70069", "title": "Sustainable Productivity Growth in Agriculture: The Role of Shifts in R&amp;D Investments and Technology", "authors": "Zuzana Smeets Křístková, Michiel van Dijk, Robert M'Barek, Hans van Meijl, Tomas Ratinger", "abstract": "ABSTRACT The objective of the paper is to evaluate the long‐term prospects of sustainable productivity growth linked to plausible assumptions on public agricultural R&amp;D investments as the key productivity driver. Second, it investigates the role of changing R&amp;D focus from yield maximization to input saving technologies (fertilizers and pesticides). The projections using CGE model MAGNET identify China, India and Brazil as regions with high productivity growth from agricultural R&amp;D while Sub‐Saharan Africa regions will struggle with low productivity growth rates and substantial increase in GHG emissions. Overall, GHG emissions are projected to grow more than agricultural output. However it is found that sustainable agricultural productivity growth could become feasible under the reorientation of R&amp;D programs in high income countries (with use of chemical inputs declining as much as 30%) where these policies can make an important contribution to sustainability while food security concerns are limited and spillover effects in terms of higher food prices are low.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-07", "url": "https://doi.org/10.1002/aepp.70069", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70069"}, {"source": "crossref", "source_id": "10.1002/aepp.70062", "title": "Tax Policy and Farm Organization", "authors": "Tia M. McDonald, Katherine Lacy", "abstract": "ABSTRACT The Tax Cuts and Jobs Act (TCJA) introduced substantial changes to the tax code, affecting farms' organizational incentives. This study examines farms' responses to the TCJA along extensive and intensive margins, focusing on organizational and labor expense adjustments. Using a logit regression, we analyze the likelihood of organizational structure selection for tax purposes in response to the TCJA and the Qualified Business Income Deduction (QBID). We find farms are more likely to be organized as S corporations after the TCJA. Furthermore, using a fuzzy regression discontinuity design, we demonstrate a significant increase in wage expenses in response to QBID income limits.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-07", "url": "https://doi.org/10.1002/aepp.70062", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70062"}, {"source": "crossref", "source_id": "10.1002/ajae.70062", "title": "Accounting for animal health in efficiency analysis: An application to Swedish dairy farms", "authors": "Frederic Ang, Enoch Owusu‐Sekyere, Karin Alvåsen, Helena Hansson", "abstract": "Abstract Poor animal health is a central concern in modern livestock production. Despite the necessity to incorporate animal health in efficiency analysis, the theoretical and empirical developments are limited on this subject. This article appropriately characterizes the axiomatic properties of animal health within a production framework. We treat animal health as a weakly disposable output with characteristics of an input and an output, which permits computing animal health‐adjusted efficiency measures and shadow prices of animal health. The application considers 980 observations of Swedish dairy farms over the years 2009–2016. We use a Benefit‐of‐the‐Doubt approach for assessing animal health, which captures its multiple dimensions with weights being optimized for each farmer. Applying a random sample‐split procedure within a Data Envelopment Analysis framework, we statistically verify the extent to which inclusion of animal health in the production framework changes the efficiency estimates. The results show that including animal health in production analysis increases the average efficiency estimates from 0.900 to 0.973, a finding that largely also holds in a statistical sense. The shadow prices of animal health are mostly positive, which indicates a general willingness to accept lower levels of production for higher levels of animal health. Our findings suggest the importance of incorporating animal health into efficiency analysis.", "journal": "American Journal of Agricultural Economics", "published": "2026-04-06", "url": "https://doi.org/10.1002/ajae.70062", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70062"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_004_cover/_article/-char/ja/", "title": "表紙", "authors": "", "abstract": "", "journal": "フードシステム研究", "published": "2026-04-03", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_004_cover/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_004_cover/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_020/_article/-char/ja/", "title": "産地商人による地域特産物生産への関わりとその影響", "authors": "戸崎 禎庸", "abstract": "This study examines how rural wholesalers ( sanchi shonin ) in southern Tochigi, Japan, have responded to the decline of kanpyo (dried gourd shavings) production by engaging directly in farming and processing. Drawing on interviews with five wholesalers, this study highlights a structural shift in which wholesalers have assumed a more active role in the production and distribution of kanpyo . Such involvement is not merely a strategy to secure product supply, but also contributes to regional agriculture by reducing farmers’ processing burdens, alleviating labor shortages, utilizing farmland to sustain production volumes, and fostering new entrants into farming.", "journal": "フードシステム研究", "published": "2026-04-03", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_020/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_020/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_021/_article/-char/ja/", "title": "生産者から仕入れる東京都内の青果小売店による価値づけの一考察", "authors": "金澤 なつ美", "abstract": "This study examines green grocery stores as intermediaries between producers and consumers. We explore whether these stores foster deeper mutual understanding from the perspective of valuation. Drawing on Bessy and Chauvin’s (2013) concept of intermediaries, we analyzed interview data from three stores. We generated 43 valuation codes for fruits and vegetables and investigated how valuation structures operate within the stores. Findings suggest that stores promote consumer understanding of producers by enabling interactive information flows and by reflecting affirmative values of produce in pricing based on the stores’ own perceptions.", "journal": "フードシステム研究", "published": "2026-04-03", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_021/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_021/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_4_news/_article/-char/ja/", "title": "裏表紙", "authors": "", "abstract": "", "journal": "フードシステム研究", "published": "2026-04-03", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_4_news/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_4_news/_article/-char/ja/"}, {"source": "crossref", "source_id": "10.1002/ajae.70069", "title": "Issue Information", "authors": "", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-04-02", "url": "https://doi.org/10.1002/ajae.70069", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70069"}, {"source": "crossref", "source_id": "10.1002/aepp.70064", "title": "Issue Information", "authors": "", "abstract": "", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-02", "url": "https://doi.org/10.1002/aepp.70064", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70064"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70038", "title": "Promoting Methane Reductions Through Behavioural Nudges and Informational Boosts: A Field Choice Experiment in Japanese Rice Farming", "authors": "Shengyi Du, Katsuya Tanaka, Hiroki Sasaki, Tetsuya Horie, Shinya Horie", "abstract": "ABSTRACT Agricultural methane emissions represent a significant contributor to global climate change, with irrigated rice cultivation being one of the primary sources. Despite the availability of effective mitigation technologies, their adoption often remains limited due to behavioural and institutional constraints. Water management practice that extends drainage periods during cultivation can curb methane emissions from irrigated rice at low cost, yet uptake among Japanese farmers remains modest. We surveyed 2219 rice producers in Shiga Prefecture using a labelled choice experiment that embedded two behavioural nudges (social norm and loss aversion) and one informational boost (knowledge enhancement), presented with or without a reminder. Farmers most favoured a 7‐day drainage extension. Social‐norm messages did not robustly shift adoption intentions, but loss‐aversion and knowledge enhancement paired with reminders increased the probability of choosing water management practice by 5–10 percentage points, particularly when financial incentives were modest. The added value of nudges and boosts faded once subsidies approached prevailing ceiling levels, suggesting diminishing marginal returns to stacking instruments. These findings suggest that timely, low‐cost behavioural interventions can effectively complement agri‐environmental payments in resource‐constrained settings, providing a scalable and context‐sensitive strategy to accelerate the adoption of climate‐smart rice practices.", "journal": "Journal of Agricultural Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/1477-9552.70038", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70038"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70043", "title": "Environmental Information or Social Norm? A Ladder Toward Environmentally Sustainable Food Choices", "authors": "Ryosuke Inoue, Kentaro Kawasaki", "abstract": "ABSTRACT Agricultural production and the food supply chain have a significant impact on the environment. To foster an environmentally sustainable food system, it is vital to change consumers' food choice patterns to be more environmentally sustainable. This study presents a concept ladder , a simplified model under which consumers may be at different stages in terms of their willingness and ability to make environmentally sustainable food choices: some may have little concern, others may have more concern but require the impetus of broader social norms to modify their choices, while a final group may have strong concern but in some cases be unable to exercise their preferences because of financial or other constraints. To empirically test this concept, we conducted a large‐scale randomised experiment involving Japanese consumers through two online surveys. In the first survey, respondents were randomly separated into three groups and provided with either environmental issue information (T1), social norm information (T2) or no information (Control). Two weeks later, a follow‐up survey was conducted to compare the actual environmental sustainability of food choice behaviours among the groups. The results show that the treatment effect of T1 is the largest for those with a low level of environmental concern, while the treatment effect of T2 is the largest for those with a moderate level of environmental concern, consistent with the ladder concept. Several robustness checks support these findings.", "journal": "Journal of Agricultural Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/1477-9552.70043", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70043"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70107", "title": "Mapping Circular Bioeconomy Research in Agrifood Systems: Perspectives From Australia and New Zealand", "authors": "Maja Arsic, Tiffany McIntyre", "abstract": "ABSTRACT Growing awareness of unsustainable linear production, consumption and waste economic models is prompting exploration of circular economy and bioeconomy models. The ‘circular bioeconomy’, sitting at the nexus of these concepts, is of particular importance to agrifood systems, which play a critical role in producing biologically based materials and services, and converting waste streams into safe and sustainable resources. A systematic mapping protocol was applied to develop a broad overview of ‘circular bioeconomy’ research in Australian and New Zealand agrifood systems. Sixty‐nine full‐text publications were coded to catalogue studies by domain, methodology, and categories of inputs, technologies and products (for biophysical studies). The circular bioeconomy is an emerging research area, currently experiencing inconsistent definitions of key terms, a high proportion of review papers, and limited engagement with key concepts in certain research areas. There were key differences between Australian and New Zealand research, particularly in terms of science domain, research methodology and dominant perspectives on key circular economy and bioeconomy principles. Recommendations for future studies include standardising circular bioeconomy definitions, increasing social science applications, mapping potential circular bioeconomy assessment tools, and applying circular bioeconomy principles and guidelines to develop cross‐sectoral strategies. Coordinated research efforts can support circular bioeconomy approaches for sustainable agrifood systems in Australia and New Zealand.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/1467-8489.70107", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70107"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70111", "title": "Issue Information", "authors": "", "abstract": "", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/1467-8489.70111", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70111"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70106", "title": "Ground‐Level Ozone and Agricultural Productivity in China", "authors": "Xiaoli Wang, Qian Li, Jing Gao, Xiaoguang Chen", "abstract": "ABSTRACT Using a county‐level dataset covering agricultural total factor productivity (TFP), crop yields, weather and ground‐level air pollution from 2003 to 2015, this study investigates the effects of air pollution, specifically ozone (O 3 ), on agricultural TFP. We find that O 3 pollution is strongly associated with productivity losses, with each one‐standard‐deviation increase in O 3 linked to a 33% reduction in TFP, far exceeding the negative impacts of other pollutants and temperature extremes. These adverse effects are primarily driven by declines in labour productivity, land productivity and crop yields and are further exacerbated by extreme temperatures. Between 2003 and 2015, agricultural TFP losses due to rising O 3 pollution grew from 9.8% to 46.6%. As an adaptive response, farmers adjust production practices, particularly by increasing fertiliser use, to mitigate productivity losses. Our findings highlight the urgent need for integrated policies that address both air pollution and climate extremes to promote agricultural sustainability.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/1467-8489.70106", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70106"}, {"source": "crossref", "source_id": "10.1111/ajar.v70.2", "title": "", "authors": "", "abstract": "", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/ajar.v70.2", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/ajar.v70.2"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70103", "title": "How Does Plant Capacity Affect Agricultural Processors' Performance? A Quasi‐Experimental Design Using International Sugar Price Shocks", "authors": "Yetian Cai", "abstract": "ABSTRACT Understanding the relationship between plant capacity and performance among agricultural processors in developing economies remains essential for effective policy design. Exploiting exogenous international sugar price fluctuations between 2008/09 and 2016/17, this study employs a quasi‐experimental framework to examine how plant capacity influences profitability within China's sugar industry. Using detailed panel data for 99 sugar plants in Guangxi province, I find that plants with greater capacity realise significantly higher profit gains under the same price shock. Specifically, facing the same exogenous international sugar price increase of 500 yuan , a plant with daily production one standard deviation higher (4691 tonnes) experiences an additional increase of approximately 32 yuan in unit profit relative to a smaller plant. This scale‐driven profitability advantage primarily results from lower non‐raw material costs rather than improved selling prices or higher productivity. This study further identifies heterogeneity in capacity effects by plant ownership and location in major versus minor production regions, highlighting the nuanced role of economies of scale and local policy interventions. These findings contribute novel insights into how firm‐level characteristics mediate the effects of global market shocks, offering clear policy implications for optimising agricultural processing efficiency in resource‐dependent regions.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/1467-8489.70103", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70103"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70109", "title": "Examining the Impact of Government Input Support on Rice Production in Vietnam", "authors": "Keo Sa Rate Thach, Ji Yong Lee, My Trang Ha, Minh Tuan Cao, Duyen Thi Le Chau, Sang Hyeon Lee", "abstract": "ABSTRACT Although rice production plays a vital role in Vietnam's economy, rice farmers' incomes remain low compared to other sectors. Several support policies have been introduced to improve this, including input support policies. This study examines the effect of input support on production outcomes of rice farmers using endogenous switching regression (ESR) analysis and propensity score matching (PSM) with data from the Vietnam Household Living Standards Survey (VHLSS) in 2018 and 2020. Findings show that households receiving input support had lower rice production efficiency and incomes than comparable households not receiving the support. While there is a link between support value and production outcomes, the impact is limited if support values are low. This suggests that small amounts of support are insufficient to improve production outcomes. Given our results, the Vietnam government should increase the support budget and focus on providing quality inputs. Additionally, rather than giving small cash amounts to individual households, which are insufficient to buy modern machinery, the government should invest in shared community‐level equipment to improve production capacity.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/1467-8489.70109", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70109"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70101", "title": "Developing Circular Bioeconomy Sustainability Metrics for Agrifood Systems: Evidence From Southeast Asia", "authors": "Novlloyd E. Celeste, Anthony B. Halog", "abstract": "ABSTRACT For most Southeast Asian nations, sustainable development remains a challenge. Despite environmental, technological, social and economic barriers, it is important to track sustainability progress in the region, given its agriculture‐based economy. This study aims to develop sustainability metric indicators for agricultural systems, examine the regional sustainability performance index and identify regional opportunities and challenges for achieving the Sustainable Development Goals. We used principal component analysis (PCA) to create new sustainability metrics for Southeast Asia. Data from the Asian Development Bank were used to determine the key dimensions of sustainability metrics. The analysis produced eight sustainability metrics based on component loadings: climate footprint, material‐use efficiency, agrifood system emissions, research and innovation, sustainable consumption and production of biofuels, information and communication technology (ICT), energy access and trade. Most agriculture‐based economies have high emissions from their agricultural systems and low material‐use efficiency. These challenges necessitate strategic development intervention, which aligns with the region's agricultural base. For example, agricultural trade can be expanded to include bio‐based products. This, coupled with the cross‐collaboration of bio‐based products in the region, will minimise agrifood emissions from countries with above‐average emissions, such as Indonesia. This study recommends the development of region‐specific monitoring frameworks to track progress in sustainability.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/1467-8489.70101", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70101"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70110", "title": "Circular Bioeconomy for Sustainable Agriculture and Food Systems: An Editorial Introduction", "authors": "Wanglin Ma, Johannes Sauer, Dil Bahadur Rahut, Tetsushi Sonobe", "abstract": "ABSTRACT This special issue advances a multi‐scalar, empirically grounded understanding of circular bioeconomy transitions in agriculture and food systems by integrating systems‐level analyses with farm‐ and household‐level evidence from diverse developing and emerging economies. The key findings include (1) circular bioeconomy research in agrifood systems in Australia and New Zealand is rapidly expanding but highly fragmented, dominated by technical perspectives with inconsistent definitions and limited social science engagement, with Australia emphasising technological recycling and New Zealand focussing more on ecological and social redesign; (2) there is a substantial untapped potential to integrate land, marine, forest and water resources into Indonesia's circular bioeconomy through converting diverse biomass residues into bio‐based products, but scaling is constrained by limited technical capacity, infrastructure gaps, policy fragmentation and high investment costs; (3) there exists pronounced heterogeneity in circular bioeconomy readiness, with most southeast Asian countries facing high agrifood emissions and low material‐use efficiency, while performance advantages in innovation and efficiency are concentrated in a few economies; (4) technical skill gaps and awareness deficits are the primary, system‐shaping constraints on crop‐residue bioenergy adoption, with spillover effects that hinder infrastructure, markets and coordination in the circular bioeconomy; (5) adoption of integrated crop–livestock systems increases bio‐fertiliser use, reduces chemical fertiliser expenditure among younger farmers and raises farm revenue without increasing costs, demonstrating the economic and environmental viability of farm‐level circular bioeconomy practices; and (6) composting spent mushroom substrate delivers the highest productivity gains compared with on‐farm deposition and distant dumping, with farmers' management choices shaped by education, extension access, infrastructure quality and mobility. These findings highlight that policies should standardise circular bioeconomy definitions and metrics, invest in farmer knowledge and extension as first‐order enablers and coordinate cross‐sector infrastructure and governance to unlock scale.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/1467-8489.70110", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70110"}, {"source": "crossref", "source_id": "10.1002/ajae.70070", "title": "Falling trade barriers and rising crime? Evidence from Colombia", "authors": "Edgar Marcillo‐Yepez, Pilar Useche, Conner Mullally, Jaclyn Kropp, Maira Emy Reimão", "abstract": "Abstract Trade liberalization is central to development strategy in low‐ and middle‐income countries, yet its social costs, particularly for poor rural households, remain poorly understood and rarely offset by policy. Greater openness to trade generates benefits through lower prices, product diversity, and export earnings, but heightened import competition can reduce income and employment in exposed sectors, potentially increasing crime by lowering the opportunity cost of illicit activity. Rising agricultural import competition is particularly concerning given that poverty in the developing world is disproportionately rural and that large shares of the labor force depend on smallholder farming. Here, using panel data from 887 Colombian municipalities and a shift‐share instrumental variables approach, we show that the U.S.‐Colombia Free Trade Agreement of 2012—by intensifying import competition in corn and beans—raised home burglaries and robberies of individuals by 16% and 6%, respectively, while reducing business robberies by 13%. Crime impacts were concentrated in Andean municipalities and non‐coca‐producing regions, reflecting the vulnerability of smallholder traditional corn producers to a surge of cheap U.S. imports and the limited economic alternatives available in those areas. Unlike prior studies from Mexico and Brazil, we find non‐robust evidence of impacts on homicides—a divergence explained by Colombia's context of de‐escalating armed conflict, which dampened extreme violence while leaving economically motivated property crime fully exposed. These results call for agricultural trade agreements to be explicitly paired with rural safety nets and labor market policies capable of preventing trade‐induced shocks from translating into elevated crime and deepened rural inequality.", "journal": "American Journal of Agricultural Economics", "published": "2026-03-31", "url": "https://doi.org/10.1002/ajae.70070", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70070"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/96/2/96_104/_article/-char/ja/", "title": "農業の未来と日本の農業経済学", "authors": "小山 修", "abstract": "人間活動が地球の許容限界を超えるとされるなか，自然を利用して人類の生命を維持する農業・食料システムの変革こそが，多くの地球規模課題群の核心課題であると認識されている．その変革には，複雑な要因を総合的に考量するための自然・社会・人文科学にわたる学問の結集が不可欠であり，その中央に位置する農業経済学こそが解決策を提案すべき立場にある．日本などの多様な環境で育まれた農業の経験，自然観，思想の中に，従来の欧米中心の学問とは異なる新たな視座，手掛かり，可能性がある．広義の農業経済学（自然共生のための社会経済学）は，人類を持続的に生存させるための稀有な役割を担っている．", "journal": "農業経済研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/nokei/96/2/96_104/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/96/2/96_104/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/96/2/96_97/_article/-char/ja/", "title": "謙虚な社会科学「農業経済学」とともに半世紀", "authors": "生源寺 眞 一", "abstract": "講演の目的は演者の半世紀にわたる研究を振り返り，農業経済学の特色を明らかにすることにある．研究は主として農家の経済行動，農村の共同行動，日欧の農政改革をカバーしている．政策の分析については，研究成果をシンプルに分かりやすく社会に発信してきた．農業経済学のひとつの特色は，絶対的な必需品としての食料に焦点を当ててきた点にある．もうひとつは個々の生産者の行動に加えて，農村コミュニティの役割を重視していることである．日本の農業経済学は経済学のひとつの分野ではない．農業経済学会の会員の構成が示唆するように，学会は経済学，農業経営学，農業史，農村社会学などに取り組む人々の学際的な研究活動によって支えられている．", "journal": "農業経済研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/nokei/96/2/96_97/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/96/2/96_97/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_001/_article/-char/ja/", "title": "培養肉の種類による消費者受容の違い", "authors": "古橋 正成", "abstract": "This study introduces the concept of “acceptance gap” for cultured meat, defined as the disparity between the daily consumption frequency of conventional animal products and the intention to consume their cultured counterparts daily. This study elucidates the type-specific acceptability of cultured livestock meat (beef and chicken) and cultured seafood (tuna and horse mackerel) among Japanese consumers. To this end, an online survey is administered to Japanese consumers to ascertain their attitudes towards conventional products and measure the acceptance gap. The study’s results indicate a substantial discrepancy in acceptance intention between cultured livestock meat and cultured seafood. In addition, the results illustrate a substantial acceptance gap for cultured livestock meat but no distinct gap for cultured seafood. These findings suggest that cultured livestock meat is less likely to be perceived as a direct substitute for conventional meat, whereas cultured seafood has a higher potential for such a substitution. This study significantly contributes to the literature on cultured meat acceptance by introducing the perspective of “acceptance change,” a concept that stands in contrast to the primary focus of the extant literature on acceptance formation. Furthermore, the study provides a valuable empirical foundation for further research on cultured meat acceptance by demonstrating the varying acceptability across different types of cultured meat. Lastly, the findings offer novel insights for consumer acceptance studies and can inform future efforts towards the practical application of cultured meat.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_001/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/3/32_001/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_002/_article/-char/ja/", "title": "宇治茶のフードシステム", "authors": "上田 遥", "abstract": "This paper provides a comprehensive overview of the economic system of green tea and matcha in Kyoto, Japan, namely Uji tea ( Uji-cha ), with a particular focus on distribution structure and quality coordination. Various statistical data and literature were analyzed while incorporating interviews with 13 business operators from producers to tea merchants, wholesale markets, and public entities. At the production stage, replanting and scale expansion have progressed since the 1970s, but new challenges have emerged, including workforce development, the preservation of traditional production methods, and adjustments to the growing commercial demand of matcha. At the distribution stage, the enhancement of public functions (such as price formation) in the tea wholesale market has made the “agricultural cooperative-tea wholesale market” route as the major distribution channel. At the same time, transactions outside the market have also played a distinctive role in ensuring a stable supply of high-quality crude tea leaves. Furthermore, along with the functions of the tea market, the technical system of gōgumi (blending) employed by tea merchants has played a crucial role in the quality coordination of Uji tea. Various economic issues remain to be addressed, including how to design a quality assurance system that accommodates the diversification of what constitutes Uji tea, and how to express its sensory characteristics and terroir.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_002/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/3/32_002/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_003/_article/-char/ja/", "title": "インドネシア農村女性による伝統食作りの継続", "authors": "伊藤 紀子", "abstract": "In Indonesia, healthy food intake is promoted by encouraging the consumption of traditional foods that have been passed down over several generations in each region. Using qualitative research methods, this study surveyed four women in a rice farming village to examine how and why traditional food making has persisted. The results clarified the following two points. First, common experiences-from the subjects’ childhood to the present day-have encouraged the continuation of traditional food making. Because the subjects have enjoyed the taste of traditional foods since childhood, even after they began eating modern foods, they believed that traditional foods were superior in terms of healthiness and availability. They taught their daughters to make traditional foods, passing down their value to them. They also harbored an active desire to continue making traditional foods for their family’s health. The subjects learned and practiced traditional food making at home and school, as well as in the local community. After marriage, they improved their skills, making use of media and seeking information on healthy food. Second, the diverse life paths of the participants was evident. While some were highly oriented toward traditional foods and actively-even spontaneously-engaged in their preparation, others preferred the taste of modern foods, making traditional foods-centered meal preparations a passive aspect of their daily lives. Some began making traditional foods in earnest before marriage, while others did so after marriage. While some used media and information on healthy food to improve their ability, others did not make much use of information. Within the survey participants’ environment, many experiences increased their awareness and ability to prepare traditional foods. However, some attitudes and experiences that caused them to stop making traditional foods and replace them with modern foods were also observed.", "journal": "フードシステム研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/3/32_003/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/3/32_003/_article/-char/ja/"},
