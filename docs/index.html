ef:10.1016/j.foodpol.2026.103118"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103119", "title": "Estimating plant-based milk impacts on U.S. fluid milk prices and quantities", "abstract": "", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103119", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103119"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103069", "title": "Philanthropic food assistance in high-income countries: Lessons from Israel’s food-aid network", "abstract": "", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103069", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103069"}, {"source": "crossref", "source_id": "10.1111/agec.v57.4", "title": "", "abstract": "", "journal": "Agricultural Economics", "published": "2026-07-01", "url": "https://doi.org/10.1111/agec.v57.4", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.v57.4"}, {"source": "crossref", "source_id": "10.1002/aepp.v48.3", "title": "", "abstract": "", "journal": "Applied Economic Perspectives and Policy", "published": "2026-07-01", "url": "https://doi.org/10.1002/aepp.v48.3", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.v48.3"}, {"source": "crossref", "source_id": "10.1002/aepp.70099", "title": "Hemp Cultivation and Crop Diversification: Implications for Ecosystem Services in Kentucky", "abstract": "ABSTRACT This study examines the ecosystem benefits of expanding hemp cultivation by assessing its impact on crop diversity. Using scenario‐based simulations and fixed‐effect panel regressions with county‐level data in Kentucky, we find that increased hemp acreage tends to enhance crop diversity, improving water quality and bird diversity. While agricultural policies aimed at small‐scale farmers align with improving farm profitability, broader ecological benefits may remain limited unless they reach a sufficient scale. Our findings suggest that hemp‐induced crop diversification can generate measurable non‐market economic benefits through improvements in water quality and bird diversity, highlighting the need for practical and proactive policy measures that promote smallholder participation.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-06-19", "url": "https://doi.org/10.1002/aepp.70099", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70099"}, {"source": "crossref", "source_id": "10.1093/erae/jbag010", "title": "The relationship between pesticides and risk in apple production", "abstract": "Abstract We examine how pesticide expenditure relates to the probability distribution of yield and revenue per hectare in apple production in northern Italy. Using a flexible moment-based approach, we find that pesticide expenditure is negatively associated with downside risk in yield and revenue, whereas late frosts are positively associated with downside risk in yield. Sensitivity analyses show that mean-equation estimates are robust to unobserved confounders, while negative semi-variance models are less robust overall. Only the pesticide–expected outcome relationship appears plausibly causal. Therefore, conclusions about pesticides as risk-increasing or risk-decreasing inputs should be made with caution.", "journal": "European Review of Agricultural Economics", "published": "2026-06-17", "url": "https://doi.org/10.1093/erae/jbag010", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbag010"}, {"source": "crossref", "source_id": "10.1111/agec.70128", "title": "Online Benefit Redemption and SNAP Participation: Evidence From the SNAP Online Purchasing Pilot", "abstract": "ABSTRACT The Supplemental Nutrition Assistance Program (SNAP) is the largest federal nutrition assistance program in the United States, yet many eligible households do not participate due to administrative burdens, stigma, and geographic access constraints. We examine whether the SNAP Online Purchasing Pilot (OPP), which allows beneficiaries to redeem benefits online, affects program participation. Using a difference‐in‐differences design with state‐level data from 2017 to 2021, we find that SNAP OPP increases program participation per capita by 13.7% (1.6 percentage points) and participation among individuals below the poverty line by 11.3% (11 percentage points). Event‐study estimates indicate effects emerge within three months and persist thereafter. Participation gains are larger in states with higher digital infrastructure (computer ownership and internet access) and greater vehicle access, indicating that online and physical access function as complements. States with higher shares of elderly residents and households with children also exhibit stronger responses. These findings suggest that enabling online benefit redemption can expand safety net access, though benefits vary systematically with local infrastructure and demographic composition.", "journal": "Agricultural Economics", "published": "2026-06-17", "url": "https://doi.org/10.1111/agec.70128", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70128"}, {"source": "crossref", "source_id": "10.1002/aepp.70093", "title": "Impact of Cooperative Membership on Maize Harvest Losses in China", "abstract": "ABSTRACT Countries are accelerating actions to reduce food loss and waste to ensure global food security and sustainable development. Cooperatives are considered important channels for promoting the use of agricultural technologies and improving farmers' skills, which are regarded as key factors in reducing harvest losses. However, owing to data limitations, few systematic assessments of the effects of cooperative membership on food losses exist. On the basis of survey data from 703 maize growers in three major maize production areas in China, propensity score matching (PSM) and endogenous switching regression (ESR) were used in this study to evaluate the effects of cooperative membership on the maize harvest losses of households. The results revealed that membership significantly reduced maize harvest losses by 68%, saving farmers an average of 238.05 kg per ha, which is worth $91.92 per ha. Membership also contributed to minor pest attacks and better working attitudes during the harvest stage. Cooperative membership is critically important for China's food security, resource conservation, and environmental protection. If the average maize harvest loss reaches the level of loss observed among member households, then it is possible to meet the food consumption needs of 13.61 million people, saving 0.74 million ha of land and 0.29 million tons of fertilizer used for maize production and reducing carbon emissions by 4.04 million tons and the water footprint by 6.43 billion m 3 .", "journal": "Applied Economic Perspectives and Policy", "published": "2026-06-17", "url": "https://doi.org/10.1002/aepp.70093", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70093"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70124", "title": "Contracts and Ownership Structures in the Bioeconomy: A Review of Their Design and Role in Innovation", "abstract": "ABSTRACT Contracts and ownership structures play a critical role in fostering innovation in the bioeconomy. However, identifying which designs best promote bioresource circularity and collaboration remains challenging, as existing studies use diverse frameworks and are often limited to specific contexts or regions. Therefore, we conducted a review to clarify the types of contracts and ownership structures within bio‐based value chains and evaluate their roles in fostering innovation. To this end, we followed PRISMA‐P guidelines when collecting studies and organised them based on methodologies to facilitate the synthesis. Using a framework of the ownership distribution along the value chain between primary producer and biorefinery, we categorise three main categories of ownership structures: vertical integration, individual ownership and joint ownership. Some literature argues that primary producers prefer low‐risk attributes and therefore shift much of the responsibility onto biorefineries. While such structures can encourage participation, they hinder innovation by concentrating power within the biorefinery. Joint ownership structures, such as cooperatives, emerge as promising alternatives, offering a more balanced and collaborative approach to sharing risks, costs and profits. Our findings highlight the need for future research to explore joint ownership structures and apply different methods to support substantial advancement.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-06-15", "url": "https://doi.org/10.1111/1467-8489.70124", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70124"}, {"source": "crossref", "source_id": "10.1111/agec.70127", "title": "The Role of Economic and Weather Conditions in Farmer Suicide in the United States", "abstract": "ABSTRACT Farmers commit suicide at high rates relative to the general population in the United States and elsewhere. Prior studies on farmer suicide have generally focused on socio‐demographic characteristics of individuals and on method of suicide, but few quantitative analyses have sought to understand the possible role of economic and climatic factors as determinants of suicide among farmers. This study addresses this void. We develop an economic model to show how poor economic outcomes or adverse weather conditions can reduce current‐period utility and diminish expectations of future utility through accumulation of debt and formation of expectations of future economic and climatic conditions, with suicide resulting in extreme cases. Our empirical analysis merges CDC nonpublic vital statistics, PRISM daily weather data, and USDA NASS crop and livestock price data into a county‐year panel to estimate the relationship between weather variables, economic factors, and farmer suicides. Results based upon a Poisson regression model show that long‐term, not transitory, poor economic conditions are associated with higher rates of farmer suicide. Extreme heat is also associated with increased farmer suicide, especially in counties most reliant upon animal agriculture. Precipitation appears to play little role in U.S. farmer suicide.", "journal": "Agricultural Economics", "published": "2026-06-12", "url": "https://doi.org/10.1111/agec.70127", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70127"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70127", "title": "Climate and Feeding Strategies: An Analysis of Productivity Growth in New Zealand Dairy", "abstract": "ABSTRACT Productivity growth is essential for securing the long‐term profitability and competitiveness of pasture‐based dairy systems, particularly amid volatile input and output prices and increasing environmental constraints. This paper measures productivity growth using a total factor productivity index (TFPI) tailored to the seasonal, pasture‐based nature of New Zealand dairy farming. We apply a proper‐index approach to enable meaningful comparisons across time and farms. The TFPI is decomposed into key components: technological progress, scale and input‐mix efficiency, technical efficiency, production environment and statistical noise. To account for climate‐related variability, we integrate pasture growth indices as proxies for pasture availability supporting milksolids (fat + protein) production. Between 2012/2013 and 2023/2024, productivity growth plateaued, with the TFPI declining by 1.33% (−0.09% per annum). While technological progress increased by 6.9%, this was offset by declines in scale‐and‐mix efficiency (−4.2%), technical efficiency (−0.63%) and production environment favourability (−1.68%). Moreover, technological progress has stagnated since 2015/2016, suggesting that recent innovations have not translated into measurable productivity gains. These findings underscore the need for a multifaceted response to reverse productivity decline and secure competitiveness: accelerating innovation, strengthening technology adoption and building environmental resilience.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-06-12", "url": "https://doi.org/10.1111/1467-8489.70127", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70127"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70125", "title": "Recommendations to Reform the National Electricity Market (\n                    <scp>NEM<\/scp>\n                    )", "abstract": "ABSTRACT Australia's National Electricity Market (NEM) was established in the late 1990s. The market is an energy only gross pool with zonal (state‐based) pricing. Over the past 15 years, the system has undergone a profound transformation as large coal‐fired power stations have retired and substantial volumes of large‐scale and embedded behind the meter variable renewables have been installed. In this context, Australian governments commissioned a review into the NEM by an expert panel (the ‘NEM Review’). This article provides a summary of the key findings of the Panel across three key timeframes: the short‐term market (spot market) is largely fit for purpose but ‘hidden participants’ are impeding efficient outcomes and there are increasing risks to be managed as the system becomes more weather dependant; the medium‐term derivative market, used to manage risk, requires urgent attention to ensure liquidity and price transparency facilitate efficient management of spot price risk; and a new long‐term integrated market mechanism designed to overcome the ‘tenor gap’ should be introduced to facilitate long‐term investment.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-06-12", "url": "https://doi.org/10.1111/1467-8489.70125", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70125"}, {"source": "crossref", "source_id": "10.1002/aepp.70096", "title": "Outsourcing Agricultural Services and Risk Reduction in Smallholder Rice Farming: Evidence From China and Global Implications", "abstract": "ABSTRACT Smallholder farmers in developing countries face the twin challenges of improving productivity and managing agricultural risks. One emerging response is outsourcing production tasks to specialized service providers. Using plot‐level data from rice farms in Jiangsu Province, China, and an endogenous treatment‐regression model, this study examines the effects of outsourcing on yields and production risks. Results show that outsourcing increases rice yields by nearly 3%, reduces yield volatility, and lowers the probability of crop failure. These benefits arise from greater access to mechanized services, the substitution of machinery for labor, and more efficient use of inputs. However, outcomes vary by type: machinery‐intensive outsourcing reduces risk, whereas labor‐intensive outsourcing can exacerbate it in weak service markets. Gains are greatest on larger and more fertile plots, underscoring the importance of policies that support mechanization and competitive service markets.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-06-12", "url": "https://doi.org/10.1002/aepp.70096", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70096"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70061", "title": "The Economic and Ecological Impact of Soy in Brazil: A Synthetic Control Method Approach", "abstract": "ABSTRACT In recent decades, soy expansion in Brazil has generated significant environmental, social and economic impacts. However, there is no consensus about benefits and drawbacks, calling for a more careful account of the economic and ecological diversity of the territories where this phenomenon has been unfolding. By acknowledging this diversity, we investigate the economic and ecological impacts of soy by applying a synthetic control method to longitudinal data (1990–2019) at state level. We focus on three indicators (GDP, CO 2 emissions and deforestation) and explore how these indicators vary in five states (Goiás, Paraná, Piauí, Rio Grande do Sul, Tocantins). These states differ in terms of underlying conditions and timing of soy expansion but have in common a significant contribution of soy to their GDP. From an environmental perspective, the states where soy consolidated its presence during the period considered (Goiás and Paraná) experienced a general improvement compared to their synthetic counterfactuals, especially in terms of deforestation, while a pioneer state in soy production such as Rio Grande do Sul saw a worsening in environmental indicators, especially right after the 2008 global financial crisis. This is also reflected in the impact of soy on GDP, which has been negative in this state, suggesting that it may have suffered from being a plantation economy, with soy subtracting resources from potentially more beneficial sectors. This geographical and temporal heterogeneity indicates that the economic and environmental impact of soy cannot be reduced to a single dominant trend. The outcome depends on the trade‐offs with other sectors, which is in turn linked to the level of economic development of the state when soy took off.", "journal": "Journal of Agricultural Economics", "published": "2026-06-11", "url": "https://doi.org/10.1111/1477-9552.70061", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70061"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70126", "title": "The Feasibility of Household Food Waste Reduction in Finland: Insights From Five Consumer Profiles", "abstract": "ABSTRACT We apply a household production framework to analyse how changes in cooking skills, waste‐abatement costs and wage rates influence the food waste behaviour of five consumer profiles in Finland. We find that achieving a given reduction in food waste through skill‐enhancing interventions induces larger behavioural adjustments than equivalent reductions in waste‐abatement costs. Higher wage rates, however, counteract efforts to decrease household food waste. Lowering abatement costs at the food preparation stage yields a greater overall reduction in waste than targeting the consumption stage. Our findings indicate that uniform, skill‐based interventions are unlikely to be sustainable without complementary structural support tailored to specific consumer groups. Accordingly, policy measures should combine skill development with targeted reductions in the costs of preventing food waste.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-06-11", "url": "https://doi.org/10.1111/1467-8489.70126", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70126"}, {"source": "crossref", "source_id": "10.1002/aepp.70095", "title": "Extreme Weather Events and Consumer Food Responses", "abstract": "ABSTRACT This study investigates consumer food responses to Hurricanes Helene and Milton, which affected a swath of the Southeastern U.S. in 2024. Using representative consumer survey data from six affected states, we analyze 10 distinct food responses classified into ex ante and ex post responses, and examine their associations with food insufficiency and diet quality. We find that ex ante food stockpiling is associated with a lower likelihood of food insufficiency and a higher diet quality score. Conversely, the ex post drop in food spending due to income loss is associated with a higher likelihood of food insufficiency and a lower diet quality score. We also examine heterogeneity in food responses across sociodemographic groups. Our results suggest that targeted support for families with children and low‐income households warrant consideration.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-06-11", "url": "https://doi.org/10.1002/aepp.70095", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70095"}, {"source": "crossref", "source_id": "10.1002/ajae.70083", "title": "The role of venture‐financed startups in innovation for US agriculture", "abstract": "Abstract To evaluate the role played by startup companies in the innovation ecosystem of US agriculture, we compile a unique dataset of 6024 new entrants founded 1987–2019 that details their financing lifecycles, annual economic performance, and patenting activities. One‐third of the firms in the sample have observable signs of contributing to innovation, including patenting and external financing such as grants and venture capital, thus characterizing them as startups. Such startups and their financing have grown substantially over the period studied. We use discrete‐time survival analysis to test factors related to firms receiving venture financing as well as to firms achieving successful financial exits. We find those firms that file for patents have higher likelihood of receiving financing than those that do not. Patent filings also increase the relative probability of a successful financial exit, which takes place primarily through mergers and acquisitions. In about a third of such exits, startups are acquired by corporate incumbents in agriculture well positioned to scale up and commercialize those startups' innovations for US agriculture. Importantly, a substantial portion of firms in the sample are still too young to have attained venture financing let alone a financial exit.", "journal": "American Journal of Agricultural Economics", "published": "2026-06-10", "url": "https://doi.org/10.1002/ajae.70083", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70083"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70062", "title": "An Economic and Environmental Analysis of Virtual Fencing for Precision Grazing", "abstract": "ABSTRACT The UK grazing livestock sector is challenged by declining farm profitability and stringent environmental policy. Innovative technologies such as virtual fencing could enable a balanced economic and environmental performance of beef production. Virtual fencing is a livestock management tool relying on invisible boundaries perceived as auditory, electrical, or vibrational cues emitted by devices worn by grazing animals. This analysis compares virtual and conventional fencing from an economic and environmental perspective using a multi‐objective linear programming model. Optimal livestock management scenarios are identified for two typical UK cattle grazing systems. In intensive lowland beef finishing, virtual fencing achieves the lowest economic performance and a beef carbon emission intensity comparable to electric fencing. In an extensive upland suckler cow system, virtual fencing enables ecological conservation and reduces beef carbon emission intensity but increases labour input compared to set stocking. This ex‐ante assessment illustrates how precision grazing technologies can be simultaneously evaluated against economic and environmental objectives. The results indicate that, under current cost structures, virtual fencing is unlikely to be competitive with electric fencing in intensive lowland beef finishing systems, where it delivers similar environmental outcomes at higher cost. In contrast, in upland suckler cow systems, virtual fencing can support habitat protection and reduce beef carbon emission intensity but remains constrained by capital and labour costs. These findings suggest that virtual fencing is unlikely to be widely adopted on purely commercial grounds but could play a targeted role in the delivery of publicly subsidised conservation programmes such as the UK's Environmental Land Management schemes.", "journal": "Journal of Agricultural Economics", "published": "2026-06-10", "url": "https://doi.org/10.1111/1477-9552.70062", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70062"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70120", "title": "Urban Agriculture Adoption, Diet Variety and Rural Support Among Urban Zimbabwe Households", "abstract": "ABSTRACT Increasing rates of urbanisation, high unemployment and the absence of social security in developing countries are putting pressure on urban households' diets, prompting some to advocate urban agriculture as a fallback. Because households voluntarily choose to engage in urban agriculture, it is important to account for the self‐selection inherent in practising urban agriculture when evaluating the efficacy of urban agriculture in cushioning urban households' diets. Accordingly, we estimate the effects of practising urban agriculture on household dietary diversity using the endogenous switching model with a count outcome (ESMC) based on four pooled annual cross‐section surveys of Zimbabwean households from 2019 to 2023. We employ propensity score matching (PSM) as a secondary robustness check, acknowledging that it addresses selection only on observed characteristics. We offer three major findings. First, large households, and households headed by women, older heads and those that are married and living together with their spouses are ceteris paribus more likely to practise urban agriculture. Second, practising urban agriculture increases the likelihood that urban households will have greater dietary diversity. Third, urban agriculture improves dietary diversity only for the sub‐population of households that do not receive support from rural relatives. The findings of this study confirm the potential role of urban agriculture in improving the food and nutrition security of urban households without support from relatives in rural areas in developing countries.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-06-09", "url": "https://doi.org/10.1111/1467-8489.70120", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70120"}, {"source": "crossref", "source_id": "10.1002/ajae.70081", "title": "Natural disaster and intergenerational occupational choice in agriculture: Evidence from the\n                    <scp>US<\/scp>\n                    Dust Bowl", "abstract": "Abstract This paper examines how a natural disaster, the Dust Bowl, shapes occupational choices in farm households across generations. Using full‐count US census data, I find that young adult sons shift away from self‐employed farming toward wage farm work and nonagricultural sectors after the Dust Bowl. Younger children with affected farming parents are more likely to leave agriculture and earn higher income. Migration and schooling serve as mechanisms, and New Deal relief spending mitigates the Dust Bowl's effects. Overall, the Dust Bowl accelerated occupational reallocation among younger children of farmers and contributed to US mid‐20th century structural change.", "journal": "American Journal of Agricultural Economics", "published": "2026-06-05", "url": "https://doi.org/10.1002/ajae.70081", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70081"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70118", "title": "The Impact of Income Subsidies on Maize Harvest Losses: Evidence From Chinese Farmers", "abstract": "ABSTRACT With the increasing risk of global food insecurity, countries have accelerated their efforts to reduce food loss and waste. Moreover, traditional agricultural policies, such as income subsidies, significantly impact farmers' behaviour and grain production and likely food losses. Based on survey data from 1885 maize growers in China, we measured maize harvest losses in China and empirically analysed the impact of income subsidies on such losses. The results showed that on average, 3.02% of the total maize amount was lost at the harvest stage, and the loss per unit area was 17.5 kg/mu (262.5 kg/ha). Income subsidies were significantly correlated with greater maize harvest losses, and this conclusion remained robust after potential endogeneity problems were resolved. A heterogeneity analysis revealed that the impact of income subsidies on maize harvest losses was significant for small‐scale farmers but not for large‐scale farmers. We suggest that the Chinese government should accelerate the transformation of agri‐food systems and the reform of income subsidy policies, which should encourage farmers to increase the scale of their operations, and these subsidies should be transformed into more targeted policies to meet the requirements for reducing food losses.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-06-05", "url": "https://doi.org/10.1111/1467-8489.70118", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70118"}, {"source": "crossref", "source_id": "10.1093/erae/jbag008", "title": "Costly regulation, minimal results: The EU’s deforestation regulation effect on global soy trade", "abstract": "Abstract The European Union Deforestation Regulation (EUDR) seeks to reduce deforestation by restricting market access to deforestation-embodied soy products in the EU market. The main concern is that such restrictions could shift the soy trade to unregulated non-EU markets. To shed light on this issue, we employ a gravity model, treating the EUDR compliance costs as additional trade costs for exports to the EU. We find that stricter compliance costs reallocate soy exports from South America toward non-EU markets, mainly China, divert the EU imports toward North America, and increase the prices of soy faced by EU soy users. Under the counterfactual scenario in which South America does not comply with the regulation, EU consumers face even larger price increases, while South American countries experience minimal terms-of-trade losses. Our analysis suggests that trade reallocation to an unregulated market could potentially dilute the impact of the EUDR, making it less effective in directly reducing deforestation linked to soy production.", "journal": "European Review of Agricultural Economics", "published": "2026-06-04", "url": "https://doi.org/10.1093/erae/jbag008", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbag008"}, {"source": "crossref", "source_id": "10.1093/erae/jbag011", "title": "The role of specialized knowledge and ‘know-how’ for firm productivity: Evidence from the equine sector", "abstract": "Abstract Using matched employer–employee data, we examine how workforce knowledge characteristics relate to firm productivity in the equine sector. Using panel data on Swedish equine firms from 2010 to 2022, we construct measures of workforce composition, including occupation-specific education, accumulated work experience and knowledge diversity. The results show that access to occupation-specific human capital is positively associated with productivity, with substantial heterogeneity across firms. Knowledge effects are stronger among firms specializing in horse racing than in breeding, highlighting differences in the role of human capital across production orientations. The findings have implications for policy and firms’ investment decisions.", "journal": "European Review of Agricultural Economics", "published": "2026-06-04", "url": "https://doi.org/10.1093/erae/jbag011", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbag011"}, {"source": "crossref", "source_id": "10.1111/agec.70124", "title": "Gamification as an Approach To Enhance Comprehension in Risk Elicitation: Experimental Evidence From Smallholder Farmers", "abstract": "ABSTRACT Understanding risk attitudes is critical for agricultural development, as risk is ubiquitous in the lives of smallholder farmers. Accurate elicitation of risk attitudes is essential to analyze patterns and biases in decision‐making. Ensuring comprehension and attention in risk elicitation tasks is particularly important, as inattentiveness generates noise rather than reliable results. Achieving this remains challenging, especially among smallholder farmers in the Global South, since many sophisticated risk elicitation methods require numerical skills that rural populations often lack due to limited education. To contribute to addressing this problem, we isolate the effects of illustration and gamification in risk elicitation tasks‐two elements that may increase attention and engagement, potentially producing lower inconsistencies and more reliable results. We empirically test the Wheel ‐task, an elicitation method designed to be easy to understand and engaging, to motivate participation. The task follows a wheel‐of‐fortune model, where a spin determines the payout, while participants can always choose between spinning the wheel and a safe payout. We compare the Wheel ‐task results to the well‐established Holt and Laury task (HL‐task) in its original form, as well as with probabilities illustrated using the wheel. We collected the data among smallholder coffee farmers from rural Colombia and Peru and in a pilot phase among smallholder farmers from rural Cambodia. We find low levels of comprehension across all three tasks. More specifically, we find no substantial difference in comprehension or levels of risk aversion when illustrating the probabilities in the HL‐task using a wheel. However, gamification affects levels of risk aversion, although these effects appear to be culturally dependent.", "journal": "Agricultural Economics", "published": "2026-06-04", "url": "https://doi.org/10.1111/agec.70124", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70124"}, {"source": "crossref", "source_id": "10.1002/aepp.70092", "title": "Issue Information", "abstract": "", "journal": "Applied Economic Perspectives and Policy", "published": "2026-06-04", "url": "https://doi.org/10.1002/aepp.70092", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70092"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70060", "title": "Fertilising Climate Policy: The Dual Impact of\n                    <scp>CBAM<\/scp>\n                    on\n                    <scp>EU<\/scp>\n                    Agricultural Emissions and Regional Disparities", "abstract": "ABSTRACT The Carbon Border Adjustment Mechanism (CBAM), scheduled to become fully operational in 2026, is designed to complement the EU Emissions Trading System (ETS) by replacing free emission allowances and preventing carbon leakage to non‐EU regions. CBAM initially covers energy‐intensive sectors, including mineral nitrogen (N) fertiliser production. Although mineral N fertiliser production is already included in the EU ETS, it is currently exempt from carbon charges owing to full compensation through free allowances. The phase‐out of these allowances and the introduction of CBAM are expected to increase the prices of both imported and domestically produced fertilisers, indirectly affecting the EU agricultural sector. This study quantitatively assesses the impacts of the expected fertiliser price changes on the EU agricultural sector and related environmental outcomes using the Modular Applied GeNeral Equilibrium Tool (MAGNET) and the Common Agricultural Policy Regionalised Impact (CAPRI) model. The results indicate that the combined effect of phasing out free allowances and implementing CBAM will double mineral N fertiliser prices. Higher prices are projected to reduce demand, leading to a 21.4% decline in domestic production and a 37% reduction in imports. Overall mineral N fertiliser use in the EU is expected to decrease by 22%, partially replaced by manure. Consequently, EU agricultural factor income is projected to fall by 7.7%, primarily affecting high‐input regions. Meanwhile, non‐EU agricultural income is projected to rise slightly by 0.05%, driven by higher exports. EU agricultural greenhouse gas emissions are expected to decrease by 22 megatons of CO 2 ‐equivalent, with no significant increase globally.", "journal": "Journal of Agricultural Economics", "published": "2026-06-03", "url": "https://doi.org/10.1111/1477-9552.70060", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70060"}, {"source": "crossref", "source_id": "10.1002/aepp.70094", "title": "How Video‐Based Information Affects Farmers' Willingness to Pay for Drone Services", "abstract": "ABSTRACT Professional service for digital technology like agricultural drones lowers transaction costs and scope thresholds for smallholders. Meanwhile, perceptual adoption barriers remain underexplored. We conduct a two‐stage choice experiment with a randomized video‐based information treatment among 384 Chinese crop farmers to measure its effect on farmers' willingness to pay (WTP) for agricultural drone services (ADS). While video‐based information significantly reduces farmers' WTP for contracts relative to oral agreements, it increases WTP for overall drone services among farmers who are younger, higher‐income, cultivate larger‐scale farms near tractor roads, have limited access to digital dissemination, and show lower risk preferences. By incorporating perceived uncertainty and risk management into the information‐adoption framework, we provide insights for policy support of digital agriculture service markets.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-06-03", "url": "https://doi.org/10.1002/aepp.70094", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70094"}, {"source": "crossref", "source_id": "10.1002/ajae.70082", "title": "Consequences of land retirement policies on agricultural labor and land tenure: Evidence from the historical Conservation Reserve Program in the United States", "abstract": "Abstract Voluntary agricultural land retirement programs are widely recognized for their environmental benefits, yet their economic effects, particularly on labor markets and land tenure, remain less understood. This paper examines the short‐ and long‐term impacts of the first large‐scale US land retirement initiative, the historical Conservation Reserve Program, introduced under the 1956 Set‐Aside Act. Between 1957 and 1960, the program enrolled more than 30 million acres under 3‐, 5‐, or 10‐year contracts, which then expired gradually through 1970. Using a newly digitized Conservation Reserve Program enrollment database linked to agricultural census data from the 1950s through the 1970s, we find that counties with medium and high enrollment intensity experienced statistically significant declines in tenant‐cultivated land relative to low‐enrollment counties during the program's active years. In medium‐enrollment counties, tenant‐operated land declined by roughly 0.6 percentage points, while high‐enrollment counties experienced declines of approximately 1.6 percentage points nationally. The proportion of tenant farm operators also fell in both medium‐ and high‐enrollment counties. These effects were larger and more persistent in the South, especially in counties with higher shares of nonwhite farm operators and sharecropping.", "journal": "American Journal of Agricultural Economics", "published": "2026-06-02", "url": "https://doi.org/10.1002/ajae.70082", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70082"}, {"source": "crossref", "source_id": "10.1093/erae/jbag004", "title": "Comparing the effects of regulating new genomic techniques on investment decisions in the European Union", "abstract": "Abstract We examine the economic impact of regulating new genomic techniques on investment decisions in the EU. Using a real options model, we compare five major regulatory options (nine including sub-options) with the status quo and analyse their effects on plant breeders’ investments. Using the current authorization process for genetically modified organisms for NGTs presents a high investment barrier for companies. The findings indicate that all alternative five options offer opportunities to reduce investment hurdles, depending on the design of the authorization process. Our model and its calibration serve as an example for further advancing the application of real options for regulatory policy analysis.", "journal": "European Review of Agricultural Economics", "published": "2026-06-02", "url": "https://doi.org/10.1093/erae/jbag004", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbag004"}, {"source": "crossref", "source_id": "10.1111/agec.70120", "title": "From Meat to Plant‐Based Products? The Enduring Impact of BSE on Beef Consumption", "abstract": "ABSTRACT This study reassesses the impact of the historical BSE outbreak on EU diets, showing that consumption patterns shifted persistently even after policy actions eliminated the food safety risk. Utilizing advanced difference‐in‐differences techniques on 1980–2020 data, we demonstrate that while beef consumption exhibited a transient U‐shaped recovery relative to other meats, it declined sharply compared to plant‐based products, with average reductions of 79%, 29%, and 28% for pulses, cereals, and vegetable oils, respectively. This highlights a structural dietary change, overlooked by previous analyses focused on meat substitution. Results are robust to sensitivity analyses. Understanding the primary drivers behind the structural shift in EU consumer diets over recent decades is crucial for future research investigating the reduction in red meat consumption driven by environmental and health concerns in high‐income countries.", "journal": "Agricultural Economics", "published": "2026-06-02", "url": "https://doi.org/10.1111/agec.70120", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70120"}, {"source": "crossref", "source_id": "10.1111/agec.70126", "title": "Land Consolidation, Tenure Documentation, and Land Rental Markets: Evidence from rural Vietnam", "abstract": "ABSTRACT Land fragmentation is widely recognized as a constraint on smallholder agriculture, raising production costs, limiting mechanization, and reducing efficiency. Land consolidation programs have been introduced in many countries to address this problem, yet their economic effects depend not only on plot reconfiguration but also on institutional implementation and land market functioning. This paper examines the impacts of Vietnam's state‐led land consolidation program using six waves of household panel data (2008–2018) from two provinces where consolidation was implemented. Impacts are estimated with two‐way fixed effects and a staggered difference‐in‐differences approach that accounts for heterogeneous adoption timing. The results show that the consolidation program substantially reduced land fragmentation: the number of plots per household fell by roughly three plots, average plot size increased by about 66 percent, and the distance between plots and homesteads declined by approximately 23 percent. At the same time, administrative delays in reissuing land‐use‐right certificates temporarily reduced the share of titled and collateral‐eligible land. While households’ overall access to credit is not adversely affected, land rental markets are significantly disrupted, with both rent‐in and rent‐out declining. Such reductions in land transactions may impede efficient land reallocation and operational scale adjustment, thereby delaying investment and productivity gains from improved land structure. Overall, the findings highlight the importance of institutional implementation and complementary market functioning for realizing the benefits of land consolidation in Vietnam and other smallholder economies.", "journal": "Agricultural Economics", "published": "2026-06-02", "url": "https://doi.org/10.1111/agec.70126", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70126"}, {"source": "crossref", "source_id": "10.1111/agec.70123", "title": "Farmland Liquidity Under a Tightened Ownership Regime: Urban–Rural Heterogeneity in South Korea", "abstract": "ABSTRACT In real estate markets featuring substantial search friction and strong seller loss aversion, external shocks that shift buyer valuations are largely reflected in liquidity fluctuations, while price adjustments tend to be rigid. This study examines market liquidity shifts following the tightening of South Korean farmland ownership regulations, utilizing the 2021 Farmland Act amendment and nationwide parcel‐level transaction data (2013−2023). We estimate the relationships between land liquidity, policy change, and key macro variables (i.e. interest rates) using a monthly county fixed‐effects model. We find that the amendment is significantly associated with a 10%−11% reduction in nationwide market liquidity, as measured by the turnover rate. This negative relationship is geographically heterogeneous, being more pronounced in rural areas while statistically insignificant in investment‐driven urban areas. Furthermore, our decomposition analysis reveals that the post‐enforcement drop in observed market liquidity is mostly associated with rising interest rates. The role of interest rates is more dominant in urbanized areas than rural ones, reflecting the higher concentration of investment‐driven buyers and substantial capital requirements for land acquisition in these regions. Our findings demonstrate that the market response to ownership regulation is strongly mediated by local market conditions, highlighting the challenges of enforcing stringent policies in areas with high investment potential.", "journal": "Agricultural Economics", "published": "2026-06-02", "url": "https://doi.org/10.1111/agec.70123", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70123"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103107", "title": "Viewpoint: evaluating transparency and market consequences of the national bioengineered food disclosure standard in the United States", "abstract": "", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103107", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103107"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103089", "title": "Seasonality of employment and food security in rural sub-Saharan Africa", "abstract": "", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103089", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103089"}, {"source": "crossref", "source_id": "10.1016/s0306-9192(26)00093-x", "title": "Editorial Board", "abstract": "", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/s0306-9192(26)00093-x", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/s0306-9192(26)00093-x"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103110", "title": "Does school lunch equalize? An examination of dietary quality and socioeconomic disparities in Germany", "abstract": "", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103110", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103110"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103090", "title": "A critical review of EU agri-food policy impacts", "abstract": "", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103090", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103090"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103085", "title": "Cost and affordability of recommended diets in Rwanda using [near] real-time market data", "abstract": "", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103085", "fetched_at": "202
