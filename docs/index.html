"id": "crossref:10.1016/j.foodpol.2026.103070"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103078", "title": "Rethinking food self-sufficiency through cultural and social capital", "abstract": "", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103078", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103078"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103056", "title": "Information exposure and economic losses during food safety outbreaks: Evidence from onion markets and Google Trends", "abstract": "", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103056", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103056"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103053", "title": "Recent approaches in agricultural production economics: Where the heck are the prices?", "abstract": "", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103053", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103053"}, {"source": "crossref", "source_id": "10.1111/ajae.v108.3", "title": "", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-05-01", "url": "https://doi.org/10.1111/ajae.v108.3", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/ajae.v108.3"}, {"source": "crossref", "source_id": "10.1111/agec.v57.3", "title": "", "abstract": "", "journal": "Agricultural Economics", "published": "2026-05-01", "url": "https://doi.org/10.1111/agec.v57.3", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.v57.3"}, {"source": "crossref", "source_id": "10.1002/aepp.v48.2", "title": "", "abstract": "", "journal": "Applied Economic Perspectives and Policy", "published": "2026-05-01", "url": "https://doi.org/10.1002/aepp.v48.2", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.v48.2"}, {"source": "crossref", "source_id": "10.1002/ajae.70074", "title": "From certification to agglomeration: Evidence from geographical indications of agricultural products in China", "abstract": "Abstract Marshallian agglomeration is typically attributed to input–output linkages, labor market pooling, and knowledge spillovers; however, empirical evidence on how these mechanisms operate in agricultural settings remains limited. This paper examines whether and how China's agricultural geographical indications certification fosters agricultural agglomeration. Exploiting the staggered rollout of this certification system since 2008 as a quasi‐natural experiment, we employ a staggered difference‐in‐differences design and find that certification significantly promotes county‐level agricultural agglomeration, primarily through strengthened input–output linkages: it encourages the colocation of upstream producers and downstream processors and deepens local production networks. In contrast, we find no significant effects through labor market pooling or knowledge spillovers. The agglomeration effects are concentrated in plant‐based certifications and are stronger in counties with better market access and transportation infrastructure. Overall, our findings extend Marshallian agglomeration theory to agriculture and provide new causal evidence on how agricultural geographical indications certification contributes to agricultural agglomeration as part of broader sectoral structural transformation.", "journal": "American Journal of Agricultural Economics", "published": "2026-04-30", "url": "https://doi.org/10.1002/ajae.70074", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70074"}, {"source": "crossref", "source_id": "10.1002/ajae.70073", "title": "Choice experiments on land managers' participation in environmental programs: A systematic review and meta‐analysis of estimate validity", "abstract": "Abstract Discrete choice experiments are increasingly being used to estimate land managers' willingness to accept participation in incentive‐based environmental programs. This is a specific application of discrete choice experiments: the estimation of willingness to accept for a private good (program participation) where respondents have to make trade‐offs between payments and the business costs required to improve the provision of the (environmental) public good targeted by the program. Previous reviews fail to provide methodological insights into the use of discrete choice experiments in this valuation context. In this study, we conduct a review of 80 studies (containing up to 93 sample‐based observations) published in the Web of Science Core Collection, all of which apply discrete choice experiments to examine land managers' (farmers' and foresters') willingness to accept for participating in incentive‐based environmental programs. Based on this systematic review, we report quantitative information on key features regarding policy settings, experiment design and implementation, and willingness to accept results. We conclude that many of the analyzed studies do not follow best practices for discrete choice experiments in particular and stated preference methods in general. We also use a construct validity indicator to assess whether willingness to accept estimates align with expectations about land managers' utility. The results from the meta‐analysis show that special care should be taken in applications that focus on Africa, include contract design attributes, and use in‐person surveys, among other features. Recommendations are provided to enable practitioners to obtain more accurate welfare estimates for better policy‐making support.", "journal": "American Journal of Agricultural Economics", "published": "2026-04-30", "url": "https://doi.org/10.1002/ajae.70073", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70073"}, {"source": "crossref", "source_id": "10.1111/agec.70118", "title": "Issue Information", "abstract": "", "journal": "Agricultural Economics", "published": "2026-04-30", "url": "https://doi.org/10.1111/agec.70118", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70118"}, {"source": "crossref", "source_id": "10.1002/aepp.70076", "title": "Measuring Nutrition Security Using the Consumer Food Data System Datasets", "abstract": "ABSTRACT Nutrition security is an emerging concept lacking a consensus definition, conceptualization, or standardized measure. This perspectives manuscript synthesizes findings from two previously published analyses to assess the feasibility of using available measures of key dimensions of nutrition security from two Consumer Food Data System (CFDS) datasets: the 2012–2013 National Household Food Acquisition and Purchase Survey (FoodAPS) and the 2007–2018 National Health and Nutrition Examination Survey/Flexible Consumer Behavior Survey (NHANES/FCBS), in deriving a measure of nutrition security aligned with the U. S. Department of Agriculture's definition. This study highlights methodological considerations, strengths and limitations of the two datasets for developing nutrition security metrics, and informs future research on standardized measurement for national nutrition monitoring.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-29", "url": "https://doi.org/10.1002/aepp.70076", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70076"}, {"source": "crossref", "source_id": "10.1002/aepp.70072", "title": "The Role of Social Food Infrastructure in Addressing\n                    <scp>SNAP<\/scp>\n                    Participation Gaps: Evidence From Linked Administrative and Ground‐Sourced Data", "abstract": "ABSTRACT We link American Community Survey and SNAP records for 185,000 units with ground‐sourced social food infrastructure data from FindFoodIL (Illinois Extension SNAP‐Ed) to examine SNAP participation determinants among eligible units. Bivariate probit models reveal, beyond SNAP offices, quantity of social infrastructure is associated with participation: each additional senior program is associated with 5.89 percentage points (pp) higher participation probability, school/summer meal sites with 3.84 pp, and food pantries with 2.94 pp, potentially through trust, repeated contact, and navigation assistance. This first macro‐level quantitative evidence shows policymakers that embedding enrollment assistance within institutions already serving eligible families—schools, senior centers, food pantries—is associated with reduced SNAP participation gaps. JEL Classification: I38, Q18, R23, R58", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-28", "url": "https://doi.org/10.1002/aepp.70072", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70072"}, {"source": "crossref", "source_id": "10.1002/aepp.70074", "title": "Consumer Health Perceptions of Cows' Milk and Plant‐Based Milk Alternatives", "abstract": "ABSTRACT This study used a best‐worst scale experiment to reveal consumers' beliefs about the healthiness of selected cows' milk and plant‐based milk products based on their nutrition panels. We find that while there is heterogeneity in health perceptions, consumers overwhelmingly select skim milk as the healthiest milk product. Additionally, the cows' milk nutrition panels are typically ranked healthier than the plant‐based milk products. Finally, we also conducted an additional intent‐to‐purchase experiment and find that there are significant differences in the preference shares of healthiness perceptions and intent to purchase, meaning that consumers consider more than just health in their purchase decisions.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-28", "url": "https://doi.org/10.1002/aepp.70074", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70074"}, {"source": "crossref", "source_id": "10.1111/agec.70112", "title": "Drought and Fruit and Vegetables Production in California", "abstract": "ABSTRACT California's increasingly frequent and intense droughts are a pressing problem for the state's agriculture and the US food supply. California supplies more than half of all fruit and vegetables produced in the United States. This paper quantifies the severity of the problem by estimating the impacts of the drought on California's fresh fruit and vegetable production. We estimate panel‐data models using comprehensive, county‐level agricultural, irrigation, and weather data from 2000 to 2019. We find that droughts significantly reduce total output by 1.2% to 2.2% for each additional week of drought. The estimated effect is driven by lower yields and fewer harvested acres. Drought effects differ among crops, with thirsty crops and crops with lower economic returns and established insurance programs being disproportionately affected. Results also show the extent to which higher irrigation levels mitigate the adverse effects of drought. Our findings provide insights into the importance of enhancing drought‐related risk management and implications for designing cost‐effective policies for future adaptation decisions.", "journal": "Agricultural Economics", "published": "2026-04-27", "url": "https://doi.org/10.1111/agec.70112", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70112"}, {"source": "crossref", "source_id": "10.1002/aepp.70077", "title": "Labeling Quality or Quantity? The Differential Impact of Geographical Indications on Export Performance in Turkish Agri‐Food Products", "abstract": "ABSTRACT This study investigates the impact of geographical indication (GI) certification on the export performance of Turkish agri‐food products by analyzing both trade volume and unit value dynamics. Drawing on monthly data from 2000 to 2024 across 22 GI‐certified products, the research employs product‐level regressions, fixed‐effects panel models with trait interactions, and Difference‐in‐Differences estimation with Goodman–Bacon decomposition. The results provide robust evidence that GI certification significantly improves export performance, with certified products showing substantial increases in both export volumes and unit prices. However, the effects are strongly heterogeneous across product types. The benefits in export volumes are concentrated in goods with high quality observability and product differentiation, while commoditized and storable products exhibit limited or even negative price responses. Furthermore, the study reveals that GI‐labeled products demonstrate greater trade resilience during external shocks, such as the COVID‐19 pandemic, by preserving price premiums despite temporary drops in export volume. These findings underscore that the effectiveness of GI schemes is contingent on product characteristics and market structures. The study contributes to the literature by offering a trait‐based explanation of origin‐labeling outcomes and provides strategic policy insights for enhancing GI effectiveness in emerging economies.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-27", "url": "https://doi.org/10.1002/aepp.70077", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70077"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70039", "title": "Farmers' Beliefs About Climate Action: Evidence From an Information Experiment", "abstract": "ABSTRACT Farmers' adoption of climate change mitigation practices is crucial for reducing greenhouse gas (GHG) emissions from food production. One major source of these emissions is chemical fertilizer application. Introducing clover into grassland can mitigate emissions by reducing the need for chemical fertilizers. In this study, we conduct an information experiment with over 300 Irish dairy farmers to examine how information impacts their beliefs about clover adoption, and how this in turn influences subsequent intentions. Methodologically, we contribute to the literature by combining qualitative (i.e., open‐ended questions) and quantitative (i.e., point estimates) belief elicitation measures in our experimental design. This approach provides more detailed insights into farmers' beliefs, as it captures top‐of‐mind concerns without priming responses. Our qualitative belief elicitation reveals that after exposure to the information treatments, while most farmers did not change their opinions, some shifted from concerns such as ‘ bloat ’ and ‘ difficult ’ to terms like ‘ reduction ’ and ‘ possible ’. Our quantitative measures show that farmers underestimated clover's potential to reduce chemical fertilizer use. This finding is key for policymakers, as similar underestimations may apply to other GHG mitigation practices. Importantly, we provide causal evidence that information could reduce misperceptions. This highlights the need for strategies that positively shift beliefs to encourage more widespread uptake of climate change mitigation practices. Nonetheless, there was no meaningful impact of the updated beliefs on intentions, which underlines the complexity of adoption decisions.", "journal": "Journal of Agricultural Economics", "published": "2026-04-26", "url": "https://doi.org/10.1111/1477-9552.70039", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70039"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70046", "title": "Market Integration and Nonlinear Price Transmission in 19th‐Century British Wheat Markets", "abstract": "ABSTRACT Important developments in infrastructure and institutions characterized 19th‐Century wheat markets in Great Britain. Among these developments was the construction of the national rail system which enabled cheaper and more efficient transport of grain and other bulky cargoes between inland towns and ports. We consider the degree to which wheat markets in twelve British cities were spatially integrated over the nineteenth century by applying conventional threshold models and semi‐nonparametric (generalized additive) models of spatial price linkages. Although results concerning market integration are qualitatively similar, the semi‐nonparametric models capture important nonlinearities that may be missed by conventional threshold models. Both approaches support a high degree of integration among the spatially distinct markets. We then consider two sub‐samples from 1800–1840 and 1870–1913 to capture price transmission before and after the repeal of the Corn Laws, the development of the railway system, the improvement of steam engines for ocean transport, and the introduction of the telegraph system. The nonlinear models suggest faster equilibration in response to large shocks and tighter transaction cost bands in the second period.", "journal": "Journal of Agricultural Economics", "published": "2026-04-26", "url": "https://doi.org/10.1111/1477-9552.70046", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70046"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70045", "title": "Preferences for Sustainable Production Practices in Extensive Livestock Systems in Uruguay", "abstract": "ABSTRACT We use a discrete choice experiment along with behavioral measures of risk and time preferences to analyze the preferences of Uruguayan cattle producers for three types of sustainable livestock practices: improved grazing systems, sustainable livestock management, and silvopastoral approaches. The results indicate that, on average, producers favor sustainable intensification, are indifferent to improved grazing practices, and require monetary compensation to adopt silvopastoral systems. A latent class model reveals significant preference heterogeneity, identifying two distinct producer profiles: one inclined to adopt the proposed practices and another that requires stronger incentives. These findings underscore the importance of designing differentiated policy instruments tailored to the characteristics and motivations of diverse producer types.", "journal": "Journal of Agricultural Economics", "published": "2026-04-26", "url": "https://doi.org/10.1111/1477-9552.70045", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70045"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70048", "title": "Trading Blows, Losing Bushels: Global Implications of US Tariff Hikes for Agri‐Food Trade and Welfare", "abstract": "ABSTRACT Recent trade policy developments have renewed concerns about the vulnerability of agri‐food markets to tariff increases. This paper quantifies the effects of 2025 US tariff hikes and potential tit‐for‐tat retaliation on agri‐food trade, prices, output, and welfare. We employ a sectoral general‐equilibrium gravity model covering 46 agri‐food industries on a 2023 baseline. The framework combines product‐level trade elasticities with sector‐specific supply elasticities based on input‐cost shares, providing a transparent mapping from tariffs to equilibrium outcomes. We simulate the April 2, 2025 (‘Liberation Day’) tariff schedule and the July 31, 2025 revisions, each with and without symmetric retaliation by all trading partners. Without retaliation, US agri‐food exports fall by 22%–25%, output declines by about 3%, the price index rises by 6.8%–7.2%, and welfare falls by 4.4%–4.9%. With retaliation, export losses deepen to 37%–43%, output drops by 4%–5%, the price index rises by 2%–5%, and welfare declines by 6.9%–7.9%. Welfare losses are highly asymmetric: Canada and Mexico experience the largest additional losses under retaliation, reflecting integrated North American supply chains, while contractions are concentrated in processed meats, soybeans, corn, and selected food products. Retaliation amplifies global welfare losses rather than offsetting them, suggesting that cooperative policy restraint yields smaller welfare costs for the United States and its major trading partners.", "journal": "Journal of Agricultural Economics", "published": "2026-04-26", "url": "https://doi.org/10.1111/1477-9552.70048", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70048"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70034", "title": "Collective Contracts as a Risk‐Sharing Mechanism for Result‐Based Agri‐Environmental Payments: Experimental Evidence", "abstract": "ABSTRACT Linking payments from agri‐environment schemes to ecological results or to collective outcomes is viewed as a promising way to increase the effectiveness of agri‐environmental conservation. However, the two approaches are rarely combined. In this study, we test the performance of result‐based payments with collective contracts in a contextualised economic experiment with 540 non‐agricultural and agricultural students in Germany. Combining result‐based payments with collective contracts may hold potential by allowing farmers to share the risks associated with result‐based payments within a group. A downside of collective contracts, however, is the creation of a social dilemma, as individual payments depend on group outcomes. We find no evidence of differences in conservation levels under result‐based payments with collective as compared to individual contracts, suggesting that risk‐sharing benefits and effects of the social dilemma offset each other. We further examine the performance of collective contracts for varying risk levels that could, for example, reflect different geological and climatic conditions across Europe. Result‐based payments with collective contracts motivate higher conservation efforts in our experiment when external risks are high. Further, high risks appear to foster group cooperation under collective contracts, potentially leading to more equitable and predictable outcomes.", "journal": "Journal of Agricultural Economics", "published": "2026-04-26", "url": "https://doi.org/10.1111/1477-9552.70034", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70034"}, {"source": "crossref", "source_id": "10.1111/agec.70114", "title": "Policy Schemes for More Sustainable Dairy Farming: The Role of Financial Instruments and Policy Implementation Modes", "abstract": "ABSTRACT Dairy farming is faced with environmental, social and economic sustainability challenges, which call for the uptake of more sustainable farming practices. Policy schemes involving public and private sectors can support the uptake of more sustainable farming practices through the provision of incentives to farmers if designed appropriately. However, empirical research in designing such policy schemes is scarce. This paper examines dairy farmers’ preferences for policy attributes in environmental compensation schemes for more grass‐based feeding systems. Using data from a discrete choice experiment in Sweden and a hybrid latent class model, we find that while size of financial compensation matters, farmers’ likelihood of participation in grass‐based feeding schemes is also driven by how the financial compensation is designed and by non‐financial attributes of the policy schemes. Notably, we find three distinct groups of farmers who differ in their likelihood of participating and exhibit heterogeneous preferences for schemes with private versus public sector‐led implementation mode, and direct subsidy payment versus consumer price premium and tax relief. Furthermore, findings demonstrate that behavioral factors, including farmer attitudes toward different forms of compensation and risk aversion, partly explain the observed heterogeneous preferences. Overall, our findings highlight the need to accommodate preference heterogeneity in policy design to improve participation, especially in settings where the transition to more grass‐based feeding is challenging for farmers.", "journal": "Agricultural Economics", "published": "2026-04-26", "url": "https://doi.org/10.1111/agec.70114", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70114"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70115", "title": "Economic and Land Use Impacts of Synthetic Dairy Production on a Dairy‐Intensive Economy: New Technology Moo‐ving In", "abstract": "ABSTRACT Synthetic dairy products are promoted as an environmentally sustainable alternative to conventional dairy goods. This paper examines the potential economic, employment and land use impacts of large‐scale synthetic dairy production on Aotearoa New Zealand—the world's leading dairy exporter. Using a global, economy‐wide model, we simulate a case in which synthetic dairy products are cost‐competitive with conventional dairy products. Our results show that, under this scenario, New Zealand's GDP would decline by 0.5%–0.7%, and national welfare would fall by 1.2%–1.5%, with significant employment impacts on dairy‐related and other sectors. The reallocation of dairy land to other uses offers limited mitigation, as global shifts in production depress the prices of other agricultural commodities. Moreover, policies aimed at preserving dairy employment are costly. These findings suggest that, if synthetic dairy products are produced at scale, policy should prioritise adaptation strategies—such as retraining and skills development—to support workers and landowners in adjusting to the resulting changes.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-25", "url": "https://doi.org/10.1111/1467-8489.70115", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70115"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_1/_article/-char/ja/", "title": "会長挨拶「現代社会の情報環境と研究活動」", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_1/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_1/_article/-c /-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_72/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_73/_article/-char/ja/", "title": "農業の共通価値創造（CSV）に向けたステークホルダーの役割と課題", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_73/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_73/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_75/_article/-char/ja/", "title": "新たな農業経営モデルとしての営農型太陽光発電導入の可能性", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_75/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_75/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_76/_article/-char/ja/", "title": "変革期の農業法人を支える事業再生と企業価値評価", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_76/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_76/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_77/_article/-char/ja/", "title": "ゲノム情報・デジタル技術利用による持続的酪農生産システム構築に関する国際比較", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_77/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_77/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_78/_article/-char/ja/", "title": "脱炭素型農業実現のための温暖化緩和技術の社会実装に向けた課題", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_78/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_78/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_79/_article/-char/ja/", "title": "吉田真悟・田井政晴　著『企業価値評価と農業法人―持続可能性による価値創造―』", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_79/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_79/_article/-char/ja/"}, {"source": "crossref", "source_id": "10.1002/ajae.70075", "title": "Correction to “Farmers' Pro‐Social Motivations and Willingness‐To‐Accept in Markets with Public Goods”", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-04-24", "url": "https://doi.org/10.1002/ajae.70075", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70075"}, {"source": "crossref", "source_id": "10.1002/aepp.70075", "title": "Do Tax Incentives for Farmland Leases Increase Farm Supply? Evidence From Iowa's Beginning Farmer Tax Credit", "abstract": "ABSTRACT In recent decades, agriculture has become increasingly concentrated through horizontal mergers and acquisitions via corporate entities, and policy makers are concerned this will be exacerbated by the aging population of farm operators. To reduce market concentration in agriculture, many states have enacted policies to entice new prospective entrepreneurs into farming. Among these are tax credits for existing farm owners who lease or sell farmland to “beginning farmers.” These subsidies aim to compensate the lessor for the additional risk associated with leasing land to a new farming enterprise. This paper investigates the effect of Iowa's Beginning Farmer Tax Credit program on land leased to farmers, farm operators' average age, and various metrics of non‐corporate farm operations. Our point estimates suggest very small effects of the program on Iowa's prevailing farm trajectories with a budgetary cost of more than $100,000 per added independent farm.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-24", "url": "https://doi.org/10.1002/aepp.70075", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70075"}, {"source": "crossref", "source_id": "10.1111/agec.70110", "title": "Efficiency of Spatial Subsidies Under Information Constraints: A Case Study", "abstract": "ABSTRACT This study compares the efficiency of homogeneous versus spatially heterogeneous subsidies in developing agricultural plans compatible with bird sustainability. Using the plains of Lleida as a case study—where incentives for agricultural intensification threaten a bird community‐we employ a spatially explicit model that simulates crop yields linked to a habitat suitability index for each species. Within this framework, we model subsidies to evaluate their impact on biodiversity conservation, farmer acceptance, required budget, and agricultural economic profitability. We also address incomplete information by relaxing the assumption that the regulator knows real opportunity costs and instead estimate them via sampling methods. Results show that a conservation‐focused homogeneous subsidy is significantly less efficient than a heterogeneous one. Heterogeneous subsidies differentiate between farmers' agricultural potential, enabling conservation goals to be met with lower budgets. Moreover, a development‐oriented heterogeneous scheme—which maximizes total agricultural profits while ensuring bird sustainability—can be even more effective, reducing implementation costs and promoting agricultural economic growth. However, incomplete information leads to suboptimal decisions, lowering total profits and causing losses for misidentified farmers who may require additional compensation. While heterogeneous subsidies remain budget‐efficient under incomplete information, achieving full farmer participation requires higher payments. This reduces their efficiency advantage, but heterogeneous subsidies still represent the more efficient option.", "journal": "Agricultural Economics", "published": "2026-04-23", "url": "https://doi.org/10.1111/agec.70110", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70110"}, {"source": "crossref", "source_id": "10.1002/aepp.70073", "title": "Ban Glyphosate—Does It Affect the Swedish Farmers' Willingness to Grow Cover Crops?", "abstract": "ABSTRACT The cultivation of cover crops is one of the new Eco‐scheme practices introduced in Sweden. This study examines how the design of policy attributes of these schemes influences farmers' willingness to grow cover crops on arable land, with particular focus on the potential impact of a glyphosate ban. A discrete choice experiment was conducted with Swedish crop farmers ( N = 875), considering three policy attributes (commitment duration, maximum allowable percentage of mixed legume plants, and subsidy payment levels), two alternatives (permission to sell or utilize cover crop biomass versus restrictions), and one treatment condition (glyphosate ban). A Latent Class Logit Model was employed to explore heterogeneity in farmers' willingness to grow cover crops. The analysis identified three distinct farmer groups: 29% are unlikely to grow cover crops regardless of policy attribute design, 41% are predisposed to adoption irrespective of policy attributes, and 30% are influenced by subsidy payment scheme design. For the latter group, a glyphosate ban should reduce their willingness to grow cover crops. These findings offer valuable insights for enhancing flexibility in Eco‐scheme management prescriptions for promoting greater farmer participation, such as easing the restriction on the maximum number of legume plants in cover crops and permitting farmers to sell or utilize cover crops.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-23", "url": "https://doi.org/10.1002/aepp.70073", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70073"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70112", "title": "Emission Reporting for Agriculture: Frameworks and Metrics Matter", "abstract": "ABSTRACT Frameworks and metrics that reliably describe agricultural emission sources and carbon sinks are critical to the formulation of cost‐effective mitigation investment. This study identifies and compares three distinct emission reporting frameworks across metrics of total emissions and emissions intensity. The frameworks and metrics are applied to agricultural industries in Western Australia. Findings for 2005 and 2023 and the trends and uncertainties over the intervening period are reported. This study novelly considers a framework that includes emissions and sequestration from land use, land use change and forestry (LULUCF) activities at an industry scale. Most of Western Australia's agricultural emissions occur in the beef, sheep and grains industries, which also dominate agricultural land use. The emissions intensity of the grains industry in particular is highly sensitive to the inclusion of LULUCF activities. While large uncertainties surround emissions and sequestration from LULUCF activities, there are indications that the effect of LULUCF on emissions has changed considerably over time. We conclude it is preferable not to rely solely on one framework or one reporting metric. We highlight that more research is needed to lessen uncertainties surrounding LULUCF activities by agricultural industries.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-21", "url": "https://doi.org/10.1111/1467-8489.70112", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70112"}, {"source": "crossref", "source_id": "10.1002/aepp.70071", "title": "Biofuel Growth: The Unintended Effects of the Ethanol Boom on Farmland Values", "abstract": "ABSTRACT This paper provides the first causal estimates of the impact of the U.S. ethanol boom on farmland values in the Midwest. Using county‐level data from the Census of Agriculture (1997–2022) and a difference‐in‐differences strategy that exploits variation in soil productivity, we find that farmland values in high corn‐suitability counties increased by $1147 per acre after 2005, equivalent to a 44% gain relative to pre‐ethanol boom levels. The effects are even larger in the most productive counties, where land values more than doubled. We also identify two reinforcing mechanisms: a short‐run response to higher corn prices and a longer‐run increase in farmland demand. These findings highlight how large‐scale energy policies can reshape rural land markets in ways that extend well beyond their intended objectives. JEL Classifications: Q11, Q24, Q28", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-21", "url": "https://doi.org/10.1002/aepp.70071", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70071"}, {"source": "crossref", "source_id": "10.1111/agec.70111", "title": "Driver's License Reform and the Labor Supply and Benefit Access of Undocumented Farm Workers", "abstract": "ABSTRACT This study investigates the impact of granting driver's licenses to undocumented immigrants on their labor market outcomes and employers' use of benefits as mechanisms to retain workers. First, using data from the American Community Survey, we document an increase in the probability of working in agriculture for likely undocumented workers in states that passed driver's license legislation. Then, by utilizing the restricted version of the National Agricultural Workers Survey, we specifically analyze changes in working hours and wages for undocumented farm workers following the implementation of the policy. We find significant increases in hours and days worked on‐farm, higher wages, especially for low‐skilled workers, and a greater likelihood of employers providing private benefits for undocumented farm workers. Farms also experience increased output in states granting driver's licenses to undocumented workers. Additionally, we also find a lower probability of participating in Supplemental Nutritional Assistance Program benefits after driver's license legislation. These findings suggest that policies enabling driving privileges for undocumented workers not only enhance labor market outcomes but also incentivize labor supply.", "journal": "Agricultural Economics", "published": "2026-04-20", "url": "https://doi.org/10.1111/agec.70111", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70111"}, {"source": "crossref", "source_id": "10.1111/agec.70113", "title": "Village E‐Commerce Penetration and Agricultural Enterprise Growth: Evidence From China", "abstract": "ABSTRACT E‐commerce is increasingly becoming a mainstream model for business development worldwide. Utilizing comprehensive business registration data and accounting data for agricultural enterprises in China, we take China's National Rural E‐commerce Comprehensive Demonstration Policy as a quasi‐natural experiment to investigate the effects of e‐commerce penetration in villages on agricultural enterprise growth and the underlying mechanisms. We find that e‐commerce penetration in villages significantly boosts the number of agricultural enterprises, a result that remains robust across various checks. Further analysis indicates that e‐commerce penetration in villages also enhances the economic performance of agricultural enterprises and fosters their innovation activities. Mechanism analysis reveals that e‐commerce penetration boosts agricultural enterprise growth by enhancing the entrepreneurial ecosystem, as evidenced by broadening sales channels for agricultural products, enriching agricultural inputs, and expanding financial access. This study offers valuable insights for China and other developing countries on leveraging e‐commerce to promote agricultural enterprise growth.", "journal": "Agricultural Economics", "published": "2026-04-20", "url": "https://doi.org/10.1111/agec.70113", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70113"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70102", "title": "Awareness–Action and Policy Acceptability in Mitigating Greenhouse Gas Emissions: Key Stakeholders in Germany's Cattle Dairy and Meat Chains", "abstract": "ABSTRACT This paper presents a systematic literature review and targeted searches to define a synthesis framework mapping the awareness–action gap, progression along the awareness–action continuum and policy acceptability in greenhouse gas (GHG) emissions mitigation among key stakeholders in Germany's cattle dairy and meat chains. The awareness–action gap results from barriers that prevent stakeholders from translating climate awareness into action, whereas progression reflects how far different stakeholder groups have advanced from awareness to action. Previous studies often focus on single stakeholder groups, individual policies or general national trends, but seldom examine how different stakeholders stagnate or progress from awareness to action or how policy acceptability can support this transition. Our synthesis framework integrates concepts and indicators from behavioural economics, social psychology and environmental policy to address these issues. We find strong disparities in four stakeholder groups regarding barriers to act. Producers face misaligned incentives and resource constraints. Consumers are hindered by cultural norms and weak market signals. Regulators struggle with fragmented policies and political hesitancy. Finally, influencers, which we define as entities such as media and think tanks that boost public discourse, amplify inconsistent narratives that impede coordinated action. We also assess the acceptability of 20 GHG mitigation policies for producers and consumers. For meat taxation, we analyse acceptability for two additional stakeholders: policymakers and social organisations. Three structural factors constrain policy uptake: fragmented stakeholder preferences, a lack of enforceable mechanisms for mid‐chain actors and weak institutional pathways to translate preferences into regulation. While some policies have higher acceptability, debated measures such as meat taxation still face low support across stakeholders. This illustrates how framing, layered atop structural constraints, ultimately shapes whether acceptability translates into implementation.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-16", "url": "https://doi.org/10.1111/1467-8489.70102", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70102"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70044", "title": "How Changing Food Preferences and Technology Are Transforming Food Markets", "abstract": "ABSTRACT The foods that consumers purchase and how they purchase food are changing over time. In this article, we discuss how health prioritization and environmental concerns, combined with new technologies, are changing consumers' food preferences and retail choices. Wellness trends have increased attention to functional attributes and specific nutrients such as protein, while intensifying scrutiny of ultra‐processed foods. Adoption of personalized technologies, including prescription medications, wearable devices and diet‐tracking apps, may alter the volume and composition of food consumed. Many consumers are also willing to pay a premium for sustainability claims, but may conflate environmental standards and healthfulness, which raises questions about credibility and effective labeling design. All of these considerations may be impacted by affordability concerns following a period of supply‐chain disruptions and disease outbreaks since 2020, causing food price inflation. This, combined with increasing income inequality, has resulted in a bifurcation of demand between value and premium consumer segments. Preferences are further separated by the channel consumers use to purchase food, as many households still purchase groceries online and order meals for delivery after the COVID‐19 pandemic. The availability of highly detailed consumer purchasing and health data allows for compelling future research on the causal relationships that arise from these trends, which will continue to shape the global food environment.", "journal": "Journal of Agricultural Economics", "published": "2026-04-15", "url": "https://doi.org/10.1111/1477-9552.70044", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70044"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70040", "title": "Small Seed Packs, Big Potential? Effect of Seed Packs on Knowledge and Adoption of Improved Crop Varieties", "abstract": "ABSTRACT Small seed packs for demonstration and testing are widely used to stimulate the uptake of improved crop varieties, yet evidence on their effectiveness remains mixed. This study examines whether small seed packs distributed either for free or at a subsidised price enhance farmers' knowledge and subsequent adoption of improved legumes, drought‐tolerant maize, and improved traditional African vegetables in Tanzania and Zambia. Drawing on mobile phone survey data and applying entropy balancing alongside machine‐learning methods to address selection bias, we find consistent evidence that seed packs increase both technical knowledge and adoption of these crops. Knowledge gains are strongest for crops with limited prior exposure, while improvements for familiar crops such as drought‐tolerant maize likely reflect experiential learning rather than new information. Adoption effects are positive across all crops and robust to alternative estimation strategies. Overall, the results indicate that small seed packs can serve as an effective demand‐creation tool, particularly in settings where farmers face information gaps or uncertainty about the performance of improved germplasm.", "journal": "Journal of Agricultural Economics", "published": "2026-04-14", "url": "https://doi.org/10.1111/1477-9552.70040", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70040"}, {"source": "crossref", "source_id": "10.1002/aepp.70070", "title": "Temperature Sensitivity and Adaptation of Cereal Yields: Empirical Evidence From Italy", "abstract": "ABSTRACT This paper investigates the evolving temperature sensitivity and climate adaptation of cereal yields in Italy from 1952 to 2023, using province‐level data for maize, common wheat, and durum wheat. Employing panel data econometric methods, we estimate yield responses to heat exposure, changes in sensitivity over time, and adaptation to climate change. The findings reveal reduced heat sensitivity in maize, persistent sensitivity in common wheat, and some evidence of reduced heat sensitivity in durum wheat. The results also highlight mixed evidence of adaptation, as long‐run climate adaptation offsets some of the negative effects only on maize yield. Consequently, there is both potential for reducing heat impacts and concern about future vulnerability. This study provides novel evidence regarding the necessity of targeted agricultural strategies in enhancing climate resilience among cereal producers.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-13", "url": "https://doi.org/10.1002/aepp.70070", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70070"}, {"source": "crossref", "source_id": "10.1002/ajae.70071", "title": "Food insecurity and unemployment among immigrants in the United States", "abstract": "Abstract Immigrants can be more vulnerable to economic downturns and, during periods of economic hardship, more likely to experience food insecurity compared to natives. This study examines the differential effect of the unemployment rate on the probability of being food insecure among diverse groups of immigrant households relative to natives in the United States. Since the unemployment rate is not randomly determined for households, we use an identification strategy based on shift‐share Bartik instruments which exploit exogenous spatial variation in industry employment shares and national industry growth rates. We find that increases in the unemployment rate raise the probability of household food insecurity, with noncitizen immigrants disproportionately affected compared to both natives and naturalized citizens, likely reflecting their more limited access to safety‐net programs. Noncitizen immigrant cohorts from countries with high proportions of less‐skilled workers, or those arriving during economic downturns, are more likely to experience food insecurity than both native‐born individuals and naturalized immigrant citizens. Higher education partially mitigates the impact of unemployment on household food insecurity, particularly for U.S. immigrant noncitizens. Our findings highlight the need for targeted measures to support at‐risk immigrant groups disproportionately vulnerable to short‐term economic shocks.", "journal": "American Journal of Agricultural Economics", "published": "2026-04-09", "url": "https://doi.org/10.1002/ajae.70071", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70071"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70105", "title": "Gender Empowerment and Climate‐Smart Agriculture: Insights and Implications for Achieving Gender Equity and Climate Resilience", "abstract": "ABSTRACT This study investigates the effects of male and female empowerment, as well as gender empowerment inequality, on the adoption of climate‐smart agriculture (CSA) practices. Using a conditional mixed process model, we analyse survey data from 743 households across Henan, Shandong and Hebei provinces in China. The results reveal that empowering both males and females significantly promotes the adoption of CSA practices. Male and female empowerment drives the adoption of CSA practices through improving income generation and reducing agricultural production costs. Higher levels of gender empowerment inequality are linked to reduced CSA practice adoption. The positive and negative impacts of male and female empowerment, as well as gender empowerment inequality, on the adoption of CSA practices among wheat growers cultivating medium‐scale farmland are the primary focus. Additionally, empowering women and narrowing gender inequality substantially boost wheat yields, whereas male empowerment shows no significant effect. These results highlight the importance of addressing gender disparities to promote sustainable agricultural practices and ensure food security. The study advocates policies that empower rural women, reduce gender inequality in access to empowerment and foster the widespread adoption of CSA technologies, thereby advancing gender equity and climate resilience in agricultural systems.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-08", "url": "https://doi.org/10.1111/1467-8489.70105", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70105"}, {"source": "crossref", "source_id": "10.1002/aepp.70069", "title": "Sustainable Productivity Growth in Agriculture: The Role of Shifts in R&amp;D Investments and Technology", "abstract": "ABSTRACT The objective of the paper is to evaluate the long‐term prospects of sustainable productivity growth linked to plausible assumptions on public agricultural R&amp;D investments as the key productivity driver. Second, it investigates the role of changing R&amp;D focus from yield maximization to input saving technologies (fertilizers and pesticides). The projections using CGE model MAGNET identify China, India and Brazil as regions with high productivity growth from agricultural R&amp;D while Sub‐Saharan Africa regions will struggle with low productivity growth rates and substantial increase in GHG emissions. Overall, GHG emissions are projected to grow more than agricultural output. However it is found that sustainable agricultural productivity growth could become feasible under the reorientation of R&amp;D programs in high income countries (with use of chemical inputs declining as much as 30%) where these policies can make an important contribution to sustainability while food security concerns are limited and spillover effects in terms of higher food prices are low.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-07", "url": "https://doi.org/10.1002/aepp.70069", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70069"}, {"source": "crossref", "source_id": "10.1002/aepp.70062", "title": "Tax Policy and Farm Organization", "abstract": "ABSTRACT The Tax Cuts and Jobs Act (TCJA) introduced substantial changes to the tax code, affecting farms' organizational incentives. This study examines farms' responses to the TCJA along extensive and intensive margins, focusing on organizational and labor expense adjustments. Using a logit regression, we analyze the likelihood of organizational structure selection for tax purposes in response to the TCJA and the Qualified Business Income Deduction (QBID). We find farms are more likely to be organized as S corporations after the TCJA. Furthermore, using a fuzzy regression discontinuity design, we demonstrate a significant increase in wage expenses in response to QBID income limits.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-07", "url": "https://doi.org/10.1002/aepp.70062", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70062"}, {"source": "crossref", "source_id": "10.1002/ajae.70062", "title": "Accounting for animal health in efficiency analysis: An application to Swedish dairy farms", "abstract": "Abstract Poor animal health is a central concern in modern livestock production. Despite the necessity to incorporate animal health in efficiency analysis, the theoretical and empirical developments are limited on this subject. This article appropriately characterizes the axiomatic properties of animal health within a production framework. We treat animal health as a weakly disposable output with characteristics of an input and an output, which permits computing animal health‐adjusted efficiency measures and shadow prices of animal health. The application considers 980 observations of Swedish dairy farms over the years 2009–2016. We use a Benefit‐of‐the‐Doubt approach for assessing animal health, which captures its multiple dimensions with weights being optimized for each farmer. Applying a random sample‐split procedure within a Data Envelopment Analysis framework, we statistically verify the extent to which inclusion of animal health in the production framework changes the efficiency estimates. The results show that including animal health in production analysis increases the average efficiency estimates from 0.900 to 0.973, a finding that largely also holds in a statistical sense. The shadow prices of animal health are mostly positive, which indicates a general willingness to accept lower levels of production for higher levels of animal health. Our findings suggest the importance of incorporating animal health into efficiency analysis.", "journal": "American Journal of Agricultural Economics", "published": "2026-04-06", "url": "https://doi.org/10.1002/ajae.70062", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70062"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_004_cover/_article/-char/ja/", "title": "表紙", "abstract": "", "journal": "フードシステム研究", "published": "2026-04-03", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_004_cover/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_004_cover/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_020/_article/-char/ja/", "title": "産地商人による地域特産物生産への関わりとその影響", "abstract": "", "journal": "フードシステム研究", "published": "2026-04-03", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_020/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_020/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_021/_article/-char/ja/", "title": "生産者から仕入れる東京都内の青果小売店による価値づけの一考察", "abstract": "", "journal": "フードシステム研究", "published": "2026-04-03", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_021/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_021/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_4_news/_article/-char/ja/", "title": "裏表紙", "abstract": "", "journal": "フードシステム研究", "published": "2026-04-03", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/4/32_4_news/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/4/32_4_news/_article/-char/ja/"}, {"source": "crossref", "source_id": "10.1002/ajae.70069", "title": "Issue Information", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-04-02", "url": "https://doi.org/10.1002/ajae.70069", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70069"}, {"source": "crossref", "source_id": "10.1002/aepp.70064", "title": "Issue Information", "abstract": "", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-02", "url": "https://doi.org/10.1002/aepp.70064", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70064"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70038", "title": "Promoting Methane Reductions Through Behavioural Nudges and Informational Boosts: A Field Choice Experiment in Japanese Rice Farming", "abstract": "ABSTRACT Agricultural methane emissions represent a significant contributor to global climate change, with irrigated rice cultivation being one of the primary sources. Despite the availability of effective mitigation technologies, their adoption often remains limited due to behavioural and institutional constraints. Water management practice that extends drainage periods during cultivation can curb methane emissions from irrigated rice at low cost, yet uptake among Japanese farmers remains modest. We surveyed 2219 rice producers in Shiga Prefecture using a labelled choice experiment that embedded two behavioural nudges (social norm and loss aversion) and one informational boost (knowledge enhancement), presented with or without a reminder. Farmers most favoured a 7‐day drainage extension. Social‐norm messages did not robustly shift adoption intentions, but loss‐aversion and knowledge enhancement paired with reminders increased the probability of choosing water management practice by 5–10 percentage points, particularly when financial incentives were modest. The added value of nudges and boosts faded once subsidies approached prevailing ceiling levels, suggesting diminishing marginal returns to stacking instruments. These findings suggest that timely, low‐cost behavioural interventions can effectively complement agri‐environmental payments in resource‐constrained settings, providing a scalable and context‐sensitive strategy to accelerate the adoption of climate‐smart rice practices.", "journal": "Journal of Agricultural Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/1477-9552.70038", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70038"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70043", "title": "Environmental Information or Social Norm? A Ladder Toward Environmentally Sustainable Food Choices", "abstract": "ABSTRACT Agricultural production and the food supply chain have a significant impact on the environment. To foster an environmentally sustainable food system, it is vital to change consumers' food choice patterns to be more environmentally sustainable. This study presents a concept ladder , a simplified model under which consumers may be at different stages in terms of their willingness and ability to make environmentally sustainable food choices: some may have little concern, others may have more concern but require the impetus of broader social norms to modify their choices, while a final group may have strong concern but in some cases be unable to exercise their preferences because of financial or other constraints. To empirically test this concept, we conducted a large‐scale randomised experiment involving Japanese consumers through two online surveys. In the first survey, respondents were randomly separated into three groups and provided with either environmental issue information (T1), social norm information (T2) or no information (Control). Two weeks later, a follow‐up survey was conducted to compare the actual environmental sustainability of food choice behaviours among the groups. The results show that the treatment effect of T1 is the largest for those with a low level of environmental concern, while the treatment effect of T2 is the largest for those with a moderate level of environmental concern, consistent with the ladder concept. Several robustness checks support these findings.", "journal": "Journal of Agricultural Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/1477-9552.70043", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70043"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70107", "title": "Mapping Circular Bioeconomy Research in Agrifood Systems: Perspectives From Australia and New Zealand", "abstract": "ABSTRACT Growing awareness of unsustainable linear production, consumption and waste economic models is prompting exploration of circular economy and bioeconomy models. The ‘circular bioeconomy’, sitting at the nexus of these concepts, is of particular importance to agrifood systems, which play a critical role in producing biologically based materials and services, and converting waste streams into safe and sustainable resources. A systematic mapping protocol was applied to develop a broad overview of ‘circular bioeconomy’ research in Australian and New Zealand agrifood systems. Sixty‐nine full‐text publications were coded to catalogue studies by domain, methodology, and categories of inputs, technologies and products (for biophysical studies). The circular bioeconomy is an emerging research area, currently experiencing inconsistent definitions of key terms, a high proportion of review papers, and limited engagement with key concepts in certain research areas. There were key differences between Australian and New Zealand research, particularly in terms of science domain, research methodology and dominant perspectives on key circular economy and bioeconomy principles. Recommendations for future studies include standardising circular bioeconomy definitions, increasing social science applications, mapping potential circular bioeconomy assessment tools, and applying circular bioeconomy principles and guidelines to develop cross‐sectoral strategies. Coordinated research efforts can support circular bioeconomy approaches for sustainable agrifood systems in Australia and New Zealand.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/1467-8489.70107", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70107"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70111", "title": "Issue Information", "abstract": "", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/1467-8489.70111", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70111"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70106", "title": "Ground‐Level Ozone and Agricultural Productivity in China", "abstract": "ABSTRACT Using a county‐level dataset covering agricultural total factor productivity (TFP), crop yields, weather and ground‐level air pollution from 2003 to 2015, this study investigates the effects of air pollution, specifically ozone (O 3 ), on agricultural TFP. We find that O 3 pollution is strongly associated with productivity losses, with each one‐standard‐deviation increase in O 3 linked to a 33% reduction in TFP, far exceeding the negative impacts of other pollutants and temperature extremes. These adverse effects are primarily driven by declines in labour productivity, land productivity and crop yields and are further exacerbated by extreme temperatures. Between 2003 and 2015, agricultural TFP losses due to rising O 3 pollution grew from 9.8% to 46.6%. As an adaptive response, farmers adjust production practices, particularly by increasing fertiliser use, to mitigate productivity losses. Our findings highlight the urgent need for integrated policies that address both air pollution and climate extremes to promote agricultural sustainability.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/1467-8489.70106", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70106"}, {"source": "crossref", "source_id": "10.1111/ajar.v70.2", "title": "", "abstract": "", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/ajar.v70.2", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/ajar.v70.2"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70103", "title": "How Does Plant Capacity Affect Agricultural Processors' Performance? A Quasi‐Experimental Design Using International Sugar Price Shocks", "abstract": "ABSTRACT Understanding the relationship between plant capacity and performance among agricultural processors in developing economies remains essential for effective policy design. Exploiting exogenous international sugar price fluctuations between 2008/09 and 2016/17, this study employs a quasi‐experimental framework to examine how plant capacity influences profitability within China's sugar industry. Using detailed panel data for 99 sugar plants in Guangxi province, I find that plants with greater capacity realise significantly higher profit gains under the same price shock. Specifically, facing the same exogenous international sugar price increase of 500 yuan , a plant with daily production one standard deviation higher (4691 tonnes) experiences an additional increase of approximately 32 yuan in unit profit relative to a smaller plant. This scale‐driven profitability advantage primarily results from lower non‐raw material costs rather than improved selling prices or higher productivity. This study further identifies heterogeneity in capacity effects by plant ownership and location in major versus minor production regions, highlighting the nuanced role of economies of scale and local policy interventions. These findings contribute novel insights into how firm‐level characteristics mediate the effects of global market shocks, offering clear policy implications for optimising agricultural processing efficiency in resource‐dependent regions.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/1467-8489.70103", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70103"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70109", "title": "Examining the Impact of Government Input Support on Rice Production in Vietnam", "abstract": "ABSTRACT Although rice production plays a vital role in Vietnam's economy, rice farmers' incomes remain low compared to other sectors. Several support policies have been introduced to improve this, including input support policies. This study examines the effect of input support on production outcomes of rice farmers using endogenous switching regression (ESR) analysis and propensity score matching (PSM) with data from the Vietnam Household Living Standards Survey (VHLSS) in 2018 and 2020. Findings show that households receiving input support had lower rice production efficiency and incomes than comparable households not receiving the support. While there is a link between support value and production outcomes, the impact is limited if support values are low. This suggests that small amounts of support are insufficient to improve production outcomes. Given our results, the Vietnam government should increase the support budget and focus on providing quality inputs. Additionally, rather than giving small cash amounts to individual households, which are insufficient to buy modern machinery, the government should invest in shared community‐level equipment to improve production capacity.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/1467-8489.70109", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70109"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70101", "title": "Developing Circular Bioeconomy Sustainability Metrics for Agrifood Systems: Evidence From Southeast Asia", "abstract": "ABSTRACT For most Southeast Asian nations, sustainable development remains a challenge. Despite environmental, technological, social and economic barriers, it is important to track sustainability progress in the region, given its agriculture‐based economy. This study aims to develop sustainability metric indicators for agricultural systems, examine the regional sustainability performance index and identify regional opportunities and challenges for achieving the Sustainable Development Goals. We used principal component analysis (PCA) to create new sustainability metrics for Southeast Asia. Data from the Asian Development Bank were used to determine the key dimensions of sustainability metrics. The analysis produced eight sustainability metrics based on component loadings: climate footprint, material‐use efficiency, agrifood system emissions, research and innovation, sustainable consumption and production of biofuels, information and communication technology (ICT), energy access and trade. Most agriculture‐based economies have high emissions from their agricultural systems and low material‐use efficiency. These challenges necessitate strategic development intervention, which aligns with the region's agricultural base. For example, agricultural trade can be expanded to include bio‐based products. This, coupled with the cross‐collaboration of bio‐based products in the region, will minimise agrifood emissions from countries with above‐average emissions, such as Indonesia. This study recommends the development of region‐specific monitoring frameworks to track progress in sustainability.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/1467-8489.70101", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70101"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70110", "title": "Circular Bioeconomy for Sustainable Agriculture and Food Systems: An Editorial Introduction", "abstract": "ABSTRACT This special issue advances a multi‐scalar, empirically grounded understanding of circular bioeconomy transitions in agriculture and food systems by integrating systems‐level analyses with farm‐ and household‐level evidence from diverse developing and emerging economies. The key findings include (1) circular bioeconomy research in agrifood systems in Australia and New Zealand is rapidly expanding but highly fragmented, dominated by technical perspectives with inconsistent definitions and limited social science engagement, with Australia emphasising technological recycling and New Zealand focussing more on ecological and social redesign; (2) there is a substantial untapped potential to integrate land, marine, forest and water resources into Indonesia's circular bioeconomy through converting diverse biomass residues into bio‐based products, but scaling is constrained by limited technical capacity, infrastructure gaps, policy fragmentation and high investment costs; (3) there exists pronounced heterogeneity in circular bioeconomy readiness, with most southeast Asian countries facing high agrifood emissions and low material‐use efficiency, while performance advantages in innovation and efficiency are concentrated in a few economies; (4) technical skill gaps and awareness deficits are the primary, system‐shaping constraints on crop‐residue bioenergy adoption, with spillover effects that hinder infrastructure, markets and coordination in the circular bioeconomy; (5) adoption of integrated crop–livestock systems increases bio‐fertiliser use, reduces chemical fertiliser expenditure among younger farmers and raises farm revenue without increasing costs, demonstrating the economic and environmental viability of farm‐level circular bioeconomy practices; and (6) composting spent mushroom substrate delivers the highest productivity gains compared with on‐farm deposition and distant dumping, with farmers' management choices shaped by education, extension access, infrastructure quality and mobility. These findings highlight that policies should standardise circular bioeconomy definitions and metrics, invest in farmer knowledge and extension as first‐order enablers and coordinate cross‐sector infrastructure and governance to unlock scale.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-01", "url": "https://doi.org/10.1111/1467-8489.70110", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70110"}, {"source": "crossref", "source_id": "10.1002/ajae.70070", "title": "Falling trade barriers and rising crime? Evidence from Colombia", "abstract": "Abstract Trade liberalization is central to development strategy in low‐ and middle‐income countries, yet its social costs, particularly for poor rural households, remain poorly understood and rarely offset by policy. Greater openness to trade generates benefits through lower prices, product diversity, and export earnings, but heightened import competition can reduce income and employment in exposed sectors, potentially increasing crime by lowering the opportunity cost of illicit activity. Rising agricultural import competition is particularly concerning given that poverty in the developing world is disproportionately rural and that large shares of the labor force depend on smallholder farming. Here, using panel data from 887 Colombian municipalities and a shift‐share instrumental variables approach, we show that the U.S.‐Colombia Free Trade Agreement of 2012—by intensifying import competition in corn and beans—raised home burglaries and robberies of individuals by 16% and 6%, respectively, while reducing business robberies by 13%. Crime impacts were concentrated in Andean municipalities and non‐coca‐producing regions, reflecting the vulnerability of smallholder traditional corn producers to a surge of cheap U.S. imports and the limited economic alternatives available in those areas. Unlike prior studies from Mexico and Brazil, we find non‐robust evidence of impacts on homicides—a divergence explained by Colombia's context of de‐escalating armed conflict, which dampened extreme violence while leaving economically motivated property crime fully exposed. These results call for agricultural trad .go.jp/article/arfe/62/1/62_37/_article/-char/ja/", "title": "Price Fixing by Dominant Meat Processors and the Global Concentration of Agrifood Power", "abstract": "", "journal": "農林業問題研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_37/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/1/62_37/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_44/_article/-char/ja/", "title": "Japan in the Global Agribusiness Network", "abstract": "", "journal": "農林業問題研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_44/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/1/62_44/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_52/_article/-char/ja/", "title": "Rice as a Financialized Food in the Japanese Empire: Colonial Imports and Exchanges’ Futures Trade", "abstract": "", "journal": "農林業問題研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_52/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/1/62_52/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_60/_article/-char/ja/", "title": "Wealth Paradox in Vietnam: Landholdings, Child Age, and Agricultural Labor Participation", "abstract": "", "journal": "農林業問題研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_60/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/1/62_60/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_9/_article/-char/ja/", "title": "都市部における食料品アクセス・食生活状態と格差", "abstract": "", "journal": "農林業問題研究", "published": "2026-03-31", "url": "https://www.jstage.jst.go.jp/article/arfe/62/1/62_9/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/62/1/62_9/_article/-char/ja/"}, {"source": "crossref", "source_id": "10.1002/ajae.70068", "title": "Climate change and perennial crop production: Evidence of yield impact and adaptation in California", "abstract": "Abstract Perennial crops are economically important. They contribute to food security, providing essential nutrients that are often lacking in annual crops, and provide additional environmental benefits compared with annual crops. Despite their importance, empirical research on the impacts of climate change and adaptation on perennial crops remains limited. We model the phenological characteristics of major perennial crops in California and take adaptation into consideration to estimate the effects of temperature and precipitation on yields in both the short run and long run. Our findings indicate that weather impacts vary across the four phenological phases—dormancy, bloom, fruit development, and fruit maturity. Specifically, warming during the dormancy phase reduces walnut yields and warming during the bloom phase reduces almond yields in both the short‐run and long‐run. These long‐run negative impacts suggest that adaptation has not offset the adverse effects of winter warming on these crops. On the other hand, warming in the fruit maturity phase positively affects almond yields, especially in the long run, suggesting that adaptation has taken advantage of rising temperatures to increase almond yields. Our findings provide valuable insights for targeted adaptation strategies to enhance the resilience of perennial crop production in the face of climate change.", "journal": "American Journal of Agricultural Economics", "published": "2026-03-30", "url": "https://doi.org/10.1002/ajae.70068", "fetched_at": "2026-06-20T12:03:54", "id": "crossr
