 farmers and farmer interactions and are especially useful when behavioural and social factors are integrated to represent farmers’ decision-making. We assess the potential of agent-based models by conducting a review of forty-eight agent-based models developed for European agriculture and a survey with twenty-six modellers and twenty-four policy stakeholders. We find that while agent-based models provide nuanced representations of farmers’ decision-making processes, there is a gap between what is currently implemented in models, what modellers consider important and what policymakers expect.", "journal": "European Review of Agricultural Economics", "published": "2026-05-26", "url": "https://doi.org/10.1093/erae/jbag006", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbag006"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70114", "title": "2025 AARES Distinguished Fellow", "authors": "", "abstract": "", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-05-26", "url": "https://doi.org/10.1111/1467-8489.70114", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70114"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70113", "title": "2025\n                    <scp>AARES<\/scp>\n                    Distinguished Fellow", "authors": "", "abstract": "", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-05-26", "url": "https://doi.org/10.1111/1467-8489.70113", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70113"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70059", "title": "Efficiency, Shadow Pricing and Regime Switching in Multi‐Ware Technologies: Evidence From Regulated Livestock Farms", "authors": "Youpei Yan, Robert G. Chambers", "abstract": "ABSTRACT We develop a framework for regulated production systems where output generation and pollution abatement impose competing technological demands. Using a multi‐ware technology, we model the production set as the intersection of two input requirement frontiers, one for production and one for abatement, each reflecting distinct trade‐offs. We characterise the efficient set using gaps in efficiency distances and recover shadow prices for smooth and non‐smooth frontiers, clarifying how subdifferentials govern shadow prices at switching points. To address unobserved heterogeneity in technological orientation, we estimate a full‐information maximum likelihood model with endogenous regime‐switching. Applying the framework to Chinese livestock farms, we recover regime‐specific land costs, identify drivers of regime assignment and quantify inefficiency using multi‐ware distances. Results reveal sharp asymmetries in spatial burdens between production and abatement, and systematic switching behaviour driven by inputs and weather. Our framework offers a widely applicable, policy‐relevant tool for evaluating environmental and economic performance. JEL Classification: D24, Q12, Q52", "journal": "Journal of Agricultural Economics", "published": "2026-05-24", "url": "https://doi.org/10.1111/1477-9552.70059", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70059"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70117", "title": "Do Governance Practices in Cluster Farming Improve Wheat Farmers' Profitability? Evidence From Ethiopia", "authors": "Xiuguang Bai, Yuming Li, Amenu Leta Duguma, Gemedo Furo, Tesfaye Solomon, Gezahegne Seyoum, Bacha Gebissa Negeri, Nazir Muhammad Abdullahi, Agerie Nega Wassihun", "abstract": "ABSTRACT Cluster farming has been promoted as an institutional strategy to improve smallholder productivity, market access and profitability in developing countries. However, empirical evidence on the association between governance practices and wheat profitability within cluster systems remains limited. This study examines the role of governance practices on the profitability of wheat farmers in Ethiopia, placing particular emphasis on the mediating role of farm‐gate selling prices. Using cross‐sectional data from 759 farmers across 11 clusters, governance dimension indices were constructed using principal component analysis, and effects were estimated using two‐stage least squares, three‐stage least squares and quantile regression. Results show that accountability, participation and conflict resolution have positive and significant effects on wheat profitability, while transparency has a negative association, likely reflecting coordination and compliance costs. Mediation analysis reveals that farm‐gate price explains about 89.5% of governance's total effect on profitability. Governance effects also vary by cluster group, landholding size, input use and profitability levels. Strong governance improves bargaining power, price realisation and economic returns. The findings highlight the importance of institutional quality in cluster farming. Strengthening accountability, participation and conflict resolution can significantly improve profitability and support smallholder livelihoods, offering key policy insights for cluster‐based agricultural development in Ethiopia and similar contexts.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-05-24", "url": "https://doi.org/10.1111/1467-8489.70117", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70117"}, {"source": "crossref", "source_id": "10.1002/aepp.70090", "title": "Drivers of Precision Agriculture Adoption in Italian Viticulture", "authors": "Olimpia Fontana, Linda Arata, Margherita Muzzillo, Paolo Sckokai", "abstract": "ABSTRACT This study examines the main drivers influencing the adoption of two types of precision farming technologies in the viticultural sector: Decision Support Systems (DSSs) and Variable Rate Technologies (VRTs). We apply a partial proportional odds model and find that socio‐demographic characteristics are not significant determinants of adoption, whereas farm structural features and a general positive attitude toward technology significantly increase the likelihood of uptake. Environmental concern plays a role only with respect to the intention to adopt, but not in explaining actual adoption behavior. Moreover, farmers' perceptions of the usefulness of digital technologies and the difficulties associated with their use emerge as key factors shaping adoption intentions among non‐adopters. These results suggest that targeted training initiatives and strengthened advisory services could play a crucial role in fostering the diffusion of precision farming technologies in viticulture.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-05-24", "url": "https://doi.org/10.1002/aepp.70090", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70090"}, {"source": "crossref", "source_id": "10.1002/aepp.70087", "title": "Crop Insurance Design and On‐Farm Risk Adaptation", "authors": "Gerald Van Tassell, Alan P. Ker", "abstract": "ABSTRACT The United States spends billions annually on crop insurance premium subsidies, yet the prevailing distance‐based guarantee design unintentionally rewards risk‐taking by linking subsidies to yield variability. We consider a simple redesign: define guarantees in terms of probability so that coverage reflects a consistent likelihood of indemnity. Using US data, this probability‐based approach would reallocate about $3.3 billion in annual subsidies from high‐risk to low‐risk production, reducing regional disparities by two‐thirds without changing total subsidies. Because most publicly subsidized crop insurance programs around the world share this structure, adopting probability‐based guarantees could help realign agricultural production toward more resilient and sustainable regions and practices.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-05-24", "url": "https://doi.org/10.1002/aepp.70087", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70087"}, {"source": "crossref", "source_id": "10.1093/erae/jbag005", "title": "Market integration and the impact of violence on trade networks: Evidence from Nigeria", "authors": "Jiawen Liu, Michael Olabisi, Mywish K Maredia", "abstract": "Abstract Market integration is critical for food security in developing economies facing socio-political instability. Using weekly price data from ninety-seven Nigerian markets, this study investigates how violent conflict influences price dynamics between market pairs. Results reveal that frequent violent events have limited short-term effects on price transmission, and changes in conflict intensity do not significantly disrupt price adjustments. Markets with stronger trade connections demonstrate greater resilience by leveraging alternative trade routes. These findings highlight the role of market connectivity in maintaining trade efficiency, suggesting that policies that enhance market networks can strengthen resilience and improve food security.", "journal": "European Review of Agricultural Economics", "published": "2026-05-21", "url": "https://doi.org/10.1093/erae/jbag005", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbag005"}, {"source": "crossref", "source_id": "10.1002/aepp.70086", "title": "The Label Trap: Unintended Consequences of Pesticide Labeling and the Power of Nudges", "authors": "Juhui Chen, Zhipeng He, Junfei Bai", "abstract": "ABSTRACT Presenting pesticide dosages in range formats (e.g., 10–40 g) is presumed to offer farmers flexibility to adjust dosage application based on pest or disease pressure, and thereby facilitating precise use. However, this conventional practice may unintentionally encourage pesticide overuse. Based on a lab‐in‐the‐field experiment, this study finds that approximately 65% of farmers disregard the minimum dosage when exposed to range‐based labels, anchoring instead on the upper bound. A nudge‐based label design, featuring reference points and brief explanatory cues, can significantly reduce pesticide use without restricting farmers' autonomy. These findings reveal both the hidden risks and promising potential of label‐based interventions, suggesting that thoughtfully designed labels can serve as a low‐cost, scalable policy tool for mitigating excessive chemical use problem in agriculture.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-05-20", "url": "https://doi.org/10.1002/aepp.70086", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70086"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70054", "title": "Intra‐Seasonal Crop Management and the Potential Benefit of Seasonal Precipitation Forecasts: Farm‐Level Embedded Risk Analysis in Ethiopia", "authors": "Christian Troost, Samuel Elias Kayamo, Livia Rasche, Thomas Berger", "abstract": "ABSTRACT How large is the potential benefit for farmers from obtaining forecasts of total rainfall in the upcoming season? This critically depends on the local farm system and the crop management actions available to farmers to respond to the forecasts issued. Studies assessing the financial value of seasonal precipitation forecasts have so far focused almost exclusively on start‐of‐season crop sowing decisions using approaches for non‐embedded risk analysis. However, crop management decisions are spread over the entire growing cycle, and considering this realistically could either increase or diminish the financial value of seasonal forecast information from a theoretical perspective. Our simulation analysis demonstrates how this research gap can be closed: we employ a state‐contingent embedded risk approach combining multi‐stage discrete stochastic programming and high‐performance computing to determine optimal crop management responses (crop choice, sowing date, tied‐ridging, relay cropping and fertilization) to seasonal precipitation forecasts throughout the full crop growth cycle. For rain‐fed agriculture in the Central Rift Valley of Ethiopia, we find seasonal forecasts to increase risk‐adjusted expected cash surplus by about 2%–3% at realistic forecast skill levels. For a typical risk‐averse subsistence farming household (0.5 ha), we calculated an increase in long‐term expected cash surplus of 58 USD PPP at 2023 prices. Intra‐seasonal crop management plays an important role in forecast response. A non‐embedded risk approach simulated not more than 35% of the forecast's economic value simulated with the embedded risk approach.", "journal": "Journal of Agricultural Economics", "published": "2026-05-19", "url": "https://doi.org/10.1111/1477-9552.70054", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70054"}, {"source": "crossref", "source_id": "10.1002/aepp.70088", "title": "The Cost of a Nutritious Diet in Cafeterias: Evidence From US Military Dining Facilities", "authors": "Linlin Fan, Yiwen Zhao, Andrea Carlson, Parke Wilde, Joanna Reagan, Julianna Jayne, Starr Seip, Denise Laursen, Matthew P. Rabbitt", "abstract": "ABSTRACT Providing nutritious meals in institutional settings with financial constraints, such as military dining facilities, is challenging. The US Department of War (DoW) and US Department of Agriculture (USDA) collaborated to modernize the Basic Daily Food Allowance (BDFA) using an optimization model that incorporates service members' consumption patterns and nutritional standards. The model estimated optimal diets for four demographic groups, producing costs similar to the 2019 BDFA but with greater food variety. This first application of the USDA Food Plan to military purchase data demonstrates a flexible approach for improving cost estimates in military and other institutional food programs.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-05-18", "url": "https://doi.org/10.1002/aepp.70088", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70088"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70119", "title": "Agricultural Vulnerability Assessment: Climate and Non‐Climate Interactions in Crop Production Systems", "authors": "Mahdieh Khezri‐nejad‐gharaei, Bouali Guesmi, Jeroen Buysse, Jose Maria Gil Roig", "abstract": "ABSTRACT Recent climate phenomena show that Spain is one of the most vulnerable countries to climate change impacts, with varied regional effects from flash floods to drought. This study assesses the vulnerability of four major crops (cereal, rice, grape and olive) in Catalonia to climate change through a comprehensive vulnerability index incorporating exposure, sensitivity and adaptive capacity indicators. Using farm‐level panel data from 2012 to 2022, we employ a three‐stage analytical approach using a multi‐criteria vulnerability index, correlation analysis and dynamic panel estimation to examine the relationship between vulnerability and total factor productivity (TFP). Results reveal significant differences in vulnerability across crops and provinces, with olive showing the highest vulnerability followed by cereal, whereas grape demonstrates the lowest vulnerability. Lleida province exhibits the highest regional vulnerability, whereas Barcelona shows the lowest. Temperature‐related factors emerge as the dominant vulnerability drivers, with extreme temperature days and temperature variability followed by topographical limitations. System GMM estimation confirms a strong negative relationship between vulnerability and agricultural productivity, with long‐term impacts exceeding immediate effects. These findings provide a foundation for targeted adaptation strategies that address both climate exposure and adaptive capacity constraints, enabling policymakers to prioritise interventions based on crop‐specific vulnerability profiles and key driving factors.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-05-17", "url": "https://doi.org/10.1111/1467-8489.70119", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70119"}, {"source": "crossref", "source_id": "10.1002/aepp.70089", "title": "On the Economics of US Agricultural Policy", "authors": "Jean‐Paul Chavas", "abstract": "ABSTRACT This paper presents an economic analysis of US agricultural policy, building on a modified version of Gardner's efficient redistribution. We argue that agricultural policy is motivated as an attempt to implement an efficient redistribution scheme that redistributes income toward farmers who, as a group, have been adversely affected by agricultural productivity growth. We show how this approach helps explain why subsidies are more common in agriculture than in other sectors of the economy. We explore how our analysis provides new and useful insights into the design and implementation of US agricultural policy.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-05-15", "url": "https://doi.org/10.1002/aepp.70089", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70089"}, {"source": "crossref", "source_id": "10.1002/aepp.70078", "title": "Correction to “The Role of Intrinsic Motivation and Continuous Enhancement on the Intention to Implement Animal Welfare Practices in Dairy Farming”", "authors": "", "abstract": "", "journal": "Applied Economic Perspectives and Policy", "published": "2026-05-14", "url": "https://doi.org/10.1002/aepp.70078", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70078"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70108", "title": "Substituting Groundwater With Surface Water for Irrigation in Northern China: Current Status, Effectiveness and Challenges", "authors": "Tianhe Sun, Baozhu Guan, Huang Chen, Jinxia Wang, Wei Chao", "abstract": "ABSTRACT China's irrigated heartlands face concurrent pressures of aquifer depletion and grain security. We evaluate Hebei's Substituting Groundwater with Surface Water for Irrigation (SGSWI) project—a medium‐scale, short‐haul program—using county‐level panel data and a staggered difference‐in‐differences design that combines water accounts, monthly deep/shallow groundwater levels, meteorological controls and agricultural statistics, supplemented by village/household surveys. We find that the SGSWI project rebalances irrigation sources without raising total agricultural water use: surface water rises by 3.2%, whereas groundwater falls by 2.3%. The program benefits deep aquifers—deep withdrawals decline 5.3% and the depth to the deep water table recovers by 1.85 m—with no detectable effect on shallow systems. Regarding production, grain output increases 8.3%, driven by a 7.4% expansion in sown area and a 3.7% rise in the multiple‐cropping index; yields per unit area, water‐use efficiency and fertiliser use intensity remain unchanged. Effects are larger where projects connect to inter‐provincial transfers and in severely overdrafted counties; dual‐source counties show the biggest output gains but risk rebound in total water use. A recipient‐side cost–benefit accounting yields an internal rate of return (IRR) of 11.55%, with one‐way sensitivity checks showing only moderate sensitivity to groundwater valuation, operational and maintenance (O&amp;M) costs, and tariffs but strong sensitivity to shortfalls in realised transfer volumes. Sustainability, however, is constrained by supply uncertainty, weak inter‐regional coordination, incomplete infrastructure, underdeveloped operation and maintenance and underpricing. Policy priorities include targeting severe overdraft basins, locking in multi‐year delivery commitments, completing and funding ‘last‐mile’ assets, introducing volumetric and tiered tariffs with safeguards and strengthening aquifer‐specific monitoring and accountability.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-05-13", "url": "https://doi.org/10.1111/1467-8489.70108", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70108"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70121", "title": "Market Design in a Weather‐Dependent and Distributed Electricity System: Lessons From the 2025\n                    <scp>NEM<\/scp>\n                    Review", "authors": "Tim Nelson", "abstract": "ABSTRACT Australia's National Electricity Market (NEM) is undergoing a rapid transition to a weather‐dependent and increasingly distributed system. This article draws on the 2025 NEM Review to examine whether the core energy‐only market design remains fit for purpose. It argues that the principal challenge is not the operation of the spot market, but the weakening of linkages between short‐term dispatch, medium‐term risk management and long‐term investment. The growth of behind‐the‐meter resources has reduced system visibility, the shift to renewable generation has altered the nature of risk, and a structural mismatch between contracting horizons and asset lives has created a ‘tenor gap’. Policy responses should therefore focus on improving visibility, strengthening forward markets and introducing targeted mechanisms to support long‐term investment while preserving market signals.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-05-13", "url": "https://doi.org/10.1111/1467-8489.70121", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70121"}, {"source": "crossref", "source_id": "10.1002/ajae.70079", "title": "An economic approach to mitigating spillover bias in synthetic control methods: An application to the price effects of fishing quotas", "authors": "Jordan Moor, Andrew Ropicki, Frank Asche, Adams Ceballos‐Concha", "abstract": "Abstract Individual Fishing Quotas (IFQs) have the potential to lead to higher ex‐vessel prices by reducing market gluts and improving product quality. While IFQs have been introduced in a number of fisheries in recent decades, few causal studies investigate their price effects. Using synthetic control methods on US reef‐fish fisheries, we show that IFQs significantly increase prices for red snapper, red grouper, gag grouper, yellowedge grouper, scamp grouper, and tilefish. We also find significant positive price spillovers to adjacent, untreated fisheries. A primary challenge to unbiased estimation using synthetic control is treatment spillover, which can contaminate both never‐treated units in the donor pool and to‐be‐treated units in a staggered implementation. When control (donor) units are subject to these spillovers, this can lead to either attenuation or divergence of the causal estimate, depending on the empirical setting. To address this estimation challenge, we propose a framework relying on economic theory (market arbitrage and product substitution) and empirical analysis (e.g., market integration or demand estimation) to inform both donor selection and the timing of the treatment start date. As a result, our proposed structure improves the accuracy of synthetic control estimates, as shown by a small Monte Carlo experiment. Furthermore, by pre‐identifying contaminated units, our framework allows for the direct measurement of the spillover effects themselves.", "journal": "American Journal of Agricultural Economics", "published": "2026-05-12", "url": "https://doi.org/10.1002/ajae.70079", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70079"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70052", "title": "Reallocation Effects of Internalizing Externalities: Evidence From China's Straw Burning Ban", "authors": "Wenyuan Hua", "abstract": "ABSTRACT This paper examines the reallocation effects of a typical environmental policy aiming to internalize externalities: the straw burning ban across China. The ban prohibited the traditional farming practice of burning straw while compelling the labour‐intensive practice of straw utilization. We show that the legislation banning straw burning led to an increase in local land renting activities. Our results indicate that implementation of the ban resulted in a within‐village land redistribution, encouraging the exit of less‐productive farmers while promoting land expansion by more‐productive farmers. Consequently, village‐level aggregate agricultural output and productivity increased by 5% and 3%, respectively. A complementary policy instrument to the command‐and‐control ban—establishing biomass power plants to incentivize farmers to collect crop residues—led to a greater land redistribution in villages with a nearby biomass power plant after the ban is imposed, relative to before.", "journal": "Journal of Agricultural Economics", "published": "2026-05-12", "url": "https://doi.org/10.1111/1477-9552.70052", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70052"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70053", "title": "Repurposing Agricultural Budgets With Multiple Objectives and Fiscal Constraints: A Multicriteria Decision‐Making Policy Tool Applied to Sub‐Saharan African Countries", "authors": "Marco V. Sánchez, Martín Cicowiez, Lucia Battaglia, Valentina Pernechele", "abstract": "ABSTRACT Repurposing agricultural public resources toward higher‐return incentives and investments can help transform agri‐food systems. This is important for low‐income countries, especially in sub‐Saharan Africa, where limited budgets restrict options for boosting agricultural spending. We demonstrate how, within a tight budget envelope, opportunities exist to achieve better agricultural transformation outcomes. To this end, we developed the policy optimization modelling tool, PolOpT, which combines a multicriteria decision‐making technique and a recursive‐dynamic computable general equilibrium model. We applied it with datasets for six sub‐Saharan African countries, including hundreds of estimated parameters that transmit the effect of policy measures onto agricultural productivity. The approach demonstrates that reallocating agricultural public expenditure across policy measures in these countries can potentially boost agri‐food output by several percentage points, create almost a million off‐farm jobs in rural areas, lift almost 3 million people out of poverty and allow 16 million people more to afford a healthy diet—all without extra funding.", "journal": "Journal of Agricultural Economics", "published": "2026-05-11", "url": "https://doi.org/10.1111/1477-9552.70053", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70053"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70041", "title": "Antimicrobial Use in Livestock: The Economic Cost of Action or Inaction", "authors": "Alejandro Acosta, Wondmagegn Tirkaso, Marco Artavia, Francesco Nicolli, Thomas Chatzopoulos, Sergio René Araujo‐Enciso, Martin Cicowiez, Shaikh Eskander, Ramanan Laxminarayan, Junxia Song", "abstract": "ABSTRACT This paper quantifies the economy‐wide consequences of two independent global stress‐tests in livestock production. The first assesses the effects of phasing out antimicrobial growth promoters (AGPs), and the second evaluates the long‐term impacts of antimicrobial resistance (AMR) progression. We use a sequential, one‐way modelling framework combining a global partial equilibrium (PE) model and a global computable general equilibrium (CGE) model to trace how scenario‐defined shocks in livestock production propagate through world agricultural markets and the wider economy. The highest‐impact AGPs phase‐out scenario results in cumulative global livestock production losses, valued at constant 2021–2023 prices, of roughly USD 53 billion over 2025–2040, with annual deviations that peak in the mid‐2020s and then decline as output converges along scenario‐defined recovery paths. In contrast, the highest‐impact AMR scenario produces persistent and compounding reductions by construction, with cumulative production losses of about USD 318 billion by 2040, while cumulative economy‐wide welfare losses in this high‐impact case reach approximately USD 1.25 trillion, concentrated mainly in upper–middle‐income countries. Results are scenario dependent by construction and represent indicative orders of magnitude rather than forecasts. The baseline implicitly reflects prevailing levels of AGPs and AMR embedded in historical production trends. The study provides a framework for quantifying the production effects of antimicrobial use (AMU) and their economy‐wide spillovers, highlighting the asymmetric timing of the economic costs of action and inaction under the imposed scenario structure.", "journal": "Journal of Agricultural Economics", "published": "2026-05-11", "url": "https://doi.org/10.1111/1477-9552.70041", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70041"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70033", "title": "Outcomes of a Public Program to Support Sustainable Livestock Farming: Evidence From Uruguay", "authors": "Emilio Aguirre, Juan Baraldo, Marcelo Caffera, Hugo Laguna", "abstract": "ABSTRACT As global demand for beef increases, balancing livestock productivity with environmental sustainability has become a policy priority. In response, Uruguay implemented the Sustainable Family Production Programme (PFIS) between 2015 and 2017, providing targeted support for small and medium‐sized cattle farmers to invest in productivity‐enhancing and climate‐adaptive technologies. This study provides the first causal evaluation of a national programme designed to promote these dual objectives in the cattle sector. Using a regression discontinuity design based on a strict eligibility threshold and panel data from 2015 to 2020, we evaluate the programme's effect on five dimensions: (i) the adoption of technology and practices, (ii) engagement in producer organisations, (iii) reported cattle health problems, (iv) beef production per hectare, and (v) greenhouse gas emissions intensity. The intervention significantly increased the application of reproductive and herd management practices, specifically early weaning, controlled mating, and ovarian activity diagnosis, without generating shifts in the other measured outcomes by the 2020 horizon. These results highlight both the potential and the limitations of integrated technology transfer programmes in promoting sustainable intensification of extensive livestock systems. They also suggest the need for longer‐term evaluations to capture potential effects on productivity and emissions that may emerge as these technologies, particularly reproductive ones, influence aggregate outcomes.", "journal": "Journal of Agricultural Economics", "published": "2026-05-11", "url": "https://doi.org/10.1111/1477-9552.70033", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70033"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70051", "title": "Adoption of New Practices in Latin American Agriculture: Livestock Technologies and Systems", "authors": "David J. Pannell", "abstract": "This issue of the Journal of Agricultural Economics includes a special section with four articles about farmer adoption of new livestock production technologies and systems in Latin America. These papers complement the large existing research literature on technology adoption in agriculture (as reviewed, for example, by Dessart et al. 2019; Foguesatto et al. 2020; Ruzzante et al. 2021; Möhring et al. 2024) and contribute to filling gaps in that literature. One of those gaps is research on practice adoption in Latin American agriculture in general. Existing research has primarily focused on agriculture in high-income countries in Europe, North America and Australasia (Pannell et al. 2006; Knowler and Bradshaw 2007; Dessart et al. 2019) or low-income countries of Africa and Asia (Kafle 2010; Yokamo 2020; Ruzzante et al. 2021). On a number of dimensions, agriculture in the three countries studied here, Uruguay, Columbia and Mexico, sits in between the characteristics of agriculture in high-income and low-income countries (e.g., yields, mechanisation, farm size, labour use), although there is overlap. Another area of relative neglect is research on the adoption of technologies and systems for livestock production. The great majority of existing studies focus on crop-production practices, including practices for increasing productivity and sustainability. The four papers included here address a wide variety of livestock production practices whose adoption has not previously been widely studied. They include controlled mating, artificial insemination, ovarian activity diagnosis, early weaning, various grazing strategies, pasture management, pasture improvement, adjustments to stocking rates, defined breeding periods, pregnancy diagnostics, post-calving nutrition, and adjusting the age of first pregnancy. Most studies of practice adoption in agriculture have analysed cross-sectional data at a point in time part-way through the adoption process. Most have used regression techniques to identify independent variables that are correlated with adoption, ex post. In most cases, causality is assumed, but the research methods do not allow it to be tested. The four papers presented here demonstrate that a wider range of approaches to studying adoption is possible and can be fruitful. Guerrero et al. (2026) conduct a Discrete Choice Experiment with 274 Uruguayan cattle producers to understand their stated preferences for adopting four different packages of sustainable livestock management practices, as well as adoption of silvo-pastoral systems (combining trees with pasture and livestock on the same land). The approach contributes to prediction of future adoption, rather than explaining past adoption. Their results indicate that the surveyed farmers hold favourable views of the presented livestock management practices and would likely adopt them if their circumstances allowed. On the other hand, they would require compensation to adopt the silvo-cultural practices. Most adoption studies treat adoption as a binary variable—adoption either occurs or it does not. For some farming practices, this neglects the fact that the decision made by a farmer is continuous. For example, a new grazing practice may be implemented in some proportion of a herd, ranging from 0% to 100%. Basurto-Hernández et al. (2026) analyse a very large sample obtained from agricultural censuses in Mexico (over 860,000 data points) to explain the allocation of grazing land across four types of grazing practice, ranging from less to more productive and sustainable. The results from their fractional multinomial logit model indicate that institutional factors, including insurance, credit, and extension services, have the largest influences on farmers' decisions to switch their livestock to more sustainable grazing systems. Relatively few studies evaluate the effectiveness of particular extension campaigns in enhancing practice adoption in agriculture (Marsh et al. (2000) is a relatively rare example) or the effect of adoption on outcomes such as productivity. Aguirre et al. (2026) examine a particular program in Uruguay (the Sustainable Family Production Program) that supports small and medium-sized cattle farmers to encourage their adoption of four productivity-enhancing and climate-adaptive technologies related to animal reproduction. Their analysis involves application of a Regression Discontinuity Design across two funding phases of the program. They found that the program positively influenced the adoption of some practices but not all of them. Interestingly, they were unable to detect any statistically significant increase in productivity or decrease in greenhouse gas emissions as a result of the successful adoption, highlighting the importance of looking beyond adoption itself when evaluating a program. Finally, Flórez-Díaz et al. (2026) employ the most frequently used approach to studying practice adoption in agriculture: an econometric analysis of cross-sectional data to identify the determinants of adoption. A feature of this study is the focus on a post-conflict zone in Colombia, with implications for land tenure and the effectiveness of institutional support structures. Consistent with previous studies, their analysis indicates that secure land tenure increases adoption of sustainable pasture management. However, secure tenure alone is not a sufficient condition for adoption. Also important is the production gain that can be achieved as a result of adoption. Farmers facing poor production levels, due to high aluminium levels in the soil affecting pasture production, were less likely to adopt. Without addressing this issue, via treatments to reduce soil acidity, the prospects for adoption of improved pasture management are limited. This highlights the importance of a finding by Montes De Oca Munguia and Llewellyn (2020) who reviewed a sample of existing adoption studies and found that many neglect the on-farm performance of the new practice (relative to the practice it replaces) when attempting to explain its adoption or non-adoption. I have highlighted a sample of findings from the four studies. There is much more to learn from detailed readings. It is hoped that these studies will inspire comparable research in other countries of Latin America, and the use of these research techniques globally. Open access publishing facilitated by The University of Western Australia, as part of the Wiley - The University of Western Australia agreement via the Council of Australasian University Librarians. The author declares no conflicts of interest. Data sharing not applicable to this article as no datasets were generated or analysed during the current study.", "journal": "Journal of Agricultural Economics", "published": "2026-05-11", "url": "https://doi.org/10.1111/1477-9552.70051", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70051"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70050", "title": "Sustainability and the Reallocation of Production Across Grazing Regimes in Livestock Systems: Evidence From Mexico", "authors": "Saúl Basurto‐Hernández, Allan Beltrán, Luis Peña‐Lévano", "abstract": "ABSTRACT Changes towards more sustainable livestock production are often evaluated in terms of whether farms abandon environmentally harmful practices. Less attention has been paid to how farms reallocate production across alternative grazing systems and how the composition of production evolves over time. This paper addresses this question by modelling grazing systems as compositional outcomes and examining how financial, institutional and structural factors shape the distribution of livestock across alternative regimes. We use farm level data from the 2007 and 2022 agricultural censuses in Mexico, covering more than 860,000 cattle farms and estimate a fractional multinomial logit model. Financial and institutional support is associated with economically meaningful reductions in free grazing. However, most of this adjustment occurs through confinement rather than controlled grazing. Heterogeneity analysis reveals that small and dairy farms allocate a larger share of production to confinement systems, whereas large and beef‐dairy farms allocate relatively more to controlled grazing. The results indicate that sustainability outcomes depend on how policy instruments interact with farm scale, production orientation and land constraints.", "journal": "Journal of Agricultural Economics", "published": "2026-05-11", "url": "https://doi.org/10.1111/1477-9552.70050", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70050"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70049", "title": "Adoption of Sustainable Livestock Innovations: Evidence from Latin America", "authors": "Allen Blackman, Gonzalo Muñoz, Lina Salazar, Paul Winters", "abstract": "ABSTRACT To maintain the vital economic benefits of Latin America's livestock sector while minimizing its environmental footprint, producers must adopt clean and climate‐friendly ‘sustainable’ technologies including improved feed, grazing, reproductive, and herd management practices. Yet we have limited evidence on the barriers to and opportunities for the adoption of such technologies, and even less on that topic in Latin America and other developing regions where socioeconomic and geophysical conditions often differ from those in the developed countries. The product of a competitive open call by the Inter‐American Development Bank, the four articles that comprise the Special Focus aim to help fill that gap. Three examine the determinants of adoption in Mexico, Colombia, and Uruguay; and the fourth presents a quasi‐experimental impact evaluation of a program aimed at promoting adoption in Uruguay. The findings suggest that: (i) generalizing about the drivers of the adoption of sustainable livestock technologies in Latin America is ill advised: they are both technology‐ and site‐specific; (ii) land tenure matters; (iii) adopting one sustainable livestock technology does not necessarily increase the chances of adopting others; (iv) adoption does not guarantee significant impacts on targeted outcomes; and (v) two of the most common policy interventions—enhancing access to credit and providing technical extension—are correlated with adoption, at least for some technologies and subgroups.", "journal": "Journal of Agricultural Economics", "published": "2026-05-11", "url": "https://doi.org/10.1111/1477-9552.70049", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70049"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70047", "title": "Sustainable Livestock Decisions in a Post‐Conflict Frontier: Evidence From Colombia's Orinoquía", "authors": "Hernando Flórez‐Díaz, Emiliano Lopez Barrera, Adriana María Molina‐Romero, Diana Elisa Correa‐Pinilla, Carlos Fontanilla‐Díaz", "abstract": "ABSTRACT The Orinoquía region is one of Colombia's principal agricultural frontiers and has been shaped by long‐standing armed‐conflict dynamics that continue to influence land governance, producer incentives, and investment decisions. Efforts to promote sustainable cattle production emphasize two key practices: sustainable pasture management (including rotational grazing systems) and ecologically appropriate stocking rates. However, their adoption varies widely because of institutional, economic, and biophysical constraints. This study applies a dual binary choice framework to examine the adoption decisions associated with these two practices and to assess whether they operate sequentially or independently. Results show that tenure security, measured through formal landownership, is strongly associated with the adoption of sustainable pasture management. In contrast, access to technical assistance is negatively associated with adoption, suggesting issues of program quality, targeting, or reverse causality. Older and more experienced producers are less likely to adopt, indicating path dependence. For stocking‐rate decisions, rotational and alternating grazing systems exhibit lower probabilities of meeting sustainable thresholds, likely reflecting implementation challenges in extensive systems. Larger finishing areas also tend to be managed less sustainably, and descriptive evidence suggests that unsustainable stocking in our sample is more frequently associated with understocking than overstocking, with 239 producers (70%) below 1 animal per hectare. These findings illustrate how structural and institutional conditions, including those linked to conflict legacies, shape sustainability transitions in the Orinoquía and can inform more tailored policy interventions for frontier livestock regions.", "journal": "Journal of Agricultural Economics", "published": "2026-05-11", "url": "https://doi.org/10.1111/1477-9552.70047", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70047"}, {"source": "crossref", "source_id": "10.1002/aepp.70085", "title": "Unpacking the Farmland Capitalization Effect of Ethanol Establishment", "authors": "Gabriel S. Sampson, Jisang Yu", "abstract": "ABSTRACT We unpack the impact of expansions in ethanol production—as measured by proximity to newly constructed ethanol plants and capacity expansions—on farmland values using land transaction data from Kansas in combination with modern causal inference techniques. We first show that Two‐Way Fixed Effects (TWFE) estimation with data aggregated to the county and township level leads to an average land value effect ranging from 4% to 9% for parcels located within 50 km of an ethanol plant. However, using a modern difference‐in‐difference estimator, we find no evidence of a statistically significant effect on farmland values. Furthermore, our analysis reveals no indication that land value proximity premiums rose following the 2005 Energy Policy Act. We find evidence that the average treatment effect detected by conventional TWFE is largely driven by land transactions in the proximity of ethanol plants that were established prior to the 2005 Energy Policy Act. Proximity to ethanol plants established after the 2005 Energy Policy Act has a smaller and less robust effect on land values.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-05-11", "url": "https://doi.org/10.1002/aepp.70085", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70085"}, {"source": "crossref", "source_id": "10.1002/ajae.70080", "title": "Contingent behavior modeling for dark skies valuation at Great Sand Dunes National Park", "authors": "Mark Eiswerth, Liam Mullen, Guanyi Yang", "abstract": "Abstract Dark sky conservation is increasingly popular, requiring facility upgrades and community cooperation. This study assesses its economic benefits at Great Sand Dunes National Park and Preserve, a Gold Tier International Dark Sky Park. Through on‐site surveys, we collected data on visitor behaviors, expenditures, and night sky perceptions. We introduced a continuum of contingent night sky brightness levels based on visitors' home locations and measured changes in visitation. Our Travel Cost‐Contingent Behavior analysis shows that each unit increase in nightlight decreases visitation by 0.05 days over 5 years. Using a weighted Latent Class Negative Binomial (LCNB) model, we estimate consumer welfare losses under escalating nightlight pollution scenarios. If the park's night skies matched an average rural, suburban, or urban area, visitors' consumer surplus would fall by about 3%, 23–24%, and 42–44%, respectively. These results underscore the substantial economic value of preserving dark skies.", "journal": "American Journal of Agricultural Economics", "published": "2026-05-10", "url": "https://doi.org/10.1002/ajae.70080", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70080"}, {"source": "crossref", "source_id": "10.1002/aepp.70082", "title": "Understanding Egg Price Volatility and Policy Implications in the U.S. With Machine Learning", "authors": "Xuemei Zhao, Simon Meister, Lucie Maruejols, Xiaohua Yu", "abstract": "ABSTRACT Eggs are an inexpensive and sustainable source of proteins, but volatility in the U.S. egg prices has intensified in recent years, raising concerns over food affordability and market stability. This study examines the drivers of U.S. egg price dynamics over 2004–2025 using a two‐stage framework that combines LASSO‐based variable selection with an ARIMAX forecasting model. The results reveal strong price persistence, together with significant impacts of energy, feed costs and seasonal demand. The influence of avian influenza is strongly time‐dependent, with limited effects in full‐sample averages but significant impacts during high‐intensity outbreak periods, particularly in the mid‐2010s and after 2022. Out‐of‐sample forecasts indicate that the LASSO‐ARIMAX model reduces forecast errors by more than 60% relative to a univariate ARIMA benchmark. These findings suggest that stabilizing key input costs, strengthening timely epidemiological surveillance, and proactively managing predictable seasonal demand pressures are more effective than relying on any single explanatory factor.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-05-10", "url": "https://doi.org/10.1002/aepp.70082", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70082"}, {"source": "crossref", "source_id": "10.1002/aepp.70083", "title": "The Biofuels Blueprint: Understanding the U.S. Renewable Fuel Standard", "authors": "Maria Gerveni, Todd Hubbs, Scott H. Irwin, James H. Stock", "abstract": "ABSTRACT We provide a comprehensive review of the U.S. Renewable Fuel Standard (RFS), synthesizing nearly two decades of program evolution, market outcomes, and economic analysis. The RFS mandates minimum volumes of renewable fuel blending through a nested structure based on life‐cycle greenhouse gas reductions, enforced via tradeable Renewable Identification Numbers (RINs). Actual implementation diverged substantially from statutory targets, reaching only 20 billion gallons in 2022 versus the intended 36 billion, primarily due to failure to scale cellulosic biofuel production. RIN prices exhibit extraordinary volatility but follow rational economic fundamentals. Total inflation‐adjusted compliance costs are estimated to be $252.1 billion over 2011 through 2025.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-05-10", "url": "https://doi.org/10.1002/aepp.70083", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70083"}, {"source": "crossref", "source_id": "10.1002/aepp.70084", "title": "Assessing Household Welfare in Response to Rising Food Prices in The Gambia", "authors": "Roger Vorsah, Obed Quaicoe, Fafanyo Asiseh, John N. Ng'ombe", "abstract": "ABSTRACT This study examines how rising food prices affected household welfare in The Gambia using nationally representative data from the 2015/16 Integrated Household Survey (IHS‐3). The analysis reflects household consumption behavior and market conditions prevailing during that period and provides a structural benchmark for understanding vulnerability in an import‐dependent economy. Using data from 5443 households, we estimate price and expenditure elasticities for four key food groups—cereals, animal products, roots and tubers, and fruits and vegetables through a censored Quadratic Almost Ideal Demand System (QUAIDS) model that accounts for zero consumption and nonlinear expenditure effects. Results reveal substantial heterogeneity across income groups and geographic locations. Poor urban households are most vulnerable to food price increases due to greater market dependence and limited substitution options, while rural households are particularly sensitive to cereal price shocks. Compensating variation estimates indicate that poor urban households require significantly higher income compensation to maintain welfare following price increases. Although structural conditions have evolved since 2015, the findings provide baseline evidence on household demand responses and distributional impacts of food price shocks in The Gambia.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-05-10", "url": "https://doi.org/10.1002/aepp.70084", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70084"}, {"source": "crossref", "source_id": "10.1111/agec.70119", "title": "Heterogeneous Effects of Weather Shocks and Crop Diversification on Household Food Security. A Gender Dimension", "authors": "Khadijat B. Amolegbe, Eugenie R. Fontep, Bernadin G. C. Ahodode, Abdelkrim Araar, Emmanuelle D. M. Pagal", "abstract": "ABSTRACT About one‐quarter of the global population, that is, approximately 1.8 billion people, with 90% in low‐ and middle‐income countries, face substantial weather‐related risks. This paper studies how weather shocks are associated with crop diversification and household food security in Nigeria, with a focus on gendered plot management. We merge historical climate data with the World Bank's Living Standards Measurement Study—Integrated Surveys on Agriculture (LSMS‐ISA) to construct rainfall anomaly (z‐score) and temperature extreme (Killing Degree Days, KDD) measures, household crop diversification, and household food security indicators. Using a Two‐Way Fixed Effects (TWFE) model, we find that both rainfall shocks and extreme temperatures are negatively associated with household dietary diversity, but the relationship is mixed for other food security outcomes. Crop diversification is positively associated with food security under high temperature exposure, but the relationship is mixed under rainfall anomalies. The gender composition of household plot managers does not show a statistically robust moderating role in the aggregate; however, gender differences emerge at certain thresholds of weather exposure. The results highlight the heterogeneity in the crop diversification—food security relationship across weather dimensions.", "journal": "Agricultural Economics", "published": "2026-05-09", "url": "https://doi.org/10.1111/agec.70119", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70119"}, {"source": "crossref", "source_id": "10.1111/agec.70115", "title": "Production Gaps Among Farmers With Disabilities Are Associated With Limited Technology", "authors": "Francis Tsiboe, Edward Martey, Jacob Asravor", "abstract": "ABSTRACT In sub‐Saharan Africa, agriculture is vital; however, the systematic exclusion of persons with disabilities from farming hinders sustainable development and social equity. Although several studies have analyzed productivity differentials across various dimensions of social exclusion, empirical evidence on technology access, farming efficiency, and productivity gaps among farmers with disabilities remains limited. This study addresses this gap by evaluating disparities in crop production between farmers with and without disabilities in Ghana, with a particular focus on differences in technology endowment and production efficiency. Utilizing the meta‐stochastic frontier analysis coupled with statistical matching techniques on nationally representative farm‐level data from the 2012/13 and 2016/17 agricultural seasons, we find negligible differences in technical efficiency between the two groups (less than 0.5%). However, the productive capacity of the technology sets employed by farmers with disabilities is approximately 11%‐point lower than that of their counterparts without disability, resulting in a 9.5%‐point shortfall in crop production. This production shortfall is primarily driven by reduced per‐hectare use of critical inputs such as planting materials, labor, fertilizer, and agro‐chemicals. These findings highlight a significant disability‐associated technology access gap that reflects broader structural inequalities. Addressing these disparities is essential for promoting equitable agricultural development while harnessing the full potential of all farmers in Ghana.", "journal": "Agricultural Economics", "published": "2026-05-09", "url": "https://doi.org/10.1111/agec.70115", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70115"}, {"source": "crossref", "source_id": "10.1111/agec.70121", "title": "Issue Information", "authors": "", "abstract": "", "journal": "Agricultural Economics", "published": "2026-05-09", "url": "https://doi.org/10.1111/agec.70121", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70121"}, {"source": "crossref", "source_id": "10.1111/agec.70116", "title": "Assessing Basis Risk in Margin Insurance for Beef Cattle Farming in Brazil", "authors": "Beatriz Salandin Dal Pozzo, Vitor Augusto Ozaki", "abstract": "ABSTRACT Price volatility in agricultural markets directly affects the financial viability of rural producers, particularly in sectors characterized by narrow profit margins and long production cycles, such as beef cattle production. Futures contracts and agricultural insurance are commonly used to mitigate this risk; however, both instruments are exposed to basis risk, which arises from the divergences between futures and spot prices. This article has two objectives: to estimate the basis risk of futures contracts for fed cattle, feeder cattle, and corn, and to assess the basis risk associated with designing a gross margin insurance product adapted to the Brazilian context. The results show that basis risk for fed cattle and corn contracts was lower in São Paulo (7.51% and 4.85%, respectively) than in Mato Grosso do Sul (11.34% and 5.79%). Using state‐level prices as a proxy for feeder cattle futures reduced basis risk in both states, although the São Paulo proxy exhibited higher relative basis risk. The basis risk of the gross margin insurance product was estimated at 31.23% in São Paulo and 32.39% in Mato Grosso do Sul. These findings indicate that incorporating regional price differentials into margin insurance valuation is an effective policy strategy to reduce basis risk, allowing insured margins to better reflect local market conditions without introducing new futures contracts.", "journal": "Agricultural Economics", "published": "2026-05-09", "url": "https://doi.org/10.1111/agec.70116", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70116"}, {"source": "crossref", "source_id": "10.1002/ajae.70077", "title": "Preferential trading in agriculture: New insights from a structural gravity analysis and machine learning", "authors": "Dongin Kim, Sandro Steinbach", "abstract": "Abstract Preferential trade agreements (PTAs) contain various non‐tariff provisions, yet identifying their trade effects remains challenging because these commitments are high‐dimensional and strongly correlated within agreements. We estimated a theory‐consistent structural gravity model with domestic flows for 26 agricultural subsectors over 1988–2017 and employed a plug‐in Elastic Net‐penalized PPML approach to isolate the provisions that systematically shape agricultural trade. The procedure identifies 13 provisions that are particularly important for agricultural trade, spanning trade facilitation, SPS/TBT disciplines, and rules on competition and subsidies. After accounting for the impact of preferential tariff rates, a generic PTA indicator is still estimated to increase trade by 20%. This effect is absorbed once the identified provision bundle is included, demonstrating that trade patterns under PTAs are primarily shaped by specific non‐tariff commitments. The results point to clear channels: facilitation and transparency provisions are trade‐promoting, whereas stronger reliance on international standards is associated with lower trade, consistent with compliance‐cost mechanisms.", "journal": "American Journal of Agricultural Economics", "published": "2026-05-08", "url": "https://doi.org/10.1002/ajae.70077", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70077"}, {"source": "crossref", "source_id": "10.1002/ajae.70072", "title": "Irrigation investments and agricultural productivity in Northern China", "authors": "Zhuanlin Wang, Jinxia Wang, Kaixing Huang", "abstract": "Abstract Irrigation is widely recognized as a key driver of agricultural productivity and rural economic development, yet credible evidence on its impacts, mechanisms, and long‐term economic returns remains limited due to endogenous irrigation investments. Leveraging the timing of government irrigation investments and longitudinal household survey data spanning 15 years, we investigate how irrigation affects agricultural productivity. We find that irrigation investment increased the share of irrigated farmland by 11.0 percentage points, which in turn raised per‐area output by 14.9%, net agricultural income by 15.6%, agricultural total factor productivity by 13.7%, and per‐labor output by 36.2%. These effects are driven by four key mechanisms: increased use of high‐productivity inputs, expanded cultivation area, labor reallocation from farm work to off‐farm work, and mitigation of drought damage. The induced land expansion and labor reallocation explain the substantially larger increase in per‐labor output. A cost‐effectiveness analysis suggests a high return to irrigation investment, with approximately half of the return stemming from labor reallocation that increased off‐farm income. These results provide strong evidence that irrigation investment plays an important role in improving agricultural productivity and accelerating rural transformation, with benefits extending beyond the farm by influencing labor markets.", "journal": "American Journal of Agricultural Economics", "published": "2026-05-08", "url": "https://doi.org/10.1002/ajae.70072", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70072"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70116", "title": "Convergence of Agricultural Productivity and the Influence of Fiscal Expenditure in Sub‐Saharan Africa", "authors": "Gezahegne Seyoum, Wei Chen, Gemedo Furo, Agerie Nega Wassihun, Amenu Leta Duguma", "abstract": "ABSTRACT Agriculture is the cornerstone of sub‐Saharan Africa's (SSA) economy, contributing substantially to national income and employing a significant proportion of the labour force. Despite its economic importance, the sector remains dominated by smallholder farmers with low productivity. In response, the African Union launched the Comprehensive African Agricultural Development Program (CAADP) in 2003 to transition African agriculture from subsistence‐based to market‐oriented production through increased public investment. This study examines the impact of fiscal agricultural expenditure on agricultural productivity in the SSA region and investigates convergence in agricultural productivity across countries. Using unbalanced panel data from 30 SSA nations (2003–2023), we employed panel corrected standard errors (PCSE) to address cross‐sectional dependence, with feasible generalised least squares (FGLS) for robustness. Beta‐ and sigma‐convergence tests further assessed disparities in productivity trends. The findings reveal that agricultural expenditure has a significant impact on productivity: A 1% increase leads to a 0.02% rise in total factor productivity, a 0.05% increase in labour productivity and a 0.2% improvement in land productivity following the implementation of CAADP. In addition, the implementation period of CAADP used as a policy dummy also has a positive influence on agricultural productivity when compared to the baseline period. Similarly, the study indicates the persistent existence of absolute and conditional beta‐convergence in three agricultural measures. Meanwhile, sigma‐convergence tests confirm a reduction in dispersion of total factor productivity, but divergent results are observed for labour and land productivities. These findings suggest that heightened public investment is needed to accelerate productivity growth and narrow performance gaps in SSA's agricultural sector.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-05-08", "url": "https://doi.org/10.1111/1467-8489.70116", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70116"}, {"source": "crossref", "source_id": "10.1002/aepp.70080", "title": "Why Didn't I Get a Payout? Understanding Farmer Choices, Index Insurance, and Basis Risk", "authors": "S. Lucille Blakeley, Sean Posey, Kathy Baylis, Daniel Osgood, Stuart Sweeney", "abstract": "ABSTRACT Index insurance, while heralded as a potential solution to alleviate poverty and food insecurity among agricultural households, has its own set of challenges, notably basis risk. Basis risk is the discrepancy between the insurance payout and losses incurred, posing a significant deterrent to the adoption of index insurance. This study investigates the effect of basis risk training on the uptake of rainfall index insurance among rural farmers in Senegal, employing an educational simulation game as a pedagogical tool. Our results suggest that a lack of transparency and a misunderstanding of basis risk contribute to low participation and a lack of trust in index insurance.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-05-07", "url": "https://doi.org/10.1002/aepp.70080", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70080"}, {"source": "crossref", "source_id": "10.1002/ajae.70078", "title": "Performance of reward, punishment, and communication in common‐pool resource management: Evidence from grassland conservation in China", "authors": "Min Liu, Ming Jiang, Pengfei Liu, Jizhe Wang, Zihan Nie, Kaixing Huang, David Wuepper", "abstract": "Abstract Common‐pool resources—such as collectively‐owned grasslands—are often overused and depleted until effective conservation strategies are put into place. We conducted a lab‐in‐the‐field experiment to examine the performance of different management strategies on the sustainability of common‐pool grassland management in China. We designed three experimental interventions—reward, punishment, and communication—to evaluate how to cost‐effectively promote grassland conservation. Results reveal that the communication treatment is as effective as the reward and punishment treatments in promoting grassland conservation. However, unlike the reward treatment, communication does not require external funding or create income inequality among herders, and unlike the punishment treatment, it avoids undesirable impacts such as reducing herders' net payoffs. A mechanism analysis suggests that our communication treatment shifts herders' focus from exploitation to conservation. Our results indicate that incorporating communication interventions into grassland management strategies could improve their overall performance.", "journal": "American Journal of Agricultural Economics", "published": "2026-05-06", "url": "https://doi.org/10.1002/ajae.70078", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70078"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70055", "title": "Correction to ‘Protected Areas and Agricultural Biodiversity Conservation—Do Parks Increase\n                    <scp>AES<\/scp>\n                    Adoption?’", "authors": "", "abstract": "Wang, Y., C. Ritzel, N. El Benni, R. Finger, and G. Mack. 2026. “Protected Areas and Agricultural Biodiversity Conservation—Do Parks Increase AES Adoption?” Journal of Agricultural Economics 77, no. 1, 225–243. https://doi.org/10.1111/1477-9552.70017. In Table 2 in Section 4. Data, incorrect numbers of communes and farms were reported for some parks. These numbers were based on a previous version of analysis, which missed some communes due to imperfect alignment between the geodata for parks and the geodata for communes. The authors later corrected this mistake in their analysis by including the missing communes, but did not update the summary table. That is, in the published paper, for some parks, the numbers of communes and farms reported in Table 2 were inconsistent with those used in the analysis. The table, as well as the text directly above it, should be: ‘We merge park boundaries with farm locations to obtain the treatment groups. This results in 4276 treated farms in 188 communes. Other data sources are reported in Table 3. Table 2 presents each park's time of establishment, landscape type, and the number of communes and farms within the park.’ We apologize for this error.", "journal": "Journal of Agricultural Economics", "published": "2026-05-05", "url": "https://doi.org/10.1111/1477-9552.70055", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70055"}, {"source": "crossref", "source_id": "10.1002/ajae.70076", "title": "The Herfindahl neutral point: A firm‐level threshold for managing market concentration with evidence from US hog packing", "authors": "Andrew J. Keller, Krishna P. Paudel", "abstract": "Abstract This paper derives a firm‐level threshold, the Herfindahl Neutral Point, from the standard concentration index used in merger review. At this threshold, a marginal expansion leaves the index unchanged. Firms below the threshold reduce concentration when they expand; firms above it increase concentration. We derive exact formulas for discrete capacity additions and define bridging amounts that measure how far each firm sits from the threshold. Applying this framework to monthly federally inspected hog slaughter data from 2004 to 2024, we show that the sharp rise in concentration in 2016 is driven by acquisitions at firms that were near the threshold and then crossed it, while the subsequent partial decline reflects sustained growth among mid‐tier packers operating below it. The 2015 acquisition of Cargill's pork business illustrates how bridging amounts organize merger analysis within a standard concentration screen. Reallocating the $34.7 million in federal capacity grants awarded to hog‐sector processors under a targeting rule based on this threshold lowers the 2024 national hog packing Herfindahl–Hirschman Index by about 147 points relative to the pre‐award baseline. The framework requires only market shares and the baseline concentration index.", "journal": "American Journal of Agricultural Economics", "published": "2026-05-04", "url": "https://doi.org/10.1002/ajae.70076", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70076"}, {"source": "crossref", "source_id": "10.1002/aepp.70081", "title": "Coping With Production Risk: Effects of Sown Plant Diversity on the Attractiveness of Crop Insurance in Grasslands", "authors": "Nicolas Alou, Sergei Schaub, Martin Quaas, Robert Finger", "abstract": "ABSTRACT Increased frequency of extreme weather events, particularly droughts, threatens grassland farming by destabilizing yields and farms' economic viability. We examine, theoretically and through numerical simulations, how sown plant diversity (natural insurance) influences the attractiveness of indemnity and drought index insurance (formal insurance) in grassland systems across Europe. Our analysis shows that higher sown diversity reduces farmers' willingness to pay for indemnity insurance, suggesting adverse selection. In contrast, drought index insurance remains equally attractive regardless of diversity. These effects hold across different insurance designs and risk preferences. Our findings offer valuable insights for farmers, insurers, and policymakers aiming to build resilient, sustainable agricultural systems.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-05-03", "url": "https://doi.org/10.1002/aepp.70081", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70081"}, {"source": "crossref", "source_id": "10.1002/aepp.70079", "title": "Certified and Stable? Price and Yield Volatility Under Voluntary Sustainability Standards in Peru", "authors": "Eva Boonaert, Eva‐Marie Meemken, Miet Maertens", "abstract": "ABSTRACT Prior research analyzes the economic effects of Voluntary Sustainability Standards (VSS)—such as Fairtrade, Organic, and GlobalGAP—but little is known about the stability of these effects over time. Using a nationally representative farm survey of Peru (2015–2019), this study analyzes whether VSS certification is associated with reduced inter‐annual price and yield volatility. Applying pooled OLS, matching, and internal instruments, we find that certification is associated with 27% lower price volatility and 17% lower yield volatility, particularly benefiting family farms, translating into an 81% reduction in their net farm revenue volatility. The results highlight VSS' potential to enhance revenue stability.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-05-03", "url": "https://doi.org/10.1002/aepp.70079", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70079"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103079", "title": "Hidden one-stop shops in transforming agrifood value chains: Agro-input retailers in Myanmar", "authors": "Joseph Goeb, Bart Minten, Joanna van Asselt, Thomas Reardon, Zin Wai Aung, May Thet Htar", "abstract": "", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103079", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103079"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103086", "title": "From grain self-sufficiency to food system resilience: Rethinking China’s approach to food security", "authors": "Mingliang Wang, Xinming He, Li Bai, Shunlong Gong", "abstract": "", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103086", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103086"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103084", "title": "Policy mixes and major emission reductions in European agriculture", "authors": "Christian Stetter, Viviane Buser, Robert Finger", "abstract": "Greenhouse gas (GHG) emissions from agriculture are a major driver of climate change. Although various policies have been implemented to reduce agricultural GHG emissions, there is limited understanding of the effectiveness of existing climate policies. Existing ex-post evaluations have mainly focused on establishing causal evidence for specific policies in isolation, potentially overlooking the interactions and combined effects of policy mixes. This paper aims to address this limitation by applying a reverse causal approach to analyze how policy mixes drive major GHG emission reductions in agriculture. We identify policy-induced structural changes in agricultural GHG emissions across the 27 European Union (EU) member states between 2000 and 2021. The detected breaks are then systematically linked to associated policy mixes. To characterize these mixes in more detail, we employ a large language model (LLM) classifier to identify specific policy instruments within the relevant legislative texts. In total, we consider more than 100,000 individual policy measures, spanning regulatory, market‐based, and voluntary instruments, to improve the plausibility that every detected change can be attributed to the potentially most relevant combination of policies. The analysis identifies ten successful policy interventions in seven EU member states, which reduced emissions between 5% and 24%. Our results reveal that successful reductions are rarely driven by single instruments but by policy mixes where regulatory baselines are reinforced by financial incentives and informational measures. Our findings emphasize the importance of policy combinations for effectively reducing agricultural GHG emissions and highlight the need for further efforts in the EU to improve climate change mitigation.", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103084", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103084"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103088", "title": "Adoption dynamics of food redistribution technology to enhance policy measures in the agri-food sector", "authors": "Marco Nasso, Emanuele Blasi, Francisco Alcon", "abstract": "The adoption of Food Redistribution Technology (FRT) plays a critical role in addressing the challenges of food security and waste prevention, particularly in the fruit and vegetable (FV) sector, which is characterized by high perishability of products and complex supply chain dynamics. FRT refers to organizational innovations that use information and communication technologies to connect stakeholders, developing business models that enhance redistribution activities and improve food system sustainability. This study employs duration analysis to identify the factors influencing the adoption of a FRT platform by Producer Organizations (POs) in Italy from 2012 to 2022. This method explores both endogenous and exogenous variables affecting the adoption process. The key drivers and barriers to FRT adoption identified provide insights into the adoption dynamic, considering managerial and entrepreneurial characteristics, economic performances, production features and institutional factors. The findings shows that that the innovative development of FRT is driven by the collaborative efforts between POs, public institutions, and non-governmental organizations, which jointly contribute to the design, implementation, and diffusion of these technologies. The results suggest that financial performance, infrastructure, and institutional influence the adoption process and can guide policymakers in promoting FRT diffusion in other countries. This research highlights the importance of supportive regulatory frameworks, technological development, and collaborative networks in fostering sustainable growth of the FV sector, which in turn provide a positive social impact by improving resource management and access to fresh FV product to vulnerable populations.", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103088", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103088"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103066", "title": "Leveraging social protection to strengthen Women’s and Girls’ Climate-Resilience in agrifood systems", "authors": "Melissa Hidrobo, Valerie Mueller, Shalini Roy, Elizabeth Bryan, Zahrah Nesbitt-Ahmed, Peter Läderach", "abstract": "Women and girls (WGs) have important roles in making agrifood systems more climate resilient. However, systemic inequalities in access to resources, technologies, information, services, and networks, alongside limited agency and restrictive gender norms, reduce their capacity to adapt to and mitigate climate change. WGs’ constraints on adaptation bear implications on the wellbeing of WGs, their households, and the sustainability of agrifood systems. With growing recognition that social protection helps promote WGs’ resilience in low- and middle-income countries (LMICs) at large scale, stakeholders are interested in developing social protection programs that are responsive to both climate change and gender inequality. However, little is known about effective approaches. We develop a conceptual framework on how social assistance – the most prevalent type of social protection programming in many LMICs – affects WGs’ coping, adaptive, and mitigative responses to climate hazards. We reflect on the emerging evidence and propose recommendations on program design features that may more effectively promote WGs’ climate resilience in agrifood systems. We additionally highlight important directions for future research to guide practice.", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103066", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103066"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103075", "title": "The impacts of integrating microfinance with agricultural extension on seasonal food insecurity: Evidence from a high-frequency panel survey in Uganda", "authors": "Ricardo Morel, Franziska Gassmann, Bruno Martorano, Nyasha Tirivayi, John Kamau", "abstract": "• Neither microfinance alone nor bundled with agricultural extension reduces food insecurity. • Dietary diversity fell during harvest and lean seasons in the bundled group. • Rigid loan repayment misaligns with agricultural cash flows, limiting program synergies. We study the impact of bundlin
