表紙", "abstract": "", "journal": "フードシステム研究", "published": "2026-01-06", "url": "https://www.jstage.jst.go.jp/article/jfsr/32/2/32_2_cover/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/jfsr/32/2/32_2_cover/_article/-char/ja/"}, {"source": "crossref", "source_id": "10.1002/ajae.70039", "title": "Do ecolabel price premiums move upstream? A firm‐level analysis of the Marine Stewardship Council ecolabel", "abstract": "Abstract Ecolabels aim to promote sustainable production practices, but their effectiveness in incentivizing producers remains debated, particularly in settings where there are groups of producers being certified. This reflects similar challenges as in other producer programs, such as generic marketing and quality programs. In the case of fisheries, for instance, the evidence with respect to the existence of price premiums at the producer level is mixed. This is partly due to limited access to upstream data that captures variations in market demand for ecolabeled products. This study uses firm‐level data from the Norwegian cod supply chain, encompassing purchase and sales prices over 8 years for two firms, to assess if a premium is associated with the ecolabel of the Marine Stewardship Council (MSC). Our data highlight that the firms handle both MSC‐certified and uncertified cod, indicating that certification is one of several product attributes. We find that there is a premium associated with the MSC label and that it is passed upstream. In addition, product form, size, and market destination significantly influence value distribution, and regional market variation shows substantial premiums in Northern and Western Europe but none in Eastern Europe.", "journal": "American Journal of Agricultural Economics", "published": "2026-01-05", "url": "https://doi.org/10.1002/ajae.70039", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70039"}, {"source": "crossref", "source_id": "10.1002/ajae.70038", "title": "Evolution and management of price risk in the carbon market: The role of hedging", "abstract": "Abstract This paper is motivated by the observed discrepancy between rising price volatility and declining hedging demand in the European Union Emission Trading System (EU ETS). To investigate whether the effectiveness of carbon futures as hedging instruments persists under varying scenarios, this paper evaluates the evolving price risk in the EU carbon market and examines the role of hedging in managing the risk. It investigates tail risk (corresponding to adverse market shocks occurring under rare events) and its temporal evolution over successive phases of EU carbon policy. Price risk is assessed empirically based on a quantile vector autoregression model of marginal price distributions along with a copula evaluation of the joint distribution of futures price and spot price. Applied to EU Allowance market over the period of 2008–2023, we find that: (1) the price distributions of both spot and futures market exhibit heavy‐tailed and leptokurtosis properties, thereby highlighting the significance of tail risk under changing policy schemes, such as the four phases of the EU ETS and shifting emission and energy policies; (2) decomposing the cost of risk across quantiles, we show that the risk located at the lower tail of the price distributions plays a dominant role; (3) we propose a novel Minimum Cost‐of‐Risk method based on the quantile vector autoregression, which more effectively evaluates the overall hedging performance in terms of cost of risk reduction compared to the traditional Minimum−Variance method.", "journal": "American Journal of Agricultural Economics", "published": "2026-01-05", "url": "https://doi.org/10.1002/ajae.70038", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70038"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf064", "title": "Supplementing biofuel mandates with a carbon mitigation policy can lead to water quality co-benefits", "abstract": "Abstract Biofuel mandates can impact the environment in multiple ways that may be positive or negative, including affecting life-cycle greenhouse gas (GHG) emissions by displacing fossil fuels, affecting soil carbon stocks due to accompanying land use change, and water quality due to changes in fertilizer requirements and the mix of crops used as feedstocks. To achieve desired environmental outcomes in the presence of a biofuel mandate, additional policy instruments must be adopted to supplement the mandate. We develop an integrated and spatially explicit ecosystem-economic modeling framework to analyze the cost-effectiveness of alternative policies to achieve desired targets for GHG emissions reduction from the agricultural and fuel sectors in the USA and nitrate leaching reduction in the Gulf of Mexico below the levels that would be achieved by a corn ethanol and/or a cellulosic ethanol mandate in the USA. We find that while a corn ethanol mandate lowers GHG emissions, it increases nitrate leaching due to the expansion of corn production; a cellulosic ethanol mandate lowers both GHG emissions and nitrate leaching relative to a corn ethanol mandate, but the additional carbon and nitrate prices are needed to achieve anticipated GHG reduction and nitrate reduction targets. We also find that accompanying a biofuel mandate with a GHG reduction target alone leads to substantial nitrate reduction co-benefits, but a nitrate reduction target alone is less effective in reducing GHG emissions. Combining a GHG standard with a nitrate standard can achieve GHG and nitrate reduction targets at lower carbon and nitrate prices as compared to implementing each of these policies independently. Our findings show that disregarding policy co-benefits can overestimate the GHG and nitrate prices needed to achieve policy targets and higher policy costs.", "journal": "European Review of Agricultural Economics", "published": "2026-01-05", "url": "https://doi.org/10.1093/erae/jbaf064", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf064"}, {"source": "crossref", "source_id": "10.1002/aepp.70052", "title": "Routine Actuarial Adjustments Cut Taxpayer Cost in Subsidized Agricultural Insurance", "abstract": "ABSTRACT Government‐subsidized agricultural insurance plays a vital role in farm risk management but exposes taxpayers to substantial fiscal risk, intensifying debates over program efficiency and fiscal restraint. Using more than 3 million observations across 32 U.S. commodities from 2001 to 2024, this study evaluates how routine adjustments to rating parameters affect taxpayer costs. The results show that updating all ratemaking parameters reduces taxpayer expenditure by roughly 10% annually, while updating reference yields alone can generate savings of up to 15%. Although most states benefit, gains are uneven, underscoring the challenges of achieving actuarially and fiscally sound pricing.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-01-05", "url": "https://doi.org/10.1002/aepp.70052", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70052"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70025", "title": "Insights from the Presidential Addresses to the Agricultural Economics Society", "abstract": "ABSTRACT The Society's published presidential addresses have embraced a wide range of subject matter, reflecting a ‘road well travelled’ in agricultural economics. The areas covered include the development and use of data and statistics, lessons from history, sectoral analysis, land economics, international trade and international development. There has been a major focus on the application of economic concepts to agricultural and agri‐environmental policy. The addresses also led to consideration of a number of important issues that go beyond the confines of technical analysis to a ‘road less travelled’. These issues include weaknesses in behavioural assumptions in economic theory, the challenge of objectivity in applied analysis, the limitations imposed by a static theoretical framework and the inadequacies of welfare economics in addressing distributional issues in policy choice. The addresses, spanning almost 100 years, demonstrate the role of agricultural economics in evidence‐based policymaking to address critical issues in the use of natural resources. The apparent rejection of the evidence‐based approach in some countries raises the question of whether humankind will be successful in finding a solution to the existential challenge posed by climate change.", "journal": "Journal of Agricultural Economics", "published": "2026-01-04", "url": "https://doi.org/10.1111/1477-9552.70025", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70025"}, {"source": "crossref", "source_id": "10.1111/ajae.v108.1", "title": "", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-01-01", "url": "https://doi.org/10.1111/ajae.v108.1", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/ajae.v108.1"}, {"source": "crossref", "source_id": "10.1111/agec.70092", "title": "Issue Information", "abstract": "", "journal": "Agricultural Economics", "published": "2026-01-01", "url": "https://doi.org/10.1111/agec.70092", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70092"}, {"source": "crossref", "source_id": "10.1111/agec.v57.1", "title": "", "abstract": "", "journal": "Agricultural Economics", "published": "2026-01-01", "url": "https://doi.org/10.1111/agec.v57.1", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.v57.1"}, {"source": "crossref", "source_id": "10.1111/agec.70090", "title": "Does Alcohol Prohibition Improve Caloric and Macronutrient Intake From Healthy Food Sources? Evidence From Bihar, India", "abstract": "ABSTRACT We examine the impact of a recent state‐led alcohol prohibition policy on caloric and macronutrient intake from healthy food sources in Bihar, India. We exploit an exogenous statewide ban on the production, sale, and consumption of alcohol implemented in 2016. Using data from two rounds of a nationally representative cross‐sectional survey conducted before and after the ban and employing a propensity score matching difference‐in‐differences framework, we find that alcohol prohibition led to significant increases in caloric, protein, and fat intake from healthy food sources. The policy was also associated with a decline in fat intake from unhealthy food sources. These findings are robust across a range of specifications and estimation strategies. Heterogeneity analysis reveals stronger effects among urban households, wealthier cohorts, and marginalized castes. The observed changes are likely driven by healthy behavioral spillovers, reduced marital conflicts, higher household earnings, income effects from the reallocation of resources previously spent on alcohol, and increased household spending on healthy food items such as pulses, dairy products, and healthy oils.", "journal": "Agricultural Economics", "published": "2026-01-01", "url": "https://doi.org/10.1111/agec.70090", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70090"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70083", "title": "Linking the ICRISAT Genebank to Poverty Reduction and Welfare in Malawi", "abstract": "ABSTRACT Genebanks contribute to the development of improved crop varieties through the conservation and supply of diverse germplasm for use in agricultural research by scientists, such as plant breeders. Tracing their contribution to the welfare and poverty impacts of improved varieties on smallholder farmers presents multiple challenges, as the germplasm is distributed to users globally and a crop improvement programme can take as long as 10 years to develop a new improved variety that can be released to farmers. We examine the relationship between genetic ancestry, development of improved groundnut varieties and poverty reduction among smallholder households in Malawi. First, we apportion the genetic ancestry and relative provenance of International Crops Research Institute for the Semi‐Arid Tropics genes of each variety and relate them to genebanks using pedigree data and expert interviews. We then leverage a three‐wave household‐level panel dataset with several estimation strategies, including panel and pseudo‐panel fixed effect estimators, to examine the association between genetic ancestry, the adoption of improved groundnut varieties and household welfare. We establish a positive association between genetic ancestry and the development of improved groundnut varieties. We find a positive association between the adoption of improved groundnut varieties and household income, assets and livestock (wealth). Improved groundnut varieties are also negatively associated with poverty indices. Our findings lend support and credence to continued investments in global efforts to conserve and widely distribute diverse genetic materials for crop improvement.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-01-01", "url": "https://doi.org/10.1111/1467-8489.70083", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70083"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70079", "title": "Managing Pesticide Resistance: Input‐Oriented Versus Result‐Oriented Tax Systems", "abstract": "ABSTRACT Pesticide resistance is a phenomenon that is becoming increasingly worrying. Heavy reliance on pesticides in the agricultural sector is at the core of this problem. In this paper, we analyse how farmers' pest control strategies can reduce pesticide resistance. We show that Integrated Pest Management is effective in limiting the growth of pesticide resistance. However, because one farmer's choices affect those of their neighbours, externalities remain and public policies are needed. We analyse two tax systems where one is polluting input‐oriented and the other is result‐oriented. We derive conditions under which both tax systems lead to socially optimal strategies. We show that a result‐oriented scheme needs less information on farmers' time preferences.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-01-01", "url": "https://doi.org/10.1111/1467-8489.70079", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70079"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70089", "title": "Issue Information", "abstract": "", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-01-01", "url": "https://doi.org/10.1111/1467-8489.70089", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70089"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70066", "title": "Youth Entrepreneurship in the Agribusiness Sector in Tanzania", "abstract": "ABSTRACT This study examines the involvement of youth in agricultural‐related activities in Tanzania. The data are nationally representative from the National Sample Census of Agriculture (NSCA) 2020. We adopt descriptive, Structural Equation Modelling (SEM) and econometric analyses. Results from the descriptive analysis show that unreliable rain associated with floods, pests and diseases and drought are critical problems, whereas low market price, market too far, high transport cost, lack of market information and insufficient production are major challenges affecting youth agripreneurship. Results from SEM reveal that mechanisation, irrigation, agro‐product processing, harvest value in TZS, credit, membership in a community group, training/extension, use of information source channels, farm input costs and land ownership are directly related to youth involvement in agripreneurship. At the same time, off‐farm income, general education, business ownership and age negatively influence youth entrepreneurship in agribusiness. The indirect/mediated effects of off‐farm income, farm input costs, credit and general education on youth involvement in entrepreneurship in agribusiness are reported. The robustness check results are consistent with the SEM results. Overall, the study proposes policy measures, academic and parental interventions to promote and retain many youths in agripreneurship.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-01-01", "url": "https://doi.org/10.1111/1467-8489.70066", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70066"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70086", "title": "Firm Strategic Labelling and Chinese Consumers' Preference for Carbonated Beverages: The Role of Healthfulness and Taste", "abstract": "ABSTRACT This study examines how firms' strategic responses to the public effort of sugar reduction influence Chinese consumers' beverage choices. We apply choice experiments to create market scenarios where companies emphasise low sugar and calorie content, as well as the use of natural sweeteners. Our findings indicate that consumers prefer diet cola labelled as ‘zero sugar and zero calorie’ and ‘natural sweeteners derived from stevia’ over diet cola without such specific claims. However, our results reveal no significant difference between the impact of these two distinct claims on consumer choices. We further observe that consumers favour regular cola over diet cola without specific product claims, implying that merely offering sugar‐free products may not motivate consumers to opt for more healthful beverages. Regarding the trade‐offs between healthfulness and taste in beverage choices, we find that although both factors are important, taste tends to have a greater influence on consumer beverage purchases.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-01-01", "url": "https://doi.org/10.1111/1467-8489.70086", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70086"}, {"source": "crossref", "source_id": "10.1111/ajar.v70.1", "title": "", "abstract": "", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-01-01", "url": "https://doi.org/10.1111/ajar.v70.1", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/ajar.v70.1"}, {"source": "crossref", "source_id": "10.1111/agec.70083", "title": "Armed Conflict and Climate‐Induced Weather Disruptions in Agricultural Input Use: Evidence From Ethiopia", "abstract": "ABSTRACT The recent surge in violent conflicts, intertwined with climate‐induced drought shock, is jeopardizing decades of development progress in many low‐ and middle‐income countries. This study investigates the compounded effects of armed conflicts and climate‐induced disruptions on agricultural input use in Ethiopia, a country experiencing significant fragility due to both factors. Utilizing a unique household‐ and plot‐level panel dataset collected before (2019) and after (2023) the onset of a widespread conflict, we examine how these disruptions affect the use of key productivity‐enhancing agricultural inputs such as inorganic fertilizers, improved seed varieties, agrochemicals, compost, and manure. We find conflict exposure significantly reduces the use of productivity‐enhancing agricultural inputs: inorganic fertilizer and improved seed use decline by 9% points, while compost and manure use fall by 11% and 13% points, respectively. These effects are magnified when conflict coincides with drought exposure, with fertilizer and improved seed use dropping by 25% and 22% points, respectively. We identify disrupted input markets—specifically reduced access to and availability of inputs, as well as rising prices—as key mechanisms. Conflict‐exposed households also experience significantly higher food insecurity and lower consumption. These findings underscore the compounding risks that conflict and climatic stress pose to smallholder agriculture and rural welfare. They highlight the need for anticipatory and post‐conflict resilience strategies that maintain functioning input markets and safeguard agricultural investment under fragility.", "journal": "Agricultural Economics", "published": "2025-12-31", "url": "https://doi.org/10.1111/agec.70083", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70083"}, {"source": "crossref", "source_id": "10.1111/agec.70085", "title": "Fast Machines, Big Losses: The Hidden Costs of Agricultural Machinery Socialization Services", "abstract": "ABSTRACT Agricultural machinery socialization services (AMSS) are the primary channel for mechanized grain harvesting in China. Nevertheless, mechanical harvest loss rates for the country's three staple grains exceed thresholds set by the Ministry of Agriculture and Rural Affairs (MARA), posing risks to national food security. This study examines the roots of opportunistic behavior among AMSS providers and its consequences for harvest losses. Using survey data from 649 rice farmers in Jiangsu, Sichuan, and Jilin provinces in China, we find that reliance on AMSS increases rice harvest losses, mainly because providers raise operating speeds—an expression of opportunism. Losses are higher when services are delivered by cross‐regional rather than local providers. Cross‐regional operators tend to work faster and find it difficult to build stable relationships with farmers; the one‐time deal of these interactions encourages opportunism. Seasonal time constraints further amplify these effects. When the harvest window is tight, dependence on AMSS significantly worsens losses. The results suggest that effective policy interventions must address the fundamental incentive misalignment in AMSS markets through standardized operating protocols, enhanced monitoring systems, and mechanisms that transform one‐time deal into repeated interactions.", "journal": "Agricultural Economics", "published": "2025-12-31", "url": "https://doi.org/10.1111/agec.70085", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70085"}, {"source": "crossref", "source_id": "10.1111/agec.70089", "title": "Preferences for Bundled Index‐Based Livestock Insurance: Evidence From Northern Kenya", "abstract": "ABSTRACT Considerable attention has been placed on bundled index insurance to enhance climate resilience, address multiple risks simultaneously, and increase the adoption of agricultural technologies. We conducted an endow‐and‐exchange choice experiment with 1,828 female and male livestock keepers in northern Kenya to elicit their preferences for bundled index‐based livestock insurance (IBLI). We measured relative willingness to pay (WTP) as the maximum amount of money that an individual is willing to pay to switch from one bundle to another. We found that livestock keepers were willing to pay 19%–33%, 100%–153%, and 148%–232% more for IBLI + animal nutrition , IBLI + animal health , and IBLI + flexible package , respectively, relative to IBLI + animal breed . Relative to the average WTP to switch from other bundles to IBLI + animal breed , women had 36%–45%, 54%–64%, and 76%–84% higher WTP than men for IBLI + animal nutrition , IBLI + animal health , and IBLI + flexible package , respectively. Providing information about bundled products and seasonal vegetation forecasts reduced the relative WTP for IBLI + animal nutrition . Our findings highlight the importance of considering the differential preferences of women and men when designing and promoting bundled IBLI products.", "journal": "Agricultural Economics", "published": "2025-12-31", "url": "https://doi.org/10.1111/agec.70089", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70089"}, {"source": "crossref", "source_id": "10.1111/agec.70084", "title": "Does Payment for Ecosystem Services Improve Technical Efficiency of Forage Production? Evidence From China's Grassland Ecological Compensation Policy", "abstract": "ABSTRACT China's Grassland Ecological Compensation Policy (GECP) is the world's most extensive grassland conservation program, based on a payment‐ for‐ ecosystem‐ services framework. Despite comprehensive studies on its impact, the underlying mechanisms remain unclear. Using survey data collected from 1039 forage farmers in Gansu and Qinghai provinces in China, this study employs a propensity score matching approach to address selection bias from observable factors. A selectivity‐corrected stochastic production frontier model was subsequently applied to correct for the bias due to unobservable characteristics. We find that GECP increased technical efficiency by more than 5.7%. Moreover, the unconditional quantile regression results demonstrate that farmers with higher TE quantiles benefit more from GECP than farmers with lower TE quantiles.", "journal": "Agricultural Economics", "published": "2025-12-31", "url": "https://doi.org/10.1111/agec.70084", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70084"}, {"source": "crossref", "source_id": "10.1111/agec.70088", "title": "Water Infrastructure and Grain Yield: Evidence From the South‐to‐North Water Diversion Project", "abstract": "ABSTRACT The South‐to‐North Water Diversion Project (SNWDP), the largest inter‐basin water transfer project in the world, was launched to address severe water shortages in northern China and to support agricultural production, ecological restoration, and urban development. This paper examines the impact of the SNWDP's central route on agricultural and ecological outcomes, with a particular focus on grain yield measured by the normalized difference vegetation index (NDVI). NDVI is used because it provides high‐frequency, fine‐resolution measures of vegetation health on both cropland and non‐cropland, allowing us to capture impacts on agricultural productivity as well as broader environmental conditions. Using a combination of difference‐in‐differences, instrumental variable estimation, and event study analysis, we find that the project significantly increases NDVI and grain yield. Further analysis shows that the project improves vegetation health more broadly by increasing the Leaf Area Index, surface water area, and soil moisture content, thereby confirming an enhanced water supply for irrigation and ecosystem support. These results highlight the effectiveness of large‐scale water diversion projects in improving both agricultural productivity and environmental conditions.", "journal": "Agricultural Economics", "published": "2025-12-31", "url": "https://doi.org/10.1111/agec.70088", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70088"}, {"source": "crossref", "source_id": "10.1111/agec.70086", "title": "Improving the Quality Competitiveness of Domestic Rice Relative to Imports: Experimental Evidence From Benin", "abstract": "ABSTRACT Previous research has shown that increasing food and nutrition sovereignty in sub‐Saharan Africa through rice requires investment in quality upgrading to help domestic rice compete with rapidly increasing imports. To increase the quality competitiveness of African rice relative to imports, enhancing processing quality is essential. In Benin, modernizing parboiling techniques has shifted production from traditional methods that often yielded inferior‐quality rice. Earlier studies found that consumers were willing to pay increasing price premiums for rice processed through locally improved and modern parboiling technologies. Since then, extensive video and radio campaigns on the nutritional benefits of improved parboiling have reached millions of processors and consumers throughout Benin, warranting a renewed assessment of the state of rice quality, as perceived, experienced, and valued by urban consumers. Using experimental auctions with tasting and collective induction rounds conducted in 2017, we assess the quality competitiveness of domestic rice processed with locally improved parboiling technologies and modern technologies such as GEM (Grain quality enhancer, Energy‐efficient and durable Material) and optical sorting, relative to imported rice, and test whether its competitiveness can be further enhanced through information and tasting. Empirical results from double‐hurdle models reveal that imported rice outcompetes domestic rice in terms of value and demand, despite the upgrading of domestic processing technologies. However, the quality competitiveness of parboiled domestic rice relative to imports is strengthened by taste experiences and, to some extent, by exogenous information conveying the nutritional benefits of improved parboiling. Whereas sensory experience shifted preferences from imported to domestic rice, endogenous information further redirected preferences from modern to local processing technologies. These findings suggest that promoting the experiential qualities of domestic parboiled rice, particularly its taste, can enhance its competitiveness against imports and increase food and nutrition security in Benin.", "journal": "Agricultural Economics", "published": "2025-12-31", "url": "https://doi.org/10.1111/agec.70086", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70086"}, {"source": "crossref", "source_id": "10.1111/agec.70087", "title": "New Administrative Geospatial Data for Agricultural Policy Evaluation: An Application to EU Crop Diversity Obligations", "abstract": "ABSTRACT This study performs an evaluation of the EU crop diversification obligation by leveraging administrative, geo‐spatial data sourced from agricultural subsidy registers in Spain. The key features of GeoSpatial Aid Application (GSA) data include national coverage, accurate identification of land use and, crucially, the ability to group land parcels managed by the same farm, thus enabling causal analyses at the holding level. We provide novel empirical evidence of bunching at diversification policy thresholds. We calibrate a model of farmers' decision‐making to GSA data and provide insights on the characterization of bunchers and compliers, finding stronger reactions among smaller‐sized holdings. We concisely discuss implications for future research endeavors in the agricultural policy domain.", "journal": "Agricultural Economics", "published": "2025-12-31", "url": "https://doi.org/10.1111/agec.70087", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70087"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70075", "title": "Asymmetric Business Cycle Fluctuations and Emissions: Evidence From African Countries", "abstract": "ABSTRACT This study examines the relationship between greenhouse gas emissions and the business cycle, which is important for environmental policy, given the potential conflict between environmental and economic growth objectives, especially in developing countries. Using a sample of 14 West and Central African countries, we implement a panel non‐linear autoregressive distributed lag (PNARDL) model on data from 1985 to 2020. The estimated coefficients indicate the existence of a long‐run asymmetric relationship between emissions and the business cycle. We also find unidirectional causality between periods of recession and CO 2 , asymmetric bidirectional causality between periods of expansion and CH 4 and no Granger causality between business cycles and N 2 O. From a decision‐making perspective, this study suggests an incentive for virtuous behaviour of the population towards the environment, hybrid environmental policies such as green monetary policies and carbon taxes.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2025-12-31", "url": "https://doi.org/10.1111/1467-8489.70075", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70075"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70082", "title": "Monetary Accounting of Cultural Ecosystem Services: Recreational Fishing in the Murray–Darling Basin, Australia", "abstract": "ABSTRACT Recreational‐related ecosystem services are culturally and economically significant activities that involve the direct interaction between people and the environment. In this study, we focus on cultural ecosystem services relating to recreational fishing—that is, the direct experiential benefits to individuals and communities associated with recreational fishing. Although monetary valuations of recreational fishing (using welfare values) are well established, their integration into ecosystem accounts remains limited. Ecosystem accounts require exchange values—values that the ecosystem service may realise if a market for such services existed. This paper addresses that gap by developing monetary ecosystem accounts for recreational fishing in the Murray–Darling Basin (MDB), Australia, using the System of Environmental Economic Accounting—Ecosystem Accounting (SEEA EA) framework. We apply the simulated exchange value (SEV) method to estimate accounting values consistent with SEEA EA and complement these with welfare values to provide a more comprehensive view of the benefits derived from recreational fishing. The study presents supply and use tables and auxiliary accounts. As such, it contributes to a small but growing set of examples that can be used to guide future ecosystem account development for recreational fishing as well as other recreational‐related ecosystem services.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2025-12-31", "url": "https://doi.org/10.1111/1467-8489.70082", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70082"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70080", "title": "Effects of Alternate Wetting and Drying on Water Savings and Rice Yields in The Philippines", "abstract": "ABSTRACT Water scarcity is a significant challenge for farmers in major rice‐producing countries, as traditional rice production typically requires rice fields to remain flooded throughout the growing season. Alternate Wetting and Drying (AWD) is a water management technique developed for rice cultivation where rice fields are allowed to dry intermittently. This paper evaluated the causal impact of the AWD irrigation technique on water savings and rice yields in a large‐scale gravity‐based irrigation system in the Philippines. Using a 2‐year panel data set from a trial based on a random encouragement design, we employ a difference‐in‐differences empirical strategy and conduct a number of robustness checks (e.g., propensity score matching, changes‐in‐changes and Kinky least squares) to achieve the study objective. We find strong positive impacts on water savings and no penalty in terms of rice yields when farmers are randomly encouraged to adopt AWD. Results from the heterogeneity analysis indicate that midstream farmers save the most amount of water and upstream and midstream farmers typically experience larger yield impacts. Findings highlight AWD's potential to address water scarcity and adapt to climate change, suggesting that water stress in major rice‐producing regions can be mitigated through broader adoption of AWD. The study also points to the need for more targeted promotion efforts and policy strategies to ensure more equitable water distribution in gravity irrigation systems.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2025-12-30", "url": "https://doi.org/10.1111/1467-8489.70080", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70080"}, {"source": "crossref", "source_id": "10.1002/aepp.70050", "title": "The Impact of Supply and Demand Changes on Non‐Real‐Estate Agricultural Loans", "abstract": "ABSTRACT This study examines the degree to which changes in non‐real‐estate agricultural loans at commercial banks are driven by changes in supply or demand. Our identification strategy exploits information provided by agricultural lending surveys conducted by three Federal Reserve Banks: Chicago, Kansas City, and Minneapolis. Building on recent studies of loan officer opinion surveys, we estimate the changes in agricultural loan supply and demand using an unbalanced panel of 1028 banks across the 2002–2021 period. The survey responses provide instruments for supply and demand changes to examine fluctuations in bank‐level agricultural loan volumes obtained from Federal Financial Institutions Examinations Council quarterly “call reports.” We find that changes in the volume of non‐real‐estate farm loans at commercial banks are principally driven by changes in excess loan demand. These findings support a careful approach for policies aimed at boosting supply of agricultural credit. JEL Classification: Q14, G21, Q00", "journal": "Applied Economic Perspectives and Policy", "published": "2025-12-30", "url": "https://doi.org/10.1002/aepp.70050", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70050"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70074", "title": "Impact of the National Rural E‐Commerce Comprehensive Demonstration Policy on Rural Labour Force Participation", "abstract": "ABSTRACT The expansion of the digital economy, particularly e‐commerce, has become a key driver of China's pursuit of high‐quality economic growth. This study examines the impact of the National Rural E‐commerce Comprehensive Demonstration Policy (NRECDP) on rural labour force participation in e‐commerce. Using a staggered difference‐in‐differences design and panel data from the National Fixed‐site Rural Survey (NFRS), we evaluate how the policy has shaped e‐commerce engagement in rural areas. The result shows that NRECDP significantly increased the share of the rural labour force involved in e‐commerce, raising village‐level participation rates by 0.30% during the pilot period. The effect was stronger in villages with lower human capital and those located near urban areas, indicating marked regional heterogeneity. Mechanism analysis suggests that the policy promoted rural e‐commerce mainly by lowering transaction costs, improving digital payment capacity and strengthening the local e‐commerce environment. These findings highlight the importance of maintaining targeted support policies to sustain rural e‐commerce development.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2025-12-29", "url": "https://doi.org/10.1111/1467-8489.70074", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70074"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70077", "title": "Paddy Cooperatives and Climate‐Smart Agriculture Adoption: A Case Study in the Vietnamese Mekong Delta", "abstract": "ABSTRACT Agricultural cooperatives in Vietnam help smallholders improve economic benefits and support farmers adapt to external shocks. Various policies have been implemented in Vietnam to develop agricultural cooperatives. The climate‐smart agriculture (CSA) approach is integral to the promotion of sustainable agriculture. However, whether cooperatives facilitate households' adoption of CSA technologies remains unclear. This study examines how paddy farms' participation in cooperatives affects their CSA adoption. We use propensity score matching (PSM) to assess the influence of cooperatives on the adoption of climate‐smart agriculture. The study's key results suggest that participation in CSA training and location in coastal provinces positively influence engagement in cooperatives. In contrast, cooperative membership is negatively affected by farming plots and farmer association membership. PSM indicates that the role of cooperatives in advancing CSA adoption becomes significant when the intensity of technical support increases from 1.4 to 2.1 cropping seasons. Cooperative membership has heterogeneous effects across farm and household attributes. The effects are greater on farms with a production scale of &lt; 2 ha, literate household heads and those that do not engage in off‐farm activities. To enhance how cooperatives support farmers adopting CSA, they should focus on training classes and facilitate farmland accumulation. JEL Classifications : Q13, Q54", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2025-12-29", "url": "https://doi.org/10.1111/1467-8489.70077", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70077"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70018", "title": "Clearing the Air: How Fine Particulate Matter Regulations Reshape Farmland Values in U.S. Corn and Soybean Regions", "abstract": "ABSTRACT We investigate the impact of air quality regulations targeting fine particulate matter (PM 2.5 ) on farmland values in corn and soybean producing counties in the United States over the period 1997–2022. Using self‐reported farmland value data from the Agricultural Census and county‐level pollution classifications provided by the Environmental Protection Agency, we employ a difference‐in‐differences event‐study design—incorporating inverse probability weighting and doubly robust estimators—to estimate the causal effect of regulatory interventions. Our primary analysis contrasts ‘non‐attainment’ counties, which failed to meet the National Ambient Air Quality Standards for PM 2.5 , with those that consistently maintained compliance. We further assess heterogeneous treatment effects by extending our analysis with a triple‐difference specification comparing counties with high versus low fertiliser use. Additionally, we employ the recentered influence function to conduct an unconditional quantile analysis across the entire distribution of farmland values. Our estimates indicate an 8.80%–8.94% decline in farmland values in ‘non‐attainment’ counties in response to the enforcement of PM 2.5 standards, suggesting that the economic costs of the prescribed standards were capitalised into farmland values, particularly in regions with higher fertiliser use. However, this impact was not uniform, with more pronounced effects observed among counties at the lower end of the farmland value distribution.", "journal": "Journal of Agricultural Economics", "published": "2025-12-28", "url": "https://doi.org/10.1111/1477-9552.70018", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70018"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70022", "title": "Is Technological Heterogeneity the Key to Sustainable Coffee Production Efficiency?: A Latent Class Frontier Analysis in the Traditional Coffee Region of Colombia", "abstract": "ABSTRACT Coffee producers deal with uncertainty due to high volatility in coffee prices. To navigate these challenges, producers must balance the tradeoff between higher yield and better quality utilising heterogeneous technologies, such as intensive production methods and environmental management practices. The aim of this study is to identify the extent to which heterogeneous technologies, particularly those focused on sustainable management, can influence the technical efficiency of Colombian coffee farms. Using the Latent Class Stochastic Frontier Model (LCSFM), we studied the unobserved differences in technologies among 387 Colombian coffee farms in the Andes. Our findings show that farms adhering to sustainable standards achieved an efficiency rate of 95.68%, compared to 74.93% for farms heavily reliant on chemical pesticides. These results underscore the efficiency benefits of sustainable practices and provide targeted recommendations to improve productivity among different groups of coffee growers. This research contributes to the broader understanding of how adopting sustainable technologies can enhance efficiency in coffee production, offering key insights for policymakers and practitioners aiming to stabilise and develop the sector.", "journal": "Journal of Agricultural Economics", "published": "2025-12-27", "url": "https://doi.org/10.1111/1477-9552.70022", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70022"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/2/97_102/_article/-char/ja/", "title": "「食料・農業・農村基本法」の改正にみるポスト新自由主義の度合", "abstract": "", "journal": "農業経済研究", "published": "2025-12-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/2/97_102/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/2/97_102/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/2/97_115/_article/-char/ja/", "title": "新自由主義の食生活と農業食料貿易構造", "abstract": "", "journal": "農業経済研究", "published": "2025-12-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/2/97_115/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/2/97_115/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/2/97_131/_article/-char/ja/", "title": "生物多様性と食品企業経営", "abstract": "", "journal": "農業経済研究", "published": "2025-12-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/2/97_131/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/2/97_131/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/2/97_142/_article/-char/ja/", "title": "環境負荷低減と食料消費行動", "abstract": "", "journal": "農業経済研究", "published": "2025-12-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/2/97_142/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/2/97_142/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/2/97_94/_article/-char/ja/", "title": "「新たな時代を迎える日本の食と農─ポスト新自由主義の食農経済論─」解題", "abstract": "", "journal": "農業経済研究", "published": "2025-12-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/2/97_94/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/2/97_94/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/61/4/61_169/_article/-char/ja/", "title": "アブラヤシ栽培の生産性とソーシャル・ネットワーク", "abstract": "", "journal": "農林業問題研究", "published": "2025-12-25", "url": "https://www.jstage.jst.go.jp/article/arfe/61/4/61_169/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/61/4/61_169/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/61/4/61_181/_article/-char/ja/", "title": "江蘇省都市消費者のコメ購買実態と「生き物ブランド米」に対する支払意思", "abstract": "", "journal": "農林業問題研究", "published": "2025-12-25", "url": "https://www.jstage.jst.go.jp/article/arfe/61/4/61_181/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/61/4/61_181/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/61/4/61_189/_article/-char/ja/", "title": "地理的表示産品産地運営者の満足度と規定要因", "abstract": "", "journal": "農林業問題研究", "published": "2025-12-25", "url": "https://www.jstage.jst.go.jp/article/arfe/61/4/61_189/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/61/4/61_189/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/61/4/61_197/_article/-char/ja/", "title": "ため池管理組織リーダーへの階梯", "abstract": "", "journal": "農林業問題研究", "published": "2025-12-25", "url": "https://www.jstage.jst.go.jp/article/arfe/61/4/61_197/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/61/4/61_197/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/61/4/61_205/_article/-char/ja/", "title": "農産加工事業者の経営意識分析", "abstract": "", "journal": "農林業問題研究", "published": "2025-12-25", "url": "https://www.jstage.jst.go.jp/article/arfe/61/4/61_205/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/61/4/61_205/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/61/4/61_214/_article/-char/ja/", "title": "内モンゴル半農半牧地域の農業経営における耕畜複合化の程度と農業所得", "abstract": "", "journal": "農林業問題研究", "published": "2025-12-25", "url": "https://www.jstage.jst.go.jp/article/arfe/61/4/61_214/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/61/4/61_214/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/61/4/61_223/_article/-char/ja/", "title": "集落ぐるみ型集落営農法人の経営性格の変容", "abstract": "", "journal": "農林業問題研究", "published": "2025-12-25", "url": "https://www.jstage.jst.go.jp/article/arfe/61/4/61_223/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/61/4/61_223/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/61/4/61_231/_article/-char/ja/", "title": "日本大学生物資源科学部国際地域研究所監修，川手督也・李裕敬・佐藤奨平編著『日韓台における有機農産物のフードシステム』", "abstract": "", "journal": "農林業問題研究", "published": "2025-12-25", "url": "https://www.jstage.jst.go.jp/article/arfe/61/4/61_231/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/61/4/61_231/_article/-char/ja/"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70019", "title": "Estimating Causal Effects With Observational Data: Guidelines for Agricultural and Applied Economists", "abstract": "ABSTRACT Most research questions in agricultural and applied economics are causal in nature: they study how changes in one or more variables (such as policies, prices or weather) affect one or more other variables (e.g., income, crop yields or pollution). Only a minority of these research questions can be studied with experimental methods, so most empirical studies in agricultural and applied economics rely on observational data. However, estimating causal effects with observational data requires an appropriate research design and a transparent discussion of all identifying assumptions, together with a critical discussion of how plausible they are. This paper provides an overview of approaches that are frequently used in agricultural and applied economics to estimate causal effects with observational data. It then provides advice and guidelines for agricultural and applied economists seeking to estimate causal effects with observational data, including how to assess and discuss the identification strategies adopted in their analysis.", "journal": "Journal of Agricultural Economics", "published": "2025-12-23", "url": "https://doi.org/10.1111/1477-9552.70019", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70019"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70020", "title": "Information, Beliefs and Support for Retaliatory Tariffs on US Agricultural Products: Evidence From a\n                    <scp>Randomised Controlled Trial<\/scp>\n                    in China", "abstract": "ABSTRACT The US–China trade war has profoundly reshaped global agricultural markets, yet the consequences of protectionist measures for domestic public attitudes—particularly within collectivist societies like China—have been underexplored. This study investigates how Chinese citizens perceive retaliatory tariffs on US agricultural products and explores how awareness of economic self‐interest shapes their support for such policies. We develop a simple theoretical model showing that trade policy attitudes are shaped by both social values and economic beliefs, with the influence of new information moderated by trust and cognitive capacity. The model predicts that information interventions can recalibrate beliefs towards actual economic interests, with effects varying by information credibility and individual human capital. Employing a randomised controlled trial in 2023, we demonstrate that backing for trade protection in China is robustly associated with collectivist values. Individuals demonstrate a strong propensity of alignment with government positions over economic self‐interests. However, when people learn about how tariffs will personally affect their household costs, they become less supportive of trade protection because they revise their expectations about economic consequences. Notably, the efficacy of these interventions depends critically on the respondents' trust in information and their level of human capital. Our findings offer new insights into the dynamics of public opinion formation in contexts where information flows are state‐mediated, with direct implications for the design of agricultural and trade policy communication strategies.", "journal": "Journal of Agricultural Economics", "published": "2025-12-22", "url": "https://doi.org/10.1111/1477-9552.70020", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70020"}, {"source": "crossref", "source_id": "10.1002/aepp.70040", "title": "Beyond the Ban—Shedding Light on Smallholders' Price Vulnerability in Indonesia's Palm Oil Industry", "abstract": "ABSTRACT The Indonesian government imposed a palm oil export ban in April 2022 to address rising cooking oil prices. This study explores oil palm smallholders' vulnerability to the policy using descriptive statistics, Lasso, and post‐Lasso OLS regressions. We analyze the perceptions of 382 smallholders in Jambi province and assess how the export ban affected their economic well‐being, including factors shaping pre‐ban sale prices and influencing the ban's price effects. Our findings show that the export ban led to an on average 63% decline in sale prices. Regression results show that households with off‐farm income sources were more resilient, while partially certified farms faced worse outcomes. Our study highlights the need for market‐based interventions and stronger smallholder integration to mitigate the adverse effects of future price shocks.", "journal": "Applied Economic Perspectives and Policy", "published": "2025-12-22", "url": "https://doi.org/10.1002/aepp.70040", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70040"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf065", "title": "Learning about best management practices: Theory and experimentation under the umbrella of crop insurance", "abstract": "Abstract Decision Support Systems (DSS) with embedded best management practices help reduce pesticide use. However, costly experimentation is necessary to learn about the quality of their data processing and recommendation models. We study farmers’ choices to try such a DSS. Due to order effects, learning can be inefficient and stop after inadequate recommendations, leading to crop losses. Subsidizing crop insurance conditional on DSS use is a cost-effective policy to foster experimentation. A 4-year living lab on-farm experiment involving French wine cooperatives, an insurer, and researchers supports our theoretical results on learning dynamics and provides additional insight into information requirements for subsidized green insurance.", "journal": "European Review of Agricultural Economics", "published": "2025-12-19", "url": "https://doi.org/10.1093/erae/jbaf065", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf065"}, {"source": "crossref", "source_id": "10.1002/aepp.70049", "title": "Synergies in Agricultural Biodiversity Conservation: Decomposing the Interaction Between Nature Parks and Agri‐Environment Schemes", "abstract": "ABSTRACT Understanding how policy instruments with overlapping goals interact is crucial for leveraging their synergies. This study explores the mechanisms for regional nature parks (a form of protected areas that impose no restrictions on agriculture) to enhance the adoption of biodiversity‐conserving agri‐environment schemes (AES) in Switzerland. Using data from Switzerland's 2023 farm census of 41,307 farms and a survey of 1009 farms from 2023, and accounting for regional landscape and socio‐economic characteristics via matching, we find that the adoption of three types of AES for biodiversity conservation is significantly higher within regional nature parks. To unravel the factors contributing to these differences, we conduct a decomposition analysis to parse out the relative importance of factors influencing AES adoption. We find that higher self‐efficacy regarding biodiversity conservation among farmers within parks explains up to 15% of the difference in AES adoption. Additionally, biodiversity goals by cantonal authorities play a key role. These findings suggest that enhancing farmers' perceived control over conservation practices and designing stronger pro‐biodiversity policies at regional levels could boost AES adoption, both within and outside park regions. For regions not designated as parks, agencies such as extension services could take up the role of fostering farmers' self‐efficacy regarding biodiversity‐conserving practices.", "journal": "Applied Economic Perspectives and Policy", "published": "2025-12-19", "url": "https://doi.org/10.1002/aepp.70049", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70049"}, {"source": "crossref", "source_id": "10.1002/aepp.70047", "title": "Livestock Tango: U.S. and Latin America Dance Together, but Who Will Lead?", "abstract": "ABSTRACT This study examines the competitiveness between Latin American and U.S. livestock and meat sectors. We employ a computable general equilibrium modeling framework to evaluate two scenarios: coordinated improvements in Latin American productivity, transport efficiency, and market access (Scenario I), and the minimum productivity gains required in the U.S. to regain its competitive position given improvements from Scenario I (Scenario II). Results highlight Latin America's transformative potential through advancements in technology, infrastructure, and trade, while emphasizing the importance of U.S. strategies to maintain market leadership. Policy implications focus on innovation, supply chain efficiency, and trade agreements to ensure sustained global competitiveness.", "journal": "Applied Economic Perspectives and Policy", "published": "2025-12-19", "url": "https://doi.org/10.1002/aepp.70047", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70047"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf066", "title": "Special issue editorial: In memory of Professor Gudbrand Lien (1966–2024)", "abstract": "Abstract This special issue of the European Review of Agricultural Economics honors the life and scholarship of Professor Gudbrand Lien (1966–2024), whose pioneering work bridged methodological rigor and practical relevance in agricultural and business economics. The collected papers reflect his enduring influence across productivity measurement, efficiency analysis and risk and sustainability research. Contributions span methodological innovations in stochastic frontier modeling, analyses of spatial and technological heterogeneity, entrepreneurship and diversification and environmental efficiency under climate change. Together, they illustrate Lien’s intellectual legacy—integrating theory, empirics and policy to advance a pluralistic, context-sensitive understanding of agricultural productivity and sustainable rural development.", "journal": "European Review of Agricultural Economics", "published": "2025-12-18", "url": "https://doi.org/10.1093/erae/jbaf066", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf066"}, {"source": "crossref", "source_id": "10.1002/aepp.70045", "title": "Did the Indian Green Revolution Change the Farm Size–Productivity Relationship?", "abstract": "ABSTRACT We examine the relationship between farm size and productivity during India's Green Revolution, a period of rapid technological transformation. Using a unique panel of over 5000 Indian farm households that spans the Green Revolution (1971–1999), we show that the classic (linear) inverse farm size–productivity relationship gradually evolved into the U‐shaped pattern observed today in India, with both small and large farms outperforming mid‐sized ones, by the turn of the century. The roll‐out of high‐yielding varieties seems to have driven this change, and also driven the increased rate of hired labor use and mechanization on large farms (relative to mid‐sized farms) that underpins that enhanced large farm productivity. Last, we show that the Green Revolution may have reduced the propensity of the smallest farms to grow into medium‐sized farms over time.", "journal": "Applied Economic Perspectives and Policy", "published": "2025-12-16", "url": "https://doi.org/10.1002/aepp.70045", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70045"}, {"source": "crossref", "source_id": "10.1111/ajae.70035", "title": "Issue Information", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2025-12-09", "url": "https://doi.org/10.1111/ajae.70035", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/ajae.70035"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70076", "title": "Soil Carbon Sequestration Policy in Australia: The Additionality Dilemma", "abstract": "ABSTRACT The Australian Carbon Credit Unit (ACCU) Scheme provides opportunities for farmers to benefit financially from sequestering additional carbon in their soils. The Scheme assesses additionality using a ‘newness’ test; if one of a list of eligible farming practices was not used by a farmer in a 5‐year baseline period, its use within the project is considered to be additional. However, this approach is unable to detect non‐additionality in cases where farmer adoption of the eligible farming practice is increasing in the absence of carbon credits. This analysis uses parameters from the actual scheme, combined with soil carbon sequestration rates informed by scientific research, and calculates net financial benefits to farmers from participation in the soil carbon method of the ACCU Scheme. In most scenarios modelled in this study, the net benefits to farmers from participating in the soil carbon scheme are small relative to other costs and revenues from farming (assuming that a recognised existing design problem with the scheme that is causing over‐crediting is corrected). As a result, the area of additional projects is relatively small and can easily be outweighed by non‐additional projects. Therefore, the expenditure on ACCUs required to achieve a tonne of genuine CO 2 ‐e mitigation can be extremely high: up to 80 times higher than the cost of an ACCU in one of the scenarios explored. The prospects of developing a system that accurately assesses the additionality of soil carbon projects seem remote.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2025-12-09", "url": "https://doi.org/10.1111/1467-8489.70076", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70076"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70078", "title": "Framing the Economy of the Future: Six Socio‐Economic Trends for Sustainability, Circularity and Inclusivity. By NielsFaber and SjorsWitjes, Northampton, USA: Edward Elgar Publishing Inc., 2024. 255 pp.\n                    <scp>ISBN<\/scp>\n                    : 978‐1‐78‐990023‐1", "abstract": "", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2025-12-09", "url": "https://doi.org/10.1111/1467-8489.70078", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70078"}, {"source": "crossref", "source_id": "10.1002/aepp.70048", "title": "Temperature and Farm Labor in Nigeria", "abstract": "ABSTRACT We estimate the impact of temperature shocks on the composition of farm labor in rural Nigeria using a nationally representative household panel survey. Leveraging plausibly exogenous year‐to‐year variation in growing season temperatures, we find that warmer temperatures significantly alter farm labor composition, prompting a substantial shift away from hired labor toward family labor. Interestingly, the displaced hired labor is not easily absorbed into non‐farm sectors in the short term; instead, high temperatures also reduce household participation in local non‐farm wage employment. We further provide suggestive evidence that households reallocate labor in response to temperature shocks because extreme heat renders reliance on external labor economically less viable. In particular, heat stress decreases farm productivity, lowering marginal returns to labor and incentivizing farmers to substitute costly hired labor with household labor. These findings underscore the multifaceted threat that climate change poses to rural livelihoods, reducing not only crop yields but also distorting labor allocation in ways that may further constrain farm productivity.", "journal": "Applied Economic Perspectives and Policy", "published": "2025-12-09", "url": "https://doi.org/10.1002/aepp.70048", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70048"}, {"source": "crossref", "source_id": "10.1002/aepp.70046", "title": "Subsidy Capture in Livestock Risk Protection Insurance: Assessing Prevalence and Program Exposure", "abstract": "ABSTRACT This study evaluates the potential for subsidy capture within the USDA's Livestock Risk Protection (LRP) insurance program. We show that contracts with expiration dates aligning with CME option expiration dates are purchased at elevated rates, particularly in feeder cattle and swine. The scale and timing of these purchases are consistent with subsidy capturing trading behavior. In contrast, we find no significant evidence of subsidy capture in fed cattle. Estimated maximum subsidy captures for 2024 reach $10 million in feeder cattle and $29.3 million in swine. Policy reforms targeting contract timing and pricing mechanisms are recommended to protect program integrity. JEL Classification: Q18, Q10, Q19", "journal": "Applied Economic Perspectives and Policy", "published": "2025-12-09", "url": "https://doi.org/10.1002/aepp.70046", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70046"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70017", "title": "Protected Areas and Agricultural Biodiversity Conservation—Do Parks Increase\n                    <scp>AES<\/scp>\n                    Adoption?", "abstract": "ABSTRACT Although both protected areas and agri‐environment schemes (AES) aim to conserve biodiversity, the interaction between the two policy instruments is unknown. We investigate the effects of listing a region as a protected area (a regional nature park) on the uptake of biodiversity conservation AES within the region. Using panel data of all Swiss farms between 2005 and 2020, and survey data on 15 Swiss regional nature parks established between 2008 and 2018, we analyse the effects of park establishment on farmers' adoption of three types of AES for biodiversity conservation (action‐based, result‐based, and agglomeration) in a heterogeneity‐robust difference‐in‐differences framework. Overall, parks significantly increase the adoption of result‐based AES. Moreover, the park effect depends largely on the agricultural baseline where parks are established. In regions with relatively more intensive agricultural production and lower AES adoption beforehand, the establishment of parks increases the adoption of result‐based and agglomeration AES, evidencing synergies between the two policies. Such effects are not observed in regions with more extensive agricultural production and high AES adoption prior to park establishment. Moreover, the effects of park establishment increase over time. Therefore, when introducing a new policy aimed at integrating biodiversity conservation into agriculture, it is important to account for baseline situations and identify synergies between intended and existing policies.", "journal": "Journal of Agricultural Economics", "published": "2025-12-08", "url": "https://doi.org/10.1111/1477-9552.70017", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70017"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70012", "title": "Do Adverse Events Influence Time Preferences? Evidence From Smallholder African Farmers", "abstract": "ABSTRACT Time preferences play a critical role in the agri‐food value chains of low‐income countries, impacting the choices of local operators, including innovation uptake. This paper assesses the association between smallholder farmers' individual characteristics, their exposure to diverse adverse events, and their intertemporal choices using in‐the‐field experiments conducted across five African countries. By jointly estimating time and risk preferences, we find that farmers who have experienced social setbacks during the previous year are more likely to be patient. This suggests that time preferences may vary over time, particularly when farmers are exposed to social distress (e.g., food shortage, health issues, violence, or crime). Moreover, we find gender to be a prominent factor associated with farmers' time preferences, with female farmers showing greater patience. These findings hold direct implications for both research and public policy initiatives aimed at influencing agricultural choices in the aftermath of social distress. By understanding the factors influencing time preferences, policy practitioners can develop more targeted and effective strategies to support smallholder farmers, thereby enhancing the resilience of agri‐food value chains in low‐income countries.", "journal": "Journal of Agricultural Economics", "published": "2025-12-08", "url": "https://doi.org/10.1111/1477-9552.70012", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70012"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf063", "title": "The impacts of seasonal weather anomalies on Italian farms’ total factor productivity", "abstract": "Abstract Understanding how seasonal weather anomalies brought by climate change impact on agricultural productivity is fundamental to food security. To allow proper site- and season-specific policy responses, micro-level assessments are needed. This study uses a panel data econometric approach to assess the impact of weather anomalies on Italian farms’ total factor productivity (TFP) over the period 2008–2020 using micro-level data. Estimates point to a complex TFP–weather relationship. Results confirm that seasonal weather anomalies have a negative effect on agricultural performance of different farm typologies. Effects tend to be larger the larger the weather anomalies.", "journal": "European Review of Agricultural Economics", "published": "2025-12-08", "url": "https://doi.org/10.1093/erae/jbaf063", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf063"}, {"source": "crossref", "source_id": "10.1111/ajae.70033", "title": "When wine walked into grocery stores: Examining the (un)intended economic consequences of wine Sale reform in Tennessee", "abstract": "Abstract Alcohol policy liberalization is a contentious issue in the United States, including debates over whether grocery stores should be allowed to sell wine. This issue reflects a dilemma between accommodating consumer convenience, promoting wine industry growth, and generating tax revenue, versus concerns about potential harm to liquor stores. However, there is a lack of empirical studies evaluating the dual impacts of wine sales liberalization following policy reforms. This study uses synthetic control methods and synthetic difference‐in‐differences to provide robust evidence on the impact that wine sale liberalization has on liquor store closures, employment outcomes, and wine excise tax revenue. Drawing on proprietary NielsenIQ data and official government statistics, the study provides a multidimensional assessment of how a 2016 Tennessee policy reform affected wine sales and supply chain dynamics. The results suggest that allowing grocery stores to sell wine had a statistically insignificant impact on the number of liquor stores, while also increasing wine excise tax revenue. However, there is mixed evidence of a potential short‐term decline in liquor store employment, where the statistical significance of the point estimate depends on the statistical approach. Recognizing that policy reform can have unintended economic consequences, these results provide valuable, policy‐relevant insights for stakeholders navigating the evolving landscape of alcohol distribution.", "journal": "American Journal of Agricultural Economics", "published": "2025-12-07", "url": "https://doi.org/10.1111/ajae.70033", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/ajae.70033"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70016", "title": "Labour Dynamics, Factor Substitution and Capital Adoption in Sub‐Saharan African Agriculture", "abstract": "ABSTRACT Ongoing structural transformations in many Sub‐Saharan African (SSA) economies are driving changes in labour inputs and wages, likely influencing smallholder agriculture and the direction of agricultural intensification processes. At the same time, the adoption of capital‐intensive technologies still remains puzzlingly low. This article, therefore, explores how smallholder farmers in Ghana, Tanzania and Malawi adapt their mix of production factors in response to evolving regional wage conditions. In particular, we investigate the nature of the relationship between capital and labour regarding their substitutability, given that the types of available capital and prevailing farming systems in SSA mean that mechanisation still requires significant complementary labour. Using a multi‐step method based on panel data, our results show that the elasticity of substitution between capital and labour is non‐unitary, indicating they are gross complements. In line with these findings, our binary choice model reveals that higher wages are likely to impede capital investment in African agriculture. Our findings corroborate recent literature from other regions and suggest that growth in the off‐farm economy could hinder the adoption of capital‐intensive agricultural technologies in SSA.", "journal": "Journal of Agricultural Economics", "published": "2025-12-05", "url": "https://doi.org/10.1111/1477-9552.70016", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70016"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70015", "title": "Direct and Indirect Effects of the\n                    <scp>COVID<\/scp>\n                    ‐19 Pandemic on\n                    <scp>EU<\/scp>\n                    Agri‐Food Trade", "abstract": "ABSTRACT Introducing and lifting COVID‐19 restrictions caused significant disruptions throughout the world economy, including in international trade. This study employs a panel gravity model to examine the impact of the pandemic on the agri‐food trade of EU countries. Specifically, we estimate the direct effects of the intensity of lockdown‐type policies on bilateral trade across country, product, and time dimensions, and the indirect effects of those policies as they work through domestic market impacts. We also decompose the indirect effects of COVID‐19 between the domestic demand side and supply side impacts. We provide insights into the sources of pandemic disruptions by comparing a ‘no‐COVID’ counterfactual scenario from March 2020 to February 2022 to the COVID‐19 reality. Our data analysis reveals a loss of 162 billion EUR in agri‐food trade due to direct and indirect effects of COVID‐19, equivalent to 11.3% of imports over the period. Approximately half of this total is comprised of intra‐EU bilateral trade. The COVID‐19 effects were proportionally greatest in the trade of fats and oils, and animal‐origin products, while vegetable‐origin and processed food products were affected only about half as much. Reduced intra‐industry demand was a dominant source of indirect effects in the trade of non‐processed food. In turn, the weakening of consumer demand was the main factor behind trade losses in processed food imports. The proportional trade impacts differ greatly across EU countries.", "journal": "Journal of Agricultural Economics", "published": "2025-12-05", "url": "https://doi.org/10.1111/1477-9552.70015", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70015"}, {"source": "crossref", "source_id": "10.1111/ajae.70030", "title": "Global agricultural value chains and food prices", "abstract": "Abstract We study the relationship between the extent of participation in global agricultural value chains (GAVCs) and food prices at the country level. Using longitudinal data on a sample of 138 countries for the period 2000–2015 and a shift‐share instrumental variable design, we study how the extent of a country's participation in GAVCs in a given year relates to food price levels and volatility in that same country and in the same year. We document a mean–variance trade‐off, finding that on average, participation in GAVCs is associated with a decrease in consumer food price levels but an increase in food price volatility. Looking at a country's upstream (i.e., closer to producers) or downstream (i.e., closer to consumers) positioning in GAVCs, we find that food price volatility is associated more strongly with downstream participation than with upstream participation.", "journal": "American Journal of Agricultural Economics", "published": "2025-12-03", "url": "https://doi.org/10.1111/ajae.70030", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/ajae.70030"}, {"source": "crossref", "source_id": "10.1111/ajae.70034", "title": "The incidence of grocery taxes in\n                    <scp>US<\/scp>\n                    food and factor markets", "abstract": "Abstract We study the incidence of county‐level grocery sales taxes across the United States from 2010 to 2019. We find substantial grocery tax over‐shifting to consumers. On average, a grocery tax that generates $1 in grocery tax revenue leads to a $1.44 rise in tax‐inclusive consumer food prices. This tax over‐shifting is even higher for lower‐income households and shoppers at discount and dollar stores. The grocery tax incidence varies significantly among foods, with over‐shifting highest for perishable staples. The increased retail margins arising from grocery tax over‐shifting do not translate into increased earnings for food retail workers nor higher farmgate prices for farmers.", "journal": "American Journal of Agricultural Economics", "published": "2025-12-03", "url": "https://doi.org/10.1111/ajae.70034", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/ajae.70034"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf062", "title": "The impact of agri-environmental measures on farms’ costs, labour and income", "abstract": "Abstract This study examines the impact of agri-environmental measures on crop and livestock costs, labour inputs and income growth, using FADN farm-level data for the years 2006 and 2013, covering the 2007–2013 programming period in 22 EU countries. Employing a difference-in-differences model combined with coarsened exact matching, the results show that while some specific production costs rise on subsidized farms, these increases differ by region. Income growth and labour inputs are consistently higher across all regions. In particular, crop protection costs rise significantly
