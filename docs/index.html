emi-variance models are less robust overall. Only the pesticide–expected outcome relationship appears plausibly causal. Therefore, conclusions about pesticides as risk-increasing or risk-decreasing inputs should be made with caution.", "journal": "European Review of Agricultural Economics", "published": "2026-06-17", "url": "https://doi.org/10.1093/erae/jbag010", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbag010"}, {"source": "crossref", "source_id": "10.1111/agec.70128", "title": "Online Benefit Redemption and SNAP Participation: Evidence From the SNAP Online Purchasing Pilot", "authors": "Chaebeen Yoon, Xiaowei Zhang, Qingxiao Li", "abstract": "ABSTRACT The Supplemental Nutrition Assistance Program (SNAP) is the largest federal nutrition assistance program in the United States, yet many eligible households do not participate due to administrative burdens, stigma, and geographic access constraints. We examine whether the SNAP Online Purchasing Pilot (OPP), which allows beneficiaries to redeem benefits online, affects program participation. Using a difference‐in‐differences design with state‐level data from 2017 to 2021, we find that SNAP OPP increases program participation per capita by 13.7% (1.6 percentage points) and participation among individuals below the poverty line by 11.3% (11 percentage points). Event‐study estimates indicate effects emerge within three months and persist thereafter. Participation gains are larger in states with higher digital infrastructure (computer ownership and internet access) and greater vehicle access, indicating that online and physical access function as complements. States with higher shares of elderly residents and households with children also exhibit stronger responses. These findings suggest that enabling online benefit redemption can expand safety net access, though benefits vary systematically with local infrastructure and demographic composition.", "journal": "Agricultural Economics", "published": "2026-06-17", "url": "https://doi.org/10.1111/agec.70128", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70128"}, {"source": "crossref", "source_id": "10.1002/aepp.70093", "title": "Impact of Cooperative Membership on Maize Harvest Losses in China", "authors": "Yi Luo, Xue Qu, Haimin Miao, Laping Wu", "abstract": "ABSTRACT Countries are accelerating actions to reduce food loss and waste to ensure global food security and sustainable development. Cooperatives are considered important channels for promoting the use of agricultural technologies and improving farmers' skills, which are regarded as key factors in reducing harvest losses. However, owing to data limitations, few systematic assessments of the effects of cooperative membership on food losses exist. On the basis of survey data from 703 maize growers in three major maize production areas in China, propensity score matching (PSM) and endogenous switching regression (ESR) were used in this study to evaluate the effects of cooperative membership on the maize harvest losses of households. The results revealed that membership significantly reduced maize harvest losses by 68%, saving farmers an average of 238.05 kg per ha, which is worth $91.92 per ha. Membership also contributed to minor pest attacks and better working attitudes during the harvest stage. Cooperative membership is critically important for China's food security, resource conservation, and environmental protection. If the average maize harvest loss reaches the level of loss observed among member households, then it is possible to meet the food consumption needs of 13.61 million people, saving 0.74 million ha of land and 0.29 million tons of fertilizer used for maize production and reducing carbon emissions by 4.04 million tons and the water footprint by 6.43 billion m 3 .", "journal": "Applied Economic Perspectives and Policy", "published": "2026-06-17", "url": "https://doi.org/10.1002/aepp.70093", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70093"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70124", "title": "Contracts and Ownership Structures in the Bioeconomy: A Review of Their Design and Role in Innovation", "authors": "Lukas Bonar Nainggolan, Julia Höhler, Alfons Oude Lansink", "abstract": "ABSTRACT Contracts and ownership structures play a critical role in fostering innovation in the bioeconomy. However, identifying which designs best promote bioresource circularity and collaboration remains challenging, as existing studies use diverse frameworks and are often limited to specific contexts or regions. Therefore, we conducted a review to clarify the types of contracts and ownership structures within bio‐based value chains and evaluate their roles in fostering innovation. To this end, we followed PRISMA‐P guidelines when collecting studies and organised them based on methodologies to facilitate the synthesis. Using a framework of the ownership distribution along the value chain between primary producer and biorefinery, we categorise three main categories of ownership structures: vertical integration, individual ownership and joint ownership. Some literature argues that primary producers prefer low‐risk attributes and therefore shift much of the responsibility onto biorefineries. While such structures can encourage participation, they hinder innovation by concentrating power within the biorefinery. Joint ownership structures, such as cooperatives, emerge as promising alternatives, offering a more balanced and collaborative approach to sharing risks, costs and profits. Our findings highlight the need for future research to explore joint ownership structures and apply different methods to support substantial advancement.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-06-15", "url": "https://doi.org/10.1111/1467-8489.70124", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70124"}, {"source": "crossref", "source_id": "10.1111/agec.70127", "title": "The Role of Economic and Weather Conditions in Farmer Suicide in the United States", "authors": "Qi Wu, Pierre Mérel, Richard J. Sexton", "abstract": "ABSTRACT Farmers commit suicide at high rates relative to the general population in the United States and elsewhere. Prior studies on farmer suicide have generally focused on socio‐demographic characteristics of individuals and on method of suicide, but few quantitative analyses have sought to understand the possible role of economic and climatic factors as determinants of suicide among farmers. This study addresses this void. We develop an economic model to show how poor economic outcomes or adverse weather conditions can reduce current‐period utility and diminish expectations of future utility through accumulation of debt and formation of expectations of future economic and climatic conditions, with suicide resulting in extreme cases. Our empirical analysis merges CDC nonpublic vital statistics, PRISM daily weather data, and USDA NASS crop and livestock price data into a county‐year panel to estimate the relationship between weather variables, economic factors, and farmer suicides. Results based upon a Poisson regression model show that long‐term, not transitory, poor economic conditions are associated with higher rates of farmer suicide. Extreme heat is also associated with increased farmer suicide, especially in counties most reliant upon animal agriculture. Precipitation appears to play little role in U.S. farmer suicide.", "journal": "Agricultural Economics", "published": "2026-06-12", "url": "https://doi.org/10.1111/agec.70127", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70127"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70127", "title": "Climate and Feeding Strategies: An Analysis of Productivity Growth in New Zealand Dairy", "authors": "Mario Fernandez, Mark Neal, Gavan Dwyer", "abstract": "ABSTRACT Productivity growth is essential for securing the long‐term profitability and competitiveness of pasture‐based dairy systems, particularly amid volatile input and output prices and increasing environmental constraints. This paper measures productivity growth using a total factor productivity index (TFPI) tailored to the seasonal, pasture‐based nature of New Zealand dairy farming. We apply a proper‐index approach to enable meaningful comparisons across time and farms. The TFPI is decomposed into key components: technological progress, scale and input‐mix efficiency, technical efficiency, production environment and statistical noise. To account for climate‐related variability, we integrate pasture growth indices as proxies for pasture availability supporting milksolids (fat + protein) production. Between 2012/2013 and 2023/2024, productivity growth plateaued, with the TFPI declining by 1.33% (−0.09% per annum). While technological progress increased by 6.9%, this was offset by declines in scale‐and‐mix efficiency (−4.2%), technical efficiency (−0.63%) and production environment favourability (−1.68%). Moreover, technological progress has stagnated since 2015/2016, suggesting that recent innovations have not translated into measurable productivity gains. These findings underscore the need for a multifaceted response to reverse productivity decline and secure competitiveness: accelerating innovation, strengthening technology adoption and building environmental resilience.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-06-12", "url": "https://doi.org/10.1111/1467-8489.70127", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70127"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70125", "title": "Recommendations to Reform the National Electricity Market (\n                    <scp>NEM<\/scp>\n                    )", "authors": "Tim Nelson, Paula Conboy, Ava Hancock, Phil Hirschhorn", "abstract": "ABSTRACT Australia's National Electricity Market (NEM) was established in the late 1990s. The market is an energy only gross pool with zonal (state‐based) pricing. Over the past 15 years, the system has undergone a profound transformation as large coal‐fired power stations have retired and substantial volumes of large‐scale and embedded behind the meter variable renewables have been installed. In this context, Australian governments commissioned a review into the NEM by an expert panel (the ‘NEM Review’). This article provides a summary of the key findings of the Panel across three key timeframes: the short‐term market (spot market) is largely fit for purpose but ‘hidden participants’ are impeding efficient outcomes and there are increasing risks to be managed as the system becomes more weather dependant; the medium‐term derivative market, used to manage risk, requires urgent attention to ensure liquidity and price transparency facilitate efficient management of spot price risk; and a new long‐term integrated market mechanism designed to overcome the ‘tenor gap’ should be introduced to facilitate long‐term investment.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-06-12", "url": "https://doi.org/10.1111/1467-8489.70125", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70125"}, {"source": "crossref", "source_id": "10.1002/aepp.70096", "title": "Outsourcing Agricultural Services and Risk Reduction in Smallholder Rice Farming: Evidence From China and Global Implications", "authors": "Jian Zhang, Ashok K. Mishra, Gaoli Zhu, Awais Jabbar", "abstract": "ABSTRACT Smallholder farmers in developing countries face the twin challenges of improving productivity and managing agricultural risks. One emerging response is outsourcing production tasks to specialized service providers. Using plot‐level data from rice farms in Jiangsu Province, China, and an endogenous treatment‐regression model, this study examines the effects of outsourcing on yields and production risks. Results show that outsourcing increases rice yields by nearly 3%, reduces yield volatility, and lowers the probability of crop failure. These benefits arise from greater access to mechanized services, the substitution of machinery for labor, and more efficient use of inputs. However, outcomes vary by type: machinery‐intensive outsourcing reduces risk, whereas labor‐intensive outsourcing can exacerbate it in weak service markets. Gains are greatest on larger and more fertile plots, underscoring the importance of policies that support mechanization and competitive service markets.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-06-12", "url": "https://doi.org/10.1002/aepp.70096", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70096"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70061", "title": "The Economic and Ecological Impact of Soy in Brazil: A Synthetic Control Method Approach", "authors": "Stefano Ghinoi, Simone Piras, Luca Tasciotti, Valdemar João Wesz Junior", "abstract": "ABSTRACT In recent decades, soy expansion in Brazil has generated significant environmental, social and economic impacts. However, there is no consensus about benefits and drawbacks, calling for a more careful account of the economic and ecological diversity of the territories where this phenomenon has been unfolding. By acknowledging this diversity, we investigate the economic and ecological impacts of soy by applying a synthetic control method to longitudinal data (1990–2019) at state level. We focus on three indicators (GDP, CO 2 emissions and deforestation) and explore how these indicators vary in five states (Goiás, Paraná, Piauí, Rio Grande do Sul, Tocantins). These states differ in terms of underlying conditions and timing of soy expansion but have in common a significant contribution of soy to their GDP. From an environmental perspective, the states where soy consolidated its presence during the period considered (Goiás and Paraná) experienced a general improvement compared to their synthetic counterfactuals, especially in terms of deforestation, while a pioneer state in soy production such as Rio Grande do Sul saw a worsening in environmental indicators, especially right after the 2008 global financial crisis. This is also reflected in the impact of soy on GDP, which has been negative in this state, suggesting that it may have suffered from being a plantation economy, with soy subtracting resources from potentially more beneficial sectors. This geographical and temporal heterogeneity indicates that the economic and environmental impact of soy cannot be reduced to a single dominant trend. The outcome depends on the trade‐offs with other sectors, which is in turn linked to the level of economic development of the state when soy took off.", "journal": "Journal of Agricultural Economics", "published": "2026-06-11", "url": "https://doi.org/10.1111/1477-9552.70061", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70061"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70126", "title": "The Feasibility of Household Food Waste Reduction in Finland: Insights From Five Consumer Profiles", "authors": "Aino Friman, Dušan Drabik", "abstract": "ABSTRACT We apply a household production framework to analyse how changes in cooking skills, waste‐abatement costs and wage rates influence the food waste behaviour of five consumer profiles in Finland. We find that achieving a given reduction in food waste through skill‐enhancing interventions induces larger behavioural adjustments than equivalent reductions in waste‐abatement costs. Higher wage rates, however, counteract efforts to decrease household food waste. Lowering abatement costs at the food preparation stage yields a greater overall reduction in waste than targeting the consumption stage. Our findings indicate that uniform, skill‐based interventions are unlikely to be sustainable without complementary structural support tailored to specific consumer groups. Accordingly, policy measures should combine skill development with targeted reductions in the costs of preventing food waste.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-06-11", "url": "https://doi.org/10.1111/1467-8489.70126", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70126"}, {"source": "crossref", "source_id": "10.1002/aepp.70095", "title": "Extreme Weather Events and Consumer Food Responses", "authors": "Ahmad Zia Wahdat, Joseph Balagtas", "abstract": "ABSTRACT This study investigates consumer food responses to Hurricanes Helene and Milton, which affected a swath of the Southeastern U.S. in 2024. Using representative consumer survey data from six affected states, we analyze 10 distinct food responses classified into ex ante and ex post responses, and examine their associations with food insufficiency and diet quality. We find that ex ante food stockpiling is associated with a lower likelihood of food insufficiency and a higher diet quality score. Conversely, the ex post drop in food spending due to income loss is associated with a higher likelihood of food insufficiency and a lower diet quality score. We also examine heterogeneity in food responses across sociodemographic groups. Our results suggest that targeted support for families with children and low‐income households warrant consideration.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-06-11", "url": "https://doi.org/10.1002/aepp.70095", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70095"}, {"source": "crossref", "source_id": "10.1002/ajae.70083", "title": "The role of venture‐financed startups in innovation for US agriculture", "authors": "Gregory D. Graff, Charles A. W. de Grazia, Nicholas E. Rada", "abstract": "Abstract To evaluate the role played by startup companies in the innovation ecosystem of US agriculture, we compile a unique dataset of 6024 new entrants founded 1987–2019 that details their financing lifecycles, annual economic performance, and patenting activities. One‐third of the firms in the sample have observable signs of contributing to innovation, including patenting and external financing such as grants and venture capital, thus characterizing them as startups. Such startups and their financing have grown substantially over the period studied. We use discrete‐time survival analysis to test factors related to firms receiving venture financing as well as to firms achieving successful financial exits. We find those firms that file for patents have higher likelihood of receiving financing than those that do not. Patent filings also increase the relative probability of a successful financial exit, which takes place primarily through mergers and acquisitions. In about a third of such exits, startups are acquired by corporate incumbents in agriculture well positioned to scale up and commercialize those startups' innovations for US agriculture. Importantly, a substantial portion of firms in the sample are still too young to have attained venture financing let alone a financial exit.", "journal": "American Journal of Agricultural Economics", "published": "2026-06-10", "url": "https://doi.org/10.1002/ajae.70083", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70083"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70062", "title": "An Economic and Environmental Analysis of Virtual Fencing for Precision Grazing", "authors": "Elias Maritan, Karl Behrendt, Sarah Morgan, Steven Mark Rutter, James Lowenberg‐DeBoer", "abstract": "ABSTRACT The UK grazing livestock sector is challenged by declining farm profitability and stringent environmental policy. Innovative technologies such as virtual fencing could enable a balanced economic and environmental performance of beef production. Virtual fencing is a livestock management tool relying on invisible boundaries perceived as auditory, electrical, or vibrational cues emitted by devices worn by grazing animals. This analysis compares virtual and conventional fencing from an economic and environmental perspective using a multi‐objective linear programming model. Optimal livestock management scenarios are identified for two typical UK cattle grazing systems. In intensive lowland beef finishing, virtual fencing achieves the lowest economic performance and a beef carbon emission intensity comparable to electric fencing. In an extensive upland suckler cow system, virtual fencing enables ecological conservation and reduces beef carbon emission intensity but increases labour input compared to set stocking. This ex‐ante assessment illustrates how precision grazing technologies can be simultaneously evaluated against economic and environmental objectives. The results indicate that, under current cost structures, virtual fencing is unlikely to be competitive with electric fencing in intensive lowland beef finishing systems, where it delivers similar environmental outcomes at higher cost. In contrast, in upland suckler cow systems, virtual fencing can support habitat protection and reduce beef carbon emission intensity but remains constrained by capital and labour costs. These findings suggest that virtual fencing is unlikely to be widely adopted on purely commercial grounds but could play a targeted role in the delivery of publicly subsidised conservation programmes such as the UK's Environmental Land Management schemes.", "journal": "Journal of Agricultural Economics", "published": "2026-06-10", "url": "https://doi.org/10.1111/1477-9552.70062", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70062"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70120", "title": "Urban Agriculture Adoption, Diet Variety and Rural Support Among Urban Zimbabwe Households", "authors": "Lloyd Chigusiwa, Asankha Pallegedara, Terrence Kairiza", "abstract": "ABSTRACT Increasing rates of urbanisation, high unemployment and the absence of social security in developing countries are putting pressure on urban households' diets, prompting some to advocate urban agriculture as a fallback. Because households voluntarily choose to engage in urban agriculture, it is important to account for the self‐selection inherent in practising urban agriculture when evaluating the efficacy of urban agriculture in cushioning urban households' diets. Accordingly, we estimate the effects of practising urban agriculture on household dietary diversity using the endogenous switching model with a count outcome (ESMC) based on four pooled annual cross‐section surveys of Zimbabwean households from 2019 to 2023. We employ propensity score matching (PSM) as a secondary robustness check, acknowledging that it addresses selection only on observed characteristics. We offer three major findings. First, large households, and households headed by women, older heads and those that are married and living together with their spouses are ceteris paribus more likely to practise urban agriculture. Second, practising urban agriculture increases the likelihood that urban households will have greater dietary diversity. Third, urban agriculture improves dietary diversity only for the sub‐population of households that do not receive support from rural relatives. The findings of this study confirm the potential role of urban agriculture in improving the food and nutrition security of urban households without support from relatives in rural areas in developing countries.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-06-09", "url": "https://doi.org/10.1111/1467-8489.70120", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70120"}, {"source": "crossref", "source_id": "10.1002/ajae.70081", "title": "Natural disaster and intergenerational occupational choice in agriculture: Evidence from the\n                    <scp>US<\/scp>\n                    Dust Bowl", "authors": "Jhih‐Yun Liu", "abstract": "Abstract This paper examines how a natural disaster, the Dust Bowl, shapes occupational choices in farm households across generations. Using full‐count US census data, I find that young adult sons shift away from self‐employed farming toward wage farm work and nonagricultural sectors after the Dust Bowl. Younger children with affected farming parents are more likely to leave agriculture and earn higher income. Migration and schooling serve as mechanisms, and New Deal relief spending mitigates the Dust Bowl's effects. Overall, the Dust Bowl accelerated occupational reallocation among younger children of farmers and contributed to US mid‐20th century structural change.", "journal": "American Journal of Agricultural Economics", "published": "2026-06-05", "url": "https://doi.org/10.1002/ajae.70081", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70081"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70118", "title": "The Impact of Income Subsidies on Maize Harvest Losses: Evidence From Chinese Farmers", "authors": "Xue Qu, Yi Luo, Yonghao Hu, Laping Wu", "abstract": "ABSTRACT With the increasing risk of global food insecurity, countries have accelerated their efforts to reduce food loss and waste. Moreover, traditional agricultural policies, such as income subsidies, significantly impact farmers' behaviour and grain production and likely food losses. Based on survey data from 1885 maize growers in China, we measured maize harvest losses in China and empirically analysed the impact of income subsidies on such losses. The results showed that on average, 3.02% of the total maize amount was lost at the harvest stage, and the loss per unit area was 17.5 kg/mu (262.5 kg/ha). Income subsidies were significantly correlated with greater maize harvest losses, and this conclusion remained robust after potential endogeneity problems were resolved. A heterogeneity analysis revealed that the impact of income subsidies on maize harvest losses was significant for small‐scale farmers but not for large‐scale farmers. We suggest that the Chinese government should accelerate the transformation of agri‐food systems and the reform of income subsidy policies, which should encourage farmers to increase the scale of their operations, and these subsidies should be transformed into more targeted policies to meet the requirements for reducing food losses.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-06-05", "url": "https://doi.org/10.1111/1467-8489.70118", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70118"}, {"source": "crossref", "source_id": "10.1093/erae/jbag008", "title": "Costly regulation, minimal results: The EU’s deforestation regulation effect on global soy trade", "authors": "Manoj Sharma, Nelson B Villoria", "abstract": "Abstract The European Union Deforestation Regulation (EUDR) seeks to reduce deforestation by restricting market access to deforestation-embodied soy products in the EU market. The main concern is that such restrictions could shift the soy trade to unregulated non-EU markets. To shed light on this issue, we employ a gravity model, treating the EUDR compliance costs as additional trade costs for exports to the EU. We find that stricter compliance costs reallocate soy exports from South America toward non-EU markets, mainly China, divert the EU imports toward North America, and increase the prices of soy faced by EU soy users. Under the counterfactual scenario in which South America does not comply with the regulation, EU consumers face even larger price increases, while South American countries experience minimal terms-of-trade losses. Our analysis suggests that trade reallocation to an unregulated market could potentially dilute the impact of the EUDR, making it less effective in directly reducing deforestation linked to soy production.", "journal": "European Review of Agricultural Economics", "published": "2026-06-04", "url": "https://doi.org/10.1093/erae/jbag008", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbag008"}, {"source": "crossref", "source_id": "10.1093/erae/jbag011", "title": "The role of specialized knowledge and ‘know-how’ for firm productivity: Evidence from the equine sector", "authors": "Pia Nilsson, Hans Andersson, Tobias Heldt", "abstract": "Abstract Using matched employer–employee data, we examine how workforce knowledge characteristics relate to firm productivity in the equine sector. Using panel data on Swedish equine firms from 2010 to 2022, we construct measures of workforce composition, including occupation-specific education, accumulated work experience and knowledge diversity. The results show that access to occupation-specific human capital is positively associated with productivity, with substantial heterogeneity across firms. Knowledge effects are stronger among firms specializing in horse racing than in breeding, highlighting differences in the role of human capital across production orientations. The findings have implications for policy and firms’ investment decisions.", "journal": "European Review of Agricultural Economics", "published": "2026-06-04", "url": "https://doi.org/10.1093/erae/jbag011", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbag011"}, {"source": "crossref", "source_id": "10.1111/agec.70124", "title": "Gamification as an Approach To Enhance Comprehension in Risk Elicitation: Experimental Evidence From Smallholder Farmers", "authors": "Selina Bruns, Daniel Hermann, Oliver Musshoff", "abstract": "ABSTRACT Understanding risk attitudes is critical for agricultural development, as risk is ubiquitous in the lives of smallholder farmers. Accurate elicitation of risk attitudes is essential to analyze patterns and biases in decision‐making. Ensuring comprehension and attention in risk elicitation tasks is particularly important, as inattentiveness generates noise rather than reliable results. Achieving this remains challenging, especially among smallholder farmers in the Global South, since many sophisticated risk elicitation methods require numerical skills that rural populations often lack due to limited education. To contribute to addressing this problem, we isolate the effects of illustration and gamification in risk elicitation tasks‐two elements that may increase attention and engagement, potentially producing lower inconsistencies and more reliable results. We empirically test the Wheel ‐task, an elicitation method designed to be easy to understand and engaging, to motivate participation. The task follows a wheel‐of‐fortune model, where a spin determines the payout, while participants can always choose between spinning the wheel and a safe payout. We compare the Wheel ‐task results to the well‐established Holt and Laury task (HL‐task) in its original form, as well as with probabilities illustrated using the wheel. We collected the data among smallholder coffee farmers from rural Colombia and Peru and in a pilot phase among smallholder farmers from rural Cambodia. We find low levels of comprehension across all three tasks. More specifically, we find no substantial difference in comprehension or levels of risk aversion when illustrating the probabilities in the HL‐task using a wheel. However, gamification affects levels of risk aversion, although these effects appear to be culturally dependent.", "journal": "Agricultural Economics", "published": "2026-06-04", "url": "https://doi.org/10.1111/agec.70124", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70124"}, {"source": "crossref", "source_id": "10.1002/aepp.70092", "title": "Issue Information", "authors": "", "abstract": "", "journal": "Applied Economic Perspectives and Policy", "published": "2026-06-04", "url": "https://doi.org/10.1002/aepp.70092", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70092"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70060", "title": "Fertilising Climate Policy: The Dual Impact of\n                    <scp>CBAM<\/scp>\n                    on\n                    <scp>EU<\/scp>\n                    Agricultural Emissions and Regional Disparities", "authors": "Davit Stepanyan, Omid Zamani, Claudia Heidecke, Janine Pelikan, Jörg Rieger, Bernhard Osterburg, Alexander Gocht", "abstract": "ABSTRACT The Carbon Border Adjustment Mechanism (CBAM), scheduled to become fully operational in 2026, is designed to complement the EU Emissions Trading System (ETS) by replacing free emission allowances and preventing carbon leakage to non‐EU regions. CBAM initially covers energy‐intensive sectors, including mineral nitrogen (N) fertiliser production. Although mineral N fertiliser production is already included in the EU ETS, it is currently exempt from carbon charges owing to full compensation through free allowances. The phase‐out of these allowances and the introduction of CBAM are expected to increase the prices of both imported and domestically produced fertilisers, indirectly affecting the EU agricultural sector. This study quantitatively assesses the impacts of the expected fertiliser price changes on the EU agricultural sector and related environmental outcomes using the Modular Applied GeNeral Equilibrium Tool (MAGNET) and the Common Agricultural Policy Regionalised Impact (CAPRI) model. The results indicate that the combined effect of phasing out free allowances and implementing CBAM will double mineral N fertiliser prices. Higher prices are projected to reduce demand, leading to a 21.4% decline in domestic production and a 37% reduction in imports. Overall mineral N fertiliser use in the EU is expected to decrease by 22%, partially replaced by manure. Consequently, EU agricultural factor income is projected to fall by 7.7%, primarily affecting high‐input regions. Meanwhile, non‐EU agricultural income is projected to rise slightly by 0.05%, driven by higher exports. EU agricultural greenhouse gas emissions are expected to decrease by 22 megatons of CO 2 ‐equivalent, with no significant increase globally.", "journal": "Journal of Agricultural Economics", "published": "2026-06-03", "url": "https://doi.org/10.1111/1477-9552.70060", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70060"}, {"source": "crossref", "source_id": "10.1002/aepp.70094", "title": "How Video‐Based Information Affects Farmers' Willingness to Pay for Drone Services", "authors": "Hua Zhang, Lena Kuhn, Hang Xiong, Zhanli Sun, Thomas Glauben", "abstract": "ABSTRACT Professional service for digital technology like agricultural drones lowers transaction costs and scope thresholds for smallholders. Meanwhile, perceptual adoption barriers remain underexplored. We conduct a two‐stage choice experiment with a randomized video‐based information treatment among 384 Chinese crop farmers to measure its effect on farmers' willingness to pay (WTP) for agricultural drone services (ADS). While video‐based information significantly reduces farmers' WTP for contracts relative to oral agreements, it increases WTP for overall drone services among farmers who are younger, higher‐income, cultivate larger‐scale farms near tractor roads, have limited access to digital dissemination, and show lower risk preferences. By incorporating perceived uncertainty and risk management into the information‐adoption framework, we provide insights for policy support of digital agriculture service markets.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-06-03", "url": "https://doi.org/10.1002/aepp.70094", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70094"}, {"source": "crossref", "source_id": "10.1002/ajae.70082", "title": "Consequences of land retirement policies on agricultural labor and land tenure: Evidence from the historical Conservation Reserve Program in the United States", "authors": "Aparna Howlader, Liqing Li", "abstract": "Abstract Voluntary agricultural land retirement programs are widely recognized for their environmental benefits, yet their economic effects, particularly on labor markets and land tenure, remain less understood. This paper examines the short‐ and long‐term impacts of the first large‐scale US land retirement initiative, the historical Conservation Reserve Program, introduced under the 1956 Set‐Aside Act. Between 1957 and 1960, the program enrolled more than 30 million acres under 3‐, 5‐, or 10‐year contracts, which then expired gradually through 1970. Using a newly digitized Conservation Reserve Program enrollment database linked to agricultural census data from the 1950s through the 1970s, we find that counties with medium and high enrollment intensity experienced statistically significant declines in tenant‐cultivated land relative to low‐enrollment counties during the program's active years. In medium‐enrollment counties, tenant‐operated land declined by roughly 0.6 percentage points, while high‐enrollment counties experienced declines of approximately 1.6 percentage points nationally. The proportion of tenant farm operators also fell in both medium‐ and high‐enrollment counties. These effects were larger and more persistent in the South, especially in counties with higher shares of nonwhite farm operators and sharecropping.", "journal": "American Journal of Agricultural Economics", "published": "2026-06-02", "url": "https://doi.org/10.1002/ajae.70082", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70082"}, {"source": "crossref", "source_id": "10.1093/erae/jbag004", "title": "Comparing the effects of regulating new genomic techniques on investment decisions in the European Union", "authors": "Maximilian Kardung, Yasmine Ambrogio, Kutay Cingiz, Nicola Consmüller, Katharina Unkel, Kai Purnhagen, Justus Wesseler", "abstract": "Abstract We examine the economic impact of regulating new genomic techniques on investment decisions in the EU. Using a real options model, we compare five major regulatory options (nine including sub-options) with the status quo and analyse their effects on plant breeders’ investments. Using the current authorization process for genetically modified organisms for NGTs presents a high investment barrier for companies. The findings indicate that all alternative five options offer opportunities to reduce investment hurdles, depending on the design of the authorization process. Our model and its calibration serve as an example for further advancing the application of real options for regulatory policy analysis.", "journal": "European Review of Agricultural Economics", "published": "2026-06-02", "url": "https://doi.org/10.1093/erae/jbag004", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbag004"}, {"source": "crossref", "source_id": "10.1111/agec.70120", "title": "From Meat to Plant‐Based Products? The Enduring Impact of BSE on Beef Consumption", "authors": "Jader Velásquez, Shon Ferguson", "abstract": "ABSTRACT This study reassesses the impact of the historical BSE outbreak on EU diets, showing that consumption patterns shifted persistently even after policy actions eliminated the food safety risk. Utilizing advanced difference‐in‐differences techniques on 1980–2020 data, we demonstrate that while beef consumption exhibited a transient U‐shaped recovery relative to other meats, it declined sharply compared to plant‐based products, with average reductions of 79%, 29%, and 28% for pulses, cereals, and vegetable oils, respectively. This highlights a structural dietary change, overlooked by previous analyses focused on meat substitution. Results are robust to sensitivity analyses. Understanding the primary drivers behind the structural shift in EU consumer diets over recent decades is crucial for future research investigating the reduction in red meat consumption driven by environmental and health concerns in high‐income countries.", "journal": "Agricultural Economics", "published": "2026-06-02", "url": "https://doi.org/10.1111/agec.70120", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70120"}, {"source": "crossref", "source_id": "10.1111/agec.70126", "title": "Land Consolidation, Tenure Documentation, and Land Rental Markets: Evidence from rural Vietnam", "authors": "Kim Lan Nguyen", "abstract": "ABSTRACT Land fragmentation is widely recognized as a constraint on smallholder agriculture, raising production costs, limiting mechanization, and reducing efficiency. Land consolidation programs have been introduced in many countries to address this problem, yet their economic effects depend not only on plot reconfiguration but also on institutional implementation and land market functioning. This paper examines the impacts of Vietnam's state‐led land consolidation program using six waves of household panel data (2008–2018) from two provinces where consolidation was implemented. Impacts are estimated with two‐way fixed effects and a staggered difference‐in‐differences approach that accounts for heterogeneous adoption timing. The results show that the consolidation program substantially reduced land fragmentation: the number of plots per household fell by roughly three plots, average plot size increased by about 66 percent, and the distance between plots and homesteads declined by approximately 23 percent. At the same time, administrative delays in reissuing land‐use‐right certificates temporarily reduced the share of titled and collateral‐eligible land. While households’ overall access to credit is not adversely affected, land rental markets are significantly disrupted, with both rent‐in and rent‐out declining. Such reductions in land transactions may impede efficient land reallocation and operational scale adjustment, thereby delaying investment and productivity gains from improved land structure. Overall, the findings highlight the importance of institutional implementation and complementary market functioning for realizing the benefits of land consolidation in Vietnam and other smallholder economies.", "journal": "Agricultural Economics", "published": "2026-06-02", "url": "https://doi.org/10.1111/agec.70126", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70126"}, {"source": "crossref", "source_id": "10.1111/agec.70123", "title": "Farmland Liquidity Under a Tightened Ownership Regime: Urban–Rural Heterogeneity in South Korea", "authors": "Jiseon Choi, Gwangseok Chae", "abstract": "ABSTRACT In real estate markets featuring substantial search friction and strong seller loss aversion, external shocks that shift buyer valuations are largely reflected in liquidity fluctuations, while price adjustments tend to be rigid. This study examines market liquidity shifts following the tightening of South Korean farmland ownership regulations, utilizing the 2021 Farmland Act amendment and nationwide parcel‐level transaction data (2013−2023). We estimate the relationships between land liquidity, policy change, and key macro variables (i.e. interest rates) using a monthly county fixed‐effects model. We find that the amendment is significantly associated with a 10%−11% reduction in nationwide market liquidity, as measured by the turnover rate. This negative relationship is geographically heterogeneous, being more pronounced in rural areas while statistically insignificant in investment‐driven urban areas. Furthermore, our decomposition analysis reveals that the post‐enforcement drop in observed market liquidity is mostly associated with rising interest rates. The role of interest rates is more dominant in urbanized areas than rural ones, reflecting the higher concentration of investment‐driven buyers and substantial capital requirements for land acquisition in these regions. Our findings demonstrate that the market response to ownership regulation is strongly mediated by local market conditions, highlighting the challenges of enforcing stringent policies in areas with high investment potential.", "journal": "Agricultural Economics", "published": "2026-06-02", "url": "https://doi.org/10.1111/agec.70123", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70123"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103135", "title": "Corrigendum to ”Cost and affordability of recommended diets in Rwanda using [near] real-time market data” [Food Policy 141 (2026) 103085]", "authors": "Rhys Manners, Kate Schneider Lecy, James Warner, Eric Matsiko, Hilda Vasanthakaalam, Gilberthe Benimana, David J. Spielman", "abstract": "", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103135", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.foodpol.2026.103135"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103107", "title": "Viewpoint: evaluating transparency and market consequences of the national bioengineered food disclosure standard in the United States", "authors": "Pei Zhou, Yuqing Zheng, Shuoli Zhao, Jane Kolodinsky, Tyler Mark, Yawotse Nouve, Lijiao Hu, Harry M. Kaiser, Miguel I. Gómez, Yuxuan Pan", "abstract": "", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103107", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103107"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103089", "title": "Seasonality of employment and food security in rural sub-Saharan Africa", "authors": "Jonas Guthoff, Martin Parlasca, Matin Qaim", "abstract": "Many rural households in sub-Saharan Africa rely on rainfed agriculture, meaning that harvests and incomes from farming are highly seasonal. This leads to recurring periods of food insecurity, commonly referred to as lean seasons. Off-farm employment may help mitigate seasonal food insecurity, but evidence on whether it actually does remains scarce. Using panel data from high-frequency phone surveys in Burkina Faso, Malawi, and Uganda, covering the period from 2020–2024, we examine seasonal labor reallocation and implications for food security throughout the year. We find that seasonal labor shifts from farming to off-farm sectors are associated with reduced seasonal food insecurity in most contexts, especially for off-farm wage employment. We also find that in regions where multiple cropping seasons are possible, work in farming is more strongly associated with food security than off-farm wage or self-employment. However, seasonal shifts from farming to other income-generating activities are not very large at the aggregate level, possibly due to lack of rural labor opportunities. These findings highlight that — depending on the context — improvements of opportunities for farming and off-farm employment are important to ensure year-round food security in rural sub-Saharan Africa.", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103089", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103089"}, {"source": "crossref", "source_id": "10.1016/s0306-9192(26)00093-x", "title": "Editorial Board", "authors": "", "abstract": "", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/s0306-9192(26)00093-x", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/s0306-9192(26)00093-x"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103110", "title": "Does school lunch equalize? An examination of dietary quality and socioeconomic disparities in Germany", "authors": "Vicky Heijnk, Sebastian Hess, Anja Simmet", "abstract": "", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103110", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103110"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103090", "title": "A critical review of EU agri-food policy impacts", "authors": "Diana Borniotto, Anne-Maud Courtois, Philippe V. Baret", "abstract": "• Literature on EU agri-food policies show limited and often uneven impacts across dimensions. • Policy effectiveness is highly heterogeneous across Member States and regions. • Compliance, governance, and targeting emerge as key recurring policy challenges. • Lack of outcome-based indicators and data limits evaluation of policy impacts. • Stronger governance is needed to align EU agri-food policies with sustainability. The European Union’s agri-food policies aim to balance productivity with environmental, social, and economic sustainability. However, their overall effectiveness remains debated due to fragmented evidence and inconsistent implementation. This study critically reviews the literature on the cumulative impacts of EU policies governing primary agricultural production, focusing on six sectors: the Common Agricultural Policy, genetically modified organisms, pesticide, fertilizers, fisheries, and animal health and welfare. Using a two-step approach, we first mapped EU-level policies, retaining 38 policies that met predefined criteria (binding EU scope, production-related, impact-oriented, and active since 2000). We then conducted a qualitative synthesis of 97 peer-reviewed studies (from 1.359 retrieved), coding the environmental, social, and economic impacts reported in these studies. Results reveal three systemic weaknesses limiting policy effectiveness across sectors: i) compliance gaps, where high implementation costs and limited enforcement create uneven outcomes across actors and Member States; ii) governance tensions, driven by subsidiarity ambiguities and fragmented decision-making; and iii) targeting deficiencies, where vague objectives reduce effectiveness and accountability. Environmentally, region-specific agri-environmental measures show localized benefits but fail to address systemic pressures like persistent nitrate pollution and delays in pesticide reassessments. Socially, advances in food safety and animal welfare coexist with exclusionary effects, notably the marginalization of small-scale fishers. Economically, compliance costs disproportionately burden smaller operators, while larger actors tend to leverage regulatory complexity and loopholes to their advantages. To overcome these structural challenges, the EU must set clearer objectives aligned with long-term sustainability goals, streamline decision-making responsibilities across governance levels, and implement robust outcome-based monitoring to ensure adaptability and accountability.", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103090", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103090"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103085", "title": "Cost and affordability of recommended diets in Rwanda using [near] real-time market data", "authors": "Rhys Manners, Kate Schneider Lecy, James Warner, Eric Matsiko, Hilda Vasanthakaalam, Gilberthe Benimana, David J. Spielman", "abstract": "Countries are increasingly benchmarking food assistance and labour laws on the cost of nationally recommended diets. Benchmarking is made against national annual estimates, which fail to account for sub-national and intra-annual variation in cost, blunting the impact of policies. Using monthly market price data collected by the Government of Rwanda (April 2019-March 2024), we estimate the cost of the country’s proposed food-based dietary guidelines, using a standardised diet costing methodology. We found rural areas experienced greater inflation in diet cost over the study period than urban areas (41% vs 28%), yet the recommended diet was 12.7% higher in urban locations. Diet costs were approximately 6% lower in districts with international border crossings to Tanzania, but 7% more in those with borders with the Democratic Republic of Congo. Fruits and vegetables (110% and 71%) and starchy staples (86% and 83%) contributed most to cost increases in rural and urban locations respectively. Seasonal diet cost fluctuations were also evident with a seasonal amplitude of 5.6% and 6.9% in rural and urban locations, synchronised to Rwanda’s agricultural calendar. 70% of employed Rwandans would find the recommended diet unaffordable, if spending 52% of wages on food. Diet costs varied 4.2-fold across all districts throughout the study period, meaning that uniform national policies to address costs and affordability would be systematically inadequate in high-cost settings and wasteful in low-cost ones. That such spatial–temporal variation exists in a small, relatively market integrated country like Rwanda suggests variation would be at least equally consequential in other low and lower-middle-income countries. High-frequency and sub-national monitoring of prices, diet costs, and affordability provides essential intelligence for policymakers to enable spatially and seasonally targeted interventions, improving both the adequacy and efficiency of food policy.", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103085", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103085"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103109", "title": "Impact of gardening and nutrition support provided to women in refugee camps in Cox’s Bazar, Bangladesh", "authors": "Liz Ignowski, Pepijn Schreinemachers, Md Maniruzzaman, Regine Kopplow, Nasir Md. Uddin, Mercy Mwambi", "abstract": "• First randomized controlled trial of a home garden and nutrition intervention in a refugee camp. • Trial included 1,050 pregnant/lactating women, equally split between control and treatment. • Garden adoption increased 17 percentage points (pp); share of households eating produce from own garden increased 57 pp. • Household food insecurity reduced by 66%; fruit intake increased, but vegetable intake did not. • The study shows the positive impact of garden interventions despite extreme space constraints in refugee camps. Nearly one million Rohingya refugees, displaced by the Myanmar civil war, live in densely populated camps in Cox’s Bazar, Bangladesh. While food aid addresses some of their immediate needs, additional solutions are necessary to foster self-reliance, as many have been living in camps for years with little hope of returning home. Gardening is one approach that could enhance diets, food security, and incomes, but evidence for the impact of home garden programs in refugee camps remains limited. The objective of this study is to evaluate the impact of a home garden and nutrition program on the diets and food security of pregnant and lactating women in refugee camps in Cox’s Bazar. A cluster-randomized controlled trial was conducted, with pre- and post-intervention data collected from 1050 women, evenly split into control and treatment groups. A difference-in-differences estimator was used to measure the intent-to-treat effects. Lack of space was the primary obstacle to gardening, but sack gardens and rooftop gardens offered solutions. Women reported many benefits from gardening beyond food consumption, such as personal joy and making the house look nice. The intervention led to a 17-percentage point increase in garden adoption (p = 0.018) and a 57-percentage point rise in households sourcing fruits and vegetables from their gardens (p < 0.001). It also improved nutrition knowledge by 23 percentage points (p < 0.001) and household food security by 66% (p < 0.05). The intervention led to a significant increase of 1 additional serving of fruit per week, but there was no significant increase in vegetable intake. These findings clearly show the benefits of providing gardening and nutrition training to nutritionally vulnerable women in densely populated refugee camps.", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103109", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103109"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2025.102854", "title": "Ambiguity and technology adoption under index insurance: Experimental evidence", "authors": "Jan Jozwik", "abstract": "• Artefactual field experiment can precisely calibrate and vary ambiguous environment. • Ambiguity is an important factor limiting technology adoption under index insurance. • Technology take-up rates depend on the degree of ambiguity. This paper investigates the effect of ambiguity on technology adoption under index insurance. I conduct an artefactual field experiment with Ghanaian cocoa farmers. Experimental subjects had an option to invest in a package of fertilizer bundled with index insurance. The returns depended both on the subjects’ investment choices and on a stochastic weather realization. The key ingredient of the study was whether the exact probability of bad weather was known or not. This probability was ambiguous in the experimental treatments, and the degree of this ambiguity varied across treatments. A large negative effect on fertilizer investments was found in treatments with either small or large ambiguity. The effect of large ambiguity was also found to be significantly stronger, suggesting that technologies with which farmers are relatively more experienced are more likely to be adopted under index insurance schemes. I provide new evidence that ambiguity may be a significant factor limiting the effectiveness of index insurance in promoting agricultural innovation. The overall findings are complementary to related recent randomized controlled trials, since it is effectively impossible to precisely calibrate and vary the level of ambiguity using the latter methodology.", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2025.102854", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2025.102854"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103104", "title": "Regulatory heterogeneity, trade mediation and nutrient intake: The case of Trans fat", "authors": "Dixit Poudel, Munisamy Gopinath", "abstract": "National nutrition regulations can shape diets in two distinct ways: directly, through domestic policy mechanisms, and indirectly, by mediating trade flows. This study assesses how trans fat (TF) intake is affected by both pathways. When countries act alone – by banning or limiting TF – their rules often differ in timing, stringency, and enforcement. The resulting regulatory heterogeneity can create loopholes that allow unhealthy products to move across borders. This study estimates the causal effects of TF regulations on its intake nationally by constructing a food-item-level panel dataset for 161 countries (2010–2022, validated with established benchmarks), and applying a staggered difference-in-differences approach combined with mediation analysis. The findings show that strict, enforceable regulations, such as those in the United States and European Union, significantly reduce TF intake and imports, acting as effective filters against TF-rich foods. In contrast, countries with weaker regulations experience rising TF imports and, eventually, increased intake, effectively placing them at risk of becoming “dietary risk havens.” Even modest rules work better when backed by strong monitoring. These results are robust to alternative specifications such as controlling for importer-specific foreign regulatory exposure. The causal evidence demonstrates that unilateral action delivers meaningful health gains, but fragmented regulatory approaches create opportunities for “regulatory dumping.” This study underscores the need for global cooperation – through harmonized standards or trade-linked enforcement – to prevent cross-border displacement of dietary risks. Beyond TF, the findings offer timely insights for emerging national and global mandates on other nutrients, such as salt, sugar, and saturated fats.", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103104", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103104"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103101", "title": "Consumer preferences for sustainability labels: A comparative analysis of the green-score and other established labels", "authors": "Francesco Vella, Rodolfo M. Nayga, Riccardo Vecchio, Wei Yang, Giuseppina Rizzo, Giuseppina Migliore", "abstract": "• A representative sample of Italian consumers participated in a Choice Experiment. • Green-Score is more effective than organic at increasing WTP for sustainable food. • The effectiveness of labels varies widely across different food product categories. • Salience nudges increase consumer preference for the Green-Score label. • PDO certification remains the most influential for culturally significant products. The Green-Score label aims to complement established certifications by providing a standardized and easily interpretable assessment of products’ environmental performance. This study examines (i) the relative influence of Green-Score, organic, and Protected Designation of Origin (PDO) certifications on consumers’ willingness to pay (WTP); (ii) how label effectiveness varies across food categories; and (iii) the impact of a salience nudge on consumer choices. A Discrete Choice Experiment was conducted with a nationally representative sample of 1,102 Italian consumers, using a between-subjects design to evaluate the nudge. Results show that PDO labels, leveraging strong institutional credibility and symbolic value, consistently generate the highest marginal WTP (€7.61), especially for culturally and traditionally significant products. Green-Score A+ labels, valued for their diagnosticity and cross-product comparability, achieve an average marginal WTP of €6.25, slightly above organic certification (€4.59), with variation across product categories and treatment conditions. The salience nudge enhances the perceived value of Green-Score, particularly in contexts where environmental performance is salient, and can reduce the marginal contribution of overlapping labels such as organic certification. These findings demonstrate that the effectiveness of sustainability labels depends on both the balance between credibility and diagnosticity and the product-specific context, offering actionable insights for policymakers and stakeholders seeking to design targeted and effective environmental labelling strategies in food markets.", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103101", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103101"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103100", "title": "Extreme heat and markets: Theoretical and empirical evidence from Nigeria", "authors": "Martin Paul Jr. Tabe-Ojong, Jourdain C. Lokossou", "abstract": "We investigate how exposure to extreme temperature affects smallholder commercialization. We examine a range of outcomes that indicate the degree of commercialization, including market participation, sales quantity, commercialization index, and sales revenue, which serves as an indicator of monetary benefit. Recognizing the non-separability between production and commercialization, we also examine how extreme temperature directly affects agricultural production. To address these questions, we develop a simple and straightforward theoretical framework that links temperature events to production and market dynamics. From this framework, we derive a set of hypotheses which we proceed to test empirically. Our empirical strategy leverages a comprehensive three-wave panel dataset, which we integrate with earth observation data on temperature extremes. We find that extreme temperatures lead to production losses. We also observe significant declines in market participation among smallholder farmers which could be explained by production shortfalls. This reduction is evident at both the extensive margin (likelihood of participating in markets) and the intensive margin (sales quantity). Furthermore, we observe that when farmers face extreme temperatures, the proportion of harvested crops they sell and the resulting revenue from these also decrease. Causal mediation analysis further confirms that production losses due to extreme temperatures explains the reduction in market outcomes. Overall, these findings highlight the broader economic burden that extreme weather events continue to impose on smallholder households.", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103100", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103100"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103102", "title": "UK Food standards agency proposals for re-structuring how it regulates food-borne risks: an analysis and critique", "authors": "Erik Millstone", "abstract": "", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103102", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103102"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103108", "title": "Digital literacy training to promote diffusion of digital agricultural tools to smallholder farmers: evidence from a randomized intervention in Egypt", "authors": "Fatma Abdelaziz, Kibrom A. Abay", "abstract": "Despite growing enthusiasm about the potential of digital innovations to transform agrifood systems, adoption among smallholder farmers in Africa remains low and heterogeneous. While the proliferation of digital tools targeting smallholder farmers is encouraging, the vast majority remain at pilot stages, facing barriers such as limited awareness among farmer, digital illiteracy, usability challenges, and low trust among farmers. This paper evaluates alternative digital literacy interventions designed to address these demand-side barriers and enhance smallholder farmers’ knowledge, utilization, trust, and uptake of two Egyptian mobile apps offering marketing, advisory, and input delivery services. Following a Training of Trainers (TOT) model, we designed and implemented a randomized controlled trial to test three variants of digital literacy training: standard classroom-based digital literacy training (T1), digital training complemented (preceded) by a video-based play (T2), digital training complemented (preceded) by a live community play (T3), and a control group (C). We find that the different variants of digital training led to statistically significant increases in uptake and utilization of digital tools. Specifically, the standard digital training alone increased uptake by 20 percentage points and utilization by 18 percentage points. The interventions also improved farmers’ trust in digital tools by 8–13 percentage points. Surprisingly, for some outcomes, the digital literacy training alone outperformed the combined approaches that incorporated edutainment nudges. We explore possible explanations, including group size effects and social influence dynamics during the plays. We also document heterogeneity in the impact of these interventions across farmers’ gender and age. Our findings offer insights into designing cost-effective, scalable interventions that build digital capabilities and trust among smallholder farmers, while cautioning against assuming edutainment always strengthens adoption outcomes.", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103108", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103108"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103114", "title": "Defaults harmonize our food choices – a systematic data review of default effects across socio-demographic groups", "authors": "Dominic Lemken, Aline Simonetti, Sanchayan Banerjee, Paul Lohmann", "abstract": "Food policy often struggles to reach diverse population groups, and well-intentioned interventions can sometimes exacerbate inequalities along socio-demographic groups. This systematic data review examines whether default nudges in food choices have consistent effects across different socio-demographic groups, or whether their impact varies depending on factors such as education level, age, and gender. After selecting eligible studies, authors from 12 studies shared their primary data and were subsequently included in the Default Nudge Research & Data Sharing Consortium (Table A2). These primary data enabled us to analyze 40 interaction effects examining whether age, gender, and education moderate the effectiveness of defaults relative to active choice conditions. Results show no consistent and rarely any interaction effects, suggesting defaults influence food decisions similarly across socio-demographic groups. A possible exception is that harmful defaults may be more effective among less educated individuals. These findings highlight default nudges as a broadly equitable behavioral tool in food policy design.", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103114", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103114"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103097", "title": "Agenda-setting in local food environment policy: A comparative Multiple Streams Analysis of the City Deal network in the Netherlands", "authors": "Fleur ter Ellen, Mika Grijzenhout, Jesse Vastenhoud, Joost Oude Groeniger, Frank J. van Lenthe, Karien Stronks, Karen M. Oude Hengel, Luc L. Hagenaars", "abstract": "• A comparative MSF study of food policy agenda-setting shaped in a policy network. • Framing food environment issues beyond health increased their agenda status. • Food strategies were more likely with consistent views on the role of municipality. • Perceived paternalism fueled political caution in zoning policy agenda-setting. • Being in a policy network helped place and keep food policies on the agenda. Little is known about the processes through which local food environment policies gain a place on municipal policy agendas. This study examines why some municipalities within the Dutch City Deal: Healthy and Sustainable Food Environment succeed in placing food strategies and food environmental zoning policies on the agenda. Guided by Kingdon’s Multiple Streams Framework (MSF) and informed by interviews with 14 policymakers and policy documents from ten municipalities, we conducted a qualitative comparative case study focusing on agenda-setting windows related to food strategies and zoning policies across ten Dutch municipalities. Six municipalities adopted local food strategies, framing obesity, health inequalities, unsustainable food systems, and economic concerns as public policy problems linked to the food environment. Agenda-setting was enabled by committed politicians, alignment with broader health or sustainability agendas, and consistent views on the government’s role. Four municipalities without local food strategies lacked clear framing or leadership and viewed food policy as politically sensitive. Framing fast-food dominance as a threat to health, liveability, and local businesses enabled zoning policy agenda-setting in four municipalities, while legal uncertainty and paternalism concerns constrained it elsewhere. Successful agenda-setting of municipal food policies depended on strategic framing, linking food environments to broader societal goals and local priorities. Institutionalising ambitions in formal visions and structures reduced reliance on individual policy entrepreneurs. Trans-local policy networks such as the City Deal can strengthen local capacity, learning, and political commitment. Limited municipal resources, concerns about paternalism, and limited guidance for zoning policies constrained agenda-setting.", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103097", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103097"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103103", "title": "The impact of post-harvest training interventions on adoption and production behavior: evidence from black pepper farmers in Sri Lanka", "authors": "E.A.G. Samanmalee Amarawansha, Daisaku Goto, Duc Tran", "abstract": "", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103103", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103103"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103105", "title": "Fostering legume purchases with behavioural interventions: evidence from field experiments in online and offline supermarkets", "authors": "Maureen Schulze, Meike Janssen", "abstract": "• Food policies promote plant-based protein; intake remains far below recommendations. • Supermarkets offer a promising setting to increase plant-based protein consumption. • Studies tested interventions in online and physical retail environments. • Legume sales increased with placement and recipe-based in-store interventions. The protein transition is a crucial element of the transition to sustainable food systems, and both EU and national policies aim to foster the consumption of plant-based proteins. Supermarkets as the primary source of food products in many countries represent a promising environment for translating these policy objectives into practice. With three studies from Denmark, including a representative online survey (n = 838 participants) followed by randomised controlled trials in a real online supermarket in two rounds over 6 weeks (n = 9,093 transactions Round 1; n = 8,706 transactions Round 2) and field experiments in physical brick-and-mortar stores (9 test stores, 13 control stores, 21 days of observation), this research investigates the potential of leveraging behavioural interventions to foster legume purchases in online and offline retail settings. The randomised controlled trials in the online supermarket showed that placement interventions in the vegetable section were effective in increasing sales of legumes by 57%, while placement interventions in the meat section were not effective, suggesting that the strategies known to work for highly processed plant-based meat substitutes cannot be translated to legumes. The field experiments in brick-and-mortar supermarkets confirmed that the vegetable section is a promising intervention point. The multi-layered intervention tested (bundling placement combined with a recipe inspiration poster) significantly increased legume purchases to a similar degree as in the other study. This paper concludes that retailers play a pivotal role in the protein transition; however, their commercial interests may impede the implementation of ambitious in-store interventions promoting legumes, highlighting the need for innovative policy approaches.", "journal": "Food Policy", "published": "2026-06-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103105", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103105"}, {"source": "crossref", "source_id": "10.1111/jage.v77.2", "title": "", "authors": "", "abstract": "", "journal": "Journal of Agricultural Economics", "published": "2026-06-01", "url": "https://doi.org/10.1111/jage.v77.2", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/jage.v77.2"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70058", "title": "Issue Information", "authors": "", "abstract": "", "journal": "Journal of Agricultural Economics", "published": "2026-05-28", "url": "https://doi.org/10.1111/1477-9552.70058", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70058"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70056", "title": "<scp>JAE<\/scp>\n                    2025: Report of the Editor‐in‐Chief", "authors": "Jonathan Brooks", "abstract": "ABSTRACT Submissions increased in 2025 to 386 original manuscripts, similar to levels preceding the Covid period. The Journal's acceptance rate increased from 11% to 13%, which contrasts with rates of less than 10% in the preceding few years. The Journal's Impact Factor increased from 3.4 to 4.2, which compares favourably with similar field journals. This is my final report as Editor‐in‐Chief, with Frederic Ang due to succeed me following publication of the final edition of the year, which will contain principally invited articles marking the centenary of the Agricultural Economics Society.", "journal": "Journal of Agricultural Economics", "published": "2026-05-28", "url": "https://doi.org/10.1111/1477-9552.70056", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70056"}, {"source": "crossref", "source_id": "10.1093/erae/jbag009", "title": "Correction to: Experimental mindset for environmental challenges: the puzzling case of public good contributions", "authors": "", "abstract": "", "journal": "European Review of Agricultural Economics", "published": "2026-05-28", "url": "https://doi.org/10.1093/erae/jbag009", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbag009"}, {"source": "crossref", "source_id": "10.1111/agec.70122", "title": "A Targeting Bonus for More Effective Agri‐Environmental Policy", "authors": "Matteo Zavalloni, Katherine Simpson, Nick Hanley", "abstract": "ABSTRACT Despite significant policy interventions and conservation initiatives, incentives for the conservation of biodiversity have been criticised for being ecologically ineffective and economically inefficient. This paper examines a novel approach to improve the ecological and economic performance of such incentives. Specifically, we analyse the ecological and economic effectiveness of a targeting bonus which establishes a two‐part subsidy for changes to land management when the ecological benefits of such changes vary spatially. Using a spatially explicit mathematical programming model applied to an empirical case study in the UK, we show that a targeting bonus has the potential to enhance efficiency, with the magnitude of gains depending on the strength of the spatial correlation between opportunity costs and ecological benefits, as well as the size of the budget and the definition of the targeting zone. We find that the targeting bonus offers major advantages when the most ecologically beneficial land parcels are positively correlated with highest opportunity costs for farmers; and that the additional benefits of the targeting bonus relative to a no‐bonus subsidy scheme eventually decline as the share of the bonus is increased.", "journal": "Agricultural Economics", "published": "2026-05-28", "url": "https://doi.org/10.1111/agec.70122", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70122"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70122", "title": "2025\n                    <scp>AARES<\/scp>\n                    Distinguished Life Member", "authors": "", "abstract": "", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-05-28", "url": "https://doi.org/10.1111/1467-8489.70122", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70122"}, {"source": "crossref", "source_id": "10.1093/erae/jbag006", "title": "Behavioural and social factors in farm-level agent-based models for European agricultural policy evaluations", "authors": "Robert Huber, Jesús Barreiro-Hurlé, Robert Finger", "abstract": "Abstract Agent-based models are valuable tools for agricultural policy evaluation. They can represent the heterogeneity of
