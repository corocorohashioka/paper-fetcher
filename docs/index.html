ef:10.1002/ajae.70068"}, {"source": "crossref", "source_id": "10.1002/aepp.70068", "title": "Consumer Valuation of Meat Alternatives and Labeling Policies: A Comparative Perspective", "abstract": "ABSTRACT This study investigates and compares US consumer perceptions and the impact of environmental, human health, and animal welfare information related to conventional meat on preferences for meat alternatives and labeling policies. Using the best–worst scaling method across 10 different burger alternatives, our results show that the meat burger is largely the most preferred option, while meat alternatives collectively account for nearly 40% of total consumer preferences. Information about the health effects of meat consumption and consumer characteristics influences preferences for meat alternatives. Consumers perceive the meat burger as tastier, more natural, more nutritious, and more expensive. In contrast, the plant burger is viewed as healthier and more environmentally friendly, while also being perceived as very distinct from the meat burger. Interestingly, most consumers oppose labeling meat alternatives as “meat.” Our findings provide useful insights into the psychology of consumer acceptance, which can be useful in communicating the nature of meat alternatives to the public and shaping meat alternatives labeling policies.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-03-30", "url": "https://doi.org/10.1002/aepp.70068", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70068"}, {"source": "crossref", "source_id": "10.1002/aepp.70067", "title": "Exploring Differences in Precision Agriculture Adoption: New and Beginning Farmers, and Established Farmers", "abstract": "ABSTRACT This paper compares precision agriculture (PA) adoption between new and beginning farmers (NBFRs) and established farmers using data from a 2021 U.S. Midwest farmer survey. We focus on the human capital of two different groups of farmers in the PA adoption. NBFRs adopted PA technologies at a higher rate than established farmers, with the most substantial adoption gap observed in diagnostic technologies that require human capital investment. A higher proportion of NBFRs held college degrees in agricultural majors, which significantly influenced PA adoption. The findings highlight the need for targeted education and support to ensure sustainable PA adoption among NBFRs. JEL Classification: Q10, Q12, 116", "journal": "Applied Economic Perspectives and Policy", "published": "2026-03-30", "url": "https://doi.org/10.1002/aepp.70067", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70067"}, {"source": "crossref", "source_id": "10.1002/aepp.70065", "title": "Investing in Agricultural Research to Sustain Growth and Competitiveness of US Agriculture", "abstract": "ABSTRACT Public investments in agricultural research and development (R&amp;D) have been a major driver of long‐term productivity growth and competitiveness of US agriculture. Public agricultural R&amp;D has high economic returns: each $1 invested has produced about $20 in benefits to the US economy. The Federal Government provides about 70% of the funding for the agricultural R&amp;D carried out by universities and USDA laboratories. State governments and non‐government sources provide the rest. Resources for public agricultural R&amp;D have been declining in real terms, with annual spending down by about one‐third from its peak in 2002; the US has fallen behind other major competitor nations in spending on agricultural R&amp;D. Part of the decline in public agricultural R&amp;D has been offset by increased R&amp;D by the private companies, but private R&amp;D is concentrated on a few commodities and underinvests in the foundational science needed to sustain long‐term growth and competitiveness for US agriculture. New approaches to public–private collaboration in agricultural R&amp;D can strengthen the financing and performance of the US agricultural innovation system.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-03-30", "url": "https://doi.org/10.1002/aepp.70065", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70065"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70042", "title": "Rising Tides, Falling Harvests: Examining the Effects of Salinity Intrusion on Paddy Production in Vietnam's Mekong Delta", "abstract": "ABSTRACT Rising sea levels and salinity intrusion increasingly threaten rice farming in Vietnam's Mekong Delta. Using a district‐level panel dataset from 2000 to 2020, this study examines the impacts of salinity on Winter–Spring rice yields and acreage and how farmers adapt to salinity risk. A Nerlovian adaptive expectations model is applied to assess how past exposure influences land‐use decisions. Results show that extreme salinity events exert a stronger and more persistent effect on acreage adjustments than year‐to‐year fluctuations, with reductions most pronounced in salinity‐prone and coastal districts. Spatial heterogeneity underscores the need for location‐specific strategies: infrastructure and salt‐tolerant varieties for inland areas, and support for transitions to alternative land uses in highly exposed regions. Evidence of complementarities between rice and aquaculture suggests integrated systems can sustain production under moderate salinity pressure. These findings highlight the importance of tailored interventions to enhance resilience as salinity intrusion intensifies with sea‐level rise.", "journal": "Journal of Agricultural Economics", "published": "2026-03-29", "url": "https://doi.org/10.1111/1477-9552.70042", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70042"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70037", "title": "Can Extensive Grassland Management Pay Off for Farmers Facing Drought Risks? A Cumulative Prospect Theory‐Based Approach", "abstract": "ABSTRACT Grasslands in Central Europe are increasingly affected by droughts, leading to lower hay yields and reduced profits for dairy farmers. The insurance hypothesis suggests that extensively managed, species‐rich grassland is more drought resistant than intensively managed grassland. However, it produces lower yields in non‐drought years, creating a trade‐off between maximising yield and improving stability. In this study, we analyse how this trade‐off translates into farmers' management decisions. Using a mechanistic bio‐economic model, we evaluate outcomes across a wide range of simulated ecological, climatic and economic input conditions. We apply classification tree analysis to identify key drivers of extensive management under expected utility, cumulative prospect theory and an extension we call reference‐based valuation, where outcomes are valued relative to management‐specific expectations. Results suggest that farmers who evaluate profits against the expected outcome under each management intensity potentially adopt extensive management despite lower expected profit if it offers greater stability during droughts. By contrast, when outcomes are compared to the status quo of intensive management, or when farmers maximise utility, extensive management is only predicted if foregone yields do not outweigh higher drought stability. Our findings highlight that adoption decisions depend strongly on the valuation perspective, motivating further applications of reference‐based behavioural models and research on how farmers' reference profits might evolve under climate change. They also suggest policy entry points: targeted extension services and demonstration farms could broaden evaluation perspectives, while financial incentives such as payments for ecosystem services could reduce adoption thresholds due to forgone yields under profit‐oriented decision‐making.", "journal": "Journal of Agricultural Economics", "published": "2026-03-25", "url": "https://doi.org/10.1111/1477-9552.70037", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70037"}, {"source": "crossref", "source_id": "10.1002/aepp.70060", "title": "Does Information Change Consumer Beliefs and Valuation of Cage‐Free Egg Systems? Evidence From an Artefactual Field Experiment", "abstract": "ABSTRACT Cage‐free egg production systems, in addition to its namesake, include pasture‐raised and certified organic eggs. Rising consumer concerns about animal welfare have increased demand for these options, yet little is known about the extent to which consumers understand these product distinctions and how information may influence their beliefs and willingness to pay. This study used an incentivized, artefactual field experiment to elicit preferences and beliefs regarding hen welfare, environmental impacts, and nutritional quality across production systems, both before and after information provision. The results indicate that information attenuated beliefs about the welfare and nutritional benefits of cage‐free systems, while increasing beliefs about various benefits of pasture‐raised and certified organic eggs. Price premiums increased for pasture‐raised eggs and decreased for cage‐free and conventional eggs.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-03-25", "url": "https://doi.org/10.1002/aepp.70060", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70060"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_185/_article/-char/ja/", "title": "中山間地域農業構造の再生産視点に基づく実態分析", "abstract": "", "journal": "農業経済研究", "published": "2026-03-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_185/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/3/97_185/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_202/_article/-char/ja/", "title": "国内誌掲載論文におけるBest-Worst Scaling Case 1の適用動向", "abstract": "", "journal": "農業経済研究", "published": "2026-03-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_202/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/3/97_202/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_217/_article/-char/ja/", "title": "農業法人の経営理念から見た共通価値の創造に対する意識と特徴", "abstract": "", "journal": "農業経済研究", "published": "2026-03-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_217/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/3/97_217/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_223/_article/-char/ja/", "title": "青果物集出荷施設における外国人材依存の深まりと多層化への対応", "abstract": "", "journal": "農業経済研究", "published": "2026-03-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_223/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/3/97_223/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_229/_article/-char/ja/", "title": "非農家高齢者の追加所得稼得機会として位置付く地域資源管理の実態", "abstract": "", "journal": "農業経済研究", "published": "2026-03-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_229/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/3/97_229/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_235/_article/-char/ja/", "title": "酒造会社における有機日本酒の生産と販売の現段階", "abstract": "", "journal": "農業経済研究", "published": "2026-03-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_235/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/3/97_235/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_241/_article/-char/ja/", "title": "農林水産本省所管の補助金の交付金化の実態と課題", "abstract": "", "journal": "農業経済研究", "published": "2026-03-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_241/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/3/97_241/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_247/_article/-char/ja/", "title": "女性農業経営者のサポートネットワークの実態と役割", "abstract": "", "journal": "農業経済研究", "published": "2026-03-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_247/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/3/97_247/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_253/_article/-char/ja/", "title": "経営資源とガバナンスが群馬県の集落営農の展開に与える影響", "abstract": "", "journal": "農業経済研究", "published": "2026-03-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_253/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/3/97_253/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_259/_article/-char/ja/", "title": "共同売店の現状とその社会的役割の再評価", "abstract": "", "journal": "農業経済研究", "published": "2026-03-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_259/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/3/97_259/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_265/_article/-char/ja/", "title": "都道府県単位のスマート農業政策の形成過程における各アクターの影響分析", "abstract": "", "journal": "農業経済研究", "published": "2026-03-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_265/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/3/97_265/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_271/_article/-char/ja/", "title": "SWISSfoodSysモデルを適用した日本の食料供給シミュレーション", "abstract": "", "journal": "農業経済研究", "published": "2026-03-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/3/97_271/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/3/97_271/_article/-char/ja/"}, {"source": "crossref", "source_id": "10.1002/ajae.70066", "title": "Maximizing experimental power through dynamic treatment assignment", "abstract": "Abstract Experimental methods have gained significant traction in agricultural economics in recent decades through the growing use of laboratory experiments, lab‐in‐the‐field studies, and experimental designs embedded in online surveys. However, replicability remains a persistent challenge and a critical benchmark for rigor in experimental economics research. Previous studies showed a strong correlation between statistical power and replicability, highlighting the importance of combining sample size with optimal study design to maximize power in experimental economics research. Despite power analysis being well established in randomized controlled trials, experimental economists have had to rely on rules of thumb (e.g., allocate equal number of subjects to each group), which may not guarantee optimal power. In this study, we propose an adaptive treatment assignment procedure to improve statistical power in experimental studies, using an experimental design that updates the researcher's beliefs about the standard deviation ratio of outcomes under different treatments. We simulate experimental data collection under different updating rules to test the expected gains in power compared to the naïve (conventional) method of equal treatment assignment. Our results show significant gains in power under our proposed adaptive procedures compared to equal treatment assignment. These gains in power are directly proportional to the standard deviation ratio between treatments. Importantly, the power achieved under our proposed adaptive treatment assignment procedures was consistently almost identical to the maximum theoretical power achievable given the study parameters. We thus provide a practical and easy‐to‐use tool that can help researchers optimize treatment assignment in their experimental studies to maximize power.", "journal": "American Journal of Agricultural Economics", "published": "2026-03-24", "url": "https://doi.org/10.1002/ajae.70066", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70066"}, {"source": "crossref", "source_id": "10.1002/aepp.70063", "title": "Diffusing Freshness: International Technology Transfers and Trade in Fresh Fruits and Vegetables", "abstract": "ABSTRACT To mitigate losses of fresh fruits and vegetables (FFVs), new technologies are increasingly developed across different stages of the supply chain. This study examines how international technology diffusion—specifically innovations targeting FFV loss at the production and transportation stages—affects bilateral trade. We develop a gravity framework grounded in a Melitz‐Pareto model and construct a novel dataset linking patent transfers from the EPO's PATSTAT database to 72 FFV products. Empirical results show that each additional patent transferred from an innovator to a recipient country increases the recipient's exports to the innovator, primarily through growth along the extensive margin. Transportation‐stage technologies, which facilitate export market entry in the technology‐recipient country, exert a stronger effect on exports than production‐stage innovations. Results are robust across PPML, OLS, lagged OLS, and IV estimations. Overall, the findings highlight the critical role of international technology diffusion in lowering entry barriers and promoting trade in perishable goods.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-03-24", "url": "https://doi.org/10.1002/aepp.70063", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70063"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70031", "title": "How Does Information Influence Consumers' Evaluation of Biofortified Foods? A Meta‐Regression Analysis", "abstract": "ABSTRACT Biofortified foods offer a promising solution to micronutrient deficiencies affecting billions worldwide, yet their potential remains constrained by limited consumer acceptance. While information plays a critical role in shaping consumers' evaluation of biofortified food products, existing evidence on its effectiveness in improving acceptance remains inconclusive across different contexts. Moreover, there is a notable lack of systematic synthesis of the effects of information interventions, particularly given the wide variation in outcome measures used in the literature. This study examines how information influences consumer evaluations of biofortified foods and identifies factors that moderate its impact. Using meta‐regression analysis based on 87 effect sizes from 34 empirical studies across 22 countries, we estimate the average effect of information provision and explore the influencing factors. Results from random‐effects models and weighted least squares regressions show that information has a significant though modest positive effect on consumer evaluation (Cohen's d = 0.27, 95% CI: 0.25–0.30). Variations in impacts can be explained by product characteristics, information design, study design and contextual factors. Future intervention campaigns should be tailored to enhance consumer acceptance and support biofortified food deployment in regions with nutritional deficits.", "journal": "Journal of Agricultural Economics", "published": "2026-03-20", "url": "https://doi.org/10.1111/1477-9552.70031", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70031"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70104", "title": "Can Women Benefit From Household Land Titles? Evidence From Nigeria", "abstract": "ABSTRACT Formal land titling is recognised as a mechanism to reduce gender disparities in land rights. However, many interventions adopt gender‐neutral, low‐cost designs aimed at ensuring equitable access. Despite technological advances reducing titling costs, effective registry maintenance still imposes significant regulatory and institutional preconditions. This study explores the gender implications of a voluntary, cost‐bearing land registration process for title holders, implemented without explicit gender inclusion requirements. Using nationally representative data from Nigeria's Living Standards Measurement Surveys‐Integrated Surveys on Agriculture and an instrumental variable approach that leverages historical global crop prices weighted by predetermined local crop composition, we investigate how land titles held by household members impact women's land rights, labour market participation and intrahousehold bargaining power. Our results show that while titling strengthens bequest rights for both genders, it notably enhances women's inheritance rights by 64%–66%. Additionally, titling doubles women's wage labour participation without affecting men's engagement and boosts women's control over liquid wealth, as indicated by a 42%–43% increase in bank account access. These findings suggest that an on‐demand titling system, even without explicit gender inclusion requirements, can significantly reduce gender disparities by securing women's land access and reallocating labour to productive activities.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-03-20", "url": "https://doi.org/10.1111/1467-8489.70104", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70104"}, {"source": "crossref", "source_id": "10.1002/ajae.70067", "title": "Lost in aggregation? On the importance of local food price data for food poverty estimates", "abstract": "Abstract This paper explores within‐country variations in food price dynamics and food poverty estimates by employing local market price data and national consumer price index (CPI) data. Our results show that national CPI data may be useful for approximating national trends but they fail to detect and identify spatial variations in local trends, which have relevant welfare implications. Indeed, sourcing cereal prices from local markets, instead of national CPI statistics, leads to classification divergences in 9% of food poverty predictions, with a substantial variation in estimation errors across countries. Our findings thus underscore the need for the systematic collection of local price data to ensure effective policymaking, such as adjusting social transfers to better reflect local differences and optimizing the allocation of social funds.", "journal": "American Journal of Agricultural Economics", "published": "2026-03-19", "url": "https://doi.org/10.1002/ajae.70067", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70067"}, {"source": "crossref", "source_id": "10.1002/ajae.70065", "title": "How does the Kids\n                    <scp>\n                      SIP\n                      <i>smart<\/i>\n                      ER\n                    <\/scp>\n                    program impact the sugar‐sweetened beverage intake of students: An investigation beyond total treatment effect in randomized controlled trial", "abstract": "Abstract This study develops and empirically estimates a structural framework to decompose the causal pathways of multilevel behavioral interventions targeting adolescent health behaviors. We apply this framework to the Kids SIP smart ER (KSS) program, a 6‐month, school‐based intervention evaluated through a clustered randomized controlled trial in rural Appalachia to reduce sugar‐sweetened beverage (SSB) consumption among 7th‐grade students. KSS includes a classroom‐based student component (KSS‐S) grounded in the Theory of Planned Behavior and health literacy, and a caregiver component (KSS‐C) delivered through two‐way text messaging to modify household beverage practices. Using structural equation modeling grounded in a Stackelberg household production framework, we estimate how behavioral strategies, health literacy, and caregiver‐child decision‐making jointly shape students' SSB intake. Stronger behavioral intentions are associated with a 5.30 oz/day reduction ( p &lt; 0.01), and the caregiver decision index (capturing household rules, availability, and role modeling) corresponds to a 16.41 oz/day reduction. KSS‐S reduces intake by 6.42 oz/day ( p &lt; 0.05), largely through a direct pathway (6.23 oz/day, p &lt; 0.05). KSS‐C reduces intake by 4.22 oz/day, primarily through caregiver‐mediated effects (3.36 oz/day). Combined, both components reduced students' SSB consumption by 10.64 oz/day (36% from baseline) ( p &lt; 0.01). We use the estimated structural parameters to simulate hypothetical SSB tax scenarios, finding that KSS achieves reductions comparable to those generated by modest tax rates. This suggests that school‐based behavioral interventions like KSS can function as complementary or alternative policy tools. By identifying causal mechanisms and enabling counterfactual policy simulations within a unified framework, the structural approach provides richer policy insights than average treatment effects alone.", "journal": "American Journal of Agricultural Economics", "published": "2026-03-19", "url": "https://doi.org/10.1002/ajae.70065", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70065"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70081", "title": "Misalignment in Carbon Credit Programmes: Insights From Producer Preferences for Cover Crop and No‐Till Contracts", "abstract": "ABSTRACT This study examines the factors influencing producer adoption of cover cropping and no‐till farming, two key carbon sequestration practices, within the context of voluntary carbon credit programmes (CCPs) in Kansas. Using a mixed‐methods survey that combines discrete choice experiments with farm‐level data from 370 producers, we estimate random‐parameter latent class models to assess preferences over contract design, payment levels and agri‐environmental constraints. Findings reveal substantial misalignments between current CCP structures and producer needs: nearly half of respondents consistently rejected all contract offers, while those most willing to enrol were often already using the promoted practices, raising concerns about the additionality of these initiatives. Key barriers include long contract durations, insufficient payments and agri‐environmental limitations such as drought and wheat‐based rotations. These results highlight the need for more flexible, regionally tailored carbon programmes and provide actionable insights for policymakers seeking to enhance the adoption and climate impact of agricultural carbon sequestration initiatives.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-03-19", "url": "https://doi.org/10.1111/1467-8489.70081", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70081"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70036", "title": "The Meta Pricing Efficiency of Producer Cooperatives Under Hedonic Product Attributes: The Case of German Wine", "abstract": "ABSTRACT High internal coordination costs may put cooperatives at a disadvantage in the production and marketing of agri‐food products with hedonic quality attributes. The efficiency of cooperatives and non‐cooperatives is therefore compared with respect to their ability to place wines on the market at prices that reflect their measurable quality attributes. The results of a stochastic metafrontier panel of 1240 wine prices from two German wine guides suggest that consumers should purchase wine from cooperatives if they are seeking a favourable relation between market prices and wine quality. In turn, members of wine cooperatives should ask themselves why non‐cooperatives are typically better at achieving higher prices for the respective quality of their wines and how they can close the price gap with non‐cooperative wineries.", "journal": "Journal of Agricultural Economics", "published": "2026-03-18", "url": "https://doi.org/10.1111/1477-9552.70036", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70036"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70100", "title": "Navigating Inflation: The Role of Food Values in Japanese Consumers' Price Search Intentions", "abstract": "ABSTRACT Global economic instability has raised food prices and household living costs, prompting consumers to reduce grocery expenditures. Unlike recessions, inflation tightens income constraints without substantially affecting unemployment; therefore, time constraints remain largely unchanged. Although prior research has mainly examined the impact of socioeconomic factors on saving behaviour during recessions, the potential role of personal values, directly affecting consumer decision‐making, under inflationary conditions has received less attention. To fill this gap, this study examines how food values, especially price‐related food values (price‐FV), influence Japanese consumers' intentions to search for price promotions and lower‐priced stores during inflation. We conducted an online survey in March 2023, applying best–worst scaling to measure food values, followed by a bivariate probit model to estimate their effects on price‐search intentions. Our results reveal a positive association between price‐FV and consumers' intentions to seek lower prices. However, the overall effect is modest, as approximately 50% of the respondents exhibit relatively low price‐FV. Even among those with high price‐FV, the joint probability of not engaging in price‐searching remains above 0.5, suggesting that active cost‐saving efforts are not widespread. Importantly, local food retail environments moderate this relationship: Consumers with high price‐FV and moderate‐distant store locations show greater search intentions than those with very close or very distant grocery stores, even when price‐FV levels are similar. These findings indicate that although price‐FV does influence price‐search intentions, its effect is conditional on local food retail environments. Thus, retailers may need to reconsider their promotional strategies to account for heterogeneous consumer responses depending on food values.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-03-18", "url": "https://doi.org/10.1111/1467-8489.70100", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70100"}, {"source": "crossref", "source_id": "10.1002/aepp.70061", "title": "Farm or Fortune? The Role of Heirs' Intentions and Tax Policies in Farmland Succession Planning", "abstract": "ABSTRACT Farm succession receives increasingly more national attention due to rising land prices and changes in tax policies. I provide a systematic evaluation of changes in capital gains and estate taxation policies influencing farmland owners' optimal selling behavior. The policy analysis provides two novel contributions: first, allowing heirs to keep or sell the farm upon inheritance, and second, analyzing four realistic policy scenarios including the proposed American Families Plan (2021) and adopted One Big Beautiful Bill Act. The results show that heirs' intentions to keep the farm exacerbate the “lock in” effect across policy scenarios, contributing to reduced farmland sales.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-03-18", "url": "https://doi.org/10.1002/aepp.70061", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70061"}, {"source": "crossref", "source_id": "10.1002/aepp.70066", "title": "Competition Policy and Agribusiness in the Biden Administration", "abstract": "ABSTRACT The Biden Administration pursued a set of ambitious competition policy initiatives in agriculture and agribusiness, primarily aimed at livestock and poultry supply chains, farm inputs, and food retailing. The initiatives included expanded antitrust enforcement; new US Department of Agriculture (USDA) contract regulations requiring poultry processors to disclose more information to growers; and USDA financial support for expanded capacity in meat processing. I summarize the initiatives, evaluate what we know about their likely impacts, and discuss open research and policy issues.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-03-18", "url": "https://doi.org/10.1002/aepp.70066", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70066"}, {"source": "crossref", "source_id": "10.1002/aepp.70059", "title": "Accounting for Substitution: Improving Estimates of\n                    <scp>GHG<\/scp>\n                    Reductions From Cattle‐Based Product Demand Shifts", "abstract": "ABSTRACT Estimates of reductions in greenhouse gas (GHG) emissions from lower demand for cattle‐based products must account for substitution effects. This study collected data through two surveys—one on ground beef and another on dairy milk—to evaluate substitution effects and potential GHG reductions. Results indicate that informing consumers about product‐level emissions decreases demand for cattle products and GHG emissions. However, ignoring substitution effects leads to an overestimation of the actual emission reduction potential. For accurate assessments, substitution effects should be included when estimating emission reductions for cattle‐based products to better reflect the true GHG mitigation potential.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-03-16", "url": "https://doi.org/10.1002/aepp.70059", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70059"}, {"source": "crossref", "source_id": "10.1002/aepp.70058", "title": "Shocks, Agricultural Productivity, Self‐Help Groups and Food Security in Tanzania", "abstract": "ABSTRACT This paper investigates whether negative shocks constrain agricultural productivity and household food security. It also examines the mitigating role of Savings and Credit Cooperative Societies (SACCOS) and self‐help groups (SHGs) in cushioning households against the adverse effects of shocks on agricultural productivity and food security. Using nationally representative panel data from Tanzania and household fixed effects, the results reveal that negative shocks significantly reduce productivity. When disaggregating by type, we find that weather‐related and covariate shocks exert larger negative effects than idiosyncratic shocks. Heterogeneity analysis shows that land‐poor and poor households are more severely affected than land‐rich and non‐poor households. Shocks also reduce food security in Tanzania, with results robust across multiple measures, shock types, and household subsamples, that is, poor and non‐poor households. Furthermore, the results reveal that neither SACCOS membership nor membership in SHGs has a significant mitigating effect on agricultural productivity or food security.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-03-15", "url": "https://doi.org/10.1002/aepp.70058", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70058"}, {"source": "crossref", "source_id": "10.1002/ajae.70064", "title": "Redistributive land reforms, agricultural productivity, and structural change: New cross‐national evidence", "abstract": "Abstract Large‐scale land reforms constitute a substantial redistribution of wealth and reallocation of agricultural land, which is a major form of asset and production input in developing countries. While land redistribution (from the rich to the poor) remains a highly controversial issue, extensive evidence on its effect is limited. Using the most comprehensive global dataset on land reforms available to date, we investigate the impact of redistributive land reforms on agricultural productivity, along with the resulting structural change in the economy. First, we document that these reforms reduce per‐hectare agricultural output and agricultural mechanization by a statistically significant and quantitatively large amount. Second, these effects get worse with repeated redistributions, underpinning the potentially detrimental impact of ownership insecurity arising from frequent redistributions. Third, we find that the employment share of agriculture increases while the shares of industry and service sectors decrease. Importantly, this reallocation of labor occurs despite falling labor productivity in agriculture, which to begin with is lower than in industry and services, suggesting a reduction in real GDP.", "journal": "American Journal of Agricultural Economics", "published": "2026-03-11", "url": "https://doi.org/10.1002/ajae.70064", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70064"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70092", "title": "Trade Liberalisation and Agricultural Exports: Evidence From Afghanistan’s\n                    <scp>WTO<\/scp>\n                    Accessions", "abstract": "ABSTRACT This paper examines the impact of Afghanistan's accession to the World Trade Organization (WTO) on its Agricultural Export Performance (), with a particular focus on the effects of Trade Liberalisation (). Using the Difference‐ in‐ Differences (DIDs) methodology, we found that has a positive and statistically significant effect on , suggesting that a 1% decrease in tariffs increases export value by approximately 0.124% in Afghanistan. This result is further validated by employing Double‐Selection LASSO Regression (DSLR), Bayesian Model Averaging (BMA) and Kernel‐Based Regularised Least Squares (KRLS) machine learning techniques. Additionally, endogeneity concerns are addressed using Trade Policy Uncertainty () as an Instrumental Variable (IV), with results indicating that the estimated effects are free from endogeneity bias. Moreover, heterogeneity analysis reveals that the impact of on varies across different income levels, regions and neighbouring country classifications. Furthermore, a three‐step mediation analysis demonstrates that Trade Costs () and Resource Allocation () partially mediate the relationship between and . Based on these empirical outcomes, several policy recommendations are discussed.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-03-11", "url": "https://doi.org/10.1111/1467-8489.70092", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70092"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70035", "title": "Landowners' Willingness to Participate in Temporary and Permanent Agri‐Environmental Schemes", "abstract": "ABSTRACT Within the EU and beyond, voluntary agri‐environmental and climate schemes (AES) are used to curtail externalities from agricultural production including nitrate leaching, biodiversity degradation and greenhouse gas emissions. This paper investigates and compares Danish landowners' preferences for temporary and permanent AES using a choice experiment (CE). We focus on landowners, who are the decision makers in terms of permanent land use change. Our study focuses on two land set‐aside contracts: temporary with annual payments and permanent with a lump‐sum payment. Results reveal that landowners require higher compensation if AES design implies giving up direct subsidy payments and hunting rights under both permanent and temporary set aside schemes. Common Agricultural Policy (CAP) direct payments were valued lower in the presence of the CAP agricultural activity requirement in permanent contracts compared to a situation without an activity requirement. As expected, landowners require higher compensation for longer commitments in temporary schemes and for rewetting commitments in permanent schemes. The average implied discount rate for schemes that mirror actual annual and lump‐sum permanent schemes offered to farmers in Denmark is 3.3%–3.4%, while that based on the CE is 1.9%–2.1%. Comparing implicit discount rates of hypothetical CE schemes with current Danish AES highlights a significant policy design misalignment. The implication is that current policy favours flexible annual payments, while the societal benefits from permanent schemes are arguably higher.", "journal": "Journal of Agricultural Economics", "published": "2026-03-09", "url": "https://doi.org/10.1111/1477-9552.70035", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70035"}, {"source": "crossref", "source_id": "10.1002/aepp.70056", "title": "Unemployment‐Linked Food Hardships in Medicaid Expansion and Nonexpansion States During the\n                    <scp>COVID<\/scp>\n                    ‐19 Pandemic", "abstract": "ABSTRACT Job losses (e.g., layoffs, furloughs) during the COVID‐19 pandemic were associated with higher levels of food hardship including food insufficiency, marginal food insufficiency, and difficulty affording food. However, we find the association between pandemic‐related job loss and food hardship was smaller in states with expanded Medicaid eligibility compared against job losses in states that did not expand Medicaid. Our key findings are larger among higher‐income households and childless adults–groups generally beyond Medicaid's core low‐income population, and they suggest that Medicaid's value as an antipoverty program complements other safety net programs during periods of unexpected material hardship.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-03-08", "url": "https://doi.org/10.1002/aepp.70056", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70056"}, {"source": "crossref", "source_id": "10.1002/ajae.70063", "title": "Food inflation pass‐through from agricultural imports in a small open economy", "abstract": "Abstract This paper develops a new framework for quantifying cost pass‐through in a small open economy by estimating firm‐level markup responses to agricultural import price shocks. We show theoretically that markup adjustments depend on firms' reliance on imported inputs and demand curvature, generating heterogeneous inflationary effects across firm types. For empirical implementation, we postulate a Leontief production structure that expresses pass‐through elasticity as a function of observed markup behavior and imported crop dependence. Using data on 10,911 South Korean food manufacturers from 2000 to 2021, we document considerable market power and increasing polarization in markups, particularly led by high‐markup firms. Markup elasticities under strategic pricing decisions differ across sectors and firm types, with particularly strong effects for non‐large firms exhibiting low reliance on imported crops. Our firm‐level pass‐through measure reveals stable aggregate patterns over time but uncovers considerable heterogeneity—most notably, rising pass‐through among firms less dependent on foreign crops. These findings illustrate how cost shocks propagate through strategic pricing and underscore the importance of firm heterogeneity in evaluating equilibrium pass‐through.", "journal": "American Journal of Agricultural Economics", "published": "2026-03-07", "url": "https://doi.org/10.1002/ajae.70063", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70063"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70097", "title": "Urban Water Demand: Income and Price Elasticities", "abstract": "ABSTRACT We use bimonthly water consumption data from 580,000 households in the metropolitan region of Western Australia over the period 2015–2020 to analyse urban residential water demand. A generalised two‐stage least squares (G2SLS) approach is used to estimate water consumption as a function of price, household income, weather variables, property characteristics and user type. The short‐run (SR) own‐price elasticity estimates are −0.09 and −0.27 for winter and summer demand, respectively; and the corresponding long‐run (LR) own‐price elasticity estimates are −0.25 and −0.89. SR income elasticity estimates for winter and summer are 0.03 and 0.21, respectively, whereas the corresponding LR income elasticity estimates are 0.08 and 0.69. Estimates for various subgroups demonstrate that income elasticity is proportional to own‐price elasticity, suggesting that residential water demand is consistent with the assumption of strong separability. These findings suggest that effective water demand management could incorporate dynamic pricing alongside the promotion of tools and knowledge aimed at improving outdoor water‐use efficiency.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-03-05", "url": "https://doi.org/10.1111/1467-8489.70097", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70097"}, {"source": "crossref", "source_id": "10.1002/aepp.70057", "title": "Adapting to Changing Rainfall and Developing Off‐Farm Employment: Implications for the Adoption of Direct Seeding in Rice Production", "abstract": "ABSTRACT Rice is the main staple food for more than half of the world's population and the income from rice is an essential source for livelihoods of millions of households. We examine whether direct seed in rice production is an adaptation of rice farmers to rainfall changes and farm labor scarcity. The results show that the deficit changes of rainfall positively associate with the application of direct‐seeded rice. After addressing the simultaneity between direct‐seeded rice application and off‐farm employment, we find a positive correlation of off‐farm employment with direct‐seeded rice application. Thus, stimulating direct‐seeded rice application is recommended for enhancing the adaptation of rice farmers to rainfall changes and for fostering rural transformation.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-03-05", "url": "https://doi.org/10.1002/aepp.70057", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70057"}, {"source": "crossref", "source_id": "10.1002/ajae.70059", "title": "How cold is too cold? A theoretical analysis of the optimal trigger for index insurance for frost damage to crops", "abstract": "Abstract Crop insurance is undoubtedly an extremely valuable element in protecting agricultural businesses, but in many cases standard indemnity‐based products have had very low uptake due to high transaction costs elevating premiums to unaffordable levels. Index insurance options in which coverage is written on a publicly observable “trigger” (involving much lower transaction costs) have begun to fill the void. In almost all of the previous economics literature on index insurance, the only variable that the insurance demander is permitted to choose is the payment to be received should the index trigger value be verified. However, it is clear that the trigger value itself is an integral element in the contract, and it is an element about which the insurance demander has clear preferences. In this article, we analyze the optimal demand for index insurance under the assumption that the demander can choose both the payment to be received if the index trigger is satisfied and the trigger value itself. We find that there is always an interior solution to this problem. We also consider the market equilibria that emerge under a variety of settings in regard to the position of the insurer. The article is cast within the scope of insurance for frost damage to a crop, but all of the results are directly applicable to any peril for which a publicly observable signal exists. The article shows that allowing the demander to choose both indemnity and trigger value should increase uptake of index insurance products.", "journal": "American Journal of Agricultural Economics", "published": "2026-03-04", "url": "https://doi.org/10.1002/ajae.70059", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70059"}, {"source": "crossref", "source_id": "10.1002/ajae.70060", "title": "Public lands and urban quality of life", "abstract": "Abstract Federal and state‐owned public lands occupy a significant proportion of many U.S. urban regions, contributing to two highly‐valued, nontradable goods: viewscapes and outdoor recreational opportunities. Yet, public lands have not been adequately addressed in the urban quality‐of‐life (QOL) literature. We argue that much of the previous literature has (1) used a geographic level of aggregation that has not been extensive enough to capture all the public lands that influence wage and housing equilibria, (2) often defined public lands measures too narrowly and has excluded over 50% of public land influencing hedonic equilibria, and (3) has rarely attempted to control for public lands endogeneity when quasi‐experimental approaches are infeasible. Using GIS and Census data for U.S. urban areas, along with instruments rooted in the 19th century land disposal policies, we estimate how publicly owned federal and state lands contribute to urban QOL. Our preferred specifications are based on Bureau of Census defined Combined Statistical Areas that are linear in public land variables, and the results are robust regardless of geographic aggregation and model specification. Welfare calculations indicate that the annual urban household willingness‐to‐pay estimate for a one percent increase in public land ranges between $80.58 and $130.29. Our study contributes to the literature by establishing land grant railroads as an exogenous instrument for public lands and by providing a framework for evaluating the welfare consequences of proposed land exchanges and other changes in land ownership or management.", "journal": "American Journal of Agricultural Economics", "published": "2026-03-02", "url": "https://doi.org/10.1002/ajae.70060", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70060"}, {"source": "crossref", "source_id": "10.1111/ajae.v108.2", "title": "", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-03-01", "url": "https://doi.org/10.1111/ajae.v108.2", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/ajae.v108.2"}, {"source": "crossref", "source_id": "10.1111/agec.70109", "title": "The Impact of Electronic Benefit Transfer on Participation in the Supplemental Nutrition Assistance Program", "abstract": "ABSTRACT This study investigates the impact of the implementation of Electronic Benefit Transfer (EBT) on Supplemental Nutrition Assistance Program (SNAP) participation using Panel Study of Income Dynamics (PSID) data from 1992 to 2007. The findings indicate a significant increase (1.6% for our benchmark model) in SNAP participation post‐EBT implementation, but smaller in magnitude compared with previous studies. The results also show significant differences in impacts across different demographic and socioeconomic groups. The event study results suggest that these effects may not be instantaneous, and show pronounced and sustainable impacts approximately 2 years after statewide EBT implementation. Understanding these nuanced impacts is crucial for policymakers to better tailor outreach and implementation efforts across different populations.", "journal": "Agricultural Economics", "published": "2026-03-01", "url": "https://doi.org/10.1111/agec.70109", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70109"}, {"source": "crossref", "source_id": "10.1111/agec.v57.2", "title": "", "abstract": "", "journal": "Agricultural Economics", "published": "2026-03-01", "url": "https://doi.org/10.1111/agec.v57.2", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.v57.2"}, {"source": "crossref", "source_id": "10.1111/agec.70108", "title": "Global Agricultural Market and Land‐Use Implications of Producing Sustainable Aviation Fuel from Second Crop Corn Ethanol in Brazil", "abstract": "ABSTRACT Ethanol can potentially serve as a feedstock for sustainable aviation fuel (SAF) production. This study evaluates the global land use and associated carbon implications of expanding Brazilian corn ethanol production using second crop corn. Using a global agricultural trade model, which explicitly represents second crop corn production in Brazil, this analysis examines scenarios regarding ethanol demand growth, corn supply elasticity, and trade constraints. Results show that increasing Brazilian ethanol production using second crop corn can moderately impact international prices, land‐use, and greenhouse gas (GHG) emissions, especially when corn supply is highly elastic or double cropping intensifies. Under the limiting assumption of a perfectly elastic second‐crop corn land response, our findings show minimal or even negative net land‐use change. Focusing on land use, a life cycle analysis reveals that second crop corn ethanol can achieve lower or negative GHG emissions, primarily due to the use of feedstock grown on land already used in the same year (second crop), renewable process energy, and the substitution of soybean meal through corn co‐products. These findings suggest that Brazilian second crop corn offers a low‐carbon pathway for SAF production, contingent on preserving double‐cropping systems and avoiding land‐use change. The article highlights critical trade‐offs and policy considerations for aligning climate goals with sustainable agricultural and energy systems.", "journal": "Agricultural Economics", "published": "2026-03-01", "url": "https://doi.org/10.1111/agec.70108", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70108"}, {"source": "crossref", "source_id": "10.1111/agec.70106", "title": "Gender and Impact of Multiple Climate‐Smart Agricultural (CSA) Practices on Nutritional Outcomes and Multidimensional Poverty Status of Cassava Farmers in Nigeria", "abstract": "ABSTRACT There is significant potential to enhance food security and address nutrition and poverty in smallholder farming systems through the adoption of climate‐sensitive agriculture practices (CSA). However, adoption rates of CSA practices remain uneven across genders due to disparities in access to resources, decision‐making power, and socio‐economic barriers. Similarly, while CSA practices are widely recognized for their potential benefits, the combined effects of using multiple practices to improve food security, nutrition, and poverty reduction remain poorly studied and not fully understood. This study analyzes data from four waves of the Nigeria General Household Survey, using fixed effects multivariate logit models and a panel endogenous switching regression framework to examine the factors influencing CSA adoption and its outcomes. The results show notable gender differences: male farmers are more likely to adopt organic manure and practice mixed cropping, while women focus more on improved seeds and combining organic and inorganic manure. Integrated CSA strategies, especially combining organic manure with mixed cropping, lead to significant gains in food security and reductions in multidimensional poverty. Nonetheless, organic/inorganic manure combinations are underused, mainly due to resource constraints and perceived inefficiencies. Addressing gender‐specific barriers and maximizing the benefits of CSA practices can provide valuable insights for policymakers and practitioners. The study recommends gender‐sensitive policies, better financial inclusion, and customized extension services to promote sustainable farming practices that boost food security, resilience, and livelihoods in smallholder systems.", "journal": "Agricultural Economics", "published": "2026-03-01", "url": "https://doi.org/10.1111/agec.70106", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70106"}, {"source": "crossref", "source_id": "10.1111/agec.70107", "title": "Kinship Matters: When Farm Input Subsidies Help—or Harm—Children", "abstract": "ABSTRACT Agricultural subsidies are crucial for improving the economic well‐being of rural households, especially in developing countries where access to agricultural inputs is limited. These subsidies reduce costs for essential inputs, such as seeds, fertilizers, and equipment, alleviating financial pressure on farmers. While their positive effects on productivity and household income are well documented, less attention has been paid to their unintended consequences, such as their influence on child labor (CL) and educational outcomes, and more so to how these unintended effects manifest under opposing kinship traditions. This issue is particularly relevant in Malawi, where CL remains prevalent in rural areas, important, since kinship norms could offer differential protection to children. This study investigates the effects of the Farm Input Subsidy Program (FISP) on CL and its secondary effects on school attendance in two opposing patrilineal and matrilineal kinship systems in Malawi. Using data from the 2020 Multiple Indicator Cluster Survey (MICS), the study uses the Instrumental Variables approach (IV), with political clientelism as an instrument for the distribution of subsidy vouchers. We found that FISP increases CL for children in matrilineal kinship. However, the program had no similar impacts on patrilineal kinship. The results also reveal that FISP significantly increases school attendance, but only in matrilineal kinship.", "journal": "Agricultural Economics", "published": "2026-03-01", "url": "https://doi.org/10.1111/agec.70107", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70107"}, {"source": "crossref", "source_id": "10.1002/aepp.v48.1", "title": "", "abstract": "", "journal": "Applied Economic Perspectives and Policy", "published": "2026-03-01", "url": "https://doi.org/10.1002/aepp.v48.1", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.v48.1"}, {"source": "crossref", "source_id": "10.1093/erae/jbag003", "title": "Combining stated and revealed preferences for valuing attributes associated with organic chicken meat", "abstract": "Abstract This paper examines consumer willingness to pay (WTP) for attributes of organic chicken meat in the UK, a product experiencing increasing popularity both domestically and internationally. We combine stated preference (SP) data from a discrete choice experiment with revealed preference (RP) data from supermarket scanner transactions in a joint estimation framework. This approach mitigates common limitations of analysing SP and RP data separately, such as hypothetical bias in SP and multicollinearity in RP. Using a heteroskedastic conditional logit model with interaction terms, we estimate WTP values that account for both preference heterogeneity and scale differences across datasets. Results indicate that consumers assign a substantial premium to the organic attribute, with joint estimates approximately 9 per cent higher than those based solely on SP data and more than double those from RP. These findings underscore the importance of integrating SP and RP data to inform evidence-based food policy.", "journal": "European Review of Agricultural Economics", "published": "2026-02-27", "url": "https://doi.org/10.1093/erae/jbag003", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbag003"}, {"source": "crossref", "source_id": "10.1002/ajae.70061", "title": "Seeds of change: The impact of Ethiopia's direct seed marketing approach on smallholders' seed purchases and productivity", "abstract": "Abstract While multiple factors explain low adoption rates of improved varieties by small‐scale farmers in sub‐Saharan Africa, a key supply‐side constraint is the limited availability of seed embodying new traits in the volume, quality, price, and timeliness required by farmers. This constraint is partly attributable to classical failures in the market for seeds and traits. Historically, governments have remedied this failure by allocating public resources to varietal improvement and seed distribution. In 2011, the Government of Ethiopia launched a novel experiment—the direct seed marketing approach—to encourage private seed investment in the country's seed system and to reduce the state's footprint in the system. Direct seed marketing incentivized seed companies to sell directly to farmers rather than through state distribution channels. This study provides the first quantitative assessment of the impact of direct seed marketing based on key indicators of a robust seed system: access to seed and farm‐level productivity. Using a quasi‐experimental difference‐in‐differences approach suitable to handling variation in treatment timing, we find that direct seed marketing increased the share of farmers purchasing fresh maize seed by 15 percentage points. It also raised the quantity of maize seed purchased by 45% and improved maize yields by 18%. In contrast, direct seed marketing had no effect on wheat seed purchases and yields. These crop‐specific differences likely reflect underlying differences in the reproductive biology of maize and wheat, highlighting the importance of crop‐specific policy design, institutional arrangements, and market development strategies to accelerate the adoption of improved varieties.", "journal": "American Journal of Agricultural Economics", "published": "2026-02-26", "url": "https://doi.org/10.1002/ajae.70061", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70061"}, {"source": "crossref", "source_id": "10.1002/ajae.70042", "title": "Uncovering renewable energy policy impact\n                    <scp>channels<\/scp>\n                    on land values, the local farm structure, and farmland heterogeneity", "abstract": "Abstract Germany's Renewable Energy Sources Act (REA), enacted in 2000 and subsequently amended, subsidized national renewable energy production with fixed feed‐in tariffs for renewable energy sources (RE) from wind, solar, and biogas. Empirical studies suggest that the policy was creating windfall effects for landowners and attribute farmland use homogenization to the policy. Empirical evidence, however, lacks a comprehensive and systemic analysis of the REA impact on farmland values, farm structures, and farmland heterogeneity. To understand the policy's impact channels, we propose five hypotheses, build a spatial price theory‐informed structural equation model (SEM) and test it on a rich dataset of land transactions and land uses for the Federal State of Brandenburg, 2005–2018. The SEM uncovers direct impact channels on farmland prices from an increased willingness to pay more in proximity to wind turbines and biogas plants, and on farmland heterogeneity by incentivizing maize‐based homogenous crop rotations. Indirect impact channels for biogas promotion on land prices via altering the farm structure reveal additional and larger impacts than previous studies suggested. Approximately 9% of the price increase could be attributed to the RE expansion over the study period. Future policy amendments should take such a systemic perspective and counteract adverse effects.", "journal": "American Journal of Agricultural Economics", "published": "2026-02-26", "url": "https://doi.org/10.1002/ajae.70042", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70042"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70032", "title": "How Aggregate Growing Season Temperature Metrics May Lead to Overestimation of the Effects of High Temperatures on Crop Yields: Evidence From China", "abstract": "ABSTRACT Existing studies generally use “aggregate” temperature measures—such as mean temperature, degree‐days, temperature bins, and piecewise linear functions within the growing season—to estimate the impact of global warming on crop yields. These temperature measures blend temperatures from different phenological stages of crop growth, thereby implicitly assuming that temperatures are additively substitutable within the growing season. However, this assumption contradicts agronomic knowledge, which indicates that crops are more sensitive to temperatures during certain phenological stages. Utilising unique site‐level data on the detailed phenological stages of major crops in China, combined with crop production data and daily weather data, we develop an econometric model with stage‐specific temperature measures. We then compare our estimates with models using traditional aggregate temperature measures. Our results show that adopting an aggregate temperature measure could overestimate the damage of predicted global warming on crop yields by up to two times compared to estimates using stage‐specific temperature measures.", "journal": "Journal of Agricultural Economics", "published": "2026-02-26", "url": "https://doi.org/10.1111/1477-9552.70032", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70032"}, {"source": "crossref", "source_id": "10.1111/agec.70105", "title": "Measurement and Regional Disparities of Pig Farming Efficiency Under Different Production Scales: Evidence From China", "abstract": "ABSTRACT China's pig farming sector is increasingly shifting toward large‐scale and intensive operations, and differences in productivity across farm‐size categories have become crucial for maintaining competitiveness. This paper investigates the changing scale structure of pig production and assesses both static efficiency and dynamic total factor productivity (TFP) for farms of four sizes using panel data from 27 mainland provinces for the period 2010–2022. Static efficiency is estimated using an input‐oriented Data Envelopment Analysis (DEA) model under variable returns to scale, specifically the Banker‐Charnes‐Cooper (BCC) specification, while dynamic productivity change is captured by the DEA‐based Malmquist index and its decomposition. The findings reveal that average static technical efficiency remains high, with medium‐sized farms slightly outperforming others. Large‐scale farms suffered a transient dip under external shock conditions, but subsequently recovered, largely through gains in pure technical efficiency. On the dynamic side, TFP hovered around unity, with technological progress emerging as the dominant driver of efficiency improvement. Regionally, eastern coastal provinces leveraged technological advancement to enhance productivity, whereas central and western regions were held back by persistent high‐input/low‐conversion inefficiencies. The results suggest that enhancing technological capacity and management performance, combined with region‐specific strategies supporting optimal scale development and technology diffusion, are key to narrowing regional gaps and promoting the high‐quality, sustainable development of China's pig‐farming industry.", "journal": "Agricultural Economics", "published": "2026-02-26", "url": "https://doi.org/10.1111/agec.70105", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70105"}, {"source": "crossref", "source_id": "10.1111/agec.70095", "title": "Nutritional Impacts of Direct Selling to Supermarkets: The Case of Farm Households in India", "abstract": "ABSTRACT A growing body of literature examines the developmental impacts of smallholder participation in supermarket value chains in developing countries, yet evidence on the nutritional implications for farm households remains limited. This study investigates how direct sales to supermarkets influence household nutritional outcomes among vegetable growers in India. Using primary survey data and econometric techniques that address simultaneity and self‐selection bias, we find that farmers selling directly to supermarkets consume significantly higher amounts of vitamin A and zinc than their counterparts. These improvements are associated with a greater share of non‐cereal food consumption. They are supported by more stable and higher incomes generated through direct sales to supermarkets, staggered vegetable harvests, and reduced price volatility. The findings highlight the potential of supermarket expansion to enhance dietary quality and address micronutrient deficiencies for farm households in smallholder‐dominated agricultural systems.", "journal": "Agricultural Economics", "published": "2026-02-26", "url": "https://doi.org/10.1111/agec.70095", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70095"}, {"source": "crossref", "source_id": "10.1111/agec.70104", "title": "Club Convergence and Drivers of Agricultural Innovation in US States: 1976–2023", "abstract": "ABSTRACT Innovation is a key driver of agricultural development, shaping productivity, food security, and sustainability. Yet, innovation in agriculture is not evenly distributed in the United States, leading to divergent development trajectories across regions. This study investigates convergence dynamics in agricultural innovation by analyzing state‐level agricultural patents as a proxy for technological advancement. To detect heterogeneous innovation pathways, we apply the club convergence framework based on the log‐ t test and nonlinear time‐series methods. Our results reveal disparities in agricultural patenting activity, with states forming distinct convergence clubs. This indicates that agricultural innovation does not converge uniformly, underscoring the need for targeted policy measures to close regional technological gaps. To further explore the determinants of club membership, we estimate an ordered logit model incorporating R&amp;D expenditures, employment‐productivity index, well‐being index, gross farm income, and land‐grant university appropriations. The findings confirm that all these factors significantly increase the likelihood of states moving into higher‐performing innovation clubs, highlighting their central role in shaping agricultural innovation.", "journal": "Agricultural Economics", "published": "2026-02-26", "url": "https://doi.org/10.1111/agec.70104", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70104"}, {"source": "crossref", "source_id": "10.1111/agec.70101", "title": "Implications of Food Trade Policy for Domestic and International Food Price Volatility", "abstract": "ABSTRACT This article investigates the impact of food trade policies on domestic and international price volatility, focusing on rice and wheat markets. It posits that policymakers aim to minimize the political costs associated with changing domestic prices and those associated with deviating from political‐economy equilibria. The study uses price data, adjusted to reflect trade costs, to estimate an Error Correction Model that identifies key policy response parameters. The findings suggest that systematic, short‐run protection changes designed to insulate against changes in world prices reduce shocks to domestic prices but exacerbate world price volatility. However, idiosyncratic, national shocks to protection rates—such as those due to national weather shocks—increase domestic price volatility relative to the amplified volatility of world prices. Our findings challenge the conventional view of price insulation as a zero‐sum game, suggesting it is a negative‐sum game that increases domestic price volatility for almost all countries, creating opportunities for policy reforms to lower costs and reduce price volatility.", "journal": "Agricultural Economics", "published": "2026-02-26", "url": "https://doi.org/10.1111/agec.70101", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70101"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70090", "title": "Unintended Effects of Water‐Saving Policy: Irrigated Corn Expansion in Türkiye", "abstract": "ABSTRACT Agriculture consumes 70% of global water resources, worsening a crisis where billions lack clean water. Governments seek innovative solutions to water scarcity. In late 2016, Türkiye implemented a policy designed to reduce agricultural water consumption by promoting water‐efficient crops (lentils and chickpeas) and requiring drip irrigation for corn farmers. Despite these incentives, our analysis shows that the policy had an unintended and counterproductive effect: It led to a significant expansion of irrigated corn cultivation in the targeted regions. Our study demonstrates that this outcome was driven by farmers responding to rational economic signals, as the enhanced support for water‐efficient crops was insufficient to overcome the superior profitability of corn. This finding demonstrates that water‐saving policies can backfire if they fail to account for the underlying economic drivers of crop choice, highlighting the critical need for careful incentive design.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-02-24", "url": "https://doi.org/10.1111/1467-8489.70090", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70090"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70098", "title": "Bridging and Dividing: The Dual Effects of Digital Inclusive Finance on Income Inequality in China", "abstract": "ABSTRACT The rapid expansion of digital inclusive finance (DIF) in China offers substantial potential to advance common prosperity by broadening access to credit and lowering barriers to financial services. However, the distributional consequences—both between rural and urban areas and within regions—remain insufficiently understood. Using data from the China Household Financial Survey (CHFS) and DIF indices over the period 2011–2019, this paper investigates the effects of DIF on urban–rural income disparities and intra‐regional income inequality and explores the underlying mechanisms. We find that DIF significantly narrowed the urban–rural income gap while simultaneously exacerbating income disparities within both rural and urban areas. The reduction in the urban–rural divide was mainly attributable to disproportionate benefits accruing to rural households, largely through increases in agricultural income. In contrast, the widening of intra‐regional income disparities is predominantly due to DIF's stronger influence on middle‐ and high‐income groups, particularly those with higher levels of education. These findings highlight the dual‐edged nature of DIF in influencing income inequality and highlight the need for targeted policy interventions to promote a more equitable benefit distribution.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-02-23", "url": "https://doi.org/10.1111/1467-8489.70098", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70098"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf069", "title": "Firm-level innovation, productivity, and efficiency in riskful business environments: A case study of agribusiness in El Salvador", "abstract": "Abstract Agribusinesses contribute 40–70 percent of the total value added in the food value chain of developing countries; however, they remain under-researched. We investigate whether firm-level innovation improves economic performance using World Bank Enterprise Surveys for El Salvador. We extend the Crépon–Duguet–Mairesse model with a selectivity-corrected stochastic frontier and a metafrontier framework. We find that innovation increases potential total sales and reduces the technology gap, but does not improve technical efficiency. This suggests that, without complementary managerial and institutional support—particularly in contexts where insecurity imposes high operational and opportunity costs—the benefits of innovation do not necessarily lead to productivity gains.", "journal": "European Review of Agricultural Economics", "published": "2026-02-20", "url": "https://doi.org/10.1093/erae/jbaf069", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf069"}, {"source": "crossref", "source_id": "10.1111/agec.70100", "title": "Issue Information", "abstract": "", "journal": "Agricultural Economics", "published": "2026-02-20", "url": "https://doi.org/10.1111/agec.70100", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70100"}, {"source": "crossref", "source_id": "10.1002/aepp.70055", "title": "Kenyan Farmers' Policy Priorities During Economic Crisis and Stability: Insights From a Best‐Worst Scaling Experiment", "abstract": "ABSTRACT Amid rising food and fertilizer prices, understanding farmers' policy preferences is critical for effective crisis response. We use best‐worst scaling experiment to assess Kenyan mobile‐owning crop farmers' preferences for government support under high and normal price scenarios. Farmers consistently favored market‐oriented and public goods investments—for example, market access, infrastructure, and extension—over subsidies and cash transfers. Input subsidies ranked fifth out of seven policy options in both scenarios. While overall rankings were stable, preference intensities sharpened under high prices. These findings challenge subsidy‐focused crisis responses and highlight the need to align agricultural policy with farmer priorities to build long‐term resilience.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-02-20", "url": "https://doi.org/10.1002/aepp.70055", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70055"}, {"source": "crossref", "source_id": "10.1093/erae/jbag002", "title": "Conservation auctions: An online double constraint reverse auction experiment", "abstract": "Abstract Conservation auctions are designed to allocate payments for environmental services to voluntary farmers. The auctioneer may announce either the maximum number of contracts (target-constrained auction) or, more commonly, the total budget available (budget-constrained auction). Building on previous work that compared these two formats, we introduce a new double-constraint auction, where both constraints—set at the same levels as in the benchmarks—are simultaneously disclosed to participants. Using the same experimental methodology, we assess performance consistent with a generic policy objective: maximizing environmental benefits while minimizing expenditures. On average, the double-constraint auction outperforms both target- and budget-constrained formats.", "journal": "European Review of Agricultural Economics", "published": "2026-02-18", "url": "https://doi.org/10.1093/erae/jbag002", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbag002"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70099", "title": "The Digital Fix: Overcoming Monitoring Constraints in Agricultural Environmental Regulation", "abstract": "ABSTRACT This study analyses the effects of environmental regulation and rural digitalisation on circular economy practices in agriculture, focusing on straw return to the field. We construct a theoretical model to explain how regulation drives farmers' behavioural change, accounting for spatial heterogeneity and the moderating role of digitalisation, and test the predictions using Chinese farm‐level survey data and text‐based measures of regulatory intensity. The results show that stricter regulation significantly promotes straw‐return adoption, with heterogeneous regional impacts, while digitalisation reduces these disparities. Beyond confirming the Porter and Pollution Haven Hypotheses in agriculture, the study highlights digitalisation as a novel policy lever that enhances regulatory effectiveness and mitigates regional disparities.", "journal": "Australian Journal of Agri
