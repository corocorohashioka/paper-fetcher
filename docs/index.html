tershed that were identified as experiencing persistent drought. In the two villages data was gathered from 35 farmer interviews covering 129 land plots, 10 stakeholder interviews, focus group discussions and participatory GIS. Using the Institutional Analysis and Development (IAD) framework, these findings show that maize cultivation (62.6% of plots) has become the dominant outcome across a wide range of former land uses—converting from paddy, cocoa, forest and grasslands—a pattern closely linked to repeated cycles of maize seed assistance rather than autonomous adaptation. Weakened boundary rules made maize seed assistance effectively open-access; loose scope rules have pushed it onto steep slopes and forest margins; and payoff rules have favoured short-cycle returns, narrowing available options and creating the conditions for what we term assistance-led maladaptation. The analysis extends the concept of erosion from constitutional and international-norms scholarship to community-level resource governance and calls for graduated multi-level safeguards that preserve local adaptive flexibility.", "journal": "Land Use Policy", "published": "2026-11-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108193", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.landusepol.2026.108193"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108185", "title": "Drivers of urbanisation and land-use and land-cover change across spatial scales: A comparative bibliometric synthesis from Global to Central and Eastern Europe", "authors": "Yana Prados, Hossein Azadi", "abstract": "", "journal": "Land Use Policy", "published": "2026-11-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108185", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.landusepol.2026.108185"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108197", "title": "Institutional configurations and conservation agriculture outcomes: A fuzzy-set analysis of production units in Lishu County, China's black-soil region", "authors": "Hongwei Yu, Yufeng Hou, Youchao Xing, Huixin Ran, Chuanling Xiang, Mingze Xia, Zijie Liu, Hu Zhou", "abstract": "", "journal": "Land Use Policy", "published": "2026-11-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108197", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.landusepol.2026.108197"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108182", "title": "A land management, biodiversity preservation, and climate change mitigation analysis in Brazil", "authors": "Gustavo da Silveira Schiavo, Annibal Scavarda, Virginia Bodolica, Shahadat Khan, Luiz Felipe Scavarda", "abstract": "This research aimed to evaluate Brazil's performance in achieving the goals and targets related to Sustainable Development Goals (SDG) 13 (Climate Change) and SDG 15 (Life on Land), while systematically assessing how governmental actions align with the mitigation hierarchy (avoidance, minimization, restoration, offsetting, and enhancement). Based on a qualitative content analysis of scientific literature and official evaluation reports, this work contributes to the debate on climate change and biodiversity loss. The research identifies areas of progress and areas that still require attention from policymakers in this context. This study was developed with a qualitative approach and was structured in two stages, namely the scoping review and documentary research based on data retrieved the Institute of Applied Economic Research (IPEA), a foundation linked to the Brazilian Ministry of Planning and Budget. Documentary research identified reports evaluating Brazil's progress on SDG 13 and SDG 15, and document analysis revealed that Brazil has action plans with varying levels of achievement (fully achieved, partially achieved, and not achieved targets) related to biodiversity preservation, climate change mitigation, and sustainable development. Based on the Brazilian actions to mitigate impacts, it was possible to observe a hierarchy with a stronger emphasis on preservation (avoidance) compared to restoration actions, particularly in land management and biodiversity preservation. Furthermore, key points of progress and areas requiring attention from policymakers regarding this topic were also identified. In view of the need for progress in public policies focused on land management and on addressing climate change and biodiversity loss, this research advances the understanding of how integrated mitigation strategies can support the joint achievement of SDG 13 and SDG 15, offering a structured analytical framework to evaluate governmental performance and inform policy design.", "journal": "Land Use Policy", "published": "2026-11-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108182", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.landusepol.2026.108182"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108181", "title": "How localized differences in street greenery conditions are associated with urban public space use patterns: Evidence from the Las Vegas Strip", "authors": "Xiaowei Li, Yuhan Wen, Qiuyi Yang, Xiwei Shen", "abstract": "", "journal": "Land Use Policy", "published": "2026-11-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108181", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.landusepol.2026.108181"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108139", "title": "Clarifying overlapping land rights in semi-formal systems: The case of Mailo tenant lands in Uganda", "authors": "Kate Marple-Cantrell, Heather Huntington, Daniel Ayalew Ali, Thea Hilhorst", "abstract": "", "journal": "Land Use Policy", "published": "2026-11-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108139", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.landusepol.2026.108139"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108211", "title": "L  – A DRSIR perspective on landscape transformation in European mountains", "authors": "Michał Sobala, Anna Żemła-Siesicka", "abstract": "", "journal": "Land Use Policy", "published": "2026-11-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108202", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.landusepol.2026.108202"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108199", "title": "Massive hidden cropland transitions undermine China's agricultural sustainability", "authors": "Nufang Fang, Renjie Zong, Qiongdan Liang, Yi Zeng, Wei Dai", "abstract": "", "journal": "Land Use Policy", "published": "2026-11-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108199", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.landusepol.2026.108199"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108187", "title": "Demographic dynamics, urban expansion, and social inclusion in Burkina Faso's small towns (1985–2019): A context-aware decoupling analysis", "authors": "Mansourou Cissé, Malicki Zorom, Xiaoye Tong, Cécile Tannier, Harouna Karambiri, Stéphanie Horion", "abstract": "Small towns constitute most of Africa’s urban settlements, yet their spatial dynamics remain poorly understood in relation to demographic change, land-use efficiency, and social inclusion. Existing decoupling models overlook initial land-consumption conditions, path dependence, and broader urban subsystem behavior. This study examines 98 small towns in Burkina Faso through five analyses: growth trajectory clustering, Gibrat’s law testing, land-population elasticity modeling, a benchmark-adjusted Tapio decoupling framework, and social outcome assessment. Results reveal sustained urban growth with two accelerated built-up expansion waves (1995–2000 and 2015–2019), reflecting decentralization policies, real-estate liberalization, and conflict-induced internal displacement. Four persistent growth regimes emerge, reflecting administrative status, accessibility, metropolitan influence, and local socioeconomic conditions. Population growth is largely size-independent, while the population-built-up relationship progressively converges toward proportionality (β = 0.96), indicating increasing spatial-demographic coherence. Persistent outliers highlight the influence of conflict, migration, mining activity, and geographic isolation. Against Burkina Faso’s national benchmark of 75 m² per capita, the share of towns exhibiting inefficient land expansion increased from 40% (2005–2010) to 78% (2015–2019). Although some land-use efficiency indicators are statistically associated with poverty incidence, they explain no meaningful share of the observed variation in poverty and wealth inequality. Context-aware efficiency classes show no significant relationship with either indicator. These results suggest that compliance with land-use benchmarks does not automatically translate into social inclusion. By integrating demographic, spatial, institutional, and social dimensions, this study proposes a replicable framework for diagnosing urban expansion in data-scarce regions and highlights the need for context-sensitive, governance-aware land-use policies in rapidly urbanizing small-town systems.", "journal": "Land Use Policy", "published": "2026-11-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108187", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.landusepol.2026.108187"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108190", "title": "Socioecological pathways shape the decoupling of population growth and land loss across Sub-Saharan Africa", "authors": "Yonas Derebe Derso, Wu Wei, Meseret C. Abate, Haile Ketema, Abay Bantihun, Dennis Afriyie, Eshetu Yirsaw, Yufan Wu", "abstract": "", "journal": "Land Use Policy", "published": "2026-11-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108190", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.landusepol.2026.108190"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108188", "title": "Reducing cropland requirement by optimizing provincial grain trade patterns in China", "authors": "Xin Xuan, Yuping Bai, Xiangzheng Deng, Yecui Hu, Fan Zhang", "abstract": "", "journal": "Land Use Policy", "published": "2026-11-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108188", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.landusepol.2026.108188"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108189", "title": "Toward policy-informed 3D urban land-use simulations by leveraging urban planning regulations: Case studies in Zurich and Copenhagen", "authors": "Somaie Abolhasani, Rafael Ramirez Eudave, Anna Hersperger", "abstract": "", "journal": "Land Use Policy", "published": "2026-11-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108189", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.landusepol.2026.108189"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108191", "title": "From static to dynamic: A phased evolution framework for multi-stakeholder collaborative governance in comprehensive land consolidation", "authors": "Jinghui Zhao, Yanfeng Jiang, Jiangying Yao, Shude Tan", "abstract": "", "journal": "Land Use Policy", "published": "2026-11-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108191", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.landusepol.2026.108191"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108170", "title": "Unraveling the spatial dynamics and mechanism heterogeneity of land transfer on carbon emission: Evidence from China’s Yangtze River Economic Belt", "authors": "Chenlu Liu, Chen Zeng, Pengrui Wang, Mingyuan Chang, Xingzi Yu, Ruijing Yu", "abstract": "", "journal": "Land Use Policy", "published": "2026-11-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108170", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.landusepol.2026.108170"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108169", "title": "‘Fit-for-purpose’ spatial justice: Diffusion of European land consolidation and global reflection", "authors": "He Gao, Walter Timo de Vries, Wencang Shen, Weidong Qu", "abstract": "This study reconstructs the programmatic core of land consolidation as a technology–governance composite grounded in spatial justice, organized through a three-stage sequence of entry diagnostics, process assembly, and institutional safeguards. Within this framework we identify four institutional pillars that render works, rights, and ecology commensurable: transparent valuation and equivalence, registration of rights with write-through, public disclosure with graduated remedies, and legally binding ecological safeguards, the last constituting a hard floor rather than an optional add-on. On this basis we develop a typology and a nine-module assembly grammar. Methodologically we combine realist synthesis (Context–Mechanism–Outcome) with structured focused comparison across global cases, formalizing decision nodes and milestones. Findings: A-type (European prototype) is the minimal complete set combining the four pillars with the three-stage sequence; B-type (institutional assembly) stabilizes delivery under fiscal and organizational constraints via land banks, compensation scaffolding, and phased rollout; C-type (platform synthesis) adds multi-objective coordination and stage-gate cadence to the pillar stack; D -type (foundational reform) appears in thin-capacity settings as pilot consolidation on customary substrate ( D -narrow) or substrate-building through statutory scaffolding, cadastral modernization, and customary-tenure recognition ( D -broad). Types are diagnostic outcomes determined by P-module operational status rather than country labels; the full diagnostic is formalized as a decision tree that takes statutory substrate, administrative capacity, stakeholder base, and ecological exposure as inputs, applies four sequential pillar checks, and routes each case to one of five exits with explicit conversion rules between types. The paper's contributions are threefold: (1) it reframes land consolidation as a technology–governance composite with ecological safeguards as a hard floor; (2) it supplies a nine-module assembly grammar and a decision tree that constitutes a design-oriented diagnostic rather than a descriptive typology; and (3) it substitutes a module-status diagnostic for country-label classification, making feasible conversion trajectories explicit.", "journal": "Land Use Policy", "published": "2026-11-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108169", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.landusepol.2026.108169"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108203", "title": "Socioeconomic and policy-triggered land use/land cover change in the Alwero Watershed, Gambela Region, Ethiopia", "authors": "Yitayh Leul, Shimeles Damene", "abstract": "", "journal": "Land Use Policy", "published": "2026-11-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108203", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.landusepol.2026.108203"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108207", "title": "Gender, land rights and climate change adaptation in Ghana: Implications for land tenure, agriculture and rural development", "authors": "Peter Asare-Nuamah, David Anaafo, Tina Beuchelt", "abstract": "", "journal": "Land Use Policy", "published": "2026-11-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108207", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.landusepol.2026.108207"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108192", "title": "Forecasting territorially differentiated land-use transitions: Behavioural evidence from discrete choice experiments and diffusion modelling in Southern Italy", ution (9-cm) aerial imagery and 1-m LiDAR data, we applied a support vector machine (SVM) classifier to produce a detailed land-cover map with an overall accuracy of 90.2% and a three-dimensional assessment of vegetation volume. UGI covers 16.64% (40.76 km²) of the urban extent, providing a relatively high per-capita green space provision of 62.14 m². Despite this, spatial analysis reveals pronounced inequities, with vegetated areas clustering in historic, oasis-adjacent neighborhoods, while newer high-density districts emerge as “cold spots” with minimal vegetation. Current municipal planning regulations, which prioritize built density and visual landscaping over ecological functionality, exacerbate these disparities. Integrating volumetric vegetation metrics and per-capita thresholds into planning codes can improve spatial equity, strengthen ecosystem services, and mitigate urban heat island effects. This study advances performance-based urban planning in arid environments and demonstrates the potential of high-resolution geospatial methods to guide sustainable, equitable urban development.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108166", "fetched_at": "2026-06-21T08:00:31", "id": "crossref:10.1016/j.landusepol.2026.108166"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108107", "title": "Estimating the value of land in Iran’s economy", "authors": "Ensieh Mosaddeghi, Mohammadbagher Asadi", "abstract": "", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108107", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108107"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108141", "title": "Land sparing and sharing: Understanding the relationship between different construction land strategies and land functions in karst areas", "authors": "Lei Kang, Erqi Xu", "abstract": "", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108141", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108141"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108148", "title": "Impact of gender equality on forest protection: Role of economic, social, political and energy factors", "authors": "Xiaojiao Zhu, Haochang Yang", "abstract": "", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108148", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108148"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108116", "title": "Exploring land cover change patterns in Hyrcanian forests through spatiotemporal trend analysis (2000–2022)", "authors": "Qadir Ashournejad, Fateme Garshasbi", "abstract": "", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108116", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108116"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108155", "title": "Land-use change and long-term socioeconomic outcomes: Studying over six decades of global data (1960–2023)", "authors": "Daria Loginova, Stefan Mann, Sabine Hoidn, Ioannis Varvaris", "abstract": "Land Use, Land-Use Change, and Forestry (LULUCF) dynamics are often evaluated primarily through environmental and ecological perspectives, yet their long-term socioeconomic outcomes remain underexplored. This study analyses global data from 1960 to 2023 to examine how changes in key LULUCF indicators – such as forest area, agricultural land, arable land, and permanent cropland – are linked to socioeconomic indicators across fifteen thematic domains, with time lags ranging from one to ten years. Drawing on longitudinal World Bank datasets, this study uses time-series analyses to capture significant linkages and temporal dynamics. The results reveal significant correlations between past land-use changes and later socioeconomic outcomes, including unexpected links to gender equality, health outcomes, and financial and employment indicators, alongside more conventional connections with Gross Domestic Product, trade, and education. These findings underscore the complex interplay between land-use decisions and socioeconomic dynamics at the country level, emphasising the need for integrated land-use policies that weigh short-term economic gains against long-term social and economic objectives. By demonstrating land use as a strategic lever for achieving equitable, resilient, and sustainable development, this study offers actionable insights to support strategies that jointly advance environmental goals – including climate and ecological targets – and foster lasting socioeconomic progress at local, regional, national, European and global scales.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108155", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108155"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108144", "title": "Disaster exposure and residential solar adoption: Urban evidence from Japan", "authors": "Jian Wang, Cheng Peng, Xiugang Zhu, Xuepeng Qian", "abstract": "", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108144", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108144"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108140", "title": "De-localization of global cities: How advanced producer services exacerbate regional spatial inequality?", "authors": "Jiaming Li, Jiachuan Liu", "abstract": "Advanced producer services (APS)—as key indicators of global city functions—reinforce the hub and control capacities of central cities within the global economy. However, their spatial benefits are unevenly distributed, often bypassing surrounding small- and medium-sized cities. This study investigates how the development of APS in 35 Chinese cities at or above the \"sufficiency\" level of global integration contributes to regional spatial inequality. We emphasize the role of de-localization processes, whereby economic functions and flows are increasingly detached from local-regional contexts. Our findings reveal three key insights:(1) The growth of APS intensifies center–periphery inequality, reinforcing the dominance and polarization of core global cities; (2) Cross-regional economic linkages—accounting for approximately 15% of spatial disparity—exacerbate inequality beyond conventional siphoning effects, highlighting the structural impact of interurban externalities; (3) Transportation infrastructure, particularly increased cross-city traffic flows, compounds disparities by facilitating the agglomeration of APS in core cities. This integrative approach sheds light on the spatial mechanisms through which global city development reshapes regional economic balance. Our findings offer policy insights for mitigating urban polarization and promoting more equitable spatial development in rapidly globalizing economies.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108140", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108140"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108121", "title": "Structural adjustment of industrial land use and economic resilience: Evidence from China's poverty-stricken counties", "authors": "Jingtong Liu, Dingyang Zhou, Guanghui Jiang", "abstract": "", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108121", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108121"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108137", "title": "Unpacking spatially explicit cropland non-agriculturalization in China based on satellite remote sensing data: A 30-year analysis of spatial patterns and conversion types", "authors": "Desheng Jiang, Zhuojian Wen, Yuqi Zhong, Yuecheng Li, Guilin Liu", "abstract": "", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108137", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108137"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108115", "title": "Socioeconomic and environmental challenges affecting sustainable land management in Africa: A systematic review towards integrated framework proposal", "authors": "Titus Adeyemi Alonge, Nabiebakye Henrietta, Michael Addaney, Jonas Ayaribilla Akudugu, Rejoice Selorm Wireko-Gyebi, Kingsley Atta Nyamekye", "abstract": "", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108115", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108115"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108106", "title": "A stakeholder-integrated land-use model for nature conservation in metropolitan areas: The case of the Randstad, Netherlands", "authors": "Yinuo Zhou, Shahryar Sarabi, Bin Zhang, Qi Han", "abstract": "Accurate understanding and modelling of complex nature land dynamics is essential for effective nature conservation and land-use planning, particularly in and around metropolitan areas where diverse land-use demands compete for limited space. However, existing modelling frameworks often overlook stakeholder interactions by relying solely on spatial drivers such as land suitability, and tend to oversimplify land-use dynamics by focusing on a single land-use type, ignoring the competing pressures from other land uses. To address this gap, this study proposes a stakeholder-integrated land-use competition (SI-LUC) model that integrates stakeholder interactions, defined by decision-making and negotiation processes, into a multi-type land-use competition framework. The model was applied to simulate nature land dynamics in the Randstad metropolitan area from 2012 to 2023. Results show that SI-LUC improves simulation performance compared to a widely used conventional model, achieving around 5% increase in the global Figure of Merit (FoM). Moreover, the sensitivity analysis confirms the effectiveness of stakeholder-related parameters in SI-LUC, such as negotiation costs and thresholds to agree, in regulating the intensity of stakeholder interactions and shaping nature land changes. Additionally, the scenario analysis highlights the model’s potential as a virtual laboratory for testing governance strategies on nature conservation, enabling decision-makers assess the long-term effects of different nature governance approaches and facilitating a more informed, context-sensitive land-use planning in complex urban contexts.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108106", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108106"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108153", "title": "Mapping indigenous California: Agency and tribal perspectives on ancestral territorial representation", "authors": "Seth LaRosa, Van Butsic, Jeremy Sorgen, Peter Nelson, Jennifer Sowerwine", "abstract": "", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108153", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108153"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108103", "title": "Spatio-temporal analysis of vegetation cover transitions and underlying governance approaches in Malawi, Southern Africa", "authors": "Ida Nadia S. Djenontin, Dan Wanyama, Leo C. Zulu", "abstract": "", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108103", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108103"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108160", "title": "Spatial and socio-geographical determinants of urban nature-based solutions (NBS) for climate resilience, biodiversity, and green space management", "authors": "Mücahit Kaya, Barbara Sowińska-Świerkosz", "abstract": "Although urban nature-based solutions (NBS) generally produce positive results compared to non-NBS interventions, translating these evidence-based approaches into site-specific and measurable applications within urban contexts remains challenging. Key questions remain regarding the optimal number, location, and spatial extent of NBS required to maximize their effectiveness. NBS must possess sufficient size and spatial distribution to support ecological stability and enhance ecosystem services. However, most cities face constraints due to limited available open space. This study investigates how the spatial characteristics of NBS influence their effectiveness in mitigating three selected UCs and examines the relationship between these characteristics and the socio-geographical context. Case studies from Poland (Lublin) and Türkiye (Istanbul) were analyzed across 17 NBS types and 26 indicators. The results indicate that, irrespective of socio-geographical context, urban waters and forests exert the greatest influence on climate resilience. In terms of green space management, the Polish case demonstrated higher overall effectiveness. Nevertheless, the findings did not conclusively demonstrate a direct relationship between NBS spatial structure and biodiversity enhancement. Beyond spatial factors, proximity to UCs, multifunctionality, and protected status emerged as critical determinants of NBS contributions to urban challenges. The evidence generated in this study can inform urban policy and planning by integrating spatial and socio-geographical considerations, thereby optimizing the potential of NBS to effectively mitigate urban challenges.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108160", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108160"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108127", "title": "Cognition behind land transactions: How diverse forest value orientations shape willingness, price expectations, and forestland transfer behavior in rural China", "authors": "Zhang Yiwen, Huo Yiming, Wang Weiye", "abstract": "Forestland transfer has been promoted as a key policy instrument to address severe parcelization and improve management efficiency. However, in China, despite long-standing policy support, actual transfer rates remain persistently low. While existing research attributes this to institutional and economic barriers, little is known about how smallholders’ subjective perceptions of forest values influence their market participation. This study examines how forest value orientations (FVOs), defined as smallholders’ perceived importance of different forest functions, shape their willingness, price expectations, and actual behaviors regarding forestland transfers. Using household-level data collected from timber-forest farmers across several provinces in southern China, exploratory factor analysis identifies three distinct value dimensions: ecological, economic, and emotional-symbolic. Binary Logit, Heckman two-step, and Cragg double-hurdle models are applied to estimate their effects on willingness-to-transfer, willingness-to-pay (WTP), willingness-to-accept (WTA), and realized transactions. Results show that ecological values significantly inhibit both transfer willingness and participation, likely reflecting the public-good nature and management burdens of ecologically valuable forests. In contrast, economic values promote active market engagement and narrow the WTA–WTP gap by aligning expectations with market benchmarks. Emotional-symbolic values, though less influential overall, positively affect transfer intentions, reflecting their role as private, exchangeable benefits under China’s temporary transfer arrangements. The findings highlight that subjective forest value perceptions critically shape market participation and price formation. Recognizing these heterogeneous value orientations can help policymakers design more nuanced, value-sensitive interventions to foster efficient and culturally appropriate forestland markets.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108127", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108127"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108122", "title": "The speculation trap and the distress push: Divergent pathways of peri-urban agriculture in Tanzania", "authors": "Cuthbert W. Mushi, Agnes G. Kapinga", "abstract": "", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108122", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108122"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108101", "title": "Beyond top-down policymaking: Policymaker–landowner interaction promotes reforestation in a strategy game", "authors": "Simona Rödlach, Giacomo Vaccario, Clare Cooper, Jaboury Ghazoul, Ivan P. Novotny", "abstract": "Scotland aims to achieve net-zero emissions by 2045, with afforestation and native woodland restoration as key strategies, targeting 25% woodland cover by 2050, or roughly 10,000 ha of new woodland annually. Much of this expansion depends on private landowners often supported by public subsidies. Yet landowners are often resistant to native woodland expansion on account of their prioritization of traditional land uses and perceived economic risks. Understanding the factors that influence landowner uptake is therefore crucial for designing effective policies. This raises the question: how does interaction between policymakers and landowners affect policy adoption? To provide insights on this, we developed a custom strategy game as an interactive socio-ecological model in which local stakeholders develop land and resource use strategies as estate owners, farmers, or policymakers. In the game setting, ‘landowners’ made decisions on land-related economic activities, while ‘policymakers’ enacted policies with potential impact on the ‘landowners’ activities. In-game landscape indicators tracked land use changes. Discussions among players were recorded with a microphone for later analysis. We showed that interactions during policy drafting between land managers and policymakers within the frame of the game modeling process are associated with higher adoption rates of proposed policies. This suggests that, under simplified experimental conditions, integrating stakeholder perspectives early in real-life policy formulation could enhance the effectiveness of reforestation strategies in Scotland by addressing both ecological and social barriers to successful implementation. More broadly, in regions where policy adoption is limited by low stakeholder engagement or misaligned incentives, accessible and engaging participatory approaches as represented by strategy games may foster more effective and widely supported environmental governance.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108101", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108101"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108112", "title": "Land tenure security and agroecological transitions: Evidence from a discrete choice experiment in Angola", "authors": "José do Rosário, Hycenth Tim Ndah, Carlos Marques, Lívia Madureira", "abstract": "While land tenure security is recognised as a cornerstone of sustainable land use, understanding of its influence on the adoption of agroecological practices is still limited, particularly in tenure-insecure contexts. This study examines how land tenure security, institutional support, and behavioural factors shape smallholders’ willingness to adopt agroecological innovations. Institutional and behavioural perspectives are integrated within a discrete choice modelling framework to analyse data from a choice experiment conducted with 400 smallholder farmers in Huambo Province, Angola. Willingness-to-accept (WTA) estimates were derived for key attributes, including land tenure security, technical assistance, and financial compensation. A conditional logit model was first employed to establish baseline preferences, followed by a mixed logit specification that relaxes the independence of irrelevant alternatives assumption and captures unobserved preference heterogeneity. The results revealed trade-offs among incentives, with required compensation increasing from 27,250 kwanzas for biopesticide use to 81,749 kwanzas for combined agroecological practices. Secure land tenure emerged as the most influential determinant, reducing WTA by 344%, while behavioural factors, including pro-environmental attitudes and livelihood security perception, moderate farmers’ responses to policy incentives. Overall, the findings indicate that institutional support, particularly tenure security combined with targeted technical assistance, increases adoption and reduces reliance on monetary compensation. These results provide empirical evidence that land governance reforms embedded in supportive institutional frameworks can enhance the cost-effectiveness and scalability of agri-environmental and payments for ecosystem services (PES) programmes. The study offers policy-relevant insights for land-use and agricultural policy design in Sub-Saharan Africa and other regions facing comparable institutional constraints.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108112", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108112"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108105", "title": "What motivates Irish farmers to participate in new afforestation schemes: Financial or environmental drivers?", "authors": "Zohreh Rafiee, James Breen, Kevin Kilcline, Mohammad Mohammadrezaei", "abstract": "Afforestation is the most significant land-based strategy for enhancing carbon sequestration and mitigating climate change globally. However, in many countries, including Ireland, planting targets remain unmet despite the availability of financial incentives. The latest Common Agricultural Policy (CAP) reform introduced Small-Scale Afforestation Measures (SSAMs) to encourage tree planting on Irish farms, but barriers and motivations for adoption remain poorly understood. Accordingly, this study examines both external factors (e.g. financial incentives) and intrinsic motives (e.g., beliefs, values, attitudes, and social norms) influencing the adoption of SSAMs, which is crucial for designing more effective and targeted afforestation policies. Using data from a nationally representative survey of 563 Irish farms, the extended Theory of Planned Behaviour was applied to distinguish the influence of different beliefs, subjective norm, and barriers. A Generalised Linear Model with Ordinal Regression was used to analyse farmers’ adoption intentions. Results showed over half of farmers were either ‘neutral’ or ‘unwilling’ to adopt SSAMs, while 38.9%, 32.0%, and 45.1% were ‘willing’ to adopt tree planting of ‘Any-kind’, under CAP Pillar I ‘Eco-scheme’, and CAP Pillar II ‘Agri-Environment-Climate Measures (AECMs)’, respectively. Most background factors were not significant to adoption, and while socio-psychological factors emerged as particularly significant. Economic beliefs shaped farmers’ attitudes toward AECM adoption, while environmental beliefs were key drivers for Eco-Scheme participation. Findings suggest that adoption can be improved by combining financial incentives with participatory training to engage influential peer groups. Addressing both economic concerns and environmental values is essential for enhancing the effectiveness of afforestation policies and increasing uptake.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108105", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108105"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108120", "title": "Climate change drives agricultural land use competition in the Paranapanema River Basin, Southeastern Brazil", "authors": "Argemiro Teixeira Leite-Filho, Érica Acioli Canamary, Anaí Floriano Vasconcelos, Daniel Andrés Rodriguez, Jaqueline Carolino Santos, Maria Clara Fava, Minella Alves Martins, Sara Bastos de Oliveira, Javier Tomasella", "abstract": "To meet the growing global demands for food and biofuels, Brazilian soybean and sugarcane production must expand. Consequently, a comprehensive understanding of how climate-induced shifts will drive competition for agricultural land in critical regions is essential for sustainable development. Here, we investigate this potential conflict in the Paranapanema River Basin (PRB), focusing on the competition between soybean and sugarcane planted areas and analyzing how temperature and rainfall seasonality influence land-use decisions. Using predictive modeling, we simulate agricultural land-use changes for 2030, 2040, and 2050 under three climate scenarios (Baseline, SSP 2–4.5, and SSP 5–8.5). Our findings reveal that climate change will significantly reshape agricultural land-use dynamics in the PRB. Rising temperatures generally favor the conversion of pasture, soybean, and mosaic areas to sugarcane, but constrain soybean cultivation. Sugarcane thrives under moderate rainfall seasonality, while soybean expansion is suppressed under moderate (SSP 2–4.5) and high emissions (SSP 5–8.5) scenarios, while sugarcane area expands and pastureland consistently declines. Those trends reflect land-use policy constraints and favor carbon mitigation due to increase biofuel production. The mosaic area remains stable under the Baseline but decreases under the SSP scenarios. The shift from soybean to sugarcane, coupled with the decline in pastureland, underscores the dual pressures of economic demands and climate adaptation. These dynamics could have broader implications for Brazil’s agricultural exports, highlighting the need for diversification and climate-resilient practices. Policymakers must prioritize integrated strategies that balance agricultural productivity with environmental sustainability, while also promoting diversification to reduce reliance on a small number of commodities.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108120", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108120"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108158", "title": "Analyzing the economics of agroforestry within land use and land cover change: The case of the Baga-Kisimagonja ecological corridor of Tanzania", "authors": "Qambemeda Nyanghura, Paulo Mandela, Lilian Binego, Felister Mombo, Ulrich Schmutz", "abstract": "Deforestation poses significant ecological, economic, and social challenges globally. The magnitude of deforestation is, however, spatially heterogeneous, arguable to be higher in the productive agro-ecological landscapes such as in ecological corridors. Agroforestry systems and specifically Silvo-arable, offer a promising solution by balancing agricultural productivity with conservation goals. Their adoption, however, remains restrained due to limited awareness on economic viability and perceived risks among farmers. This study assessed the land use land cover changes of Baga Kisimagonja ecological corridor (BKG) in Tanzania between 1992 and 2022. The study further employs a probabilistic cost-benefit analysis (PCBA) to assess the economic viability of traditional agroforestry practices in comparison to conventional crop farming. The findings indicate that over the study period, crop land expanded at an annual rate of about three to six percent while agroforestry grew at a rate of less than three percent. Forest land decreased by an average of two percent per annum. Such land use dynamics is associated to a net carbon loss of 2.3–3.5 kt C year −1 , valued at approximately 18771–32681 USD year −1 . Additionally, our analysis showed that agroforestry systems are economically viable compared to conventional crop farming and more so when carbon benefits are integrated. We conclude that agroforestry has the potential to mitigate deforestation and enhance long-term land-use resilience if implemented effectively. The findings of this study are important to guide policymakers, farmers, and conservation organizations in making informed investments in agroforestry technologies and practices to restore the degraded ecosystems.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108158", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108158"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108135", "title": "BGBI: A citywide-referenced and bidirectional land use mix index for planning and policy evaluation", "authors": "Jorge Ubirajara Pedreira Junior, Thiago Vinícius Louro, Lucas Brandão Monteiro de Assis, Patrícia Lustosa Brito, Fabio Garboggini Bomfim", "abstract": "Land use mix (LUM) metrics provide actionable evidence to monitor planning goals and prioritize interventions, including transit-oriented development, zoning revisions, and urban retrofits. Yet common measures suffer from two main limitations that often render them difficult to translate into decisions. First, all measures summarize how mixed a place is without indicating the direction of the mix, i.e. whether a homogeneous area is predominantly residential or non-residential. Second, most metrics attain their maximum LUM value at a 50/50 split, even when the citywide composition is highly asymmetric. Here we introduce the Bidirectional Global-centered Balance Index (BGBI), a bounded signed index for land use composition that preserves directionality and centers interpretation on the observed citywide reference share. We compute BGBI alongside four widely used benchmarks and empirically validate all indices against job accessibility metrics by testing whether each measure’s implied balance target coincides with accessibility optima. The analysis uses point address data to measure LUM in terms of residential and non-residential shares aggregated in H3 hexagonal grids for three Brazilian cities. The full workflow can be executed using an open-source R package, which supports reproducible computation of all indices across multiple H3 resolutions and facilitates straightforward replication and sensitivity checks. Our results indicate that the highest-accessibility locations occur near baseline-centered balance (BGBI ≅ 0), rather than near the 50/50 reference implicit in many conventional metrics. These results show that interpretability properties can change diagnostic conclusions and suggest that baseline-centered directionality provides a practical target for planning and policy monitoring.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108135", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108135"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108150", "title": "Econobiomes: A terrestrial-based country classification for international sustainability comparison", "authors": "Trichet Matthieu, Maurin Julie, Calas Julien", "abstract": "Biodiversity loss, driven by human activities such as land-use change, climate change, and pollution, is a critical global challenge. Effective sustainability performance assessments, especially at the national level, require tools that account for biophysical characteristics alongside economic and social factors. Current methods often overlook the ecological constraints and opportunities shaped by biomes—large-scale regions defined by climatic and ecological attributes that influence ecosystem services. This study introduces Econobiome classifications , a novel country categorization system based on terrestrial ecosystem composition and the spatial distribution of economic activities, including agriculture, forestry, and night light data. Using partitioning clustering techniques, we classify countries into four distinct groupings: cropland (11 clusters), forestry (5 clusters), night light (7 clusters), and all activities (7 clusters). The classifications highlight how dominant biomes and economic activity locations shape ecological conditions and sustainability constraints. We apply the Econobiome framework to benchmark the environmental efficiency of national agricultural systems (NAS) using data envelopment analysis (DEA). Results reveal significant variation in eco-efficiency across clusters, underscoring the importance of context-sensitive comparisons in sustainability diagnostics. While the Econobiome framework improves ecological comparability across countries, it relies on national-scale data and does not capture subnational ecological and socio-economic variation. Yet, the Econobiome classification provides policymakers and researchers with a robust tool to align environmental assessments with ecological realities, improving the accuracy of sustainability benchmarks and supporting evidence-based decision-making in the face of the biodiversity crisis.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108150", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108150"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108156", "title": "Granular and spatially differentiated density thresholds for No Net Land Take: A scenario-based cellular automata analysis in French territories", "authors": "Igor Agbossou, Tudal Sinsin, Jean-Philippe Antoni, Gilles Vuidel, Edouard Patault", "abstract": "The \"No Net Land Take\" (NNLT) objective – halting land artificialization by 2050 – poses a fundamental planning challenge: how to accommodate housing demand without new land take. This paper addresses two issues. First: by demonstrating that achieving Net No Land Take (NNLT) requires moving beyond uniform average density targets toward spatially differentiated density thresholds adapted to local urban contexts. Second: by establishing that spatial computing methodologies, particularly high-resolution cellular automata modeling, provide an appropriate framework for defining and testing such granular density thresholds under NNLT constraints. To investigate these issues, we employ the LucSim high-resolution cellular automata model to simulate five density scenarios up to 2050 across two contrasting French territories: the demographically dynamic peri-metropolitan Grand Rovaltain (GR) and the ecologically sensitive, tourism-driven Aire Gapençaise (AG). Simulations are calibrated with official 2050 housing targets from their respective Territorial Coherence Schemes (SCoT) and translated into six settlement entity‑specific density thresholds to test whether granular spatialization matters. Methodologically, cellular automata prove appropriate for this task because they spatially allocate densification under policy constraints while preserving local morphological realism. Our results show that higher-density scenarios can substantially limit land artificialization and protect high-quality soils. However, the effectiveness of densification strategies strongly depends on regional socio-economic and biophysical contexts. This study provides a quantitative, scenario-based framework for policymakers, emphasizing that context-sensitive densification is essential for reconciling urban development with environmental sustainability.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108156", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108156"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108152", "title": "Similar patterns, different processes: Persistence and change in path-dependent land systems", "authors": "Lien Imbrechts, João C. Azevedo, Rebekka Dossche, Matthias Bürgi, Peter H. Verburg", "abstract": "Large-scale land use changes can lead to a fundamental reorganisation of the land and corresponding socioecological regime. These regime shifts are notably hard to detect, predict or model, often arising from unprecedented changes in technology, markets or policies. In a remote rural region in Portugal, we tracked the land use history in three parishes between 1899 and 2018, capturing multiple disruptive socioeconomic and political circumstances, to assess whether a regime shift was triggered. We used a causal historical approach that included the spatio-temporal mapping of LULC changes and a socioecological event timeline to track policy changes and other important events or circumstances. We used these, and other available (historic) literature, to contextualise local information provided in oral history interviews (OHI) that revealed land managers’ decision-making during the last 70 years. We found that during the Estado Novo dictatorship, productivism-based policies had a strong influence on the observed land use intensification, yet OHI revealed that the high level of self-sufficiency agriculture made alternative trajectories unlikely if not impossible. After the 1974 revolution, recalibration took place in the form of a rural exodus and associated land reorganisation, including tenure and production systems. Overall, semi-natural areas, which usually depend on grazing or pastoralism, strongly diminished, while natural and plantation forests expanded. Arable land areas remained relatively stable across the entire study period. Our study shows that land systems that have undergone disruptive changes in the past may continue to evolve discontinuously afterwards, without causing a socioecological regime shift or breaking path dependence.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108152", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108152"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108117", "title": "Mapping, quantifying and predicting future urban green infrastructure dynamics: The case study of Dire Dawa, Ethiopia", "authors": "Habtamu Dersso Meseganaw, Kassahun Gashu, Abenezer Wakuma Kitila, Kassaye Hussien", "abstract": "", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108117", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108117"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108119", "title": "Heterogenous impacts of property rights on the climate-smart investments of farming households: Empirical evidence from Nigeria", "authors": "Osayi Precious Emokpae, Edeoba William Edobor, Micheal Attah, Nneji Ifeyinwa Umeokeke, Grace Sewuese Orshio, Ododo Bukola Izekor, Sulaiman Adesina Yusuf", "abstract": "Climate-induced extremities deplete agricultural yield and reshape investment incentives. Mitigating the adverse effects of climate change on food systems requires increasing commitments to climate-smart investments (CSIs). Property Rights (PRs) create incentives to utilize resources optimally. However, unless such rights are enforceable, CSIs may remain low. In this study, we specifically interrogated the role of institutions in strengthening or undermining the resilience of food systems by assessing how different land-use rights (formal, semi-formal and informal) impact farming households’ incentives to embrace climate-smart adaptation measures. Data for this study were obtained from the fifth wave of the General Household Survey (GHS) Panel for Nigeria. Data from 1199 farming households were analyzed using the Endogenous Switching Regression (ESR) model. Our results show that holding formal PRs have higher positive correlates with investments in climate-smart adaptation measures than in the counterfactual scenario, and, farming households without such rights exhibit higher positive correlates with investments in climate-smart adaptation measures than in the counterfactual scenario. By contrast, residence in communities that allocate non-formal (semi-formal and informal) PRs significantly improves the CSIs of farming households than in the counterfactual scenario. However, the positive impact on CSIs is significantly lower for farming households in communities that do not allot non-formal PRs than in the counterfactual scenario. Therefore, extending the frontier of non-formal PRs such that communities that hitherto do not wield such rights become empowered to allot them is a core pathway through which institutions in Nigeria can foster extensive commitments to climate-smart adaptation measures among farming households.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108119", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108119"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108157", "title": "Unfolding the multisensory landscape experiences from online reviews: A large language model based approach with implications for human-centric land use policy", "authors": "Yun Luo, Shiliang Su", "abstract": "", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108157", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108157"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108149", "title": "Digital twin enabled land administration systems: A multi-dimensional comparative assessment and policy pathways for Turkey", "authors": "Fatih Taktak", "abstract": "", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108149", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108149"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108164", "title": "The politics of land in Israel’s solar transition: Top-down and bottom-up governance", "authors": "Avri Eitan, Shira Bukchin-Peles", "abstract": "The expansion of solar energy has brought land to the center of energy policy debates, yet the governance processes that determine how land is allocated, contested, and transformed remain insufficiently understood. This article examines how solar deployment reshapes land-use governance through the interaction between top-down state authority and bottom-up local claims across open landscapes, built environments, and productive agricultural lands. Israel provides a revealing setting, as land scarcity and a centralised land regime heighten the stakes of solar siting and make governance tensions visible. Drawing on a qualitative case study based on regulatory documents, governmental protocols, stakeholder materials, field visits, and 26 semi-structured interviews, the analysis shows that solar siting generates distinct temporal, spatial, and distributive effects. National authorities accelerate deployment and set spatial priorities that treat territories as readily available for development. Municipalities, communities, and landholders respond by mobilizing ecological knowledge, asserting community rights, and advancing alternative visions of land value. These encounters shape which landscapes host solar infrastructure, which land uses are displaced or preserved, and how transition benefits and burdens are distributed. Although grounded in Israel, these mechanisms extend more broadly. Across settings, solar expansion operates less as a uniform national strategy than as a negotiated reconfiguration of territorial authority, land politics, and spatial meaning. The findings demonstrate that the energy transition is also a land-use transition. For land-use policy, this underscores the need for governance arrangements that balance national goals with place-based priorities and enable renewable energy development to proceed in legitimate and spatially just ways.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108164", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108164"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108161", "title": "Property size linked to deforestation, fragmentation and forest fires in the Brazilian Amazon", "authors": "Ciar D. Noble, James J. Gilroy, Weslei Butturi, Carlos A. Peres", "abstract": "Deforestation and forest degradation within Brazilian Amazonia primarily occur on private lands, yet their extent varies considerably among properties. We combine high-resolution remote-sensing and land-ownership data to analyse relationships between property size and forest retention, canopy height, fragmentation and fire prevalence across 30,022 private properties within an > 113,000 km 2 consolidated agricultural frontier. Bayesian geospatial regressions showed that larger properties retained a greater proportion of forest overall and within Riparian Protected Areas and were more likely to adhere to Legal Reserve requirements. Properties > 1000 ha contained 75.2% of all remaining forest, while ≤ 150 ha properties accounted for the largest shares of total deforestation (27.6%) and riparian losses (39.9%). Smaller properties were also associated with lower-stature forest canopy, higher forest fire densities, and greater landscape-scale (∼100-km 2 ) fragmentation, primarily due to increased disaggregation of forest among, rather than within, landholdings. Smaller properties thus not only retained less forest, but this forest was more degraded, underscoring the need to tailor policy interventions within Brazilian Amazonia according to property size. Targeted subsidies and credit schemes could enable smallholders to farm a smaller portion of their land, restore forest and reduce reliance on degrading land-use practices (e.g., fires). Fines, embargoes, and stricter Forest Code enforcement may help preserve remaining forest and reduce fire use in largeholdings. Incentivising forest restoration across property boundaries, and offsetting forest cover deficits to remaining continuous forest tracts, would help minimise fragmentation. Implementing these measures will depend on collaboration between government agencies and NGOs to align enforcement, financing, and coordinate landscape-scale management.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108161", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108161"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108125", "title": "Agricultural carbon emission efficiency and its regional convergence in China: Role of land use modes and economic factors", "authors": "Yiqi Zhu, Hanwei Liang, Yifei Wang, Yuran Feng", "abstract": "", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108125", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108125"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108118", "title": "Understanding land use evolution for vacant residential and vacant commercial parcels in Miami, Florida", "authors": "Lauren Hoover, Sudipta Dey Tirtha, Naveen Eluru", "abstract": "", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108118", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108118"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108142", "title": "Defining informality in a Southern European City indicators of informality in the CEP neighborhood, Palermo", "authors": "Meghdad Kahvand, Marco Picone, Michelangelo Carraro, Mona Saadvandi, Annalisa Giampino", "abstract": "Urban informality in Southern Europe remains an underexplored yet significant phenomenon, challenging dominant frameworks that primarily address informality in the Global South. This study examines the Centro Espansione Periferica (CEP) neighborhood in Palermo, Italy, to develop a taxonomy of informal settlement indicators suited to Southern European cities' specific governance, socio-economic, and spatial characteristics. Using a qualitative methodology grounded in Grounded Theory, this research integrates semi-structured interviews, document analysis, and field observations to capture the complexities of informality in a regulated urban environment. Findings reveal that informality in CEP emerges from economic hardship and governance failures, ambiguous tenure arrangements, and spatial adaptations within public housing initiatives. The study highlights key informality indicators, including weak institutional oversight, socio-spatial transformations, and informal negotiations between residents and public authorities. This taxonomy challenges binary classifications of informality and calls for a more nuanced, context-sensitive approach to land-use policies in European urban contexts. This research provides valuable perspectives for urban management and sustainable development approaches in cities facing comparable issues by emphasizing staged formalization, inclusive planning, and tailored policy measures.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108142", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108142"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108159", "title": "Analysis of sustainability and regulatory compliance of land allotment for cooperative housing development in Ethiopia", "authors": "Masresha Belete Asnakew, Tewachew Yirga Getie, Yeneneh Nigusie, Yeshareg Baye Simegn, Takele Abebe, Niguse Adane Derseh, Melkam Ayalew Gebru, Abirham Tarekegn Yitayih", "abstract": "", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108159", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108159"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108163", "title": "Modelling the structural and land use effects of support policies for the expansion of organic farming: The case of organic dairy farms in France", "authors": "M. Schiavo, P.M. Aubert, C. Le Mouël", "abstract": "", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108163", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108163"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108110", "title": "Balancing growth and conservation: Land-use policy scenarios for Uruguay’s grasslands", "authors": "Melanie Schweikart, Leonardo R. Ramírez, Ina Säumel", "abstract": "Land-use scenario simulations support policy decisions that seek to balance economic development with environmental conservation. In Uruguay’s Río de la Plata temperate grasslands, agribusiness expansion has driven land-use intensification, threatening biodiversity, ecosystem services, and rural livelihoods. This study integrates land-use data from 2000 to 2015 with explanatory variables in a multi-layer perceptron Markov model to predict vulnerability to change and land-use patterns for 2030 under three scenarios: business-as-usual, multifunctional land use, and grassland conservation. Under continued intensification, native grasslands are predicted to decline by 9% to a land cover of 51% by 2030, with cropland expansion accounting for 80% of the loss. Reducing cropland expansion and maintaining timber plantations at 2015 levels could preserve grassland cover at 57%, corresponding to more than 10,000 km² compared to the business-as-usual scenario. Except for a northern area with comparatively low conflict potential, approximately two-thirds of Uruguay remain highly susceptible to agricultural conversion. Applying 90 m and 180 m conservation buffers around sensitive areas may reduce agricultural spillover and enhance ecosystem service provision. Implementing 90 m protection buffers substantially curtails cropland expansion within designated areas, resulting in a 139% relative difference in net cropland change compared to the business as usual scenario. By providing high-resolution vulnerability assessments and policy-relevant insights, this study supports evidence-based land-use planning and highlights how targeted conservation measures can help navigate trade-offs between agricultural development and ecological resilience at national and local scales.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108110", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108110"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108143", "title": "Spatiotemporal dynamics of preferential occupation of high-qu gical transformation of rural working lands", "authors": "David Matarrita-Cascante", "abstract": "Amenity migration, the movement of urban populations to rural areas in search of lifestyle, natural, and cultural amenities, has intensified following the COVID-19 pandemic, particularly across rural working lands characterized by farming, ranching, forestry, and resource stewardship. While existing scholarship has examined the drivers and impacts of amenity migration, this phenomenon remains undertheorized as a broader process of social-ecological transformation. This viewpoint paper argues that post-COVID amenity migration represents more than a demographic shift, functioning instead as a transformative force reshaping rural working lands and broader agrifood and rural production systems.pGrounded in a social-ecological systems perspective, the paper develops an integrative conceptual framework linking three interconnected transformation pathways: (1) structural and institutional transformations, including fragmented ownership patterns, institutional adaptation challenges, and the emergence of hybrid governance arrangements; (2) reconfigurations of social dynamics and capacities, including changing community composition, civic participation, and knowledge systems; and (3) shifts in land use and production regimes associated with multifunctional and post-productivist landscape transitions. Together, these pathways demonstrate how demographic and land-use changes associated with amenity migration cascade across governance, ecological, economic, and social dimensions.pBy positioning amenity migration as a driver of multi-scalar rural transformation, this paper contributes to land-use scholarship by extending existing amenity migration research beyond demographic mobility and toward a more comprehensive understanding of contemporary rural transitions. The paper further highlights the need for adaptive governance, institutional realignment, and planning approaches capable s with low levels of socioeconomic development and a dominant agricultural function. The effect of deagrarianization was threshold-based: afforestation intensity increased with the deagrarianization index up to approximately 0.3, beyond which no further increase was observed. Spatially, forest expansion was concentrated in peripheral municipalities, particularly those distant from regional centres and characterised by relative monofunctional, family-farming-based economies. The results demonstrate that recent afforestation patterns are weakly aligned with areas of highest ecological need, revealing shortcomings in the spatial targeting of CAP instruments. The findings provide policy-relevant evidence for the development of territorially differentiated afforestation strategies, improved alignment of financial incentives with local socioeconomic conditions, and more effective integration of afforestation into land-use planning and forest policy.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108111", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108111"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108147", "title": "After quantification: Insights from India’s Soil Health Card scheme", "authors": "Ritwick Ghosh, Ryan Nehring, Wei Zhang", "abstract": "As the concept of soil health gains prominence, it becomes increasingly important to examine how states design and implement soil health policies. Does soil health offer a novel pathway to enact and legitimize institutional changes toward more sustainable farming systems, or does it risk becoming another neologism that preserves status quo, productivist agriculture? We explore these questions through an analysis of one of the most ambitious state-led initiatives organized around soil health: India’s Soil Health Card (SHC) scheme. The SHC scheme seeks to provide every farmer in the country with bi-annual soil test reports, based on the assumption that improved information will encourage more judicious use of fertilizers and pesticides. The assumption reflects a broader emphasis within the agricultural sciences on the importance of quantifying soil health. Drawing on government documents and farmer perception studies (n = 38), we find that although farmers view the cards positively, they make few substantive changes to their farming practices. As an illustrative case, India’s grand SHC scheme shows that quantification alone is insufficient and could even dampen momentum for transformative policy reforms. Effective and durable change lies in pairing efforts to quantify soil health with (a) plural epistemic approaches to knowledge production, (b) participatory models for knowledge dissemination, and (c) structural reforms in the agri-food system that address issues around land tenure and subsidies.", "journal": "Land Use Policy", "published": "2026-10-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108147", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108147"}, {"source": "crossref", "source_id": "10.1016/j.landusepol.2026.108113", "title": "Economic results and production choices of Italian arable farms under the CAP 2023–2027 first pillar reform: The role of crop rotation eco-scheme", "authors": "Rebecca Buttinelli, Simone Severini, Raffaele Cortignani", "abstract": "The European Common Agricultural Policy (CAP) 2023–2027 reform introduced significant changes to first-pillar payments, including Eco-Schemes designed to promote environmentally beneficial practices. This study examines the impact of the CAP first-pillar reform on Italian arable farms through the AGRITALIM agro-economic supply model and a sample of 5803 farms from the Farm Accountancy Data Network database, providing a national-scale assessment of the reform under the Italian CAP Strategic Plan considering also climatic conditions. The voluntary decision to participate watersheds using green-grey infrastructures: A cooperative perspective", "authors": "Ghazi Al-Rawas, Mohammad Reza Nikoo, Mohammad Reza Hassani, Seyyed Farid Mousavi Janbehsarayi, Mohammad Hossein Niksokhan", "abstract": "", "journal": "Land Use Policy", "published": "2026-09-01", "url": "https://doi.org/10.1016/j.landusepol.2026.108087", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.landusepol.2026.108087"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103134", "title": "The integrated food security phase classification system: seven defining characteristics", "authors": "Hope Michelson, Erin Lentz, John Armstrong, Kaija Korpi", "abstract": "The Integrated Phase Classification (IPC) is the global standard for analyzing and classifying food insecurity, including famine. While media attention tends to focus on IPC famine analyses, the IPC conducts most of its analyses in non-famine contexts, providing critical assessments of sub-national food insecurity. These analyses guide considerable humanitarian intervention and investment. We argue that IPC analyses are most valuable and effective when users understand the processes, data, and methodological safeguards that underlie and inform IPC findings. We present and discuss seven essential characteristics to clarify IPC operations and interpretation including its analysis framework, consensus-based processes, reporting output interpretation, and famine classification protocols. These seven characteristics are key to the IPC’s capacity to monitor dynamic, overlapping and chronic circumstances of food insecurity. We discuss the strengths and limitations of these characteristics, and we work through implications for interpreting and applying IPC outputs. While our primary objective is to clarify IPC processes, we conclude with a section that is more normative, discussing the IPC’s role and significance in the current global humanitarian system. At a time of significant strain on the humanitarian system and in the face of a loss of practitioner expertise at all levels, a more complete understanding of the IPC’s processes will enhance its utility in an increasingly constrained humanitarian landscape.", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103134", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.foodpol.2026.103134"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103139", "title": "Assessing the economic effects of veterinary antimicrobial use reduction policies: China’s experience and worldwide implications", "authors": "Ruishi Si, Hao Zhao, Sitong Pan, Yongfeng Tan, Mingyue Liu", "abstract": "", "journal": "Food Policy", "published": "2026-08-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103139", "fetched_at": "2026-07-09T08:00:31", "id": "crossref:10.1016/j.foodpol.2026.103139"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103141", "title": "Assessing the environmental implications of sustainable public procurement of food", "authors": "Michael Martin, Sofia Lingegård", "abstract": "Sustainable public procurement (SPP) is increasingly recognized as a policy tool to improve the environmental performance of food systems, yet there is limited empirical evidence on how procurement strategies influence environmental outcomes. This study assesses the environmental implications of municipal food procurement in a rural Swedish region using life cycle assessment (LCA). Procurement data from Östersund Municipality were used to construct baseline and alternative scenarios that reflect policy targets and objectives, including increased sourcing of organic and local foods, substitution of beef with game or legumes, and reductions in plate waste. Environmental impacts were evaluated using the Impact World + method across multiple indicators, including climate change, eutrophication, biodiversity, toxicity, and resource use. The results show that procuremen
