  <script>
    const PAPERS = [{"title": "Briefing Chat: Testosterone and sperm might get a boost from obesity drugs", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-19", "url": "https://doi.org/10.1038/d41586-026-01963-1"}, {"title": "A long-lived butterfly’s secret to graceful ageing", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-19", "url": "https://doi.org/10.1038/d41586-026-01948-0"}, {"title": "Stem cells banish severe autoimmune disease for 15 years", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-19", "url": "https://doi.org/10.1038/d41586-026-01925-7"}, {"title": "Author Correction: Autophagic cell death restricts chromosomal instability during replicative crisis", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-19", "url": "https://doi.org/10.1038/s41586-026-10812-0"}, {"title": "Is AI ruining our skills? Early results are in — and they’re not good", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1038/d41586-026-01947-1"}, {"title": "Clues to the sloth’s sloth found in its genome", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1038/d41586-026-01869-y"}, {"title": "Cell transplant across the tree of life hints at how animals emerged", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1038/d41586-026-01910-0"}, {"title": "Brexit tore apart European science — now the research rifts are healing", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1038/d41586-026-01841-w"}, {"title": "It slices! It dices! Sashimi-Bot handles seafood with ease", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1038/d41586-026-01871-4"}, {"title": "Daily briefing: The brain builds a sentence neuron by neuron", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1038/d41586-026-01967-x"}, {"title": "Scalable fabrication of COF membranes for aliphatic/aromatic separation of crude oil", "abstract": "Distillation has been the cornerstone of crude oil refining for more than a century, relying on boiling point differences for fractionation. Although effective, it is highly energy-intensive and lacks the precision to separate specific hydrocarbon classes. We report crystalline covalent organic framework (COF) membranes with well-defined micropores and alkyl-functionalized frameworks that combine molecular sieving with preferential affinity to enrich aliphatics. An electric field–assisted roll-to-roll process enabled scalable fabrication of continuous membranes. These COF membranes enriched aliphatics to &gt;95% and delivered permeance orders of magnitude higher than amorphous polymers in Arabian Light crude oil. A crude oil permeance of 0.34 liters m −2 hours −1 bar −1 with &gt;90% aliphatics enrichment was achieved using industrial-standard 1812 membrane modules, demonstrating a lower energy demand than distillation.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aea0869"}, {"title": "Induction of broadly neutralizing HIV antibodies by a two-step mechanism informs vaccine design", "abstract": "A major obstacle confronting HIV-1 vaccine and cure research is the lack of an outbred animal model for rapid and consistent induction of broadly neutralizing antibodies (bNAbs). We designed an epitope-focused simian-human immunodeficiency virus (SHIV.5MUT) that elicited broad and potent V3-glycan–targeted antibodies within a year of infection in 14 of 22 macaques compared with 0 of 14 control animals. SHIV.5MUT elicited bNAbs by a two-step mechanism, inducing an initial wave of V1-directed antibodies that selected for envelope (Env) glycoprotein variants with shortened, hypoglycosylated V1 loops, which in turn primed V3-glycan bNAb precursors. Rhesus bNAbs were immunogenetically and structurally diverse, closely resembling human V3-glycan bNAbs. Env-bNAb coevolution revealed a diverse repertoire of bNAb precursors and the Env variants that matured them, yielding a molecular blueprint for vaccine design.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aec6396"}, {"title": "El Niño is here. It may be the strongest this century", "abstract": "After clearing a spring forecasting hurdle, scientists see growing odds of a powerful climate event that could disrupt weather worldwide", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aej7946"}, {"title": "Inheriting trauma, rethinking science", "abstract": "", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aeh7938"}, {"title": "Violet seed propulsion inspires robot design", "abstract": "Comparative analysis of seed biomechanics reveals principles that can guide soft robot technology", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aei6084"}, {"title": "Protein-templated synthesis of dinucleotide repeat DNA by an antiphage reverse transcriptase", "abstract": "Defense-associated reverse transcriptases (DRTs) are widespread bacterial antiphage systems that use unconventional mechanisms of polynucleotide synthesis. We show that DRT3, which comprises two distinct RTs (Drt3a and Drt3b) and a noncoding RNA (ncRNA), synthesizes alternating poly(GT/AC) double-stranded DNA. Cryo–electron microscopy structures at 2.6-angstrom resolution reveal a D3-symmetric 6:6:6 complex of Drt3a, Drt3b, and ncRNA. Drt3a produces the poly(GT) strand using a conserved ACACAC template within the ncRNA. Notably, Drt3b synthesizes a complementary, protein-primed poly(AC) strand in the complete absence of a nucleic acid template, using conserved active site residues specific to Drt3b to enforce precise base alternation. These findings expand the functional landscape of nucleic acid polymerases, revealing a protein-templated mechanism for sequence-specific DNA synthesis.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aed1656"}, {"title": "Big Ebola outbreak puts research spotlight on little-known virus", "abstract": "The Bundibugyo virus only emerged twice before. Now, scientists see a chance to get to know it better", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aej7944"}, {"title": "In Science Journals", "abstract": "Highlights from the Science family of journals", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aej7458"}, {"title": "Direct development of stem tetrapods across the fin-to-limb transition", "abstract": "Modern amphibians are characterized by an aquatic larval stage that ends abruptly with a period of widespread tissue remodeling (metamorphosis) upon transition to terrestrial adulthood. A transient larval stage ending in gradual metamorphosis is often assumed for the earliest digited tetrapods, but direct evidence of this larval stage is lacking. Exceptionally preserved stem tetrapod hatchlings show that a transient larval stage was absent in tetrapods both before and after the fin-to-limb transition; instead we identified soft- and hard-tissue evidence of direct development, falsifying hypotheses of an ancestral origin of metamorphosis or of a gradual larval-postlarval transition serving as a template for lissamphibian metamorphosis. We argue that a transient larval period culminating in metamorphosis originated near or within the tetrapod crown group as part of a broader suite of traits associated with terrestrialization.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aeb7635"}, {"title": "Hour of the wolf", "abstract": "Wolves have made a spectacular comeback in Europe. But attacks on livestock and humans have caused a heated debate about the limits of coexistence", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aej7910"}, {"title": "ScS-triggered slip on megathrust interfaces after the 2011\n                    <i>M</i>\n                    <sub>W</sub>\n                    9.0 Tohoku-Oki earthquake", "abstract": "We report an extraordinary observation of ground motion in Japan after the moment magnitude ( M W ) 9.0 2011 Tohoku-Oki earthquake attributed to a multiplate-interface slip event triggered by shear wave that traveled to the Earth’s core and back. The megathrust earthquake generated a strong ScS phase with a peak-to-peak amplitude exceeding 1 centimeter in Japan. Superposed on this waveform, an eastward steplike displacement of up to 5 to 6 millimeters was recorded in Global Navigation Satellite System (GNSS) data throughout Japan. This likely originated from slip on the megathrust interfaces triggered by the nearly simultaneous arrival of the ScS wave across Japan. Such an ScS triggering is a previously unrecognized source of seismic hazard, which can potentially (re)activate the mainshock area and the broader surrounding megathrust interfaces.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aec4190"}, {"title": "Decoupling of global metabolic flux and proteome partitioning in bacteria", "abstract": "Bacteria regulate homeostatic growth by adjusting proteome composition. In Escherichia coli , this coordination is mediated by guanosine tetraphosphate and pentaphosphate, collectively termed (p)ppGpp, which couple amino acid supply with ribsosome production. We identified a distinct architecture in Bacillus subtilis , in which guanosine triphosphate (GTP), not (p)ppGpp, controls proteome allocation. Translational inhibition resulted in GTP depletion and suppressed amino acid biosynthesis through feedback inhibition without altering ribosome abundance, establishing a regulated decoupling between total amino acid flux and proteome composition, with flux deviating from proteome-based predictions. By artificially adjusting GTP concentrations, we recoupled flux and proteome, restoring growth to maximal amounts. The regulated suboptimality enables a trade-off to balance growth and stress resilience. Similar GTP-based strategies were present in other Firmicute species, indicating possible evolutionary conservation. Proteome composition and metabolic flux have distinct regulatory layers in some bacteria.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aeb6410"}, {"title": "AI finds legal loopholes, even when not asked", "abstract": "Models repeatedly discovered ways to exploit regulations, and current safeguards largely failed to stop them", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aej7948"}, {"title": "Lamprey 3D single-cell transcriptomics reveals ancestral and specialized features of the vertebrate brain", "abstract": "The lamprey occupies a pivotal position for elucidating vertebrate brain evolution. Using spatial transcriptomics and single-nucleus RNA sequencing, we generated a three-dimensional molecular atlas of the lamprey brain, identifying 209 distinct cell clusters across 14 regions. Cross-species comparisons revealed broad conservation of regional spatial architecture, defining an ancestral organizational blueprint. Within this conserved framework, however, marked lineage-specific divergence emerged. We observed extensive neuronal specialization across vertebrate lineages, accompanied by regulatory shifts associated with spatial reorganization and functional diversification of neuronal populations. Additionally, our results suggest that a cerebellum-like architecture predates the jawed vertebrate cerebellum. Together, these findings identified constraints on neural organization and detected cellular innovations driving evolutionary diversification.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aea2535"}, {"title": "Maternal trans-vaccenic acid shapes neonatal T cell development and early-life immune imprinting", "abstract": "How maternal nutrition influences neonatal immune development and imprinting through breastfeeding remains largely unclear. We report that maternal supplementation with trans-vaccenic acid (TVA), the predominant naturally occurring trans-fatty acid in human breast milk, promoted neonatal T cell development in mice. Neonates fed by mothers on a TVA-enriched diet showed an expanded naïve cluster of differentiation 4 (CD4 + ) T cell population and enhanced adaptive immunity against infection. TVA reprogrammed neonatal naïve CD4 + T cells through a G protein–coupled receptor–CCCTC-binding factor axis and promoted T helper cells (Th1)–skewing by cooperating with the transcription factor TBX21. Early-life exposure to maternal TVA via breastfeeding supported long-lasting antiviral immunity in adulthood. Our findings establish the multifaceted benefits of maternal nutrition and breastfeeding via TVA in promoting infant immune homeostasis and protective immunity.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aea4041"}, {"title": "Tracking the roots of zoonoses", "abstract": "Ancient pathogen DNA from animals elucidates the origin and evolution of infectious diseases", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aef0941"}, {"title": "AI may raise the bar and thin the pipeline", "abstract": "", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aeh4940"}, {"title": "Managing the pitfalls of private money", "abstract": "", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aei6193"}, {"title": "An HIV vaccine blueprint", "abstract": "The infection of rhesus macaques with a chimeric virus uncovers a recipe for broadly neutralizing antibodies", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aei3106"}, {"title": "Scientific computing in an AI world", "abstract": "Scientific computing must integrate AI with simulation and focus on energy-efficient methods and systems", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aef4214"}, {"title": "Preserve EEOC data collection", "abstract": "", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aei1236"}, {"title": "Indium-free perovskite/silicon tandem solar cells with tin oxide recombination layer and electrodes", "abstract": "Indium-based transparent conductive oxides are widely used as electrodes and recombination layers in perovskite/silicon tandem solar cells, yet their scalability is constrained by indium scarcity and sputtering-induced damage. Here we report high efficiency and stable indium-free perovskite/silicon tandem solar cells enabled by reactive plasma deposited tin oxide (RPD-SnO x ). For RPD-SnO x as the recombination layer, a certified efficiency of 33.6% is achieved. Fully indium-free tandems that used RPD-SnO x as both recombination layer and electrodes delivering a champion PCE of 33.2% (1 cm 2 ) and a mini-module with a certified efficiency of 31.0% (207.9 cm 2 ). Dense and uniform self-assembled monolayer anchoring enabled by RPD-SnO x suppressed non-radiative recombination and reduced halide migration. Indium-free mini-modules exhibited high thermal, damp-heat, and outdoor operational stability and retained 65% of their maximum initial efficiency after 105 days of outdoor operation.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aef5355"}, {"title": "A metastable solid solution transforms into complex nanostructures", "abstract": "Instability in a high-entropy alloy drives structural changes that strengthen the alloy", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aei4111"}, {"title": "Brain-wide topographic coordination of rotating waves", "abstract": "Patterns of brain activity moving in waves occur across brain regions and species, yet their spatial organization, anatomical basis, and brain-wide distribution remain unclear. Using cortex-wide imaging and electrophysiology in awake mice, we revealed a prominent wave motif across spatial scales. Waves frequently formed rotational patterns centered on somatosensory cortex and sweeping across somatotopic maps. Axonal architecture within sensory cortex exhibited a matching circular arrangement. Rotating waves were mirrored between hemispheres and between sensory and motor cortex and were coordinated with subcortical spiking. Bilaterally cutting the circular circuitry diminished rotating waves. Rotating waves were modulated across behavioral states, evoked by sensory inputs, and recruited during correct visuomotor performance. These results establish that rotating waves are sculpted by axonal architecture across diverse brain systems and behavioral contexts.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.adx1369"}, {"title": "Unlikely chemistry of life may have originated on the ocean floor", "abstract": "Group offers new scenario for how cells came to rely on phosphate molecules", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aej7951"}, {"title": "Paws for thought", "abstract": "", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aej7460"}, {"title": "Dynamic asymmetric strain imprinted into substrates by an oxide thin film", "abstract": "In film-substrate systems, the substrate role is often considered to be limited to providing static mechanical constraints. Dynamic film-substrate interactions when a structural change in the film modifies the substrate are generally disregarded. Using combined X-ray and electron microscopies, we observed that the electrically induced filament in a VO 2 film created strong asymmetric strain in the underlying Al 2 O 3 substate. This asymmetric substrate strain fed back into the film and defined the filament expansion direction, revealing the importance of film-substrate dynamic interactions in determining film functionality. Furthermore, the strain imprint propagated at least tens of microns deep into the substrate, exceeding the film thickness more than 200 times, potentially enabling substrate functionalization as an active mechanical coupling media in 3D-integrated microelectronics architectures.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.adt9347"}, {"title": "In Other Journals", "abstract": "Editors’ selections from the current scientific literature", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aej7459"}, {"title": "The Lucy flyby of (52246) Donaldjohanson: A bilobed asteroid with tumbling rotation", "abstract": "The main belt asteroid (52246) Donaldjohanson (DJ) is a likely member of the Erigone asteroid family. This implies that DJ is a fragment of a larger parent body that was destroyed in a collision about 155 million years ago. We report observations taken during a flyby of DJ by the Lucy spacecraft. We found that DJ is composed of two heavily cratered lobes, connected by a smoother neck, with overall dimensions 8.8 kilometers (km) by 4.4 km by 3.1 km. The crater density is consistent with the Erigone family’s age, except for craters &lt;0.4 km, which have been preferentially erased. DJ rotates slowly in a tumbling state, likely owing to spin-down by radiative forces. Surface spectra show iron-bearing phyllosilicates, indicating moderate aqueous evolution on the parent body.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aec0503"}, {"title": "Changes in wildlife activity patterns in response to war in Ukraine", "abstract": "Conflict zones are inherently hazardous and inaccessible for researchers, which results in a knowledge gap about the immediate effects of armed conflicts on the environment, particularly wildlife. We used camera-trap detections to investigate the impact of armed conflict on wildlife activity patterns before, during, and after the Russian occupation of the Chornobyl Exclusion Zone (Ukraine) in 2022 and compared it to the same period in 2021. Mammal species responded to armed conflict through immediate behavioral adjustments, including reduced activity during night and on dates when armed-conflict activities intensified. Our results provide insight into wildlife’s behavioral responses to armed conflict in real time and underscore the potential of camera trapping to quantify the ecological effects of war.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aed1493"}, {"title": "Ultrathin polymer membranes with locked intrinsic microporosity for hydrocarbon fractionation", "abstract": "Membrane technologies offer an energy-efficient alternative to conventional distillation for hydrocarbon fractionation, but they suffer from a trade-off between fast liquid transport and high molecular selectivity. We report a scalable approach to fabricate polymer membranes with stable interconnected pathways by locking in their intrinsic microporosity. This locking strategy reduces polymer swelling and preserves the subnanometer pore structure in hydrocarbon liquids, resulting in 10-fold higher permeance for synthetic crude oil compared with current state-of-the-art membranes. When applied to Arabian Extra Light crude oil, these membranes achieved excellent size- and class-based separation, removing 99.8% of hydrocarbons containing &gt;15 carbon atoms and 93% of sulfur-containing components. These scalable membranes underpin processes providing rapid and selective hydrocarbon separation, enabling a more sustainable pathway toward crude oil refining.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aed1111"}, {"title": "CD4\n                    <sup>+</sup>\n                    T cells impair tumor growth through IL-3 and TNF-dependent vascular damage", "abstract": "Most cancer immunotherapy strategies are focused on direct tumor killing by immune cells, especially T lymphocytes. Clinical and conceptual limitations of these approaches create a need for additional strategies. We identified a tumor stroma–targeting mechanism in which tumor antigen–specific CD4 + T cells inhibit tumor growth through myeloid cell and tumor necrosis factor (TNF)–dependent vascular damage. Multiplex immunofluorescence and single-cell and tissue transcriptomics showed that CD4 + T cells trigger the formation of perivascular myeloid cell clusters containing “classically activated” macrophages that produce TNF in response to T cell–derived interleukin-3. TNF causes intratumoral endothelial damage and blood supply disruption, which are associated with localized tumor cell death. Thus, intratumoral antigen-triggered T cell activation can mediate antitumor effects without direct recognition of living tumor cells, thereby avoiding many of the inhibitory mechanisms that limit anti-tumor immunity.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.ads7910"}, {"title": "A space telescope is falling to Earth. NASA is racing to rescue it", "abstract": "Vehicle will attempt a daring capture-and-boost mission to extend the life of the Swift observatory", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aej7947"}, {"title": "Russia plans deep quest for ‘endless oil’", "abstract": "Soviet-era theory touted by Putin’s former campaign manager claims oil deposits can form without organic matter", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aej7952"}, {"title": "Reanimating ELIZA, the world’s first chatbot\n                    <b>Inventing ELIZA</b>\n                    <i>Sarah Ciston, David M. Berry, Anthony C. Hay, Mark C. Marino, Peter Millican, Jeff Shrager, Arthur I. Schwarz, Peggy Weil</i>\n                    The MIT Press, 2026. 350 pp.", "abstract": "A simple program created in the 1960s laid the groundwork for future conversational computers", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aeh9238"}, {"title": "Making the most of your time at work\n                    <b>80,000 Hours: How to Have a Fulfilling Career That Does Good</b>\n                    <i>Benjamin Todd</i>\n                    Harmony, 2026. 384 pp.", "abstract": "Thinking strategically from the start could help you do more good over the course of your career", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aeh4754"}, {"title": "Age and early life adversity shape heterogeneity of the epigenome across tissues in macaques", "abstract": "Age and early life adversity (ELA) are key determinants of health, but whether they affect similar physiological mechanisms across tissues is unknown. We generated DNA methylation (DNAm) profiles across 14 tissues in 237 semi–free-ranging rhesus macaques with naturally occurring ELA. Age-associated DNAm was predominantly tissue dependent, yet tissue-specific epigenetic clocks showed that epigenetic aging was relatively consistent within individuals. ELA effects were adversity dependent, but each ELA exerted coordinated effects across tissues. Although ELA targeted many of the same loci as age, the directions of effects differed, which indicates that ELA does not uniformly increase epigenetic age. Instead, ELA leaves a coordinated, cross-tissue epigenetic signature that is distinct from—yet intertwined with—age-related differences, which advances our understanding of how early environments sculpt the molecular foundations of aging and disease.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aea4922"}, {"title": "Britain’s next research choice", "abstract": "Ten years ago, the Brexit referendum began the United Kingdom’s departure from the European Union (EU), forcing British science to confront a serious question: What place should the UK occupy in European research? No longer qualified to be a full-fledged member of Horizon Europe, the matter of whether to rejoin as an associate member became a totemic issue for the UK. There were serious questions around whether rejoining would be worth the money, especially if it had to pay in more funding than it could win back in grants. UK researchers, however, insisted that association was the best way to protect their access to the most prestigious and attractive funding opportunities. So, when the UK eventually associated in 2024, it was to sighs of relief. But times have changed.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aej6498"}, {"title": "Strain-induced fully coherent triphase nanoarchitecture in refractory high-entropy alloys", "abstract": "Nanostructured materials have exceptional properties, yet scalable fabrication of bulk, three-dimensional, nanograined structures remains a formidable challenge. We report the self-assembly of a fully coherent, triphase nanostructure—resembling a mesocrystal—formed through solid-state phase separation in an equiatomic refractory alloy. The resulting architecture integrates three common metallic crystal structures—face-centered cubic, body-centered cubic, and hexagonal close-packed—interwoven through strain-induced phase separation and unconventional transformation pathways triggered by the separation itself. This nanostructure accommodates large atomic-size mismatches and lattice misfits while maintaining full coherency and thermal stability. The resulting material exhibits a compressive yield strength exceeding 2 gigapascals. These findings provide a method for nanostructure engineering in compositionally complex alloys through strain-induced transformation pathway engineering.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aec4995"}, {"title": "New list of political jobs at science agencies called ‘weird and capricious’", "abstract": "NIH programs and leadership are hit hard; other science agencies are barely mentioned", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aej7945"}, {"title": "EU Omnibus proposal increases pesticide risks", "abstract": "More efficient environmental risk assessment and stronger protection are achievable", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aeg8744"}, {"title": "Another red alert for American science", "abstract": "Although research has bipartisan support in the US Congress, and trust in science is above 75% across the country, the Trump administration seems as determined as ever to mortally wound the nation’s scientific enterprise. After the scientific community persuaded Congress to restore most of the president’s draconian cuts to research funding last year, the White House Office of Management and Budget (OMB), under Russell Vought, has found new ways to circumvent the will of Congress and starve American science. At the beginning of this year, OMB dragged its feet in releasing instructions to federal agencies for how to distribute the funding appropriated by Congress, leading to lags in dispersal. Now, OMB has proposed revising the rules that govern how federal dollars are spent. The changes would inevitably lead to unlegislated reductions in funding and damage US leadership in science, both in academia and industry.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aej3572"}, {"title": "<i>Viola</i>\n                    seed pod architecture shapes sequential, force-augmented pinching", "abstract": "Many plants explosively launch seeds, but these natural catapults often display inefficient, unpredictable energy transfer in seed ejection. Violets ( Viola spp.) address this problem by ejecting seeds successively with consistent propulsive force from a single pod, a strategy that requires sophisticated energy release. In this work, we show that Viola achieves this feat with a simple and compact structure that generates adaptive force augmentation through sequential pinching. Our biological and mathematical analyses indicate that the pod valve’s morphogeometry optimizes pinching with sufficient strength for seed ejection with limited material cost and creates a shifting force-amplifying hotspot, which allows consecutive seed ejections. We use this design principle to create autonomous zipping actuators for a range of applications, including biomedical soft machines.", "journal": "Science", "source": "crossref", "published": "2026-06-18", "url": "https://doi.org/10.1126/science.aed2953"}, {"title": "The ancestors of eukaryotic cells contained a mix of genes from various microbes", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/d41586-026-01739-7"}, {"title": "Analysis of 173,303 exomes and genomes in the Pakistan Genome Resource", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10667-5"}, {"title": "A mosaic of whole-body representations on the human precentral gyrus", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10653-x"}, {"title": "Wah-ult in the vault", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/d41586-026-01719-x"}, {"title": "Daily briefing: The proteins that protect us from deadly mutations", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/d41586-026-01960-4"}, {"title": "These ‘master’ proteins protect us from deadly mutations — and could inspire new drugs", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/d41586-026-01883-0"}, {"title": "Towards Conversational AI for Disease Management", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10764-5"}, {"title": "How the zebrafish brain weaves recent experiences into future decisions", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/d41586-026-01756-6"}, {"title": "Fast formation to reinforce lithium-rich cathodes", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-025-09553-3"}, {"title": "Reconfigurable quantum computer juggles 98 qubits", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/d41586-026-01702-6"}, {"title": "Freezing brain damage in its tracks: cooling drugs limit stroke injury in mice", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/d41586-026-01923-9"}, {"title": "Mapping the neuronal building blocks of human language with language models", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10691-5"}, {"title": "Structure of the pre-initiation complex explains CMGE biogenesis", "abstract": "Abstract When cells enter S phase, bidirectional DNA replication is initiated through the kinase-regulated recruitment of three activators (Cdc45, GINS and Pol ε) to a duplex-DNA-loaded double hexamer of minichromosome maintenance (MCM) ATPases. Together, these proteins form two CMGE helicases that establish divergent replication forks as they become separated 1 . Here, to gain an understanding of CMGE biogenesis, we reconstituted the pre-initiation complex with purified yeast proteins. The cryo-electron-microscopy structure shows a set of firing factors caught in the act of assembling two symmetrical CMGEs. We show how stepwise complex formation reshapes MCM in preparation for DNA opening, and we explain how ATP promotes firing-factor ejection and CMGE maturation. We find that although Sld2 facilitates the recruitment of GINS to MCM, as expected, it also aids the efficient separation of the CMGE dimer, and is essential for the ejection of the lagging strand from MCM. These findings have direct implications for our understanding of the metazoan Sld2 orthologue, RECQL4, and point to a replication-fork establishment mechanism that is conserved across eukaryotes.", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10657-7"}, {"title": "The EU needs to back its ambition to end animal testing with cash", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/d41586-026-01882-1"}, {"title": "Oceans in Asia smash heat records — what it means for extreme weather", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/d41586-026-01938-2"}, {"title": "Visualizing the impact of quenched disorder on 2D electron Wigner solids", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10654-w"}, {"title": "Light-controlled microgripper punches above its weight", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/d41586-026-01703-5"}, {"title": "Emergent decadal predictability in Antarctic contribution to sea-level rise", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10614-4"}, {"title": "Probing picometre-scale interlayer deformations via hyperbolic polaritons", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10638-w"}, {"title": "Cortical development dynamics across autism spectrum disorder mouse models", "abstract": "Abstract Despite the functional diversity of over 100 causal genes 1–3 , phenotypic convergence across models may reveal common neurobiological processes in autism spectrum disorder (ASD). Here we profiled 251 samples from 11 monogenic mouse models of ASD using single-nucleus multi-omic sequencing across three developmental stages, both sexes and two brain regions. Despite genetic heterogeneity, ASD-linked mutations converged on perturbations of the radial glial cell lineage. These alterations reflect a transient developmental delay rather than lasting lineage misspecification and resolve by postnatal stages. Molecularly, the largest transcriptional differences emerged in neurons at early postnatal stages. These changes included downregulation of synaptic and ion channel-related genes, consistent with homeostatic adaptation or delayed maturation. Network analysis showed molecular convergence across models within each developmental stage, suggesting that diverse mutations linked to ASD impinge on common, stage-specific processes. Convergence becomes less pronounced by postnatal day 14, highlighting the dynamic nature of ASD-associated changes. Cross-genotype heterogeneity is superimposed on stage-specific effects. Electrophysiology corroborated this pattern: mutants generally showed altered neuronal excitability and synaptic properties with model-specific nuances. Our study also highlighted sex-specific gene expression alterations, with female mice often displaying larger effect sizes than male mice. Together, our findings provide a comprehensive view of developmental cellular and molecular dynamics across models of ASD.", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10679-1"}, {"title": "CHPO coordinates chilling recovery and nitrogen use in rice", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10682-6"}, {"title": "DNA from hunter-gatherer teeth reveals secrets of ancient plague", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/d41586-026-01941-7"}, {"title": "Reimagining machine vision with optical computing", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/d41586-026-01891-0"}, {"title": "Should nicotine be regulated like a narcotic? A Pacific nation makes the case", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/d41586-026-01903-z"}, {"title": "Navigating a crowded developing brain leaves neurons with broken DNA", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/d41586-026-01705-3"}, {"title": "Rock weathering can counteract river CO2 emissions induced by permafrost thaw", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10664-8"}, {"title": "Towards autonomous medical artificial intelligence agents", "abstract": "Abstract Large language models (LLMs) show great potential for clinical decision-making, yet most applications remain narrow, task-specific chat tools rather than systems integrated into clinical workflows 1,2 . However, building physician copilots will require models that operate within the electronic health record (EHR), with governed access to patient data and the ability to initiate permitted EHR actions within defined safety constraints. Yet it remains unproven whether such a system can manage patient cases with physician-level performance. Here we show that MIRA (Medical Intelligence for Reasoning and Action), an autonomous artificial intelligence agent operating in a sandboxed EHR environment, can navigate a large clinical action space to obtain patient histories; order and interpret laboratory, imaging and microbiology tests; generate differential diagnoses; and formulate treatment plans such as prescribing medications, scheduling surgical procedures and planning admissions. In simulations on real patient cases spanning multiple diagnoses, MIRA outperformed physicians in diagnostic accuracy and made guideline-concordant, medication-safe and appropriate admission decisions. Compared with previous LLM applications that addressed isolated subtasks or provided free-text advice, these results suggest that an EHR-integrated artificial intelligence agent can turn clinical intent into structured, actionable EHR operations, possibly making it a more effective decision-support partner for physicians. Further work is needed to establish generalization, safety and governance through prospective, real-world studies.", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10675-5"}, {"title": "The brain region that could provide a cognitive ‘reservoir’ in old age", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/d41586-026-01870-5"}, {"title": "Confined migration induces non-lethal DNA damage in developing neurons", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10648-8"}, {"title": "Optical fibre gripper for high-performance 3D micromanipulation", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10673-7"}, {"title": "A prototype differential atom interferometer for fundamental physics", "abstract": "Abstract Gravitational waves and ultralight dark matter are among the most compelling frontiers in fundamental physics, motivating proposals for very-long-baseline atom interferometerssuch as AION 1 , MAGIS 2 , AICE 3 and AEDGE 4 that aim to detect at frequencies at which ground-based 5 and space-borne 6 laser interferometers lose sensitivity. Very-long-baseline atom interferometers look for signals by comparing the quantum phase evolution of widely separated atomic ensembles interrogated by a common laser. However, their performance depends critically on suppressing noise sources, particularly laser phase noise. The experimental validation of such noise rejection remains an important challenge. Here we demonstrate a prototype differential atom interferometer based on the single-photon clock transition of fermionic 87 Sr. Thus, we obtain a gradiometer configuration with a species intrinsically suited to kilometre-scale and space-baseline operation. The instrument operates at the standard quantum limit 7 with no excess noise beyond atom shot noise. The differential configuration maintains quantum-limited sensitivity in the presence of several radians of artificially injected laser phase noise per shot, which emulates the conditions expected in a very-long-baseline atom interferometer. We also demonstrate the recovery of coherent oscillatory signals across a broad frequency range under fully phase-randomized conditions, a capability that is inaccessible to a single interferometer operating in the same regime. These results provide an experimental validation of the noise-immune measurement principle underlying very-long-baseline atom interferometers and mark an important step towards next-generation quantum sensors for gravitational-wave detection and searches for ultralight dark matter 8,9 .", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10617-1"}, {"title": "Lethal plague outbreaks in Lake Baikal hunter-gatherers 5,500 years ago", "abstract": "Abstract Plague is among the most devastating diseases in human history 1 . However, early strains of the plague-causing bacterium Yersinia pestis lacked virulence factors that are required for the bubonic form until around 3,800 years ago 2,3 . Consequently, the morbidity and mortality of early plague strains remain unclear. Here we describe early plague strains that are associated with two phases of outbreaks among mid-Holocene hunter-gatherers near Lake Baikal in southeast Siberia, beginning from about 5,500 years ago. These outbreaks occur across four hunter-gatherer cemeteries, with a 39% detection rate for plague infection. By reconstructing kinship pedigrees, we show that small familial groups were affected, consistent with human-to-human spread of disease, and that the first outbreak occurred within a single generation. The infections appear to have resulted in acute mortality, especially among children (aged 8 to 11 years). We further note functional differences, including in the ypm superantigen locus, which is also present in present day Yersinia pseudotuberculosis . The new strains diverge ancestrally to known Y. pestis and constrain the timing of its emergence, indicating that this happened before approximately 5,700 years ago. These findings show that plague outbreaks happened earlier than previously thought and were indeed lethal. We contend that the occurrence of outbreaks among mid-Holocene hunter-gatherer communities well outside the sphere of Late Neolithic Europe challenges the notion that higher population densities and lifestyle changes during the Neolithic agricultural transition were prerequisites for plague epidemics.", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10540-5"}, {"title": "Molecular basis of polyadenylated RNA fate determination in the nucleus", "abstract": "Abstract Eukaryotic genomes generate a plethora of polyadenylated (pA + ) RNAs 1,2 , which are packaged into ribonucleoprotein particles (RNPs). To ensure faithful gene expression, functional pA + RNPs, including protein-coding RNPs, are exported to the cytoplasm, whereas transcripts within non-functional pA + RNPs are degraded in the nucleus 1–4 . How cells distinguish these opposing fates remains unknown. The DExD-box ATPase UAP56 (also known as DDX39B) is a central component of functional pA + RNPs, and promotes their docking to the nuclear pore complex-anchored TREX-2 5,6 , which triggers transcript release from UAP56 to facilitate export 7 . Here we reveal that the poly(A) tail exosome targeting (PAXT) connection 8 binds a TREX-2-like module, which releases pA + RNAs from UAP56 for decay by the nuclear exosome. The core of this module consists of a LENG8–PCID2–SEM1 trimer, which we show is structurally and biochemically equivalent to the central GANP–PCID2–SEM1 trimer of TREX-2. Mutagenesis and transcriptomic data demonstrate that the nuclear fate of pA + RNPs is governed by the contending actions of nucleoplasmic PAXT and nuclear pore complex-associated TREX-2, which interpret RNA-bound UAP56 as a signal for RNA decay or export, respectively. As RNA targets of PAXT are generally short and intron-poor, we propose an overall model for pA + RNP fate determination whereby the distinct sub-nuclear localizations of PAXT and TREX-2 govern the degradation of short non-functional pA + RNAs while allowing export of their longer and functional counterparts.", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10650-0"}, {"title": "Revealing competitive interfacial reactions in high-energy Li–S batteries", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-025-09473-2"}, {"title": "A blastoporal organizer in a ctenophore", "abstract": "Abstract In an iconic experiment in 1924, Hilde Mangold and Hans Spemann established that the dorsal blastopore lip of amphibian embryos functions as an organizer and induces a secondary body axis when transplanted into a host embryo 1 . This discovery demonstrated that specific embryonic regions can regulate embryonic patterning and lead to the establishment of an entire body axis. Subsequent studies have revealed that cnidarians, the sister group to Bilateria, also possess a blastoporal embryonic organizer 2,3 . However, the evolutionary origin of the organizer remains unclear. Here we report that the blastopore lip of the ctenophore Mnemiopsis leidyi , a member of the evolutionary sister group to all other metazoans 4,5 , exhibits organizer activity. We show that transplanted fragments of blastopore lip tissue from M. leidyi gastrula induce secondary pharynx and mouth formation. Moreover, transphyletic transplantation experiments show that the blastopore lip of M. leidyi leads to the generation of a secondary body axis in embryos of the cnidarian Nematostella vectensis . Organizer function in M. leidyi requires both β-catenin and TGFβ signalling, and the TGFβ-family ligands probably provide this inductive capacity. These findings reveal the deep homology of the blastoporal organizer in ctenophores, cnidarians and vertebrates, implying the ancestral organizer role of the blastopore lip. We propose that the emergence of the organizer was an essential innovation that facilitated the change from the temporal cell differentiation of unicellular relatives to the spatial cell differentiation of the first multicellular embryo.", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10643-z"}, {"title": "Cucurbituril-based anion-conducting membranes with supramolecular nanopores", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10666-6"}, {"title": "Optical metasurfaces for general vision processing on the edge", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10635-z"}, {"title": "A distant brown dwarf coplanar to a warm Jupiter and a hot super-Earth", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10586-5"}, {"title": "Fiery data hint that controlled forest fires benefit human health", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/d41586-026-01868-z"}, {"title": "A 98-qubit trapped-ion quantum computer with all-to-all connectivity", "abstract": "", "journal": "Nature", "source": "crossref", "published": "2026-06-17", "url": "https://doi.org/10.1038/s41586-026-10676-4"}];

    function esc(s) {
      return (s || "").replace(/[&<>"']/g, c => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    }

    // 取得元プルダウンを構築
    const sel = document.getElementById("source");
    [...new Set(PAPERS.map(p => p.source))].sort().forEach(s => {
      const o = document.createElement("option");
      o.value = s; o.textContent = s; sel.appendChild(o);
    });

    function render() {
      const q = document.getElementById("q").value.toLowerCase().trim();
      const src = document.getElementById("source").value;
      const filtered = PAPERS.filter(p => {
        if (src && p.source !== src) return false;
        if (q) {
          const hay = (p.title + " " + (p.abstract || "")).toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });
      document.getElementById("count").textContent = filtered.length;
      const list = document.getElementById("list");
      if (!filtered.length) {
        list.innerHTML = '<div class="empty-state">該当する論文がありません。</div>';
        return;
      }
      list.innerHTML = filtered.map(p => `
        <div class="card">
          <div class="title"><a href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.title)}</a></div>
          <div class="meta"><span class="tag">${esc(p.source)}</span>${esc(p.journal)} · ${esc(p.published)}</div>
          ${p.abstract
              ? `<div class="abstract">${esc(p.abstract)}</div>`
              : `<div class="abstract empty">（アブストラクトなし）</div>`}
          <div class="link"><a href="${esc(p.url)}" target="_blank" rel="noopener">論文を開く →</a></div>
        </div>`).join("");
    }
    render();
  </script>
