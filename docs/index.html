g microfinance with farming extension services on seasonal food security in rural Uganda. Using an experimental design, we monitor seasonal changes through a monthly panel spanning two years. We find that neither the combined approach nor standalone microfinance reduced food insecurity across seasons. Conversely, households in both treatment groups experienced declines in dietary diversity during harvest and land preparation seasons. Exploratory analysis suggests that the bundled approach offered sporadic benefits only to households with better market access, while standalone credit appeared to constrain dietary choices for the poorest. We attribute these results to a structural mismatch: the inflexible repayment schedule of the microfinance product likely discouraged agricultural investment, preventing the intended synergies. Our findings imply that for bundled interventions to succeed, financial products must be flexible enough to match the cash flows of the complementary agricultural activities.", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103075", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103075"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103065", "title": "Childhood Can’t be too Sweet: The impact of information interventions on Sugar-Sweetened beverage consumption among children and adolescents", "authors": "Zhichong Xuan, Xinrong Li, Qiran Zhao, Shenggen Fan", "abstract": "", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103065", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103065"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103082", "title": "An unknown known: Knowledge, preferences, and acceptance of the Common Agricultural Policy", "authors": "Matteo Zavalloni, Giacomo Salvarani, Elena Viganò", "abstract": "Despite its importance for the agricultural sector, little is known about the extent to which the general public understands and knows the Common Agricultural Policy (CAP), and how such (lack of) knowledge shapes their policy preferences. This paper investigates the role of factual knowledge of the CAP in influencing Italians’ support for and acceptance of the policy. Relying on original survey data ( N = 1002 ) representative of the Italian population, we first assess citizens’ factual knowledge of the CAP’s central function (providing subsidies to the agricultural sector, rather than imposing taxes on it or having no policy at all). We then examine how knowledge affects preferences over budget allocations across policy goals. In addition, we conduct an information provision experiment, randomizing information about the environmental conditionality of CAP subsidies, to test its effect on public acceptance of the policy. We use multinomial logistic regression to analyze budget allocation preferences and ordered logistic regression to examine the determinants of CAP acceptance . Our results show that Italians generally exhibit acceptance of the CAP, but respondents with correct knowledge display preferences that move away from income support toward other policy goals. Moreover, information about environmental conditionality of the CAP significantly increases its acceptance, particularly among individuals with environmentally conscious consumption habits. These findings highlight the importance of policy knowledge and communication in shaping public opinion on EU-level agricultural policies.", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103082", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103082"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103049", "title": "Modelled health impacts of three stakeholder-selected policies to support healthy and environmentally sustainable population diets in New Zealand", "authors": "Christine Cleghorn, Christina McKerchar, Bruce Kidd, Cliona Ni Mhurchu", "abstract": "• Uses rich qualitative data on stakeholder perspectives to inform policy design. • Presents three food policies of varying designs to inform real world policy. • Identifies cost saving policies which could potentially reduce health inequities. • Policies require large up-front costs or loss of governmental income. • Health system cost savings are expected in the medium to long term. Food production and consumption impacts both planetary and population health. This research aimed to estimate the impacts of three food policies, selected by stakeholders, for the New Zealand (NZ) population: Exempting core, sustainable foods from Goods and Services Tax (GST), education about healthy sustainable foods and māra kai (food garden informed by mātauranga Māori) and community gardens. These were modelled using a proportional multistate lifetable model through to health gains (in Health Adjusted Life Years, HALYs), health equity impacts, and net costs (combining health system costs/cost savings and intervention costs in 2011 NZD). Changes in dietary intake were modelled through to changes in diet related disease incidence over the remaining life of the 2011 NZ population (n = 4.4 million, 3% discounted). Exempting core, sustainable foods from GST resulted in 87,410 HALYs (95% Uncertainty Interval (UI): 72,280 to 104,110) and health system cost savings of $927.3 Million (M), UI: (686.6 to 1216.6 M). Education about healthy sustainable foods generated small health impacts (1,170 HALYs, UI: 930 to 1,430) and health system cost savings ($9.6 M, UI: $6.8 to $12.9 M). Māra kai and community gardens generated 8,040 HALYs (UI: 4,720 to 11,800) and would cost the government $364.3 M (UI: $267.6 to $464.6 M). All scenarios produced more age-standardised per capita health gain for Māori (Indigenous population) than non-Māori. The first two policies were cost saving while the māra kai and community gardens policy was borderline cost-effective. This research shows that these policies have the potential to improve population health and could be used to inform food policy in high-income countries. For NZ, these policies could also reduce ethnic health inequities; careful policy design involving relevant stakeholders, including Māori communities, is needed to ensure health and equity benefits are realised.", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103049", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103049"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103072", "title": "From brand to prosperity: the impact of agricultural regional public brands on local economic growth in China", "authors": "Chengji Yang, Zhongting Yi, Rongrong Bai, Hongdong Guo", "abstract": "", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103072", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103072"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103077", "title": "Forecasting for food price inflation using machine learning methodology: Expansion on FRED-MD", "authors": "Hongqiang Yan, Mark Manfredo, Ashok K. Mishra", "abstract": "", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103077", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103077"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103083", "title": "Allergen regulations for non-prepacked foods in the food service sector: A global scoping review", "authors": "Mariana Scudeller Vicentini, Carolina Neves Freiria, Jan Mei Soon-Sinclair, Iain Malcolm Ferris, Lisa Marie Winnall, Han Wen, Diogo Thimoteo da Cunha", "abstract": "• First global review maps 83 allergen laws for non-prepacked foods in foodservices. • Most laws in high-income countries; LMICs face gaps due to informal food markets. • Only 4 of 83 regulations require anaphylaxis action plans; most lack full management systems. • Digital delivery platforms rarely mandate real-time allergen info, risking consumer safety. • Calls for harmonized standards, LMIC support, and integrated allergen management systems. Food hypersensitivity is rising worldwide, with strict avoidance of specific foods currently the only effective strategy for affected individuals. Regulatory frameworks have been introduced to support allergic consumers; however, regulations addressing non-prepacked foods within the food service sector remain underexplored. This scoping review, conducted using an adapted PRISMA methodology, systematically mapped 83 regulatory documents relating to food allergen management in non-prepacked foods across various global jurisdictions. Five principal themes were extracted from the legislation: (1) Presence of Information About Allergenic Ingredients. (2) Presence of Information Requesting Consumers to Declare Their Allergies. (3) Training and Education of Food Business Operators or Staff. (4) Existence of an Action Plan in Case of Anaphylaxis. (5) Existence of Food Allergen Management System or Individualised Plans. Most regulatory initiatives were located in high-income countries, underscoring a marked deficit in protections within low- and middle-income settings. Despite recent improvements, critical gaps persist in regulatory coverage, enforcement, and equity, potentially limiting the protection available to vulnerable consumers. This review offers a comparative framework for international policy development and identifies priority areas for strengthening allergen management in food service environments. The findings are intended to inform policy-makers and guide future research aimed at improving safety, regulatory inclusivity, and equitable access for allergic consumers eating away from home.", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103083", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103083"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103057", "title": "Five years of evolving dual red/green front of package food labeling: Criteria evolution and governance lessons from Israel’s scientific committee", "authors": "Michal Gillon-Keren, Carmit Safra, Michal Efrat, Iris Shai, Elliot M. Berry, Amir Tirosh, Oren Froy, Gila Fayman, Sigal Tepper, Naomi Fliss Isakov, Anat Chavia Ben-Yosef, Avidor Ginsberg, Ronit Endevelt, Moran Blaychfeld-Magnazi", "abstract": "", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103057", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103057"}, {"source": "crossref", "source_id": "10.1016/s0306-9192(26)00061-8", "title": "Editorial Board", "authors": "", "abstract": "", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/s0306-9192(26)00061-8", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/s0306-9192(26)00061-8"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103055", "title": "Public perspectives on food date labeling: implications for waste reduction and food safety policy", "authors": "Peng Lu, Lulu Mao, Xiting Zhuang, Zhihong Xu, Shuai Ma", "abstract": "Confusion about U.S. food date labels contributes to preventable waste and foodborne risk, yet real-world perspectives remain underexplored. This study reviewed and analyzed 744 unique public comments submitted to the United States Department of Agriculture (USDA) 2024–2025 Request for Information using a multi-label text-mining approach. Eleven themes emerged; the most prevalent were Food Waste Concerns (56.85%), Support for Label Standardization (55.78%), Label Confusion (53.09%), and Clarity of Language/Suggestions (47.72%). A substantial share of comments also emphasized the Safety versus Quality Distinction (40.99%). Less frequently mentioned themes included Support for Proposal (21.51%), Economic Concerns (15.19%), and Consumer Education (13.71%). Accessibility of Labels (7.66%) and Cultural or Household Practices (7.39%) appeared in a smaller proportion of comments, and Trust in Government or Industry (6.85%) was the least common theme. Building on these findings and prior literature, this study proposes a policy-oriented conceptual framework that includes two pathways for policy action. The first pathway is standardization, emphasizing consistent, visible, and practicable labeling formats that differentiate quality from safety and account for product-category context. The second pathway is education, emphasizing evidence-informed, audience-tailored programs integrated with communication strategies and practical guidance. By situating public voices within ongoing regulatory debates, this study contributes to food policy discussions on labeling reform. The results carry international relevance given global efforts to harmonize date labeling standards and strengthen food system sustainability.", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103055", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103055"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103073", "title": "Trajectories into famine: observations of patterns and implications for prevention", "authors": "Daniel Maxwell, Matthew Day, Merry Fitzpatrick, Paul Howe, Peter Hailey, Anu Atre, Alex de Waal", "abstract": "• Drawing on famine systems theory, this paper focuses on the factors that form a trajectory into famine. • Four cases of famine trajectories are reviewed from recent famines or near famine crises. • Identifying the factors that form a trajectory could help to more effectively disrupt those trajectories. • The shape of the trajectory is less important that the identifying its starting point. The prevention of famine is once again a significant humanitarian and policy issue. The population at risk has risen and a number of policy initiatives have been initiated to address the threat of famine. While actual famines, as determined by the Integrated Food Security Phase Classification (IPC) thresholds are still relatively rare, near-famine crises are increasingly frequent, suggesting the need for earlier prevention measures. Based on a 2020 observation of different trajectories into famine and recent insights from famine theory, this paper analyzes four recent cases of famine or near famine crises, and identifies five common categories of factors and 12–15 context-specific indicators within those categories that describe famine trajectories. This paper develops two novel ways of analyzing and depicting them. The main finding is that the shape of the trajectory matters less than the observation of how and when a trajectory—in other words, a famine system—starts. The ability to demonstrate the onset of a famine trajectory (as opposed to simply warning of worsening food insecurity) should enable earlier interventions to prevent famine.", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103073", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103073"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103074", "title": "Farming under pressure: land rent, financial risk, and nutrient over-application in China", "authors": "Yitian Jin, Dakuan Qiao, Kunyang Zhang, Yi Luo, Laping Wu", "abstract": "", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103074", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103074"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103071", "title": "Tracking the hog and pig inventory in real-time using nowcasting", "authors": "Tao Xiong, Zhenfeng Ma, Lee Schulz, Xinyue He, Dermot Hayes, Wendong Zhang", "abstract": "", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103071", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103071"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103045", "title": "Video information framing’s impact on consumers’ mental effort, choices, and beliefs: evidence from food-choice studies", "authors": "Zhengliang Yang, Vincenzina Caputo", "abstract": "", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103045", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103045"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103051", "title": "Disruption in ground transportation: Natural disasters and disintegration of local food markets", "authors": "Gustavo Nino", "abstract": "Spatial integration between production regions and consumer markets is essential for price efficiency, yet even a single road blockage can break that link and push prices up overnight. Climate change is expected to bring more frequent natural disasters such as flash floods and landslides, turning these small but recurring blockages into a growing threat. Leveraging a novel dataset linking 230,000 weekly food price records, a routing algorithm that identifies the roads used in the supply chain network, and 1200 landslides in Colombia from 2013 to 2020, I use an instrumental variable strategy to isolate the causal effect of transport blockages on food price differentials at the national level. A typical closure diverts roughly 2%–3% of the total quantity supplied to the affected market and raises local wholesale prices by 0.5-0.9 % within one week. The diverted quantity also lowers prices in other markets by about 0.4 %. Heterogeneity estimates using the machine learning causal forest technique reveal that the strongest effects occur in markets located far from major supply corridors, where limited connectivity amplifies the impact of road closures. The variation in results is driven by the importance of the disrupted road within the transportation network and by differences in price elasticities across cities with distinct income levels and product specializations. Using the Causal Forest results, the article identifies regions where infrastructure improvements would most effectively reduce the impact of disruptions on price differentials. • Landslides raise local wholesale food prices 0.5–0.9% within a week. • Traded quantities fall 2%–3% in affected markets. • Shocks lower prices elsewhere 0.4–0.5% and widen dispersion 0.8–1.2%. • Peripheral markets face larger effects due to limited route options.", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103051", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103051"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103081", "title": "Impact of business coaching on farmers’ income: A cluster randomized controlled trial of vegetable growers in Benin", "authors": "Modeste D. Dohou, Ogoudele S. Codjo, Pepijn Schreinemachers, Edmond Totin, Zakou Amadou, Jacob A. Yabi, Laurent C. Glin, Malick N. Ba", "abstract": "• Cluster randomized trial with 48 farmer groups and 665 vegetable producers in Benin. • Evaluated the impact of business coaching and technical support for smallholder farmers. • The intervention raised average net vegetable income by 11.2% after one year. • Intermediary effects on business knowledge, trust, credit access, and agricultural practices. • Business coaching and technical support are important to raise farm productivity. The productivity of smallholder farmers in sub-Saharan Africa has remained low despite significant investment in technology development and scaling. There is a recognized need for interventions that strengthen farmers’ business skills and organizational capacity while providing technologies on demand. However, the evidence base for such types of interventions is weak. This study aims to fill this gap by analyzing the impact of “Vegetable Business Networks,” an intervention approach that emphasizes business coaching and capacity strengthening of vegetable value chains. The study applied a cluster-randomized controlled trial design with 48 farmer groups in Benin, equally split between control and treatment. Questionnaire-based data were collected from 665 farmers before the intervention and one year later. The intent-to-treat effect is estimated using analysis of covariance (ANCOVA) and difference-in-difference (DiD) methods. The results show farmers’ annual income increased by $2159/ha or 5.9%. The score for knowledge of developing a business plan increased by 21.5 (p < 0.001). Farmers’ trust in their organization and external actors significantly increased. While more evidence is needed on the cost-effectiveness and sustainability of holistic approaches compared to those that promote particular technologies, our study proves that business coaching can significantly increase farmers’ income in the short term.", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103081", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103081"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103054", "title": "Estimating returns to surface-water management infrastructures: Evidence from coastal Bangladesh", "authors": "Haseeb Ahmed, Luis Becerra-Valbuena, Katarzyna Czaplicka, Silvio Daidone, Md. Shahnewaz Parvez, Ranjan Roy, Nicholas J. Sitko, Hari Prasad Vajja", "abstract": "", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103054", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103054"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103087", "title": "Effect of market-level risk information on consumer willingness to pay for aflatoxin-safe food: evidence from unregulated food markets in Nigeria", "authors": "Oluwagbenga Akinwehinmi, Liesbeth Colen, Vincenzina Caputo", "abstract": "Consumption of aflatoxin-contaminated food can pose severe health risks, yet many consumers in many low- and middle-income countries (LMICs) are unaware of their exposure. Moreover, most food markets in these countries are not regulated for food safety and lack credible mechanisms to signal food safety. This study investigates how market-specific exposure information influences consumers’ beliefs about the health risks of aflatoxin contamination and their exposure to it, as well as their willingness to pay for tested, certified, and untested maize flour. Laboratory tests of 150 maize flour samples collected at five informal markets, show that total aflatoxin levels range from less than 0.96 to 909.65 μg/kg, with 80–100% of market samples exceeding the regulatory limit. Using this market-specific exposure information, we conducted an incentive-compatible discrete choice experiment with a random information treatment among 370 consumers in Northern Nigeria. We find that compared to providing only generic health information, tailored, market-specific exposure information more effectively shifts consumers’ beliefs about exposure to unsafe food, resulting in a 120% discount for untested maize flour. Compared with no information, market-specific information resulted in a 113% discount for untested maize flour, a 45% discount for certified maize flour, and a 24.12% price premium for tested maize flour. Findings underscore the potential of market-specific information to mitigate consumer exposure to food safety risks, promote safer food markets, and inform food safety policies in LMICs.", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103087", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103087"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103076", "title": "Healthy diets are affordable but often displaced by other foods in Indonesia", "authors": "Leah Costlow, Rachel Gilbert, William A. Masters, Flaminia Ortenzi, Ty Beal, Ashish Deo, Widya Sutiyo, Sutamara Noor, Wendy Gonzalez", "abstract": "New methods for modeling least-cost diets that meet nutritional requirements for health have emerged as important tools for informing nutrition policy and programming around the world. This study uses the cost of a healthy diet to inform targeted nutrition programming in Indonesia. We combine detailed retail prices and household survey data from Indonesia to describe how reported consumption and expenditure patterns across all levels of household income diverge from least cost healthy diets using items from nearby markets. We examine regional price variations, identify households with insufficient income for healthy diets, and analyze the nutrient adequacy of reported consumption patterns. We find that household food spending was sufficient to meet national dietary guidelines using the least expensive locally available items for over 98% of Indonesians, but almost all households consume substantial quantities of discretionary foods and mixed dishes while consuming too little energy from fruits, vegetables, and legumes, nuts, and seeds. Households with higher incomes have higher nutrient adequacy and are closer to meeting local dietary guidelines, but still fall short of recommendations. These findings shed new light on how actual food demand differs from least-cost healthy diets, due to factors other than affordability, such as taste, convenience, and aspirations shaped by marketing and other sociocultural influences.", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103076", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103076"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103070", "title": "Introducing a national in-kind food assistance program: evidence from an experiment in Korea", "authors": "Sanghyo Kim, Yong Jee Kim, Ji Yong Lee", "abstract": "", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103070", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103070"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103078", "title": "Rethinking food self-sufficiency through cultural and social capital", "authors": "Sothy Eng", "abstract": "", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103078", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103078"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103056", "title": "Information exposure and economic losses during food safety outbreaks: Evidence from onion markets and Google Trends", "authors": "Xuerui Yang, Andrew S. Hanks, Robert L. Scharff", "abstract": "Before 2020, fresh onions were rarely associated with major foodborne illness outbreaks in the United States. However, two major multistate outbreaks in 2020 and 2021 resulted in over 2000 reported illnesses and substantial economic losses. This study examined consumer and market responses to onion-related foodborne outbreaks occurring between 2017 and 2021, using household panel and retail scanner data through May 2022. We introduced Google Trends to measure information-seeking behavior, which under the proportionality assumption proxies for state-level information exposure. Using a Heckman selection framework, we decomposed demand shifts into direct outbreak effects (raising population mean risk perceptions) and information-moderated adjustments, with higher information exposure considerably reducing demand losses during outbreaks. Household onion purchases decreased by 20.37% in 2020 and 27.14% in 2021, while earlier outbreaks (2017–2019) showed no significant demand effects. Revenue losses totaled $1.158 billion in 2020 and $1.346 billion in 2021, surpassing even the estimated upper bound of the annual U.S. health burden from all onion-related Salmonella cases ($680 million). These indirect losses were 25–100 times greater than direct recall costs ($46.88 million in 2020, $13.64 million in 2021). Producers absorbed nearly all losses in 2020 amid stable prices (-1.94%), while consumers bore an additional $201 million through 5.56% price increases in 2021. Retail assortment stayed constant (-1.04% and -0.05%) throughout both outbreaks, indicating that observed reductions in purchases were primarily demand-driven rather than supply-constrained. These results reveal a policy trade-off: early outbreak warnings reduce illness but trigger broad consumption losses when sources remain unclear. We recommend real-time Google Trends monitoring for targeted communication and producer burden-sharing mechanisms. • Higher information-seeking (Google Trends) moderated risk-driven demand losses, with variation across states. • Purchases fell 20.4% (2020), 27.1% (2021); stable assortment shows demand-driven drop. • Market losses ($2.5B combined) exceeded $680M estimated annual Salmonella health burden. • Producers bore nearly all 2020 losses ($1.16B); 2021 shifted $201M to consumers. • Timely, targeted communication and GT-based monitoring can reduce economic disruption; producer risk-sharing mechanisms are needed.", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103056", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103056"}, {"source": "crossref", "source_id": "10.1016/j.foodpol.2026.103053", "title": "Recent approaches in agricultural production economics: Where the heck are the prices?", "authors": "Jesse Tack, Jisang Yu, Roderick M. Rejesus", "abstract": "• We provide an overview of empirical approaches in production economics that focus on credible identification of a small number of model parameters. • We provide a historical context: where they came from, how they differ, and where we think the methodological landscape is headed. • We focus on ag production and provide specific examples of research in the climate change, agricultural policy, and technology arenas. We provide an overview of increasingly common empirical approaches in production economics that focus on credible identification of a small number of model parameters, the value of which is couched within a practitioner’s perspective on the evolution of empirical methods in this literature dating back to the mid-twentieth century. That is, we provide a historical look at where these approaches came from, how they differ from previous approaches, and where we think the methodological landscape is likely headed. Our particular focus is on the agricultural production literature, and we provide specific examples of research in the climate change, agricultural policy, and technology arenas. We also discuss recent innovations in data and methods that have driven empirical work to date and point to how these methodological advances (and perhaps future advances) can be leveraged to push the agricultural production economics literature forward. We conclude with some general take-away messages and highlight trade-offs researchers often make when choosing an empirical approach.", "journal": "Food Policy", "published": "2026-05-01", "url": "https://doi.org/10.1016/j.foodpol.2026.103053", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1016/j.foodpol.2026.103053"}, {"source": "crossref", "source_id": "10.1111/ajae.v108.3", "title": "", "authors": "", "abstract": "", "journal": "American Journal of Agricultural Economics", "published": "2026-05-01", "url": "https://doi.org/10.1111/ajae.v108.3", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/ajae.v108.3"}, {"source": "crossref", "source_id": "10.1111/agec.v57.3", "title": "", "authors": "", "abstract": "", "journal": "Agricultural Economics", "published": "2026-05-01", "url": "https://doi.org/10.1111/agec.v57.3", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.v57.3"}, {"source": "crossref", "source_id": "10.1002/aepp.v48.2", "title": "", "authors": "", "abstract": "", "journal": "Applied Economic Perspectives and Policy", "published": "2026-05-01", "url": "https://doi.org/10.1002/aepp.v48.2", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.v48.2"}, {"source": "crossref", "source_id": "10.1002/ajae.70074", "title": "From certification to agglomeration: Evidence from geographical indications of agricultural products in China", "authors": "Zhaofeng Tan, Teng Huang, Tianjun Liu, Xinshuang Zhang, Ziqing Tian", "abstract": "Abstract Marshallian agglomeration is typically attributed to input–output linkages, labor market pooling, and knowledge spillovers; however, empirical evidence on how these mechanisms operate in agricultural settings remains limited. This paper examines whether and how China's agricultural geographical indications certification fosters agricultural agglomeration. Exploiting the staggered rollout of this certification system since 2008 as a quasi‐natural experiment, we employ a staggered difference‐in‐differences design and find that certification significantly promotes county‐level agricultural agglomeration, primarily through strengthened input–output linkages: it encourages the colocation of upstream producers and downstream processors and deepens local production networks. In contrast, we find no significant effects through labor market pooling or knowledge spillovers. The agglomeration effects are concentrated in plant‐based certifications and are stronger in counties with better market access and transportation infrastructure. Overall, our findings extend Marshallian agglomeration theory to agriculture and provide new causal evidence on how agricultural geographical indications certification contributes to agricultural agglomeration as part of broader sectoral structural transformation.", "journal": "American Journal of Agricultural Economics", "published": "2026-04-30", "url": "https://doi.org/10.1002/ajae.70074", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70074"}, {"source": "crossref", "source_id": "10.1002/ajae.70073", "title": "Choice experiments on land managers' participation in environmental programs: A systematic review and meta‐analysis of estimate validity", "authors": "Anastasio J. Villanueva, Angel Perni, Jesus Barreiro‐Hurle", "abstract": "Abstract Discrete choice experiments are increasingly being used to estimate land managers' willingness to accept participation in incentive‐based environmental programs. This is a specific application of discrete choice experiments: the estimation of willingness to accept for a private good (program participation) where respondents have to make trade‐offs between payments and the business costs required to improve the provision of the (environmental) public good targeted by the program. Previous reviews fail to provide methodological insights into the use of discrete choice experiments in this valuation context. In this study, we conduct a review of 80 studies (containing up to 93 sample‐based observations) published in the Web of Science Core Collection, all of which apply discrete choice experiments to examine land managers' (farmers' and foresters') willingness to accept for participating in incentive‐based environmental programs. Based on this systematic review, we report quantitative information on key features regarding policy settings, experiment design and implementation, and willingness to accept results. We conclude that many of the analyzed studies do not follow best practices for discrete choice experiments in particular and stated preference methods in general. We also use a construct validity indicator to assess whether willingness to accept estimates align with expectations about land managers' utility. The results from the meta‐analysis show that special care should be taken in applications that focus on Africa, include contract design attributes, and use in‐person surveys, among other features. Recommendations are provided to enable practitioners to obtain more accurate welfare estimates for better policy‐making support.", "journal": "American Journal of Agricultural Economics", "published": "2026-04-30", "url": "https://doi.org/10.1002/ajae.70073", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70073"}, {"source": "crossref", "source_id": "10.1111/agec.70118", "title": "Issue Information", "authors": "", "abstract": "", "journal": "Agricultural Economics", "published": "2026-04-30", "url": "https://doi.org/10.1111/agec.70118", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70118"}, {"source": "crossref", "source_id": "10.1002/aepp.70076", "title": "Measuring Nutrition Security Using the Consumer Food Data System Datasets", "authors": "Vibha Bhargava, Jung Sun Lee, Travis A. Smith", "abstract": "ABSTRACT Nutrition security is an emerging concept lacking a consensus definition, conceptualization, or standardized measure. This perspectives manuscript synthesizes findings from two previously published analyses to assess the feasibility of using available measures of key dimensions of nutrition security from two Consumer Food Data System (CFDS) datasets: the 2012–2013 National Household Food Acquisition and Purchase Survey (FoodAPS) and the 2007–2018 National Health and Nutrition Examination Survey/Flexible Consumer Behavior Survey (NHANES/FCBS), in deriving a measure of nutrition security aligned with the U. S. Department of Agriculture's definition. This study highlights methodological considerations, strengths and limitations of the two datasets for developing nutrition security metrics, and informs future research on standardized measurement for national nutrition monitoring.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-29", "url": "https://doi.org/10.1002/aepp.70076", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70076"}, {"source": "crossref", "source_id": "10.1002/aepp.70072", "title": "The Role of Social Food Infrastructure in Addressing\n                    <scp>SNAP<\/scp>\n                    Participation Gaps: Evidence From Linked Administrative and Ground‐Sourced Data", "authors": "Michael Lotspeich‐Yadao, Caitlin Kownacki, Jennifer McCaffrey, Craig Wesley Carpenter", "abstract": "ABSTRACT We link American Community Survey and SNAP records for 185,000 units with ground‐sourced social food infrastructure data from FindFoodIL (Illinois Extension SNAP‐Ed) to examine SNAP participation determinants among eligible units. Bivariate probit models reveal, beyond SNAP offices, quantity of social infrastructure is associated with participation: each additional senior program is associated with 5.89 percentage points (pp) higher participation probability, school/summer meal sites with 3.84 pp, and food pantries with 2.94 pp, potentially through trust, repeated contact, and navigation assistance. This first macro‐level quantitative evidence shows policymakers that embedding enrollment assistance within institutions already serving eligible families—schools, senior centers, food pantries—is associated with reduced SNAP participation gaps. JEL Classification: I38, Q18, R23, R58", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-28", "url": "https://doi.org/10.1002/aepp.70072", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70072"}, {"source": "crossref", "source_id": "10.1002/aepp.70074", "title": "Consumer Health Perceptions of Cows' Milk and Plant‐Based Milk Alternatives", "authors": "Danielle M. Kaminski, Wei Yang, Rodolfo M. Nayga", "abstract": "ABSTRACT This study used a best‐worst scale experiment to reveal consumers' beliefs about the healthiness of selected cows' milk and plant‐based milk products based on their nutrition panels. We find that while there is heterogeneity in health perceptions, consumers overwhelmingly select skim milk as the healthiest milk product. Additionally, the cows' milk nutrition panels are typically ranked healthier than the plant‐based milk products. Finally, we also conducted an additional intent‐to‐purchase experiment and find that there are significant differences in the preference shares of healthiness perceptions and intent to purchase, meaning that consumers consider more than just health in their purchase decisions.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-28", "url": "https://doi.org/10.1002/aepp.70074", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70074"}, {"source": "crossref", "source_id": "10.1111/agec.70112", "title": "Drought and Fruit and Vegetables Production in California", "authors": "Qingyin Cai, Metin Çakır, Timothy Beatty", "abstract": "ABSTRACT California's increasingly frequent and intense droughts are a pressing problem for the state's agriculture and the US food supply. California supplies more than half of all fruit and vegetables produced in the United States. This paper quantifies the severity of the problem by estimating the impacts of the drought on California's fresh fruit and vegetable production. We estimate panel‐data models using comprehensive, county‐level agricultural, irrigation, and weather data from 2000 to 2019. We find that droughts significantly reduce total output by 1.2% to 2.2% for each additional week of drought. The estimated effect is driven by lower yields and fewer harvested acres. Drought effects differ among crops, with thirsty crops and crops with lower economic returns and established insurance programs being disproportionately affected. Results also show the extent to which higher irrigation levels mitigate the adverse effects of drought. Our findings provide insights into the importance of enhancing drought‐related risk management and implications for designing cost‐effective policies for future adaptation decisions.", "journal": "Agricultural Economics", "published": "2026-04-27", "url": "https://doi.org/10.1111/agec.70112", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70112"}, {"source": "crossref", "source_id": "10.1002/aepp.70077", "title": "Labeling Quality or Quantity? The Differential Impact of Geographical Indications on Export Performance in Turkish Agri‐Food Products", "authors": "Ihlas Sovbetov, Muge Burcu Ozdemir", "abstract": "ABSTRACT This study investigates the impact of geographical indication (GI) certification on the export performance of Turkish agri‐food products by analyzing both trade volume and unit value dynamics. Drawing on monthly data from 2000 to 2024 across 22 GI‐certified products, the research employs product‐level regressions, fixed‐effects panel models with trait interactions, and Difference‐in‐Differences estimation with Goodman–Bacon decomposition. The results provide robust evidence that GI certification significantly improves export performance, with certified products showing substantial increases in both export volumes and unit prices. However, the effects are strongly heterogeneous across product types. The benefits in export volumes are concentrated in goods with high quality observability and product differentiation, while commoditized and storable products exhibit limited or even negative price responses. Furthermore, the study reveals that GI‐labeled products demonstrate greater trade resilience during external shocks, such as the COVID‐19 pandemic, by preserving price premiums despite temporary drops in export volume. These findings underscore that the effectiveness of GI schemes is contingent on product characteristics and market structures. The study contributes to the literature by offering a trait‐based explanation of origin‐labeling outcomes and provides strategic policy insights for enhancing GI effectiveness in emerging economies.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-27", "url": "https://doi.org/10.1002/aepp.70077", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70077"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70039", "title": "Farmers' Beliefs About Climate Action: Evidence From an Information Experiment", "authors": "Felipe Aguiar‐Noury, Doris Läpple, Cathal Buckley", "abstract": "ABSTRACT Farmers' adoption of climate change mitigation practices is crucial for reducing greenhouse gas (GHG) emissions from food production. One major source of these emissions is chemical fertilizer application. Introducing clover into grassland can mitigate emissions by reducing the need for chemical fertilizers. In this study, we conduct an information experiment with over 300 Irish dairy farmers to examine how information impacts their beliefs about clover adoption, and how this in turn influences subsequent intentions. Methodologically, we contribute to the literature by combining qualitative (i.e., open‐ended questions) and quantitative (i.e., point estimates) belief elicitation measures in our experimental design. This approach provides more detailed insights into farmers' beliefs, as it captures top‐of‐mind concerns without priming responses. Our qualitative belief elicitation reveals that after exposure to the information treatments, while most farmers did not change their opinions, some shifted from concerns such as ‘ bloat ’ and ‘ difficult ’ to terms like ‘ reduction ’ and ‘ possible ’. Our quantitative measures show that farmers underestimated clover's potential to reduce chemical fertilizer use. This finding is key for policymakers, as similar underestimations may apply to other GHG mitigation practices. Importantly, we provide causal evidence that information could reduce misperceptions. This highlights the need for strategies that positively shift beliefs to encourage more widespread uptake of climate change mitigation practices. Nonetheless, there was no meaningful impact of the updated beliefs on intentions, which underlines the complexity of adoption decisions.", "journal": "Journal of Agricultural Economics", "published": "2026-04-26", "url": "https://doi.org/10.1111/1477-9552.70039", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70039"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70046", "title": "Market Integration and Nonlinear Price Transmission in 19th‐Century British Wheat Markets", "authors": "Barry K. Goodwin, A. Ford Ramsey", "abstract": "ABSTRACT Important developments in infrastructure and institutions characterized 19th‐Century wheat markets in Great Britain. Among these developments was the construction of the national rail system which enabled cheaper and more efficient transport of grain and other bulky cargoes between inland towns and ports. We consider the degree to which wheat markets in twelve British cities were spatially integrated over the nineteenth century by applying conventional threshold models and semi‐nonparametric (generalized additive) models of spatial price linkages. Although results concerning market integration are qualitatively similar, the semi‐nonparametric models capture important nonlinearities that may be missed by conventional threshold models. Both approaches support a high degree of integration among the spatially distinct markets. We then consider two sub‐samples from 1800–1840 and 1870–1913 to capture price transmission before and after the repeal of the Corn Laws, the development of the railway system, the improvement of steam engines for ocean transport, and the introduction of the telegraph system. The nonlinear models suggest faster equilibration in response to large shocks and tighter transaction cost bands in the second period.", "journal": "Journal of Agricultural Economics", "published": "2026-04-26", "url": "https://doi.org/10.1111/1477-9552.70046", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70046"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70045", "title": "Preferences for Sustainable Production Practices in Extensive Livestock Systems in Uruguay", "authors": "Santiago Guerrero, Laure Kuhfuss, José Ignacio Rivero‐Wildemauwe, Patricia Correa, Miguel Carriquiry, Francisco Rosas, José Velazco", "abstract": "ABSTRACT We use a discrete choice experiment along with behavioral measures of risk and time preferences to analyze the preferences of Uruguayan cattle producers for three types of sustainable livestock practices: improved grazing systems, sustainable livestock management, and silvopastoral approaches. The results indicate that, on average, producers favor sustainable intensification, are indifferent to improved grazing practices, and require monetary compensation to adopt silvopastoral systems. A latent class model reveals significant preference heterogeneity, identifying two distinct producer profiles: one inclined to adopt the proposed practices and another that requires stronger incentives. These findings underscore the importance of designing differentiated policy instruments tailored to the characteristics and motivations of diverse producer types.", "journal": "Journal of Agricultural Economics", "published": "2026-04-26", "url": "https://doi.org/10.1111/1477-9552.70045", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70045"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70048", "title": "Trading Blows, Losing Bushels: Global Implications of US Tariff Hikes for Agri‐Food Trade and Welfare", "authors": "Carlos Zurita, Dongin Kim, Sandro Steinbach", "abstract": "ABSTRACT Recent trade policy developments have renewed concerns about the vulnerability of agri‐food markets to tariff increases. This paper quantifies the effects of 2025 US tariff hikes and potential tit‐for‐tat retaliation on agri‐food trade, prices, output, and welfare. We employ a sectoral general‐equilibrium gravity model covering 46 agri‐food industries on a 2023 baseline. The framework combines product‐level trade elasticities with sector‐specific supply elasticities based on input‐cost shares, providing a transparent mapping from tariffs to equilibrium outcomes. We simulate the April 2, 2025 (‘Liberation Day’) tariff schedule and the July 31, 2025 revisions, each with and without symmetric retaliation by all trading partners. Without retaliation, US agri‐food exports fall by 22%–25%, output declines by about 3%, the price index rises by 6.8%–7.2%, and welfare falls by 4.4%–4.9%. With retaliation, export losses deepen to 37%–43%, output drops by 4%–5%, the price index rises by 2%–5%, and welfare declines by 6.9%–7.9%. Welfare losses are highly asymmetric: Canada and Mexico experience the largest additional losses under retaliation, reflecting integrated North American supply chains, while contractions are concentrated in processed meats, soybeans, corn, and selected food products. Retaliation amplifies global welfare losses rather than offsetting them, suggesting that cooperative policy restraint yields smaller welfare costs for the United States and its major trading partners.", "journal": "Journal of Agricultural Economics", "published": "2026-04-26", "url": "https://doi.org/10.1111/1477-9552.70048", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70048"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70034", "title": "Collective Contracts as a Risk‐Sharing Mechanism for Result‐Based Agri‐Environmental Payments: Experimental Evidence", "authors": "Thomas Rellensmann, Stefanie Engel, Jens Rommel, Fabian Thomas", "abstract": "ABSTRACT Linking payments from agri‐environment schemes to ecological results or to collective outcomes is viewed as a promising way to increase the effectiveness of agri‐environmental conservation. However, the two approaches are rarely combined. In this study, we test the performance of result‐based payments with collective contracts in a contextualised economic experiment with 540 non‐agricultural and agricultural students in Germany. Combining result‐based payments with collective contracts may hold potential by allowing farmers to share the risks associated with result‐based payments within a group. A downside of collective contracts, however, is the creation of a social dilemma, as individual payments depend on group outcomes. We find no evidence of differences in conservation levels under result‐based payments with collective as compared to individual contracts, suggesting that risk‐sharing benefits and effects of the social dilemma offset each other. We further examine the performance of collective contracts for varying risk levels that could, for example, reflect different geological and climatic conditions across Europe. Result‐based payments with collective contracts motivate higher conservation efforts in our experiment when external risks are high. Further, high risks appear to foster group cooperation under collective contracts, potentially leading to more equitable and predictable outcomes.", "journal": "Journal of Agricultural Economics", "published": "2026-04-26", "url": "https://doi.org/10.1111/1477-9552.70034", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70034"}, {"source": "crossref", "source_id": "10.1111/agec.70114", "title": "Policy Schemes for More Sustainable Dairy Farming: The Role of Financial Instruments and Policy Implementation Modes", "authors": "Oyakhilomen Oyinbo, Helena Hansson", "abstract": "ABSTRACT Dairy farming is faced with environmental, social and economic sustainability challenges, which call for the uptake of more sustainable farming practices. Policy schemes involving public and private sectors can support the uptake of more sustainable farming practices through the provision of incentives to farmers if designed appropriately. However, empirical research in designing such policy schemes is scarce. This paper examines dairy farmers’ preferences for policy attributes in environmental compensation schemes for more grass‐based feeding systems. Using data from a discrete choice experiment in Sweden and a hybrid latent class model, we find that while size of financial compensation matters, farmers’ likelihood of participation in grass‐based feeding schemes is also driven by how the financial compensation is designed and by non‐financial attributes of the policy schemes. Notably, we find three distinct groups of farmers who differ in their likelihood of participating and exhibit heterogeneous preferences for schemes with private versus public sector‐led implementation mode, and direct subsidy payment versus consumer price premium and tax relief. Furthermore, findings demonstrate that behavioral factors, including farmer attitudes toward different forms of compensation and risk aversion, partly explain the observed heterogeneous preferences. Overall, our findings highlight the need to accommodate preference heterogeneity in policy design to improve participation, especially in settings where the transition to more grass‐based feeding is challenging for farmers.", "journal": "Agricultural Economics", "published": "2026-04-26", "url": "https://doi.org/10.1111/agec.70114", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70114"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70115", "title": "Economic and Land Use Impacts of Synthetic Dairy Production on a Dairy‐Intensive Economy: New Technology Moo‐ving In", "authors": "Niven Winchester, Dominic White", "abstract": "ABSTRACT Synthetic dairy products are promoted as an environmentally sustainable alternative to conventional dairy goods. This paper examines the potential economic, employment and land use impacts of large‐scale synthetic dairy production on Aotearoa New Zealand—the world's leading dairy exporter. Using a global, economy‐wide model, we simulate a case in which synthetic dairy products are cost‐competitive with conventional dairy products. Our results show that, under this scenario, New Zealand's GDP would decline by 0.5%–0.7%, and national welfare would fall by 1.2%–1.5%, with significant employment impacts on dairy‐related and other sectors. The reallocation of dairy land to other uses offers limited mitigation, as global shifts in production depress the prices of other agricultural commodities. Moreover, policies aimed at preserving dairy employment are costly. These findings suggest that, if synthetic dairy products are produced at scale, policy should prioritise adaptation strategies—such as retraining and skills development—to support workers and landowners in adjusting to the resulting changes.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2026-04-25", "url": "https://doi.org/10.1111/1467-8489.70115", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70115"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_1/_article/-char/ja/", "title": "会長挨拶「現代社会の情報環境と研究活動」", "authors": "伊庭 治彦", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_1/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_1/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_10/_article/-char/ja/", "title": "ICT利用と協働を通じた農業経営の学習と成長", "authors": "武藤 幸雄", "abstract": "Information and Communication Technology(ICT)-based information systems and services for smart farming have recently diffused among Japanese farm management entities expanding their scale of operations. Based on the author’s research results over the past ten years and organizational and contract theories, this paper explains how farm managements should utilize ICT-based information systems and services with changing their organizational structures, and what strategy they should choose for the utilization to enhance their farm management. This paper shows that whether farm management entities can effectively utilize ICT-based information systems and services toward their growth depends on their endowments or availability of complementary human resources and/or their collaboration systems with external organizations. Moreover, this paper discusses how farm management entities can combine various management resources and collaborate with external organizations to efficiently utilize ICT-based information systems and services and enhance their management growth. Thus, this paper points out that farm management entities need to develop effective combination and collaboration strategies. The paper presents specific examples and theoretical explanations to illustrate these arguments. For example, when farm management entities adopt ICT-based information systems, delegating authority to employees may not be efficient for them. The reason is that the employees may not easily master management skills. Additionally, the communication cost savings due to the ICT-based information systems may be sufficiently large to justify authority centralization to managers. Thus, the optimal authority allocation for such farm management entities depends on their human resource endowments and the cost-effectiveness of the systems. This paper illustrates what strategy such farm management entities can take to develop a competitive combination of human resources and ICT-based information systems consistent with the optimal authority allocation.", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_10/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_10/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_22/_article/-char/ja/", "title": "雇用劣化の下における労働力・農地制約と雇用型経営の展開", "authors": "氷見 理", "abstract": "Farm management with hired labor has developed despite the current decline in Japanese agriculture. The labor market has changed since the 2010s, particularly in non-seniority-based expansion and low-wage employment among young and middle-aged men, referred to as “employment deterioration.” This study clarifies how these changes have influenced farm management development with hired labor, focusing on resource constraints, such as the labor force and farmland. Employment deterioration creates a relative work advantage in the agriculture sector by lowering wage expectations and fosters a management mindset among certain farmers. However, a dual income is necessary in low-income households, which induces labor supply. Thus, hiring opportunities at low wages are offered in farm management with hired labor. In addition, low-income households often reduce their farm size or retire from their own farm because they are required to work full-time by their employers. Therefore, farmland is supplied to farm management with hired labor. As a result, employment deterioration has dual effects: (1) It encourages upward development among farmers with a management mindset and makes them farm managers with hired labor. (2) It causes widespread downward development among low-income households by retiring from their own farm.", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_22/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_22/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_3/_article/-char/ja/", "title": "多様な経営目標と資源制約に直面する農業経営主体の技術導入と市場対応", "authors": "松下 秀介", "abstract": "Primary approaches of agricultural management studies rely on case analyses and normative analyses. This field has often faced criticism related to the difficulty of generalizability of scientific discussion partly because procedures that ensure scientific objectivity are difficult to employ. Moreover, an evaluative perspective highlighting the practical applicability of agricultural management studies holds that despite the complexity of environmental factors, social institutions, and local conditions, the rich information obtained even from a few cases can effectively contribute to solving regional issues and supporting farmers’ decision making. Accordingly, the agenda of this symposium focuses on diverse managerial norms and resource constraints, emphasizing the development of the practical applicability of agricultural management studies. Moreover, these discussions aim to emphasize application-oriented perspectives of analysis that contribute to the practical applicability of agricultural management research not only in academic studies but also in agricultural extension and advisory activities.", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_3/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_3/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_32/_article/-char/ja/", "title": "北海道の大規模経営が直面する与件変化と経営対応", "authors": "山田 洋文", "abstract": "This study examines how large-scale agricultural corporations in Hokkaido that manage local resources are established under conditions of rapid depopulation and aging. The following points are clarified. First, a case study shows that a farm in X Town expanded to approximately 173 ha by consolidating farmland vacated by exiting farmers. To maintain an appropriate cropping balance, this farm temporarily increased the proportion of labor-intensive buckwheat and wheat. It also expanded paddy rice, the core of its rice production by securing suitable workers, machinery, and facilities. Second, the study finds that sparse planting and direct seeding have been adopted in remote paddy fields to mitigate severe constraints related to seedling production and transportation in rice cultivation. For such large-scale agricultural corporations to be established and operate stably, management strategies that respond to both internal and external business environments are essential.", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_32/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_32/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_40/_article/-char/ja/", "title": "施設園芸経営における農業経営支援サービスの実態と今後の展開", "authors": "田口 光弘", "abstract": "This paper clarifies the status and planned development of agricultural management support services in greenhouse horticulture. In Japan, large-scale greenhouse operations exceeding 1ha are increasing, and such operations often face significant challenges in environmental control and human resource management. Introducing consultants in cultivation and human resource management can effectively address these issues. Hence, this paper presents case studies on the introduction of such consultants. In addition, one of the authors serves as a consultant and provides detailed examples from his own practice.", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_40/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_40/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_48/_article/-char/ja/", "title": "コメント1", "authors": "若林 勝史", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_48/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_48/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_51/_article/-char/ja/", "title": "コメント2", "authors": "飯田 拓詩", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_51/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_51/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_54/_article/-char/ja/", "title": "討論の要約", "authors": "", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_54/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_54/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_70/_article/-char/ja/", "title": "畑作酪農専業地帯におけるスマート農業技術の展望", "authors": "三宅 俊輔", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_70/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_70/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_72/_article/-char/ja/", "title": "北海道農業における人材育成の現状と課題", "authors": "前田 晶子", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_72/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_72/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_73/_article/-char/ja/", "title": "農業の共通価値創造（CSV）に向けたステークホルダーの役割と課題", "authors": "角田 毅", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_73/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_73/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_75/_article/-char/ja/", "title": "新たな農業経営モデルとしての営農型太陽光発電導入の可能性", "authors": "馬上 丈司", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_75/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_75/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_76/_article/-char/ja/", "title": "変革期の農業法人を支える事業再生と企業価値評価", "authors": "田井 政晴", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_76/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_76/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_77/_article/-char/ja/", "title": "ゲノム情報・デジタル技術利用による持続的酪農生産システム構築に関する国際比較", "authors": "長命 洋佑", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_77/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_77/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_78/_article/-char/ja/", "title": "脱炭素型農業実現のための温暖化緩和技術の社会実装に向けた課題", "authors": "芦田 敏文", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_78/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_78/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_79/_article/-char/ja/", "title": "吉田真悟・田井政晴　著『企業価値評価と農業法人―持続可能性による価値創造―』", "authors": "犬田 剛", "abstract": "", "journal": "農業経営研究", "published": "2026-04-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/64/1/64_79/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/64/1/64_79/_article/-char/ja/"}, {"source": "crossref", "source_id": "10.1002/ajae.70075", "title": "Correction to “Farmers' Pro‐Social Motivations and Willingness‐To‐Accept in Markets with Public Goods”", "authors": "", "abstract": "Fitzsimmons, J., H. H. Peterson, and N. Lavoie. 2026. “ Farmers' Pro-Social Motivations and Willingness-To-Accept in Markets with Public Goods.” American Journal of Agricultural Economics 108(3): 799–828. https://doi.org/10.1111/ajae.70004. The authors' family names were incorrectly cited as “Eckle Grossman.” The correct citation should be “Eckel and Grossman.” We apologize for this error.", "journal": "American Journal of Agricultural Economics", "published": "2026-04-24", "url": "https://doi.org/10.1002/ajae.70075", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/ajae.70075"}, {"source": "crossref", "source_id": "10.1002/aepp.70075", "title": "Do Tax Incentives for Farmland Leases Increase Farm Supply? Evidence From Iowa's Beginning Farmer Tax Credit", "authors": "Justin M. Ross, Wesley M. Zebrowski, Julia C. D. Valliant", "abstract": "ABSTRACT In recent decades, agriculture has become increasingly concentrated through horizontal mergers and acquisitions via corporate entities, and policy makers are concerned this will be exacerbated by the aging population of farm operators. To reduce market concentration in agriculture, many states have enacted policies to entice new prospective entrepreneurs into farming. Among these are tax credits for existing farm owners who lease or sell farmland to “beginning farmers.” These subsidies aim to compensate the lessor for the additional risk associated with leasing land to a new farming enterprise. This paper investigates the effect of Iowa's Beginning Farmer Tax Credit program on land leased to farmers, farm operators' average age, and various metrics of non‐corporate farm operations. Our point estimates suggest very small effects of the program on Iowa's prevailing farm trajectories with a budgetary cost of more than $100,000 per added independent farm.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-24", "url": "https://doi.org/10.1002/aepp.70075", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70075"}, {"source": "crossref", "source_id": "10.1111/agec.70110", "title": "Efficiency of Spatial Subsidies Under Information Constraints: A Case Study", "authors": "Germán Sánchez‐Arce, Montserrat Viladrich‐Grau", "abstract": "ABSTRACT This study compares the efficiency of homogeneous versus spatially heterogeneous subsidies in developing agricultural plans compatible with bird sustainability. Using the plains of Lleida as a case study—where incentives for agricultural intensification threaten a bird community‐we employ a spatially explicit model that simulates crop yields linked to a habitat suitability index for each species. Within this framework, we model subsidies to evaluate their impact on biodiversity conservation, farmer acceptance, required budget, and agricultural economic profitability. We also address incomplete information by relaxing the assumption that the regulator knows real opportunity costs and instead estimate them via sampling methods. Results show that a conservation‐focused homogeneous subsidy is significantly less efficient than a heterogeneous one. Heterogeneous subsidies differentiate between farmers' agricultural potential, enabling conservation goals to be met with lower budgets. Moreover, a development‐oriented heterogeneous scheme—which maximizes total agricultural profits while ensuring bird sustainability—can be even more effective, reducing implementation costs and promoting agricultural economic growth. However, incomplete information leads to suboptimal decisions, lowering total profits and causing losses for misidentified farmers who may require additional compensation. While heterogeneous subsidies remain budget‐efficient under incomplete information, achieving full farmer participation requires higher payments. This reduces their efficiency advantage, but heterogeneous subsidies still represent the more efficient option.", "journal": "Agricultural Economics", "published": "2026-04-23", "url": "https://doi.org/10.1111/agec.70110", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70110"}, {"source": "crossref", "source_id": "10.1002/aepp.70073", "title": "Ban Glyphosate—Does It Affect the Swedish Farmers' Willingness to Grow Cover Crops?", "authors": "Vivian Wei Huang, Anna Kristina Edenbrandt, Elin Röös", "abstract": "ABSTRACT The cultivation of cover crops is one of the new Eco‐scheme practices introduced in Sweden. This study examines how the design of policy attributes of these schemes influences farmers' willingness to grow cover crops on arable land, with particular focus on the potential impact of a glyphosate ban. A discrete choice experiment was conducted with Swedish crop farmers ( N = 875), considering three policy attributes (commitment duration, maximum allowable percentage of mixed legume plants, and subsidy payment levels), two alternatives (permission to sell or utilize cover crop biomass versus restrictions), and one treatment condition (glyphosate ban). A Latent Class Logit Model was employed to explore heterogeneity in farmers' willingness to grow cover crops. The analysis identified three distinct farmer groups: 29% are unlikely to grow cover crops regardless of policy attribute design, 41% are predisposed to adoption irrespective of policy attributes, and 30% are influenced by subsidy payment scheme design. For the latter group, a glyphosate ban should reduce their willingness to grow cover crops. These findings offer valuable insights for enhancing flexibility in Eco‐scheme management prescriptions for promoting greater farmer participation, such as easing the restriction on the maximum number of legume plants in cover crops and permitting farmers to sell or utilize cover crops.", "journal": "Applied Economic Perspectives and Policy", "published": "2026-04-23", "url": "https://doi.org/10.1002/aepp.70073", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70073"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70112", "title": "Emission Reporting for Agriculture: Frameworks and Metrics Matter", "authors": "Johnny Machon, Christophe d'Abbadie, Ross Kingwell", "abstract": "ABSTRACT Frameworks and metrics that reliably describe agricultural emission sources and carbon sinks are critical to the formulation of cost‐effective mitigation investment. This study identifies and compares three distinct emission reporting frameworks across metrics of total emissions and emissions intensity. The frameworks and metrics are applied to agricultural industries in Western Australia. Findings for 2005 and 2023 and the trends and uncertainties over the intervening period are reported. This study novelly considers a framework that includes emissions and sequestration from land use, land use change and forestry (LULUCF) activities at an industry scale. Most of Western Australia's agricultural emissions occur in the beef, sheep and grains industries, which also dominate agricultural land use. The emissions intensity of the grains industry in particular is highly sensitive to the inclusion of LULUCF activities. While large uncertainties s
