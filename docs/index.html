in Western countries, while labour inputs do so in Southern and Eastern countries and at the EU level. Positive and significant effects on productivity outcomes are observed in the EU and Western EU countries.", "journal": "European Review of Agricultural Economics", "published": "2025-12-03", "url": "https://doi.org/10.1093/erae/jbaf062", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf062"}, {"source": "crossref", "source_id": "10.1002/aepp.v47.5", "title": "", "abstract": "", "journal": "Applied Economic Perspectives and Policy", "published": "2025-12-01", "url": "https://doi.org/10.1002/aepp.v47.5", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.v47.5"}, {"source": "crossref", "source_id": "10.1111/ajae.70032", "title": "Information flow and the adoption of soil‐improving and water conservation measures, and household welfare: Insights from a randomized controlled trial in Uganda", "abstract": "Abstract Extension services are designed to facilitate the flow of information from researchers to farmers. However, information failures continue to impede the diffusion of soil‐improving and water conservation technologies in Sub‐Saharan African countries. We use a randomized controlled trial (RCT) to examine the impact of an extension‐based campaign on the adoption of soil and water conservation measures and welfare outcomes among farmers in Uganda. The experiment involves the use of mass media including radio programs and video shows, lecture trainings, and practical sessions involving demonstration trials and farmer field days in disseminating information pertinent to soil‐improving and water conservation practices. We compare the impact of utilizing audio‐visual and hands‐on approaches in disseminating information relative to audio means of communication. We employ machine learning techniques to analyze the heterogeneous effects and for covariate adjustment. We find that augmenting mass media in public extension has far‐reaching effects. Our results reveal that the transmission of information through multiple communication channels significantly increases the adoption of the soil‐improving and water conservation measures. We also find that the intervention significantly increases welfare measures like banana yields, marketed surplus, and household incomes. These findings provide evidence that the use of mass media for increased awareness of improved technologies and utilizing audio‐visual and hands‐on communication channels in facilitating changes in attitudes and behavior of the end‐users, can enhance the adoption of these technologies and contribute to increased household welfare.", "journal": "American Journal of Agricultural Economics", "published": "2025-11-29", "url": "https://doi.org/10.1111/ajae.70032", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/ajae.70032"}, {"source": "crossref", "source_id": "10.1002/aepp.70031", "title": "Relationship Between Knowledge and Compliance With Safety Measures: Evidence From\n                    <scp>COVID<\/scp>\n                    ‐19", "abstract": "ABSTRACT Compliance with health safety protocols is important for protecting public health, particularly in agricultural sectors where disease outbreaks can disrupt production and market access. Despite its economic significance, we know little about what drives protocol compliance. We examine the relationship between individuals' objective and self‐assessed knowledge and their compliance with safety measures in the context of COVID‐19. We find that greater opposition to COVID‐19 safety protocols is associated with lower objective knowledge and inflated self‐assessed knowledge, indicating overconfidence. Addressing cognitive biases could make public health interventions more effective, with important implications for agricultural settings where resilience depends on consistent protocol adherence.", "journal": "Applied Economic Perspectives and Policy", "published": "2025-11-29", "url": "https://doi.org/10.1002/aepp.70031", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70031"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70067", "title": "Environmental Total Factor Productivity and the Cost‐Effectiveness of\n                    <scp>GHG<\/scp>\n                    Emission Reduction: The Case of Crop Production in China", "abstract": "ABSTRACT China's diversified agricultural policies have effectively improved both the yield and environmental performance of the crop sector. Quantifying productivity trends and their drivers is key to formulating strategies for high‐quality and low‐carbon crop development. This study uses input–output panel data of crop products to examine changes in the environmental total factor productivity (ETFP) of the crop sector and its major sub‐sectors across 30 Chinese provinces from 2001 to 2020. The results show that the ETFP of the crop sector exhibited a wavelike growth pattern, mainly driven by technological progress. In addition, reducing greenhouse gas (GHG) emissions can significantly improve the ETFP and shows considerable potential. Over the entire study period, the crop sector could mitigate up to 35.5% of GHG emissions to reach the frontier target value. The average marginal abatement cost is 4106 yuan/tonne CO 2 e. Spatially, the GHG emission mitigation potential and cost‐effectiveness in the western and central regions are higher than those in the eastern region. Therefore, inter‐regional cooperation can leverage regional differences to optimise total reduction costs and establish a carbon market, which would positively impact both the crop economy and the environment.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2025-11-28", "url": "https://doi.org/10.1111/1467-8489.70067", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70067"}, {"source": "crossref", "source_id": "10.1002/aepp.70041", "title": "Climate Change Agricultural Comparative Advantage and the\n                    <scp>US<\/scp>\n                    Trade Balance", "abstract": "ABSTRACT Current science indicates that warming and elevated atmospheric CO 2 will have ambiguous results for crop productivity depending on crop type and geographic location, whereas increased heat stress makes livestock and human labor less productive. The differential impacts across regions will alter comparative advantage and shift the patterns of global trade. This paper employs an economywide trade model to assess all three types of productivity shocks under a 3°C global warming scenario. We find that the widening agricultural trade deficits persist, even as the overall US trade balance improves due to enhanced investment inflows.", "journal": "Applied Economic Perspectives and Policy", "published": "2025-11-28", "url": "https://doi.org/10.1002/aepp.70041", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70041"}, {"source": "crossref", "source_id": "10.1111/ajae.70029", "title": "Wildfires and agricultural worker injury", "abstract": "Abstract This paper studies the impact of wildfire smoke on workplace injuries among agricultural workers, using workers' compensation claims between 2007 and 2020. We find a substantial increase in agricultural‐worker injuries attributable to smoke‐induced PM 2.5 and wildfire smoke. Specifically, a 10 μg/m 3 increase in daily PM 2.5 exposure from wildfire smoke increases traumatic injuries by 2.9% and respiratory and cardiovascular injuries by 18.97%. We examine nonlinearities in the dose–response relationship and find that the health impacts of PM 2.5 vary across concentration levels. The effects of smoke on traumatic injuries are largest among the oldest workers (aged 60 and above) and the youngest workers (under 30), relative to those in middle age. We find that injuries occur even at levels of PM 2.5 deemed safe under current regulations. Our back‐of‐the‐envelope calculation suggests that in 2020 alone, wildfire smoke was responsible for approximately 244 additional agricultural worker injuries in California compared to a hypothetical scenario without smoke.", "journal": "American Journal of Agricultural Economics", "published": "2025-11-27", "url": "https://doi.org/10.1111/ajae.70029", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/ajae.70029"}, {"source": "crossref", "source_id": "10.1111/ajae.70031", "title": "Product churn, tastes, and price indices", "abstract": "Abstract Price indices commonly used to measure inflation do not account for the entry and exit of products nor for systemic changes in consumer preferences over time. Recent developments in the theory of price indices show that these issues have significant impacts on the growth of prices that consumers experience. However, executing these developments requires access to household‐level data. Analyzing the ready meal purchases of 30,000 UK households during 2013–2022, we evaluate the extent of the bias between standard price indices and those that accommodate product churn as well as changes in consumer tastes. Household data also permit the effects to be calculated across income groups. Our results show that price indices commonly used to measure inflation significantly overstate the extent of price increases due to: (i) “representative” prices used to measure the Consumer Prices Index do not adequately capture the prices of goods in household baskets, and (ii) the effect of the net entry of products and taste changes, the latter being particularly strong. Furthermore, differences in the shopping baskets across income groups suggest that inflation varies across the income distribution. We find that when product churn and taste changes are accounted for, ready meals prices rose over the period by around 3% in low‐income households compared with a rise of 12% and 14% in middle‐ and higher‐income households, respectively. These issues are important not only for measuring cost‐of‐living and how it varies across income groups but also in addressing policy issues more generally.", "journal": "American Journal of Agricultural Economics", "published": "2025-11-27", "url": "https://doi.org/10.1111/ajae.70031", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/ajae.70031"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf056", "title": "Understanding the role of supply and demand factors in the global wheat market", "abstract": "Abstract We develop a novel Bayesian SVAR model to analyse the impact of supply and demand shocks on the real price of wheat. This is the first SVAR model of the global wheat market to comprehensively account for the endogenous interactions between producers, inventory holders and consumers. Our results show that the real price of wheat responds differently to global wheat market shocks, depending on the economic motivations underlying each shock. Specifically, consumption demand shocks explain nearly 70 per cent of price fluctuations, while supply shocks account for 20 per cent and the remaining 10 per cent is attributed to shocks in economic activity, inventory demand and fertilizer prices.", "journal": "European Review of Agricultural Economics", "published": "2025-11-25", "url": "https://doi.org/10.1093/erae/jbaf056", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf056"}, {"source": "crossref", "source_id": "10.1002/aepp.70044", "title": "Changes to Hog Formulas: Swapping Negotiated Hogs With Pork Cutout Values", "abstract": "ABSTRACT Since 2019, negotiated and formula hog values have increasingly diverged. Using rolling regression models, we demonstrate that the divergence is likely due to a switch from using negotiated hog values to using pork prices for valuing formula hogs, limiting the previously theorized impacts of thin negotiated hog markets on producer welfare. The change in the formulas raises timely questions about the thinness of wholesale pork markets, risk sharing through public information, and transparency in formula pricing.", "journal": "Applied Economic Perspectives and Policy", "published": "2025-11-25", "url": "https://doi.org/10.1002/aepp.70044", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1002/aepp.70044"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf059", "title": "Information economics to support sustainable and resilient agri-food systems: Special issue introduction", "abstract": "Abstract This special issue focuses on how information influences the transition to sustainable and resilient agri-food systems. The contributions analyse farmers’ and consumers’ responses to different information strategies, including behavioural framings, advisory services, digital tools, data-sharing rules and communication around meat taxes. While the findings show that information alone may not always have a strong impact, its effectiveness can often be improved when combined with incentives. Together, the articles advance understanding of how information economics can inform policies and interventions to close sustainability and resilience gaps in agri-food systems.", "journal": "European Review of Agricultural Economics", "published": "2025-11-21", "url": "https://doi.org/10.1093/erae/jbaf059", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf059"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70068", "title": "Policy Evaluation for Climate Mitigations in the European Agricultural Sector—A Comparison of Policy Options at Micro and Macro Level", "abstract": "ABSTRACT The purpose of this paper is to discuss the micro‐ and macro‐outcomes for the standard neoclassical carbon tax (whose burden falls on the producers) versus the implication of a budget neutral, performance‐based EU Common Agricultural Policy ( CAP ) focusing on non‐ CO 2 emission ( N 2 O and CH 4 , measured in CO 2 eq ) reduction, especially in the livestock sector. The subsidy is budget neutral as financed via the current basic payment of the first pillar of the CAP . The policies are applied to the single farm level model FarmDyn to take into account heterogeneity between farms and regions and the macro model MAGNET to take into account market feedback and possible leakage effects. Farm level mitigation potentials and costs from FarmDyn are used to calibrate the EU27 national milk production Marginal Abatement Costs Curves ( MACCs ) in MAGNET . On the other hand, scenario‐specific changes in prices of agricultural inputs and output from MAGNET are used as input in FarmDyn , improving the consistency of the modelling framework. The results of the simulations conducted in this framework show clear conclusions. On the one hand, imposing a standard carbon tax on non‐ CO 2 emissions in the agricultural sector is the most effective method to achieve a greenhouse gas ( GHG ) emission reduction as the carbon tax can lead to significant reduction of total agricultural GHG emissions ( MAGNET ). Nevertheless, this result is connected to several trade‐offs, such as farm income losses in the short term ( FarmDyn ) and losses in agricultural production and employment (different by country in the EU27 ) in the somewhat longer term ( MAGNET ). On the other hand, subsidising the emission abatement costs allows for mitigating almost completely the negative trade‐offs while still allowing a substantial reduction of agricultural emissions. However, subsidies easily result in overcompensation and increased prices of inputs and technologies that mitigate emissions.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2025-11-20", "url": "https://doi.org/10.1111/1467-8489.70068", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70068"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70072", "title": "Access to Credit and Mechanisation Service Expenditure: An Analysis Considering Access, Sources, Purposes and Amounts of Credit", "abstract": "ABSTRACT This study estimates the impact of access to credit on mechanisation service expenditure by considering farmers' binary credit access decisions and distinguishing between formal and informal credit access. We employ a conditional mixed process model to address selection bias issues and use open‐access data from the Rural Development Institute at the Chinese Academy of Social Sciences (Beijing, China) through the 2020 China Rural Revitalization Survey. The theoretical analyses suggest that relaxing credit constraints enables farmers to achieve higher net returns by increasing all variable inputs, including farm machines, until they achieve the expected optimal level. The empirical results reveal that access to credit significantly increases mechanisation service expenditure by 115.5 yuan/mu, and the impact is larger on farmers cultivating small‐ and medium‐sized farms and those residing in the less developed central and western regions. Access to formal and informal credit affects mechanisation service expenditure differently. Specifically, accessing credit from formal sources (e.g., banks) significantly increases mechanisation service expenditure by 44.7 yuan/mu, while accessing credit from informal sources (e.g., friends and relatives) has no statistically significant effect on mechanisation service expenditure. Moreover, credit primarily intended for financing agricultural production significantly increases mechanisation service expenditure by 83.5 yuan/mu, whereas credit used mainly for non‐agricultural purposes significantly reduces such expenditure by 25.5 yuan/mu. These findings are further verified by estimating the effects of loan amounts on mechanisation service expenditure. Finally, we also investigate the nexus between mechanisation service adoption and farm performance, revealing that mechanisation service adoption increases crop yield by 12.6% and commercialisation by 77.4%, respectively.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2025-11-20", "url": "https://doi.org/10.1111/1467-8489.70072", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70072"}, {"source": "crossref", "source_id": "10.1111/1467-8489.70061", "title": "Willingness‐to‐Pay for Safe Vegetables: A Comparative Analysis Between Wet Market and Supermarket Shoppers in Urban Cambodia", "abstract": "ABSTRACT Consumers in low‐ and middle‐income countries are increasingly worried about food safety, but markets for safe produce remain underdeveloped and do not offer farmers a premium price. This study used the Becker–DeGroot–Marschak experimental auction design to identify the market for safe vegetables by assessing consumers' willingness to pay for both internationally and locally certified vegetables. The study involved 585 shoppers at wet markets and supermarkets in Phnom Penh, Cambodia. The factors influencing willingness to pay were analysed using Pooled Ordinary Least Squares. Compared to uncertified vegetables, shoppers were willing to pay 100% more for those certified as United States Department of Agriculture Organic and 55% more for those certified under Cambodian Global Agricultural Practices. Providing information about both types of certification increased shoppers' willingness to pay for certified vegetables, with a greater increase for the international label than the local one. For the local label, information only increased willingness to pay among supermarket shoppers, not wet market shoppers. Our findings highlight the importance of age and income in shaping consumers' willingness to pay for safe produce. We offer recommendations to improve food purchasing choices in low‐income countries, emphasising the need for food safety information that is tailored to different populations.", "journal": "Australian Journal of Agricultural and Resource Economics", "published": "2025-11-20", "url": "https://doi.org/10.1111/1467-8489.70061", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1467-8489.70061"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf058", "title": "The organic health halo: Influence of mood, restrained eating and healthiness perceptions", "abstract": "Abstract Although organic labels inform consumers about food production, many incorrectly infer that organic foods contain fewer calories than regular foods, a phenomenon known as the organic health halo effect. This study examines the influence of mood, restrained eating, and food healthiness perceptions on the prevalence of the organic health halo effect. Results revealed that both restrained and unrestrained eaters perceive organic foods as healthier and less caloric. Although organic and regular foods were identical in calories, calorie misperception persisted across mood conditions and restrained eating status. However, positive and negative moods decreased the organic health halo effect among unrestrained eaters.", "journal": "European Review of Agricultural Economics", "published": "2025-11-18", "url": "https://doi.org/10.1093/erae/jbaf058", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf058"}, {"source": "crossref", "source_id": "10.1111/agec.70079", "title": "Digital Agricultural Extension and Productivity Impacts in Rice Farming: Lessons From Nigeria", "abstract": "ABSTRACT The use of digital tools in farm management is increasing in developing countries, yet their effects on production, technology, and managerial performance remain underexplored. This study evaluates the impacts of RiceAdvice, a decision‐support mobile app that provides personalized recommendations to rice farmers. Using a four‐period experimental panel dataset from northern Nigeria, we estimate impacts on technology, technical efficiency, and frontier yields across a control group, a group receiving recommendations only, and a group receiving recommendations plus fertilizer. Results from panel stochastic production frontier models and analysis of covariance estimations show that RiceAdvice improves productivity by enhancing both access to improved practices and managerial performance. Gains are especially large and consistently significant when advisory services are bundled with fertilizer, while effects of the recommendation‐only intervention are more fragile under attrition, as revealed by Lee bounds analysis. Productivity gains peaked in the second year before tapering off, highlighting potential sustainability challenges without continued support. Overall, the findings suggest that sustained access to RiceAdvice, especially when complemented with fertilizer, can strengthen managerial performance and raise productivity among smallholder rice farmers.", "journal": "Agricultural Economics", "published": "2025-11-18", "url": "https://doi.org/10.1111/agec.70079", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70079"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf061", "title": "Round effects in economic experiments—A novel probabilistic programming approach to round-dependent response behaviour", "abstract": "Abstract Respondents in multi-round experimental studies can show round-dependent response behaviour, subsumed as round effects, which can distort the analysis of study results. In this paper, we develop a novel probabilistic programming approach to capturing round effects. We apply our model to experiment data, investigating the relevance of three theoretically defined types of round effects: preference learning, institutional learning and fatigue effects. By using a Bayesian modelling workflow featuring the specification of a data generating process and extensive model inspection prior to data analysis, we demonstrate the high adaptability and transparency of our approach, as well as its value for future experimental research.", "journal": "European Review of Agricultural Economics", "published": "2025-11-17", "url": "https://doi.org/10.1093/erae/jbaf061", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf061"}, {"source": "crossref", "source_id": "10.1111/agec.70082", "title": "Do Cover Crops Reduce Downside Production Risk?", "abstract": "ABSTRACT This study examines whether cover crop adoption reduces downside production risk. A crop insurance loss measure is used as the main measure of downside production risk. To achieve the study objective, we utilize a unique county‐level panel data set with information on cover crop adoption rate, crop insurance production losses, and weather variables. The data covers the main corn and soybean production regions in the Midwestern United States for the period 2005–2018. We employ linear fixed effects econometric models and a number of robustness checks in the empirical analysis (i.e., implementing different estimation procedures and a variety of empirical specifications). The different estimation methods employed leverage the panel nature of the data to address various specification and endogeneity issues. Our estimation results suggest that counties with higher cover crop adoption tend to have lower crop insurance losses and lower downside production risk. This finding supports the idea that the soil health benefits from cover crop use translate to a reduced likelihood of production losses.", "journal": "Agricultural Economics", "published": "2025-11-16", "url": "https://doi.org/10.1111/agec.70082", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70082"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70014", "title": "Farm Policies and Their Impact on Sector Composition and Risk Aversion", "abstract": "ABSTRACT This study examines how farm policies influence the composition and risk aversion of the farm sector using an agent‐based model based on Missouri crop farms. The analysis considers varying farmer risk aversion, payoffs from farming and other activities, and land competition. Policy scenarios include no policy, land subsidies and revenue floors. Findings indicate policies significantly affect who farms and sector‐wide risk aversion. Without policies, risk‐averse farmers exit, reducing sector‐wide risk aversion. Conversely, risk‐mitigating policies retain risk‐averse farmers, increasing sectoral risk aversion. The study further finds that altering the composition of individuals in the farm sector through risk‐reduction policies increases the demand for such policies. These results trace the risk‐reducing effects of policies from individual decisions about farm entry, expansion and exit to broader impacts on sector structure. For scientists, this highlights the need to consider sector‐level risk aversion as part of the research problem, not merely an exogenous aspect of a fixed population. For policymakers, results indicate that farm program design may affect who farms and lead to lower average risk tolerance, potentially increasing the demand for further publicly supported risk management tools.", "journal": "Journal of Agricultural Economics", "published": "2025-11-14", "url": "https://doi.org/10.1111/1477-9552.70014", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70014"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf060", "title": "Bayesian econometrics in agricultural and resource economics", "abstract": "Abstract The Computer Age has enabled an explosion in Bayesian inference. Historically, agricultural and resource economists have contributed to the development and application of Bayesian econometrics. This article describes Bayesian econometrics in agricultural and resource economics and highlights its use. We detail the basics of Bayesian methodology and computation, and provide an accompanying empirical example. We then examine the strengths and weaknesses of the Bayesian approach, particularly for applications in agricultural and resource economics. Lastly, we consider frontier Bayesian methods and how they might be used to obtain improved inference, make more accurate predictions, or solve computational challenges.", "journal": "European Review of Agricultural Economics", "published": "2025-11-13", "url": "https://doi.org/10.1093/erae/jbaf060", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf060"}, {"source": "crossref", "source_id": "10.1111/agec.70078", "title": "Unpacking the Effects of Conflict on Fertilizer Use and Maize Yields: Empirical Evidence From Nigeria", "abstract": "ABSTRACT Conventional recommendations emphasize increasing the use of inorganic fertilizer to enhance maize yields in African countries south of the Sahara, but it is not clear how smallholders’ exposure to violent conflicts affect demand, yield responses, and the profitability of fertilizers. Our study tackles this question. We analyze how maize yield responds to fertilizer use and assess the profitability of fertilizer use in conflict‐affected settings. We then investigate how conflict impacts the profitability of fertilizer, given that armed conflicts are likely to increase input costs, logistical difficulties, and market uncertainties. Our study reveals that yield responses to nitrogen are very low in Nigeria. We also show that exposure to conflict reduces input use rates and decreases the marginal physical productivity of nitrogen in maize production, making investment in fertilizer less profitable. Recognizing this effect of conflict on input use and maize yield response is crucial for targeting and resource allocation decisions among smallholders in similar conflict‐affected regions. Moreover, the effect of conflict highlights how external factors, beyond the scope of agronomic practices, influence the economic incentives for fertilizer application and the resulting yield outcomes.", "journal": "Agricultural Economics", "published": "2025-11-13", "url": "https://doi.org/10.1111/agec.70078", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70078"}, {"source": "crossref", "source_id": "10.1111/agec.70080", "title": "The Effects of the South‐to‐North Water Transfer Project on Agriculture in China: A Tale of Two Routes", "abstract": "ABSTRACT This study investigates the impacts of China's South‐to‐North Water Transfer Project (SNWTP) on agricultural production using city‐level data from 2009 to 2019. Utilizing the Synthetic Control Difference‐in‐Differences method, we find heterogeneous impacts along the eastern and middle routes of the SNWTP. The operation of the eastern route increases agricultural output by 3.7%, primarily driven by an increase in fishery and aquaculture output. In contrast, the middle route decreases agricultural output by 10.8%, mainly due to the reduction in outputs of crop cultivation and animal husbandry. This unexpected decrease in agricultural output in the water‐receiving cities along the middle route can be attributed to the stricter environmental regulations aimed at preserving the quality of the diverted water. The heterogenous effects of the SNWTP on agricultural production highlight the complex consequences of large‐scale water infrastructure projects, underscoring the importance of incorporating environmental considerations into the evaluation of such initiatives.", "journal": "Agricultural Economics", "published": "2025-11-13", "url": "https://doi.org/10.1111/agec.70080", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70080"}, {"source": "crossref", "source_id": "10.1111/agec.70081", "title": "Dairy Trade Reconsidered: Gravity and the Distributional Effect of Non‐Tariff Barriers and Distance", "abstract": "ABSTRACT This study examines the average and distributional effects of trade policy and friction variables on dairy trade flows. To capture average effects, we utilize the recently extended Poisson Pseudo Maximum Likelihood (PPML) methods, which rigorously address potential bias for coefficient and standard error estimates due to the incidental parameter problem in two‐way and three‐way gravity models. Additionally, we are among the first to apply a new distribution regression method to study counterfactual distributional effects in a two‐way gravity model. Using PPML methods, we find that sanitary and phytosanitary (SPS) measures hinder dairy trade, while technical barriers to trade (TBT) boost it on average. Findings show that the model specification with separate intranational and international distance variables better fits the dairy trade data than using a combined distance variable. Using the distribution regression method, we find that the effect of TBT is positive but statistically insignificant. In contrast, trade agreements exhibit positive and heterogeneous effects, particularly in the upper quantiles of dairy trade flows. Additionally, distance shows a strong negative heterogeneous impact on the upper quantiles of dairy trade flows. Our findings could guide policymakers in formulating trade policies to improve global dairy trade.", "journal": "Agricultural Economics", "published": "2025-11-13", "url": "https://doi.org/10.1111/agec.70081", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70081"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70013", "title": "Effects of Agricultural Land Titling on Poverty Reduction in China", "abstract": "ABSTRACT Using administrative data on low‐income populations, this study provides quasi‐experimental evidence on the impact of agricultural land titling on poverty reduction in rural China. We show that the staggered rollout of the programme at the town level significantly reduces household poverty incidence by enhancing labour incentives, facilitating the reallocation of labour to non‐agricultural sectors and increasing labour market participation among people with disabilities. We provide a simple theoretical framework with empirically testable predictions to interpret our results. Further analysis reveals that agricultural land titling promotes land reallocation and supports income growth through different channels for agricultural and non‐agricultural households. Additional evidence suggests that the programme mitigates vulnerability and reduces the risk of long‐term poverty. These findings illustrate how institutional reforms in property rights empower labour incentives among vulnerable groups, providing valuable insights for other developing countries aiming to achieve sustainable and inclusive poverty reduction.", "journal": "Journal of Agricultural Economics", "published": "2025-11-12", "url": "https://doi.org/10.1111/1477-9552.70013", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70013"}, {"source": "crossref", "source_id": "10.1111/agec.70077", "title": "Consumer Evaluation of Organic, Local, and Controlled‐Environment Grown Lettuce: Evidence From an Experimental Auction in Two Study Sites", "abstract": "ABSTRACT In recent years, controlled‐environment agriculture (CEA) has been expanding rapidly in the United States. Whereas estimates of production costs and environmental performance of CEA production systems exist in the literature, information on consumer valuation of CEA‐grown produce is limited. This paper examines consumer willingness to pay (WTP) for CEA‐grown green leaf lettuce and lettuce with other attributes (local and organic), as well as the impact of the environmental performance information of these products on consumer WTP. We conducted an experimental laboratory auction in two study sites and found that consumers are largely indifferent between CEA‐grown and field‐grown lettuce but are willing to pay a price premium for local and organic lettuce. Our results on the effect of environmental performance information indicate that this information significantly influences consumer WTP for all evaluated lettuce, albeit in different directions. The environmental performance information increases consumer WTP for lettuce produced locally and decreases WTP for CEA‐grown and organic lettuce. These findings provide important insights for policymakers and marketers and allow us to make inferences about consumer knowledge and awareness about CEA‐grown, local and organic produce.", "journal": "Agricultural Economics", "published": "2025-11-11", "url": "https://doi.org/10.1111/agec.70077", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70077"}, {"source": "crossref", "source_id": "10.1111/agec.70074", "title": "Decentralization and Spatial (Mis‐)Allocation of Irrigation Water", "abstract": "ABSTRACT This paper examines the consequences of decentralization in the management of canal irrigation for spatial allocation of water and agricultural performance. Under centralized management, farmers closer to the canal tend to over‐extract water, resulting in spatial misallocation. We test whether decentralization can improve spatial allocation of water by exploiting the differential timing of the constitution of locally elected canal management bodies (“Pani Panchayats”) in the state of Orissa, India, that decentralized its canal management. Using survey data and a heterogeneous treatment effect estimation strategy using farmer level fixed effects, we show that farming plots farther away from the canal received less water under centralized system, but longer exposure to decentralization significantly reduces spatial misallocation. Consequently, agricultural revenue and wealth (landholding) improve more for those farmers. The effect of decentralization is more pronounced in areas with high land inequality and lower in areas where plots are similarly sized across distance from canal. We find suggestive evidence that distant farmers’ ability to complain to local representatives is an important mechanism explaining our results.", "journal": "Agricultural Economics", "published": "2025-11-11", "url": "https://doi.org/10.1111/agec.70074", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70074"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf049", "title": "Intercropping can enhance long-term farm economic performance: Evidence from Swedish agriculture 2001–2018", "abstract": "Abstract We investigate the long-term economic effects of adopting intercropping using a farm-level dataset from Sweden spanning the period 2001 to 2018. Guided by a causal model framework, specifically a causal path diagram, we apply a debiased fixed-effects method that dynamically incorporates information about past farm performance into the model estimation. We also triangulate the findings from the debiased fixed-effects method with results from both semi-parametric and instrumental variable approaches. Our baseline results indicate that adopting intercropping is associated with a 5–13 per cent increase in farm net income over the long term, with significant variations observed across different farm types. In addition, the findings show that intercropping adoption predicts an increase in the gross value of total production, labor demand and intermediate costs in the long term. Finally, the results reveal that intercropping adoption mitigates the negative effects of extreme climatic conditions on farm net income.", "journal": "European Review of Agricultural Economics", "published": "2025-11-08", "url": "https://doi.org/10.1093/erae/jbaf049", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf049"}, {"source": "crossref", "source_id": "10.1111/ajae.70028", "title": "Matching property rights and transboundary ecological processes: The case of Norwegian salmon aquaculture", "abstract": "Abstract Transboundary ecological processes, such as the spread of pests and diseases, require management strategies that align property rights with the spatial scale of these processes. The existing literature is predominantly based on theoretical models and qualitative case studies, and has posited that coordinated management can often mitigate spatial externalities. However, robust causal assessments of the effects of coordinated management remain scarce. To address the issue empirically, we differentiate between the probability of an initial salmon lice infestation (the extensive margin) and the severity of infestation once it occurs (the intensive margin) using a uniquely comprehensive dataset from Norwegian salmon aquaculture. The findings reveal that while ownership concentration does not significantly alter the likelihood of infestation, it substantially reduces severity by enabling coordinated management practices. This divergence demonstrates that firm incentives vary across these two dimensions. Although the empirical setting focuses on salmon lice in salmon aquaculture, the findings carry broader implications for industries facing similar spatial‐dynamic externalities. In particular, ownership consolidation can encourage coordinated investments and interventions, potentially reducing the underinvestment typically observed when multiple firms share biologically connected resources.", "journal": "American Journal of Agricultural Economics", "published": "2025-11-07", "url": "https://doi.org/10.1111/ajae.70028", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/ajae.70028"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf042", "title": "Alternative weighting schemes for the aggregate Malmquist productivity index: A theoretical and empirical comparison", "abstract": "Abstract In this paper, we present a number of alternative weighing schemes, which are obtained by combining different aggregator functions, i.e. arithmetic, harmonic and geometric, with different metrics, i.e. values of distance functions or efficiency scores, that result in the same value of the aggregate (input- and output-oriented) Malmquist productivity index. Our results indicate that first, in the output-oriented model the value of the aggregate Malmquist productivity index depends on the way efficiency is measured and thus, the aggregation weights will be different depending on whether the Farrell or the Färe, Grosskopf and Lovell (FGL) technical efficiency index is used (this is not an issue in the input-oriented model). Using panel farm-level data, we provide empirical evidence on this difference when inappropriate weighting schemes are used. Second, weighting schemes based on actual rather potential (input or output) shares are computationally less demanding.", "journal": "European Review of Agricultural Economics", "published": "2025-11-07", "url": "https://doi.org/10.1093/erae/jbaf042", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf042"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf047", "title": "Crop farm efficiency and climate extremes in Germany", "abstract": "Abstract Using German crop farm data from the EU Farm Accountancy Data Network for 2004–2020, we investigate how weather and climate extremes interact with farm-level inefficiency, accounting for policy. We use a four-component stochastic production frontier model to disentangle farm heterogeneity from persistent and transient inefficiency, and explicitly address economic and econometric endogeneity. We select weather-related determinants of inefficiency using panel random forests. We find that losses associated with one climate extreme day range from 0.15 to 26.31 Euro/hectare. Water-related extremes appear less detrimental than temperature-related extremes. Our results suggest that efficiency can be underestimated if agro-climatic conditions are not acknowledged.", "journal": "European Review of Agricultural Economics", "published": "2025-11-06", "url": "https://doi.org/10.1093/erae/jbaf047", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf047"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf054", "title": "Coupling information provision with sharing rules for water conservation: French farmers’ preferences for data reporting", "abstract": "Abstract Providing farmers with information on their irrigation efficiency and establishing prioritized access to water accordingly requires data. This study assesses French farmers’ preferences for a scheme incentivizing the adoption of regulated deficit irrigation (RDI). Choice experiment results show that 37–60 per cent of the 202 farmers interviewed are willing to adopt RDI in exchange for priority water access, depending on data requirements. Accounting for data reporting preferences is crucial for enhancing water savings in irrigated systems. While mandatory smart meters reduce the potential water savings due to farmer opposition, most farmers accept reporting cropping patterns.", "journal": "European Review of Agricultural Economics", "published": "2025-11-06", "url": "https://doi.org/10.1093/erae/jbaf054", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf054"}, {"source": "crossref", "source_id": "10.1111/agec.70076", "title": "Integrating Soil Natural Capital Into Production Frontiers of Ecosystem Services in Agriculture", "abstract": "ABSTRACT Natural capital is a key element in the provision of soil ecosystem services (ES). However, most economic analyses of production lack an explicit integration of natural capital and its components. We develop a novel empirical approach that integrates soil natural capital into a multi‐output production model using a distance function framework. By treating natural capital as a latent variable derived from biophysical soil indicators, we bridge the gap between stock‐based and service‐based approaches to ecosystem valuation, providing joint estimates of technical efficiency and ES provision in agriculture. Our empirical application uses data from a sample of farmers and detailed soil observations collected by the Observatoire Pérenne de l'Environnement (ANDRA, Grand‐Est Region, France). We focus on two key ES provided by agricultural soils: biomass provision and climate regulation. Estimation results show that soil natural capital is a highly significant input in the distance function, and that omitting it leads to an underestimation of technical efficiency. We also find evidence of a trade‐off between biomass production and climate regulation services.", "journal": "Agricultural Economics", "published": "2025-11-06", "url": "https://doi.org/10.1111/agec.70076", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70076"}, {"source": "crossref", "source_id": "10.1111/ajae.70026", "title": "Food without fire: Environmental and nutritional impacts from a solar stove field experiment", "abstract": "Abstract Over 80% of the population in rural Sub‐Saharan Africa relies on biomass cooking fuel, a substantial source of anthropogenic greenhouse gases. We use a field experiment in Zambia to investigate the impact of solar stoves on biomass fuel use and cooking habits. Participants kept detailed food diaries, recording every ingredient and fuel source used in preparing every dish in every meal every day during the experiment. This produces data on 93,000 ingredients used to prepare 30,000 dishes. Treated households significantly reduce biomass fuel use, cutting emissions by 3–7%, but do not significantly change cooking habits.", "journal": "American Journal of Agricultural Economics", "published": "2025-11-05", "url": "https://doi.org/10.1111/ajae.70026", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/ajae.70026"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf046", "title": "Are mixed crop–livestock regions in Europe more profitable with mixed or specialized farms?", "abstract": "Abstract Mixed agricultural regions, which balance crop and livestock production, are often recommended to enhance resilience and sustainability. This study assesses the profit potential of mixed regions in Europe for three scenarios: (1) a combination of mixed and specialized farms, (2) mixed farms and (3) specialized farms. Using data envelopment analysis, we compare the maximum profit across scenarios. Livestock-oriented regions profit most from becoming mixed. Mixed regions are more profitable with a combination of mixed and specialized farms, favouring a greater proportion of specialized farms. However, at the farm level, it is more costly to enforce specialization than mixedness.", "journal": "European Review of Agricultural Economics", "published": "2025-11-03", "url": "https://doi.org/10.1093/erae/jbaf046", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf046"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf052", "title": "To specialize or not to specialize?—A technical efficiency analysis in three transition economies", "abstract": "Abstract We provide evidence on the recommendable crop allocation levels from a technical efficiency (TE) perspective, considering heterogeneous farming systems across regions and countries. Towards this aim, we employ a latent profile analysis to identify the main patterns of crop systems among a random sample of 2,830 crop farms from Kyrgyzstan, Mongolia and Uzbekistan. Using a stochastic frontier analysis, we calculate TE scores for the identified crop profiles to examine the relationship between diversification portfolios and TE. We find that, on average, diversified crop profiles exhibit the highest TE scores, particularly those with a greater emphasis on dual-season grain crops. Meanwhile, the specialized farm profile tends to show the lowest average TE score.", "journal": "European Review of Agricultural Economics", "published": "2025-11-03", "url": "https://doi.org/10.1093/erae/jbaf052", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf052"}, {"source": "crossref", "source_id": "10.1111/agec.12844", "title": "Issue Information", "abstract": "", "journal": "Agricultural Economics", "published": "2025-11-01", "url": "https://doi.org/10.1111/agec.12844", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.12844"}, {"source": "crossref", "source_id": "10.1111/agec.v56.6", "title": "", "abstract": "", "journal": "Agricultural Economics", "published": "2025-11-01", "url": "https://doi.org/10.1111/agec.v56.6", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.v56.6"}, {"source": "crossref", "source_id": "10.1111/agec.70063", "title": "Farmers’ Risk and Ambiguity Preferences and Fertilizer Use Behaviors: Experimental Evidence From Taihu Basin in China", "abstract": "ABSTRACT Uncertainty in agricultural production often leads to excessive fertilizer use, a major contributor to agricultural non‐point source pollution. This paper studies how farmers’ risk and ambiguity preferences impact their fertilizer use behaviors. We conduct the analysis based on a lab‐in‐the‐field experiment in Taihu, China. The experiment results show that farmers are, on average, risk averse in the gain domain and risk seeking in the loss domain, while being ambiguity seeking in gains and ambiguity averse in losses. They tend to exhibit higher probability distortions—overweighting small probabilities and underweighting large probabilities—in ambiguous contexts. We find that ambiguity aversion has a stronger influence on chemical fertilizer use than risk aversion. Moreover, farmers who are reluctant to use organic fertilizers tend to underestimate the probability of potential benefits. Our results suggest that improving farmers’ cognitive ability could potentially reduce chemical fertilizer use, while increasing household income and expanding cropland size may facilitate the adoption of organic fertilizers.", "journal": "Agricultural Economics", "published": "2025-10-31", "url": "https://doi.org/10.1111/agec.70063", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70063"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf045", "title": "Shadow pricing of carbon emissions from agriculture using spatially adaptive reference sets", "abstract": "Abstract We propose a novel spatially adaptive nonparametric framework for estimating shadow prices of carbon dioxide emissions (CSP) in the agriculture sector. Our approach addresses the frequently overlooked issue of spatial heterogeneity among production units. Using a city-level panel dataset from four major agricultural provinces in China during the period 2008–2023, we define spatially adaptive reference sets based on the geographical proximity among metropolitan areas rather than assuming a single production frontier. Our study highlights the importance of considering spatial heterogeneity in environmental performance analysis and proposes a policy-relevant approach for promoting sustainable development in agriculture.", "journal": "European Review of Agricultural Economics", "published": "2025-10-30", "url": "https://doi.org/10.1093/erae/jbaf045", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf045"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70009", "title": "Treatment Effect Heterogeneity of Farmers Participating in Cooperatives", "abstract": "ABSTRACT Despite the many studies providing evidence of the benefits of cooperatives, most small farms and farm households, particularly in transition economies, do not participate in them. This study analyses the effect of cooperative activity on farm performance using a large‐scale farm survey conducted in Armenia. In addition, it addresses the issue of heterogeneity, which is often overlooked in the literature. It looks at heterogeneity in terms of observed effect modifiers, which are measured covariates that can modify the causal effect of cooperation on a specific farm performance indicator. This is the first study that pays special attention to heterogeneity and uses the causal forest approach in the context of cooperative membership to characterise the drivers of treatment heterogeneity (i.e., variation in the causal impact of cooperative membership across farmers with different observable characteristics). Participation in cooperatives is associated with greater perceived farm performance among farmers with limited access to market information and low financial literacy. Similarly, higher benefits are observed for less experienced and older farmers, suggesting that cooperatives play a particularly important role in supporting more vulnerable subgroups.", "journal": "Journal of Agricultural Economics", "published": "2025-10-29", "url": "https://doi.org/10.1111/1477-9552.70009", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70009"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf050", "title": "Social learning to reduce pesticides: Evidence from a French agricultural extension programme", "abstract": "Abstract Social learning is likely to play a crucial role in disseminating new agricultural technologies and driving the agroecological transition in European countries. We evaluated a French pesticide reduction programme designed to train farmers and promote practices through demonstration days on participating farms. Using pseudo-panel data from surveys conducted before and after the programme’s launch, we found evidence of decreased pesticide use among cohorts linked to farms attending demonstration days. Our analysis, supported by a placebo test and various robustness checks, suggests that peer-sharing in training programmes can scale up effectively at no additional cost.", "journal": "European Review of Agricultural Economics", "published": "2025-10-29", "url": "https://doi.org/10.1093/erae/jbaf050", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf050"}, {"source": "crossref", "source_id": "10.1111/agec.70075", "title": "Free From the Kitchen Fueled by Clean Energy: Women's Employment and Nutritional Benefits in Rural China", "abstract": "ABSTRACT The adoption of clean fuels has been associated with improvements in health and women's empowerment. However, the effects on women's labor market participation and family nutrition remain under‐investigated. This study examines the impact of adopting clean fuels on rural women's labor market participation and family nutritional status using representative survey data from the China Health and Nutrition Survey. Our findings indicate that households’ use of clean fuels can promote female employment through two pathways as follows: improving health and reducing cooking time, which leads to an increase in their weekly labor supply by 0.9 days and daily working hours by nearly 1 h. Moreover, this gender‐specific improvement in employment can more effectively enhance women's role in promoting household nutrition, as indicated by more diverse dietary patterns and higher protein intake. This study highlights a novel perspective that integrates domestic energy transition into broader sustainable development goals, particularly those related to health, nutrition, and gender equality.", "journal": "Agricultural Economics", "published": "2025-10-29", "url": "https://doi.org/10.1111/agec.70075", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/agec.70075"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf048", "title": "Heterogeneous effects of export-market preferences on deforestation in Brazil", "abstract": "Abstract We investigate how preferences in the European Union (EU) and China as export destinations affect deforestation dynamics in Brazil at the municipal scale, using a shift–share measure to capture local exposure to foreign demand for soy as an instrument for soy exports. Our findings indicate that municipalities more exposed to increased EU export demand experienced a decline in deforestation compared with less exposed areas, and municipalities with greater exposure to export demand from China experienced increased deforestation compared with less exposed areas. We also examine implications for due diligence policies such as the EU Regulation on deforestation-free products.", "journal": "European Review of Agricultural Economics", "published": "2025-10-28", "url": "https://doi.org/10.1093/erae/jbaf048", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf048"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf043", "title": "Risk attitude, perception, management experience, and productivity: Evidence from a semiparametric approach and a less developed economy", "abstract": "Abstract Though high-value crops like fruits and vegetables are considered lucrative enterprises in developing countries, farmers face various risks related to the inputs and outputs of these production systems. Relatively higher initial investments, intensive care requirements in the face of farm labor shortage, and climatic and production risks challenge vegetable production. This study estimates the production function of commercial vegetable growers in Nepal, particularly emphasizing the effects of risk-related factors. The study uses a semiparametric smooth coefficient production function generalized by integrating the risk-specific variables, allowing the estimation with minimal functional form assumptions. Findings reveal that growers’ attitudes toward risk, perception of risk, and risk management skills affect vegetable production directly and indirectly through input-related decisions and selection. Vegetable growers who were relatively more risk-averse experienced lower productivity than less risk-averse or neutral growers. At the same time, growers who worried about production quality, pests, and climatic risks managed higher productivity than their counterparts. Finally, the study shows heterogeneous effects of risk-related variables across production quantiles; most commercial growers operate their farms around constant or slightly decreasing returns to scale.", "journal": "European Review of Agricultural Economics", "published": "2025-10-27", "url": "https://doi.org/10.1093/erae/jbaf043", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf043"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf053", "title": "The role of advisory provision and policy objective information in dairy farmers’ preferences for methane-reducing feed additives", "abstract": "Abstract In a discrete choice experiment with 320 Swedish dairy farmers, we investigate preferences for methane-reducing feed additives, finding that higher environmental effectiveness and a farm advisor as the provider of accompanying information increase the probability of adoption. Additionally, an information treatment on methane reduction policy objectives lowers willingness to accept for the 30 per cent methane-reduction level of the feed additive. Latent class analysis shows that innovation-friendly farmers are more likely to be adopters, while those with stronger pro-animal-welfare attitudes are not. Finally, we predict feed additive market shares and discuss the economic implications for emissions reduction.", "journal": "European Review of Agricultural Economics", "published": "2025-10-27", "url": "https://doi.org/10.1093/erae/jbaf053", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf053"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf036", "title": "Motivation and intended use transparency: Shaping consumer responses to a red meat tax through information disclosure", "abstract": "Abstract We investigate the impact of a red meat tax and informational strategies on consumer preferences for ground beef, ribeye steak and alternative proteins in a simulated market. We examine the impact of the tax itself and information about its motivation and revenue usage on demand. Results show the tax shifts demand mainly to other animal-based proteins, with variable responses between beef types, highlighting product-specific sensitivity. Our results also suggest that the effectiveness of the tax in shifting consumer behavior significantly depends on the type of information provided about the tax’s purpose and how its revenues would be recycled.", "journal": "European Review of Agricultural Economics", "published": "2025-10-25", "url": "https://doi.org/10.1093/erae/jbaf036", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf036"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf055", "title": "Using multiple methods to improve validity", "abstract": "Abstract Behavioral research faces unique challenges in balancing internal and external validity, especially for policy-oriented studies. This paper examines the limitations of combining experimental and field data to address the “behavioral policy challenge,” highlighting the need for rigorous theoretical assumptions and practical considerations. Drawing on empirical examples, we demonstrate how combining laboratory and field data can sometimes fail to ensure both causality and relevance. We propose criteria for effectively integrating multiple methods to enhance validity, offering insights for researchers aiming to establish robust evidence for behavioral phenomena in policy-making contexts.", "journal": "European Review of Agricultural Economics", "published": "2025-10-25", "url": "https://doi.org/10.1093/erae/jbaf055", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf055"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf044", "title": "Urbanization and the industrialization of agriculture", "abstract": "Abstract As urban environments expand, urban pressure is likely to generate increased competition for resources used in the agricultural sector, such as land and labor. We assess the effects of this urban pressure on the size and exit patterns for local farms. Our results suggest that the effects of urbanization on nearby farms are fundamentally heterogeneous. Increasing urban pressure causes smaller farms in neighboring areas to downsize or exit the industry, whereas large farms scale up in the face of growing urban pressures. In other words, local competition for resources as a result of urbanization can serve as an important mechanism for agricultural industrialization.", "journal": "European Review of Agricultural Economics", "published": "2025-10-25", "url": "https://doi.org/10.1093/erae/jbaf044", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf044"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf029", "title": "Behaviourally informed interventions to maximize environmental delivery under the new CAP green architecture", "abstract": "Abstract A pre-registered online experiment with 1,745 European farmers in four countries tested if behaviourally informed interventions (BII) can increase participation in voluntary measures under the green architecture of the 2023–7 Common Agricultural Policy. We tested seven BIIs including framing (non)adoption as benefits (costs), framing the payment as compensation or reward and the provision of social norms both as stand-alone interventions or when combined. The results showed BII did not increase stated adoption for eco-schemes, but combining social norms with changes in payment framing or framing non-adoption as costs had a positive effect on agro-environmental and climate measure adoption.", "journal": "European Review of Agricultural Economics", "published": "2025-10-25", "url": "https://doi.org/10.1093/erae/jbaf029", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf029"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_1/_article/-char/ja/", "title": "集落営農の組織化過程のメカニズム", "abstract": "", "journal": "農業経営研究", "published": "2025-10-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_1/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/3/63_1/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_14/_article/-char/ja/", "title": "農業法人の役員借入金と収益性に関する実証分析", "abstract": "", "journal": "農業経営研究", "published": "2025-10-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_14/_a
