: "2025-10-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_46/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/3/63_46/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_53/_article/-char/ja/", "title": "生物多様性に係る情報提示内容が有機農産物の購買意向に及ぼす影響", "abstract": "", "journal": "農業経営研究", "published": "2025-10-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_53/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/3/63_53/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_59/_article/-char/ja/", "title": "外国人労働者のキャリアパスの実態と課題", "abstract": "", "journal": "農業経営研究", "published": "2025-10-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_59/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/3/63_59/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_65/_article/-char/ja/", "title": "ポップコーン（爆裂種とうもろこし）による六次産業化と経営成長", "abstract": "", "journal": "農業経営研究", "published": "2025-10-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_65/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/3/63_65/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_71/_article/-char/ja/", "title": "Regional Determinants of Farmland Leasing Efficiency through Farmland Intermediary Management Institutions in Japan:", "abstract": "", "journal": "農業経営研究", "published": "2025-10-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_71/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/3/63_71/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_78/_article/-char/ja/", "title": "ロボットトラクタの利活用実態と大規模水田輪作経営への影響", "abstract": "", "journal": "農業経営研究", "published": "2025-10-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_78/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/3/63_78/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_85/_article/-char/ja/", "title": "稲作経営への園芸作導入と拡大のプロセス", "abstract": "", "journal": "農業経営研究", "published": "2025-10-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_85/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/3/63_85/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_92/_article/-char/ja/", "title": "早場米地帯における水田作経営の作付計画の決定要因", "abstract": "", "journal": "農業経営研究", "published": "2025-10-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_92/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/3/63_92/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_98/_article/-char/ja/", "title": "川手督也・李裕敬・佐藤奨平　編著『日韓台における有機農産物のフードシステム』", "abstract": "", "journal": "農業経営研究", "published": "2025-10-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/3/63_98/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/3/63_98/_article/-char/ja/"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf051", "title": "Exploring the role of public investment and farm subsidy in driving farm TFP convergence across Indian states", "abstract": "Abstract This study examines the convergence in total factor productivity (TFP) and its sources across major agricultural states of India between 1990 and 2020. The study uses the system-GMM procedure, panel data and additional convergence analysis between high- and low-income states, as well as the early economic reform (1990–2004) and later economic reform (2005–2020) periods. Findings show an absolute β-convergence for all high- and low-income states during the early reform and later reform periods. Further, an absolute β-convergence shows a faster convergence in the later economic reform period than in the early economic reform period. The conditional β-convergence reveals that public agricultural expenditures enhance TFP growth and convergence. The findings from this study underscore the need for investments in Indian agriculture, particularly in rural infrastructure building, connectivity, farm research and education, warehousing and storage, irrigation development and crop husbandry and rationalization of input subsidies. However, selective input subsidies are a critical source of divergence in TFP and therefore call for rationalization.", "journal": "European Review of Agricultural Economics", "published": "2025-10-24", "url": "https://doi.org/10.1093/erae/jbaf051", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf051"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf024", "title": "Weather impact on environmental efficiency of the Irish dairy sector: A panel stochastic frontier analysis", "abstract": "Abstract This paper assesses the influence of weather events on the environmental efficiency of Irish dairy farms. Stochastic frontier models based on distance functions (hyperbolic, enhanced and restricted) are estimated using panel data surveyed between 2017 and 2021. Our results indicate that Irish dairy farms can improve their productive performance by increasing desirable outputs by 5.49 per cent and reducing undesirable output (nitrogen surplus) by 5.20 per cent. Results also show that higher temperature and soil moisture are negatively associated with environmental efficiency. These findings highlight the importance of taking into account weather events in farm managerial decisions and policies that aim at tackling environmental challenges in the Irish dairy sector.", "journal": "European Review of Agricultural Economics", "published": "2025-10-23", "url": "https://doi.org/10.1093/erae/jbaf024", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf024"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf040", "title": "The evolution and dynamics of farmer engagement in direct-to-consumer channels in France", "abstract": "Abstract In this study, we employ a mixed-Markov chain model to analyze the factors that influence the dynamics of farm involvement in direct-to-consumer (DTC) channels, using data from the French Agricultural Data Network (FADN). Our findings reveal low participation in DTC channels in France since 1970, along with a notable trend toward combining these channels with conventional supply chains. We also find that farmers often disengage from direct sales over time, partly due to challenges in scaling up, declining returns, and weakening demand for direct food products.", "journal": "European Review of Agricultural Economics", "published": "2025-10-23", "url": "https://doi.org/10.1093/erae/jbaf040", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf040"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf030", "title": "The long-term logistical implications and risks from the Russian invasion of Ukraine on global corn trade flows", "abstract": "Abstract This paper examines the long-term effects on trade from major exporters to key importers. A Monte Carlo simulation combines forecasts for corn trade, energy and shipping costs with the current logistics structure and seasonal dynamics. Random logistical costs are modeled using subject matter expert time–series methods, which calculate optimal monthly trade flows over a 10-year period, from July 2023 to August 2032, to minimize logistics costs. Results indicate that Brazil’s share of the corn market is likely to increase if the war persists, while the US share remains stable. Argentina’s and Ukraine’s shares decline due to throughput constraints on Ukrainian exports. If the war ends in October 2025, Ukraine’s market share is expected to increase.", "journal": "European Review of Agricultural Economics", "published": "2025-10-21", "url": "https://doi.org/10.1093/erae/jbaf030", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf030"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf021", "title": "Agricultural entrepreneurs’ ways to innovate—From food production to tourism experience", "abstract": "Abstract The aim is to explore how agricultural entrepreneurs are innovative and generate new business opportunities, particularly by transforming their farms into tourism experiences. The study was conducted as a qualitative multiple case study with eight cases within agricultural industries in Europe. Data were collected through observations, interviews and documentary studies. A conclusion is that co-creation with customers drives business development forward. By involving customers in the value co-creation process, new solutions and ideas for selling products as well as services emerge. Implications include the need for enterprises to diversify themselves from their competitors and try to find their own uniqueness.", "journal": "European Review of Agricultural Economics", "published": "2025-10-21", "url": "https://doi.org/10.1093/erae/jbaf021", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf021"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf031", "title": "Assessing the impact of payments for environmental services on a bioeconomic supply chain equilibrium", "abstract": "Abstract This study evaluates the effectiveness of Payments for Environmental Services (PES) in mitigating both climate change and biodiversity loss within bioeconomic supply chains. Employing a variational inequality approach within a multicriteria decision-making framework, complemented by numerical simulations using an optimized machine learning algorithm, we find that reductions of approximately 50 per cent in greenhouse gas emissions and biodiversity loss are attainable. However, PES alone are insufficient to achieve these targets. A comprehensive strategy—combining a moderate reduction in production through economic decoupling, increased environmental awareness, and targeted incentives—is necessary for meaningful reductions. Our findings also indicate that supply chain participants collectively forgo 11.36 per cent of their profits when internalizing environmental externalities. Meanwhile, consumers are willing to pay only a 4.04 per cent premium for sustainable products, implying that a significant portion of these costs cannot simply be transferred to consumers. Consequently, firms must invest in greener production methods and abatement technologies to sustain profit margins while mitigating environmental impacts.", "journal": "European Review of Agricultural Economics", "published": "2025-10-16", "url": "https://doi.org/10.1093/erae/jbaf031", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf031"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf034", "title": "Animal welfare in non-anthropocentric cost-benefit analysis and social welfare functions: A critical review to guide practical application", "abstract": "Abstract Cost-benefit analysis and social welfare functions are two closely related methods to evaluate policy impacts. In this critical review, we present the state of knowledge on how to include the animals’ (non-anthropocentric) perspective in these policy evaluations. For this, we synthesize material from the scientific and grey literature and develop a checklist that guides through the process of non-anthropocentric cost-benefit analysis and social welfare functions. Step-by-step, the checklist gives an overview of the alternative options and normative assumptions in the literature and points to remaining research gaps.", "journal": "European Review of Agricultural Economics", "published": "2025-10-16", "url": "https://doi.org/10.1093/erae/jbaf034", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf034"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70011", "title": "Private or Public? Farmer Preferences and Identities in Agri‐Environmental Contract Implementation", "abstract": "ABSTRACT This study investigates farmer preferences for publicly and privately financed agri‐environmental contracts. Using a labelled Discrete Choice Experiment with 366 German grassland farmers, we examine trade‐offs between payment schemes (public/private), payment criteria (practice‐based/result‐based), collaboration options, and advisory services. Our results show that farmers require higher compensation for privately financed contracts compared to public ones. On average, respondents prefer practice‐based over result‐based payments and value free advisory services, particularly in private schemes. Preferences for collaborative implementation indicate a strong desire for autonomy. A key contribution of this study lies in integrating farmer identity into the analysis. Drawing on a psychometric scale of ‘good farmer’ attributes, we identify three latent identities—productivist, environmentalist and civic‐minded—and show that these significantly explain heterogeneity in preferences and land enrolment decisions. Productivist farmers demand higher compensation and commit less land, while environmentalist and civic‐minded farmers are more inclined to participate and enrol larger areas, even at lower compensation levels. These findings highlight the importance of tailoring agri‐environmental contracts to farmers' identities through for example framing of agri‐environmental contracts accordingly. Privately financed schemes, such as those based on crowdfunding platforms, must address perceived risks, offer advisory support and develop communication strategies that resonate with different identity profiles. Recognising farmer identity as a behavioural driver can enhance participation in both public and private agri‐environmental schemes and inform more effective contract design.", "journal": "Journal of Agricultural Economics", "published": "2025-10-15", "url": "https://doi.org/10.1111/1477-9552.70011", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70011"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf032", "title": "Small farm enterprises amid war in Ukraine: Disruption channels and resilience patterns", "abstract": "Abstract This paper examines the impact of the 2022 war in Ukraine on small farm enterprises in global value chains. Drawing on nationally representative survey data, we assess initial disruptions to market access, productivity, damages, labor supply, and coping strategies. We analyze how pre-war characteristics—such as farm scale, adaptive capacity, and market orientation—shaped resilience. Results reveal significant disruptions, mainly from productivity losses. The findings underscore the complex interplay between structural features and resilience, identifying scale and adaptive capacity as key mitigating factors, while nuancing the view that diversification always strengthens resilience. The study offers insights to enhance farm resilience amid shocks.", "journal": "European Review of Agricultural Economics", "published": "2025-10-15", "url": "https://doi.org/10.1093/erae/jbaf032", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf032"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf022", "title": "Estimating technical efficiency at farm level when plot-level data are available", "abstract": "Abstract Ownership of multiple plots by a farmer leads to hierarchical structure of data on production. Researchers use averaging of plot-level technical efficiency scores for computing the farm-level technical efficiency score. With Monte Carlo simulation, we checked the performance of averaging and that of the linear mixed effects model in estimating the true farm efficiency. We generated true efficiency scores under half-normal, normal, and skew-normal distributions of the farm-level random effect. Plot-level score averaging did not estimate the true efficiency. The linear mixed effects model preserved the ranking as well as estimated the true farm-level efficiency score.", "journal": "European Review of Agricultural Economics", "published": "2025-10-15", "url": "https://doi.org/10.1093/erae/jbaf022", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf022"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70008", "title": "Consumer Preferences for Gene‐Edited Foods: A Review of the Literature and Discussion of Industry and Policy Implications", "abstract": "ABSTRACT Gene editing (GE), a revolutionary genetic engineering technology that makes targeted modifications to plant and animal genomes, offers the potential to address key challenges in food security, nutrition, safety, health, agricultural productivity, and sustainability, yet consumer demand for GE foods remains uncertain and complex. This study reviews (1) the factors affecting consumer preferences for GE foods and (2) studies on consumer acceptance of GE foods that feature comparisons to genetically modified (GM) foods. The present manuscript also discusses implications for industry and policymakers and identifies areas where additional research would further promote the acceptance of GE technology. A total of 74 consumer studies were identified, reviewed, and discussed. The results indicate that many factors drive consumer preferences for GE foods, mainly sensory attributes, nutritional content, price, risk perception, trust in institutions, consumer socio‐demographics, and available knowledge and information about GE technology. Furthermore, we found that consumers generally prefer GE foods over GM foods, but this preference varies depending on specific products and contexts. These findings provide useful insights for science, industry, and policymakers aiming to develop, commercialise, and regulate GE foods. Finally, several future research avenues are outlined and discussed.", "journal": "Journal of Agricultural Economics", "published": "2025-10-06", "url": "https://doi.org/10.1111/1477-9552.70008", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70008"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/61/3/61_111/_article/-char/ja/", "title": "農業法人における役員借入金と現金保有に関する実証分析", "abstract": "", "journal": "農林業問題研究", "published": "2025-09-27", "url": "https://www.jstage.jst.go.jp/article/arfe/61/3/61_111/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/61/3/61_111/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/61/3/61_118/_article/-char/ja/", "title": "農村体験型宿泊事業における事務局組織の人材特性", "abstract": "", "journal": "農林業問題研究", "published": "2025-09-27", "url": "https://www.jstage.jst.go.jp/article/arfe/61/3/61_118/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/61/3/61_118/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/61/3/61_127/_article/-char/ja/", "title": "大規模水田作農業法人における若年雇用就農者のキャリア初期の組織適応に関する一考察", "abstract": "", "journal": "農林業問題研究", "published": "2025-09-27", "url": "https://www.jstage.jst.go.jp/article/arfe/61/3/61_127/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/61/3/61_127/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/61/3/61_136/_article/-char/ja/", "title": "環境配慮型畜産物に対する消費者評価とその規定因", "abstract": "", "journal": "農林業問題研究", "published": "2025-09-27", "url": "https://www.jstage.jst.go.jp/article/arfe/61/3/61_136/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/61/3/61_136/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/61/3/61_144/_article/-char/ja/", "title": "バイオエコノミーとマクロ経済の連関分析", "abstract": "", "journal": "農林業問題研究", "published": "2025-09-27", "url": "https://www.jstage.jst.go.jp/article/arfe/61/3/61_144/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/61/3/61_144/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/61/3/61_152/_article/-char/ja/", "title": "国産果樹花粉の価格決定要因と市場形成に関する考察", "abstract": "", "journal": "農林業問題研究", "published": "2025-09-27", "url": "https://www.jstage.jst.go.jp/article/arfe/61/3/61_152/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/61/3/61_152/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/61/3/61_160/_article/-char/ja/", "title": "農業経営の法人化と農地流動化", "abstract": "", "journal": "農林業問題研究", "published": "2025-09-27", "url": "https://www.jstage.jst.go.jp/article/arfe/61/3/61_160/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/61/3/61_160/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/arfe/61/3/61_167/_article/-char/ja/", "title": "山田隆一著『国際協力と実践的農学―アジアとアフリカの現場経験に基づいて―』", "abstract": "", "journal": "農林業問題研究", "published": "2025-09-27", "url": "https://www.jstage.jst.go.jp/article/arfe/61/3/61_167/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/arfe/61/3/61_167/_article/-char/ja/"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70010", "title": "The European Union‐Mercosur Association Agreement: Implications for the\n                    <scp>EU<\/scp>\n                    Livestock Sector", "abstract": "ABSTRACT Following 25 years of negotiations, the Mercosur countries and the European Commission reached a political agreement on a comprehensive association agreement in December 2024. However, its ratification is currently uncertain due to concerns of some European member states, among other issues, around possible negative impacts on their farm/livestock sectors. The main objective of this paper is to quantify these likely impacts. Our methodology elaborates on the general equilibrium framework used in previous sustainable impact assessments, where potential or illustrative agreements were analysed. We simulate both a full liberalisation scenario as well as a scenario simulating the more limited market‐opening offers in sensitive sectors, notably tariff rate quotas in agriculture. This allows us to identify the protective impact of these more limited offers. We also provide results for the main European member states and conduct several robustness analyses. We find that, because the beef offer is limited to additional import quotas, the negative impacts on livestock income are heavily muted. We also find that the European livestock sector, and more generally the farm and food industries, benefit from the income growth induced by the other components of the agreement. Finally, we do not find stronger negative effects in countries currently opposed to ratification, in particular France, because their consumers prefer domestic foods.", "journal": "Journal of Agricultural Economics", "published": "2025-09-26", "url": "https://doi.org/10.1111/1477-9552.70010", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70010"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_1/_article/-char/ja/", "title": "農業新技術の導入における都道府県単位の制度的特徴", "abstract": "", "journal": "農業経済研究", "published": "2025-09-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_1/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/1/97_1/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_21/_article/-char/ja/", "title": "環境ストレス耐性の品種改良と遺伝資源保全の課題", "abstract": "", "journal": "農業経済研究", "published": "2025-09-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_21/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/1/97_21/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_37/_article/-char/ja/", "title": "水田地域の園芸振興におけるソーシャル・キャピタルの役割", "abstract": "", "journal": "農業経済研究", "published": "2025-09-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_37/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/1/97_37/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_43/_article/-char/ja/", "title": "解散事例からみた農業法人への戦略的廃業概念の適用可能性", "abstract": "", "journal": "農業経済研究", "published": "2025-09-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_43/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/1/97_43/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_49/_article/-char/ja/", "title": "中山間地域等直接支払協定の広域再編プロセスと地域の人材確保体制の構築", "abstract": "", "journal": "農業経済研究", "published": "2025-09-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_49/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/1/97_49/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_55/_article/-char/ja/", "title": "内モンゴル牧畜地域における農用地貸借市場に関する事例研究", "abstract": "", "journal": "農業経済研究", "published": "2025-09-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_55/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/1/97_55/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_61/_article/-char/ja/", "title": "労働力募集アプリの効果的活用に求められる農家の意識と行動", "abstract": "", "journal": "農業経済研究", "published": "2025-09-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_61/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/1/97_61/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_67/_article/-char/ja/", "title": "茨城県における水稲品種「にじのきらめき」の普及状況とその要因", "abstract": "", "journal": "農業経済研究", "published": "2025-09-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_67/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/1/97_67/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_73/_article/-char/ja/", "title": "農福連携による精神障害者・ひきこもり等の一般就労に向けた支援の現状と課題", "abstract": "", "journal": "農業経済研究", "published": "2025-09-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_73/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/1/97_73/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_79/_article/-char/ja/", "title": "情報提供がゲノム編集食品に対する消費者の意識に及ぼす影響", "abstract": "", "journal": "農業経済研究", "published": "2025-09-25", "url": "https://www.jstage.jst.go.jp/article/nokei/97/1/97_79/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/nokei/97/1/97_79/_article/-char/ja/"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70007", "title": "COVID‐19 and Farm Management in India: Evidence From the Rural–Urban Interface of Bangalore", "abstract": "ABSTRACT We examine farm management decisions of smallholder farmers during the first wave of COVID‐19 infections in India between June 2020 and March 2021. We use panel data from 256 farm households in the rural–urban interface of Bangalore from a pre‐COVID‐19 face‐to‐face survey and a phone survey at the end of the first COVID‐19 wave. We combine this survey data with sub‐district and village level data on the number of COVID‐19 infections as well as rainfall data. Results of fixed effects panel data models show that higher COVID‐19 exposure, measured by numbers of sub‐district and village level COVID‐19 infections, positively affects the number of sustainable agricultural practices adopted. Conversely, higher COVID‐19 exposure is related to a reduction in the share of crops treated with external inputs such as fertilisers and pesticides. The results suggest that disruptions related to COVID‐19 exposure levels restricted farmers' access to agricultural inputs, prompting a shift towards sustainable agricultural practices.", "journal": "Journal of Agricultural Economics", "published": "2025-09-22", "url": "https://doi.org/10.1111/1477-9552.70007", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70007"}, {"source": "crossref", "source_id": "10.1111/1477-9552.70005", "title": "Presidential Address: Obsessions With Farm Performance: A Cinderella Data Story?", "abstract": "ABSTRACT Agricultural policies have long sought to address the low farm income problem. Investment in farm‐level data collection to analyse these policies has generated extensive datasets that have substantially facilitated the estimation and understanding of farm‐level performance. These high‐quality datasets are underpinned by first‐principles methodological developments and implemented by Research or Investigation Officers (RIO). A Scopus research output search (2000–2024) shows the importance of income, sustainability, performance, efficiency and productivity as research topics drawing on farm‐level datasets. We now require farm‐level data collection and analysis to extend in scope if we are to achieve Net Zero targets. Current global sustainability legislation is based upon production or territorial emissions only, which may incentivise carbon‐inefficient production. To overcome this issue, one approach is the implementation of Agricultural Carbon Border Adjustment Mechanisms (Ag‐CBAM) within international trading rules. These would require robust farm‐level Greenhouse Gas (GHG) data reporting that has proved complex and thus far lack national and international definitional agreement. Collecting farm‐level Key Practice Indicator (KPRI) data, as included in the EU's Farm Sustainability Data Network (FSDN), can demonstrate economic‐environmental win‐wins and farmer‐to‐farmer communication opportunities to reduce agricultural GHG impacts. Central to these new data are the RIOs who engage with farmers to make data provision possible. Farm‐level performance analysis will remain central to our understanding of farming and food systems. We should give greater recognition to our colleagues who collect, collate and synthesise farm‐level data.", "journal": "Journal of Agricultural Economics", "published": "2025-09-17", "url": "https://doi.org/10.1111/1477-9552.70005", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.70005"}, {"source": "crossref", "source_id": "10.1111/jage.v76.3", "title": "", "abstract": "", "journal": "Journal of Agricultural Economics", "published": "2025-09-01", "url": "https://doi.org/10.1111/jage.v76.3", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/jage.v76.3"}, {"source": "crossref", "source_id": "10.1111/1477-9552.12606", "title": "Issue Information", "abstract": "", "journal": "Journal of Agricultural Economics", "published": "2025-09-01", "url": "https://doi.org/10.1111/1477-9552.12606", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1111/1477-9552.12606"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf039", "title": "To be(tween) or not to be(tween)? Mixed-subject designs in preference elicitation", "abstract": "Abstract This study examines consumer preferences for organic and local apples by combining between- and within-subject design characteristics in a second-price auction. Our empirical application combines provision of information regarding local and organic attributes of apples with a tasting stage. We find that a design that combines between- and within-subject elements—a mixed-subject design—results in less noisy willingness-to-pay estimates as well as allows us to uncover significant heterogeneity in elicited premiums that would have been masked if we had drawn inferences from the between-subject or the within-subject treatments in isolation. Results highlight the gains that can be achieved by using a mixed-subject design in experimental auctions.", "journal": "European Review of Agricultural Economics", "published": "2025-09-01", "url": "https://doi.org/10.1093/erae/jbaf039", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf039"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf038", "title": "Land consolidation and interhousehold land-use conflicts: Insights from China", "abstract": "Abstract This study develops a theoretical framework to examine how land consolidation affects interhousehold land-use conflicts (LUCs). It shows that land consolidation mitigates disamenity spatial externalities from fragmented land use rights, reducing conflicts over economic land rights. Using survey data of rice farmers from China and a conditional mixed process model, we empirically confirm that land consolidation significantly lowers the likelihood of interhousehold LUCs. The effect is stronger with cooperative institutions but weaker where alternative mechanisms—like risk-sharing or clan-based governance—exist. The study’s findings underscore the importance of integrating institutional support with land consolidation to reduce rural LUCs effectively.", "journal": "European Review of Agricultural Economics", "published": "2025-09-01", "url": "https://doi.org/10.1093/erae/jbaf038", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf038"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf026", "title": "Organic cultivation and farmland prices: Does certification matter?", "abstract": "Abstract Organic cultivation offers environmental benefits such as improved soil functioning; however, whether an organic cultivation history capitalizes in farmland values remains unclear. We analyse price differentials between organic and conventional arable land in Brandenburg, Germany, using detailed land transaction data and longitudinal land-use data. Based on a doubly robust approach combining matching and regression, we find on average no price differential between organic and conventional farmland at the time of sale. Investigating effect heterogeneity over time, in space, and by post-sale use indicates that this null effect comprises markups and markdowns for organic farmland.", "journal": "European Review of Agricultural Economics", "published": "2025-09-01", "url": "https://doi.org/10.1093/erae/jbaf026", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf026"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf028", "title": "Balancing health benefits and risks: Consumer responses to seafood recalls", "abstract": "Abstract Using weekly NielsenIQ data from 2010 to 2022, we examined the effects of seafood recalls on household purchases of recalled brands and their spillover effects on purchases of unrecalled brands of the same species and unrecalled species. We find that recalls reduced purchases of both recalled and unrecalled brands of the affected species, demonstrating negative within-species spillover effects. We also find that households increased purchases of unrecalled species as a substitute, reflecting positive cross-species spillover effects. These impacts were short-lived: direct impacts on recalled brands lasted approximately 4 weeks, while spillover effects on unrecalled products persisted for only about 1 week.", "journal": "European Review of Agricultural Economics", "published": "2025-09-01", "url": "https://doi.org/10.1093/erae/jbaf028", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf028"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf025", "title": "Pesticide taxation and the adoption of low-input cropping management practices using a hidden Markov model", "abstract": "Abstract Literature indicates that a significant reduction in farmers’ pesticide use requires a change in cropping management practices (CMPs). This article investigates farmers’ decision to adopt low-input CMPs and, particularly, how a standard pesticide reduction policy impacts this decision. We propose a hidden Markov model to uncover farmers’ latent CMP choice, which is considered as an expected return maximizing choice. Our empirical application suggests that, for low-input CMP adopters, non-economic factors outweigh profitability concerns. Whereas for conventional farmers, the CMP choice depends on the economic context and the CMPs profitability level. Hence, pesticide reduction policies could help conventional farmers into less intensive CMPs, provided that they compensate for the revenue gap. This study contributes to the debate on the use of financial incentives to encourage reluctant farmers to adopt sustainable practices.", "journal": "European Review of Agricultural Economics", "published": "2025-09-01", "url": "https://doi.org/10.1093/erae/jbaf025", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf025"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf023", "title": "A comprehensive analysis of urban–rural differences: The case of food consumption in China", "abstract": "Abstract Rapid urbanization and rural-to-urban migration in China have led to significant dietary changes and greater reliance on Western foods. Previous studies have recognized the importance of urbanization but have overlooked key aspects. They neglect the mechanisms behind these shifts, assume uniform consumer responses, and underestimate the impact of food precommitments and demand for food quality. We analyze the impact of urbanization on food consumption using a Generalized Exact Affine Stone Index model, building on advancements in consumer theory. Our study highlights how urbanization offers dietary flexibility, while rural consumers tend to have precommitments. Despite data limitations, we assess food accessibility, availability, and consumer lifestyles as factors contributing to urban–rural dietary disparities. As rural incomes increase, consumers become more conscious of food quality, while urban residents consider further quality improvements less significant. Greater food accessibility and shifts in lifestyle affect dietary variations observed between urban and rural areas, where widening lifestyle gaps reduce quantity disparities while increasing quality gaps. Grasping these dynamics is essential for tackling food security, sustainability, and public health, as urbanization aims to reduce poverty.", "journal": "European Review of Agricultural Economics", "published": "2025-09-01", "url": "https://doi.org/10.1093/erae/jbaf023", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf023"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf035", "title": "Predicting replication outcomes and generalizability of results", "abstract": "Abstract I discuss reasons for why false-positive results are produced and published and report the results from large-scale replication projects where laboratory experiments are redone with new data to test the same hypotheses as in the original studies. In some of this work my collaborators and I have also added prediction markets and decision markets to study whether researchers can predict replication outcomes. The results suggest some but not perfect “wisdom of crowds.” I also discuss potential solutions to replication problems, including potential credibility problems and solutions for nonexperimental results.", "journal": "European Review of Agricultural Economics", "published": "2025-09-01", "url": "https://doi.org/10.1093/erae/jbaf035", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf035"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf057", "title": "Nudging consumers toward healthier diets: Evidence from the Food Choice App in India", "abstract": "Abstract We develop the Food Choice App (FCA) based on the Gastronomic Systems Research (GSR) framework to study how behavioral change communication (BCC) on healthier diets influences diet planning under income shocks. A sample of 192 low- and middle-income households in West Bengal use the FCA to plan their diets by allocating a randomized weekly food budget among 162 Bengali dishes across five eating occasions over seven weekdays. Budget constraints drive carbohydrate prioritization, but BCC exposure and women’s empowerment significantly increase dietary protein density. Findings underscore the importance of targeted nudges across multiple levels of the Gastronomic System to promote healthier diets.", "journal": "European Review of Agricultural Economics", "published": "2025-09-01", "url": "https://doi.org/10.1093/erae/jbaf057", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf057"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf020", "title": "Quality-based pricing in a fish auction market: Are sellers’ expectations met?", "abstract": "Abstract This study investigates producer motivations for quality-enhancing production by comparing hedonic models for auctioned cod in Norway. Transaction prices reflecting buyer valuations of specific quality attributes are compared with sellers’ reserve prices reflecting their price expectations for the same attributes. High-quality attributes obtain the highest prices, but the spread between transaction and reserve prices for these attributes is negative, indicating that sellers’ price expectations are not met. However, the spread is positive for lower quality attributes, suggesting that keeping quality below the highest quality level represents the economically most sustainable way of harvesting.", "journal": "European Review of Agricultural Economics", "published": "2025-09-01", "url": "https://doi.org/10.1093/erae/jbaf020", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf020"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf027", "title": "Consumers’ heterogeneity estimates for sustainable food attributes: Evidence from three European countries", "abstract": "Abstract Semi-parametric estimates of willingness to pay (WTP) distributions for sustainable food attributes are retrieved from data from a stated choice experiment conducted in Germany, Italy and the UK. The focal product is würstel sausages (aka ‘bratwurst’ or ‘hot dog’ sausages). Empirical findings show such attributes are differently appreciated across countries, at least in some of features. The choice data are analysed using a WTP version of the logit-mixed-logit model, which allows for fixed and random coefficients while accommodating correlation effects. The advantages of the model proposed are compared against the standard mixed logit model.", "journal": "European Review of Agricultural Economics", "published": "2025-09-01", "url": "https://doi.org/10.1093/erae/jbaf027", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf027"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf041", "title": "From choice to context: Rethinking food environments, consumer agency and policy action", "abstract": "Abstract Traditional measures of food environments, such as availability, often center on geographic proximity, but in the digital era, proximity is less of a constraint, as consumers browse thousands of food options online. I extend the concept of availability to include what consumers see when buying food online. Using web-scraped data on food-away-from-home offerings from Uber Eats in Michigan, I map retailer presence, product offerings and prices, linking them to nutritional profiles and carbon emissions. I find that the digital food environment is dominated by nutritionally unbalanced, calory-dense and carbon-intensive options. When choice architecture constrains available options, even individuals with strong health and sustainability preferences are unable to make choices aligned with their dietary goals. As these environments are shaped by supply and demand, dual policy strategies are needed to reform what is offered, promoted and priced.", "journal": "European Review of Agricultural Economics", "published": "2025-09-01", "url": "https://doi.org/10.1093/erae/jbaf041", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf041"}, {"source": "crossref", "source_id": "10.1093/erae/jbaf037", "title": "Agricultural R&amp;D impact evaluation: Insights from three decades of research impact assessment in agriculture", "abstract": "Abstract Agricultural research and development (R&amp;D) has played a crucial role in improving agricultural productivity, enhancing the resilience of farming system and ensuring food security worldwide. During the last few decades, assessing and understanding the impact of research is of increasing importance in light of the need to provide public research organizations with reliable information on how R&amp;D investments are generating impacts. The culture of R&amp;D impact assessment is indeed still developing, requiring a multifaceted approach to the consideration of the economic, social and environmental dimensions. This paper aims to provide a synthesis of three decades of agricultural research impact assessment at institutional governance level, highlighting its broader implications for the agri-food sector, the lessons learned and future directions.", "journal": "European Review of Agricultural Economics", "published": "2025-09-01", "url": "https://doi.org/10.1093/erae/jbaf037", "fetched_at": "2026-06-20T12:03:54", "id": "crossref:10.1093/erae/jbaf037"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/2/63_1/_article/-char/ja/", "title": "持続型農業における地域農業組織と経営機能", "abstract": "", "journal": "農業経営研究", "published": "2025-07-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/2/63_1/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/2/63_1/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/2/63_12/_article/-char/ja/", "title": "農業経営におけるデータの活用と可能性", "abstract": "", "journal": "農業経営研究", "published": "2025-07-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/2/63_12/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/2/63_12/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/2/63_18/_article/-char/ja/", "title": "集落営農法人におけるスマート農業の導入", "abstract": "", "journal": "農業経営研究", "published": "2025-07-25", "url": "https://www.jstage.jst.go.jp/article/fmsj/63/2/63_18/_article/-char/ja/", "fetched_at": "2026-06-20T11:54:01", "id": "jstage:https://www.jstage.jst.go.jp/article/fmsj/63/2/63_18/_article/-char/ja/"}, {"source": "jstage", "source_id": "https://www.jstage.jst.go.jp/article/fmsj/63/2/63_25/_article/-char/ja/", "title"         return;
      }
      list.innerHTML = filtered.map(p => {
        const isRead = readSet.has(p.id);
        const isNew = newIds.has(p.id) && !isRead;
        const cls = "card" + (isRead ? " read" : "") + (isNew ? " is-new" : "");
        return `
        <div class="${cls}" data-id="${esc(p.id)}">
          <button class="toggle-read" data-toggle>${isRead ? "未読に戻す" : "既読にする"}</button>
          <div class="title">${isNew ? '<span class="badge-new">NEW</span>' : ""}<a class="paper-link" href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.title)}</a></div>
          <div class="meta"><span class="tag">${esc(p.source)}</span>${esc(p.journal)} · ${esc(p.published)}</div>
          ${p.abstract
              ? `<div class="abstract">${esc(p.abstract)}</div>`
              : `<div class="abstract empty">（アブストラクトなし）</div>`}
          <div class="link"><a class="paper-link" href="${esc(p.url)}" target="_blank" rel="noopener">論文を開く →</a></div>
        </div>`;
      }).join("");
    }

    // クリック委譲: 既読ボタン / 論文リンク（開いたら自動で既読に）
    document.getElementById("list").addEventListener("click", e => {
      const card = e.target.closest(".card");
      if (!card) return;
      const id = card.getAttribute("data-id");
      if (e.target.closest("[data-toggle]")) {
        e.preventDefault();
        toggleRead(id);
      } else if (e.target.closest("a.paper-link")) {
        markRead(id);  // ナビゲーションは止めない（別タブで開く）
      }
    });

    render();
  </script>
</body>
</html>
